<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Management Masă Caldă PNRAS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f14; --panel: #1a1f26; --accent: #10b981; --border: #30363d; --text: #e6edf3; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Roboto Condensed', sans-serif; padding-bottom: 50px; }
        .header-bar { background: var(--panel); padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .section-title { background: #000; padding: 10px 20px; border-left: 4px solid var(--accent); margin: 30px 0 15px 0; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Tabel Principal */
        .table-wrap { width: 100%; overflow-x: auto; background: var(--panel); padding: 15px; border-bottom: 1px solid var(--border); }
        table { border-collapse: collapse; table-layout: fixed; width: 1500px; }
        th, td { border: 1px solid var(--border); text-align: center; height: 50px; font-size: 11px; }
        th { background: #161b22; color: var(--accent); }
        .row-label { width: 180px; text-align: left; padding-left: 12px; font-weight: bold; background: #161b22; }
        
        /* Celule clickabile */
        .cell-aviz { cursor: pointer; transition: 0.2s; font-weight: bold; color: #fbbf24; font-size: 14px; position: relative; }
        .cell-aviz:hover { background: #fbbf24; color: #000; }
        .cell-aviz:hover::after { content: "DESCHIDE AVIZ"; position: absolute; top: -20px; left: 0; font-size: 8px; background: #000; color: #fff; padding: 2px; width: 100%; }
        .cell-empty { color: #444; }

        .sel-meniu { width: 100%; height: 100%; background: #000; color: var(--accent); border: none; font-weight: bold; text-align: center; cursor: pointer; outline: none; }

        /* Butoane Sub Tabel */
        .btns-luna { display: flex; gap: 14px; justify-content: center; margin: 20px auto; max-width: 750px; }
        .btn-print-luna { flex: 1; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-align: center; font-size: 13px; text-transform: uppercase; transition: 0.2s; }
        .btn-print-luna:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn-raport { background: var(--accent); color: #000; }
        .btn-pv { background: #2563eb; color: #fff; }

        /* Grile Foldere Rapoarte */
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 0 20px; }
        .folder { background: #21262d; border: 1px solid var(--border); padding: 20px 10px; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .folder:hover { border-color: var(--accent); background: #1c2128; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .folder-icon { font-size: 40px; display: block; color: #fbbf24; margin-bottom: 8px; }
        .folder b { display: block; color: #fff; font-size: 12px; }
        .folder span { font-size: 10px; color: var(--accent); font-weight: bold; }

        .btn-back { background: #444; color: white; border: none; padding: 8px 18px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-dosar-rap { background: linear-gradient(135deg,#10b981,#059669); color: #000; border: none; padding: 8px 18px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 13px; letter-spacing: 0.5px; transition: 0.2s; }
        .btn-dosar-rap:hover { filter: brightness(1.1); transform: scale(1.02); }
    </style>
</head>
<body>

<div class="header-bar">
    <div style="font-size: 18px; font-weight: bold; color: var(--accent);">LOGISTICĂ MASĂ CALDĂ</div>
    <button class="btn-dosar-rap" onclick="window.location.href='raportare_masa_calda.html'">📁 DOSAR RAPORTARE MASĂ CALDĂ</button>
    <button class="btn-dosar-rap" style="background:linear-gradient(135deg,#0e7490,#0369a1);" onclick="window.location.href='registru_avize.html'">📋 REGISTRU AVIZE</button>
    <button class="btn-back" onclick="window.location.href='index.html'">ÎNAPOI</button>
</div>

<div class="section-title">1. Verificare Zilnică (Click pe cifre pentru Avizul zilei)</div>
<div class="table-wrap">
    <div style="margin-bottom: 15px;">
        <label>Perioada afișată în tabel:</label>
        <select id="sel-luna-tabel" onchange="loadTable(this.value)" style="background:#000; color:#fff; border:1px solid var(--accent); padding:8px; border-radius:4px; font-weight:bold;">
            <optgroup label="Anul 2025" id="opt-2025"></optgroup>
            <optgroup label="Anul 2026" id="opt-2026"></optgroup>
        </select>
    </div>
    
    <table id="main-table">
        <thead><tr id="h-row"></tr></thead>
        <tbody>
            <tr id="row-aviz"></tr>
            <tr id="row-tip-meniu"></tr>
        </tbody>
    </table>

    <div class="btns-luna">
        <button id="btn-print-luna" class="btn-print-luna btn-raport" onclick="printLuna()">📊 GENEREAZĂ RAPORT LUNAR</button>
        <button class="btn-print-luna btn-pv" onclick="printPV()">📋 GENEREAZĂ PROCES VERBAL DE RECEPȚIE</button>
        <button class="btn-print-luna" style="background:#7c3aed;color:#fff;" onclick="window.open(`avize-toate.html?luna=${state.luna}&an=${state.an}&print=1`)">📄 PRINTEAZĂ TOATE AVIZELE</button>
    </div>
</div>

<div class="section-title">2. Arhivă Rapoarte Lunare (Dosar complet Avize)</div>
<div class="folder-grid" id="grid-rapoarte"></div>

<script>
    const URL_S = 'https://aexjrbdgajurxzngfkpx.supabase.co';
    const KEY_S = 'sb_publishable_KPV__0BA9z4EvRl5eqC0FQ_hmBLOLYv';
    const supabaseClient = supabase.createClient(URL_S, KEY_S);

    let state = { luna: "Ianuarie", an: "2025" };
    const luniArr = ["Ianuarie", "Februarie", "Martie", "Aprilie", "Mai", "Iunie", "Iulie", "August", "Septembrie", "Octombrie", "Noiembrie", "Decembrie"];

    async function loadTable(lunaAn) {
        const parts = lunaAn.split('_');
        state.luna = parts[0]; 
        state.an = parts[1];
        
        const { data: records } = await supabaseClient.from('setari_pontaj').select('*').match({ luna: state.luna, an: state.an });

        document.getElementById('h-row').innerHTML = `<th class="row-label">ZILE ${state.an}</th>${Array.from({length:31},(_,i)=>`<th>${i+1}</th>`).join('')}`;
        
        let avizCells = `<td class="row-label">PORȚII (AVIZ)</td>`;
        let meniuCells = `<td class="row-label">TIP MENIU</td>`;

        for(let i=1; i<=31; i++) {
            const ziDate = records?.find(x => parseInt(x.zi) === i);
            const valAviz = ziDate?.valoare_aviz;
            
            if (valAviz && parseInt(valAviz) > 0) {
                avizCells += `<td class="cell-aviz" onclick="window.location.href='avize.html?zi=${i}&luna=${state.luna}&an=${state.an}'">${valAviz}</td>`;
            } else {
                avizCells += `<td class="cell-empty">-</td>`;
            }
            
            let opts = `<option value="">-</option>`;
            for(let m=1; m<=5; m++) {
                opts += `<option value="${m}" ${ziDate?.tip_meniu == m ? 'selected' : ''}>M${m}</option>`;
            }
            meniuCells += `<td><select class="sel-meniu" onchange="updateMeniu(${i}, this.value)">${opts}</select></td>`;
        }
        document.getElementById('row-aviz').innerHTML = avizCells;
        document.getElementById('row-tip-meniu').innerHTML = meniuCells;
    }

    async function updateMeniu(zi, val) {
        const v = val === "" ? null : parseInt(val);
        await supabaseClient.from('setari_pontaj').upsert({ zi, luna: state.luna, an: state.an, tip_meniu: v }, { onConflict: 'zi,luna,an' });
    }

    function printLuna() {
        window.location.href = `raport-lunar.html?luna=${state.luna}&an=${state.an}`;
    }
    function printPV() {
        window.location.href = `proces_verbal_masa.html?luna=${state.luna}&an=${state.an}`;
    }

    function init() {
        const grid = document.getElementById('grid-rapoarte'), s25 = document.getElementById('opt-2025'), s26 = document.getElementById('opt-2026');
        
        const calendar = [];
        luniArr.forEach(l => calendar.push({l, a:"2025"}));
        luniArr.slice(0, 6).forEach(l => calendar.push({l, a:"2026"}));

        grid.innerHTML = "";
        calendar.forEach(item => {
            // Dropdown setup
            const opt = `<option value="${item.l}_${item.a}">${item.l} ${item.a}</option>`;
            if(item.a === "2025") s25.innerHTML += opt; else s26.innerHTML += opt;
            
            // Grid Foldere
            grid.innerHTML += `
                <div class="folder" onclick="window.location.href='raport-lunar.html?luna=${item.l}&an=${item.a}'">
                    <span class="folder-icon">📊</span>
                    <b>Raport ${item.l}</b>
                    <span>AN ${item.a}</span>
                </div>`;
        });
        loadTable("Ianuarie_2025");
    }

    init();

    const meniuriConfigPDF = {
        1: ["Meniu 1: Snizel de pui cu garnitura, salata si paine","Carne: snizel de pui (>130 g) | Garnitura: cartofi la cuptor/piure (>150 g)","Salata: salata de varza | Paine: 3 felii | Ambalaj si tacamuri"],
        2: ["Meniu 2: Pulpa de pui cu garnitura, salata si paine","Carne: pulpa de pui la cuptor (>130 g) | Garnitura: orez legume/cartofi (>150 g)","Salata: salata varza/asortata | Paine: 3 felii | Ambalaj si tacamuri"],
        3: ["Meniu 3: Hamburger de pui","Carne: burger de pui (>130 g) | Garnitura: cartofi pai (>150 g)","Salata: legume | Paine: chifla | Ambalaj si tacamuri"],
        4: ["Meniu 4: Piept de pui cu garnitura, salata si paine","Carne: piept pui (>130 g) | Garnitura: natur/piure (>150 g)","Salata: varza/asortata | Paine: 3 felii | Ambalaj si tacamuri"],
        5: ["Meniu 5: Mancare cartofi cu carne porc, muraturi si paine","Carne: porc (>130 g) | Garnitura: mancarica cartofi (>150 g)","Salata: muraturi asortate | Paine: 3 felii | Ambalaj si tacamuri"]
    };
    const luniMapPDF = {"Ianuarie":"01","Februarie":"02","Martie":"03","Aprilie":"04","Mai":"05","Iunie":"06","Iulie":"07","August":"08","Septembrie":"09","Octombrie":"10","Noiembrie":"11","Decembrie":"12"};
    const PRET_PDF = 13.8;
    function ro(t){if(!t)return"";return String(t).replace(/ă/g,"a").replace(/Ă/g,"A").replace(/â/g,"a").replace(/î/g,"i").replace(/Î/g,"I").replace(/ș/g,"s").replace(/Ș/g,"S").replace(/ț/g,"t").replace(/Ț/g,"T");}

    async function genereazaToateAvizele() {
        const {PDFDocument,StandardFonts,rgb} = PDFLib;
        const pm = document.createElement('div');
        pm.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:9999;";
        pm.innerHTML = '<div style="background:#1a1f26;border:1px solid #10b981;padding:30px 40px;border-radius:12px;min-width:340px;text-align:center;color:#e6edf3;"><div style="font-size:16px;font-weight:bold;color:#10b981;margin-bottom:8px;">Generare avize PDF</div><div id="pm-txt" style="font-size:13px;color:#94a3b8;margin-bottom:14px;">Se incarca datele...</div><div style="background:#0b0f14;border-radius:99px;height:10px;overflow:hidden;"><div id="pm-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#10b981,#059669);border-radius:99px;transition:width 0.3s;"></div></div><div id="pm-pct" style="font-size:12px;color:#10b981;margin-top:6px;">0%</div></div>';
        document.body.appendChild(pm);
        const upd = (pct,txt) => { document.getElementById('pm-bar').style.width=pct+'%'; document.getElementById('pm-pct').textContent=Math.round(pct)+'%'; if(txt) document.getElementById('pm-txt').textContent=txt; };
        try {
            const {data:pontaj} = await supabaseClient.from('setari_pontaj').select('*').match({luna:state.luna, an:state.an});
            const zile = (pontaj||[]).filter(r=>parseInt(r.valoare_aviz)>0).sort((a,b)=>parseInt(a.zi)-parseInt(b.zi));
            if(!zile.length){pm.remove();alert('Nu exista avize pentru luna selectata.');return;}
            const {data:registru} = await supabaseClient.from('registru_documente').select('nr,zi').match({tip:'AVIZ',luna:state.luna,an:parseInt(state.an)});
            const nrPtZi = {}; (registru||[]).forEach(r=>nrPtZi[String(r.zi)]=r.nr);
            upd(5,'Se incarca antetul...');
            let antetImg = null;
            try { const r=await fetch('https://aexjrbdgajurxzngfkpx.supabase.co/storage/v1/object/public/arhiva_pnras/antet_pnras.jpeg'); if(r.ok) antetImg=new Uint8Array(await r.arrayBuffer()); } catch(e){}
            const pdf = await PDFDocument.create();
            const fR=await pdf.embedFont(StandardFonts.TimesRoman);
            const fB=await pdf.embedFont(StandardFonts.TimesRomanBold);
            const fI=await pdf.embedFont(StandardFonts.TimesRomanItalic);
            let imgA=null; if(antetImg) imgA=await pdf.embedJpg(antetImg);
            const W=595,H=842,M=42,negru=rgb(0,0,0),gri=rgb(0.95,0.95,0.95);

            for(let idx=0;idx<zile.length;idx++){
                const r=zile[idx];
                const zi=String(r.zi), ziP=zi.padStart(2,'0');
                const lunaNum=luniMapPDF[state.luna];
                const dataF=`${ziP}.${lunaNum}.${state.an}`;
                const cant=parseInt(r.valoare_aviz)||0;
                const val=(cant*PRET_PDF).toFixed(2);
                const nrAviz=nrPtZi[zi]||'?';
                const spec=meniuriConfigPDF[r.tip_meniu]||["Meniu nespecificat"];
                upd(10+(idx/zile.length)*85,`Aviz ${idx+1}/${zile.length} - ${dataF}`);
                const page=pdf.addPage([W,H]);
                const txt=(t,x,y,font=fR,size=9)=>page.drawText(ro(t),{x,y,size,font,color:negru});
                let y=H-M;
                // Antet
                if(imgA){const d=imgA.scale(1);const aW=W-2*M;const aH=(d.height/d.width)*aW;page.drawImage(imgA,{x:M,y:y-aH,width:aW,height:aH});y-=aH+10;}
                // Tabel furnizor/beneficiar
                const hw=(W-2*M)/2;
                page.drawRectangle({x:M,y:y-52,width:hw,height:52,borderColor:negru,borderWidth:0.5,color:rgb(1,1,1)});
                page.drawRectangle({x:M+hw,y:y-52,width:hw,height:52,borderColor:negru,borderWidth:0.5,color:rgb(1,1,1)});
                txt("Furnizor: SC PROCONS IASI SRL",M+5,y-12,fB,8);
                txt("Nr. ord. reg. com.: J22/294/23.02.2015",M+5,y-22,fR,7.5);
                txt("C.U.I.: 34138254 | Sat Belcesti, Jud. Iasi",M+5,y-32,fR,7.5);
                txt('Beneficiar: Liceul Tehn. "V. Mihailescu Craiu" Belcesti',M+hw+5,y-12,fB,8);
                txt("C.U.I.: 17130374",M+hw+5,y-22,fR,7.5);
                txt("Com. Belcesti, Str. Principala, Nr. 1, Jud. Iasi",M+hw+5,y-32,fR,7.5);
                y-=62;
                txt(`Nr. ${nrAviz}/${dataF}`,M,y,fB,10); y-=16;
                // Titlu
                const titlu="AVIZ DE INSOTIRE A MARFII";
                page.drawText(titlu,{x:(W-fB.widthOfTextAtSize(titlu,14))/2,y,size:14,font:fB,color:negru}); y-=14;
                const dt=`Data: ${dataF}`;
                page.drawText(ro(dt),{x:(W-fR.widthOfTextAtSize(ro(dt),11))/2,y,size:11,font:fR,color:negru}); y-=20;
                // Tabel produse header
                const cW=[28,285,42,55,70,83];
                const cX=[M]; cW.forEach((w,i)=>cX.push(cX[i]+w));
                const hdrs=["Nr.\ncrt.","Specificatia","U.M.","Cant.","Pret unit.\n(f. TVA)","Valoare\n(lei)"];
                hdrs.forEach((h,ci)=>{
                    page.drawRectangle({x:cX[ci],y:y-26,width:cW[ci],height:26,borderColor:negru,borderWidth:0.5,color:gri});
                    h.split('\n').forEach((line,li)=>{const lw=fB.widthOfTextAtSize(line,7);page.drawText(line,{x:cX[ci]+(cW[ci]-lw)/2,y:y-10-li*9,size:7,font:fB,color:negru});});
                });
                y-=26;
                // Rand produs
                const rH=Math.max(38,spec.length*11+12);
                cW.forEach((_,ci)=>page.drawRectangle({x:cX[ci],y:y-rH,width:cW[ci],height:rH,borderColor:negru,borderWidth:0.5,color:rgb(1,1,1)}));
                txt("1",cX[0]+10,y-rH/2-3,fR,9);
                spec.forEach((line,li)=>txt(line,cX[1]+4,y-11-li*11,li===0?fB:fR,li===0?8.5:7.5));
                txt("buc.",cX[2]+(cW[2]-fR.widthOfTextAtSize("buc.",9))/2,y-rH/2-3,fR,9);
                page.drawText(String(cant),{x:cX[3]+(cW[3]-fB.widthOfTextAtSize(String(cant),10))/2,y:y-rH/2-3,size:10,font:fB,color:negru});
                page.drawText("13,8",{x:cX[4]+(cW[4]-fR.widthOfTextAtSize("13,8",9))/2,y:y-rH/2-3,size:9,font:fR,color:negru});
                page.drawText(val,{x:cX[5]+(cW[5]-fB.widthOfTextAtSize(val,9))/2,y:y-rH/2-3,size:9,font:fB,color:negru});
                y-=rH+12;
                // Mentiuni
                txt("Mentiuni:",M,y,fB,10); y-=13;
                ["1. Produsele sunt livrate conform contractului Nr. 143/06.12.2024;","2. Produsele sunt conforme din punct de vedere sanitar-veterinar;","3. Avizul insoteste marfa pe durata transportului;"].forEach(m=>{txt(m,M+10,y,fR,9);y-=13;});
                y-=6;
                // Expeditie
                txt("Date privind expeditia:",M,y,fB,10); y-=13;
                txt("1. Numele delegatului: Murariu Mirela; C.I. Seria MZ, Nr. 710839",M+10,y,fR,9); y-=13;
                txt(`2. Expedierea s-a efectuat in prezenta noastra la data de ${dataF}, ora 13.30.`,M+10,y,fR,9); y-=35;
                // Semnaturi
                txt("Semnatura si stampila furnizorului,",M+10,y,fR,9);
                txt("Semnatura de primire,",M+320,y,fR,9); y-=13;
                txt('Liceul Tehn. "V. Mihailescu Craiu" Belcesti',M+300,y,fB,8); y-=13;
                txt("Pavel Ioan",M+350,y,fB,9); y-=40;
                page.drawLine({start:{x:M+10,y},end:{x:M+170,y},thickness:0.5,color:negru});
                page.drawLine({start:{x:M+300,y},end:{x:M+480,y},thickness:0.5,color:negru});
                // Footer
                const ft=ro("PNRR. Finantat de Uniunea Europeana | https://mfe.gov.ro/pnrr/");
                page.drawLine({start:{x:M,y:M+18},end:{x:W-M,y:M+18},thickness:0.3,color:rgb(0.7,0.7,0.7)});
                page.drawText(ft,{x:(W-fI.widthOfTextAtSize(ft,7))/2,y:M+6,size:7,font:fI,color:rgb(0.4,0.4,0.4)});
            }
            upd(97,'Se salveaza PDF-ul...');
            const blob=new Blob([await pdf.save()],{type:'application/pdf'});
            const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`Avize_${state.luna}_${state.an}.pdf`; a.click();
            upd(100,'Gata!'); setTimeout(()=>pm.remove(),800);
        } catch(e){ pm.remove(); alert('Eroare: '+e.message); console.error(e); }
    }
</script>
</body>
</html>
