<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raportare Masă Caldă PNRAS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;}

/* ===== INDEX ===== */
#view-index{padding:40px 20px;}
.idx-header{text-align:center;margin-bottom:40px;}
.idx-title{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:800;color:#10b981;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.idx-sub{color:#475569;font-size:13px;}
.years-wrap{display:flex;gap:32px;justify-content:center;flex-wrap:wrap;}
.year-block{background:#1e293b;border:1px solid #1e3a5f;border-radius:14px;padding:20px;min-width:300px;}
.year-label{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;color:#10b981;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;text-align:center;}
.months-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.month-card{background:#0f172a;border:1px solid #1e3a5f;border-radius:8px;padding:12px 8px;text-align:center;cursor:pointer;transition:.2s;}
.month-card:hover{border-color:#10b981;background:#0d2010;transform:translateY(-2px);box-shadow:0 4px 16px rgba(16,185,129,.15);}
.month-card .mc-name{font-size:12px;font-weight:700;color:#cbd5e1;display:block;}
.month-card .mc-count{font-size:9px;color:#475569;display:block;margin-top:2px;}
.month-card.has-docs{border-color:#10b981;}
.month-card.has-docs .mc-name{color:#10b981;}

/* ===== DOSAR ===== */
#view-dosar{display:none;}
.cp{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#0f172a,#1e293b);border-bottom:3px solid #10b981;padding:10px 20px;}
.cp-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.cp-title{font-weight:800;font-size:14px;color:#10b981;letter-spacing:1px;text-transform:uppercase;margin-right:auto;}
.cp-luna{background:#0f172a;border:1px solid #10b981;border-radius:6px;padding:5px 12px;font-size:13px;font-weight:700;color:#10b981;}
.btn{padding:7px 16px;border:none;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;color:white;transition:.15s;font-family:'Inter',sans-serif;}
.btn:hover{filter:brightness(1.1);}
.btn-back{background:#334155;}
.btn-dosar-salvat{padding:7px 16px;border:none;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#065f46,#047857);color:#6ee7b7;transition:.15s;font-family:'Inter',sans-serif;white-space:nowrap;}
.btn-dosar-salvat:hover{filter:brightness(1.15);}
.btn-dosar-salvat-empty{font-size:11px;color:#334155;padding:7px 4px;}
.btn-gen{background:linear-gradient(135deg,#10b981,#059669);font-size:13px;padding:9px 20px;}
.btn-gen-teh{background:linear-gradient(135deg,#7c3aed,#5b21b6);font-size:13px;padding:9px 20px;}
.btn-print{background:linear-gradient(135deg,#2563eb,#1e3a8a);}
#status-bar{margin-top:6px;padding:5px 10px;border-radius:5px;font-size:11px;font-weight:600;display:none;}
.st-load{background:#fef3c7;color:#92400e;display:block!important;}
.st-ok{background:#dcfce7;color:#166534;display:block!important;}
.st-err{background:#fee2e2;color:#991b1b;display:block!important;}

.dosar-body{display:flex;min-height:calc(100vh - 60px);}

/* Sidebar */
.sidebar{width:240px;min-width:240px;background:#0f172a;border-right:1px solid #1e293b;overflow-y:auto;padding:8px 0;position:sticky;top:60px;height:calc(100vh - 60px);}
.sb-sec{padding:7px 12px 3px;font-size:9px;font-weight:800;color:#10b981;text-transform:uppercase;letter-spacing:1px;border-top:1px solid #1e293b;margin-top:4px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;}
.sb-sec:first-child{border-top:none;margin-top:0;}
.sb-sec .arr{font-size:8px;color:#334155;transition:.2s;}
.sb-sec.open .arr{transform:rotate(90deg);}
.sb-items{display:none;}
.sb-sec.open+.sb-items{display:block;}
.sb-item{padding:4px 12px 4px 18px;font-size:10px;color:#475569;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.1s;border-left:2px solid transparent;}
.sb-item:hover{background:#1e293b;color:#94a3b8;border-left-color:#334155;}
.sb-item.ok{color:#10b981;border-left-color:#10b981;}
.sb-item .dot{width:5px;height:5px;border-radius:50%;background:#334155;flex-shrink:0;}
.sb-item.ok .dot{background:#10b981;}

/* Main */
.dosar-main{flex:1;padding:20px 28px;overflow-y:auto;}

/* Section card */
.sec-card{background:#1e293b;border:1px solid #1e3a5f;border-radius:10px;margin-bottom:16px;overflow:hidden;}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;background:linear-gradient(135deg,#0f172a,#162033);border-bottom:1px solid #1e3a5f;cursor:pointer;user-select:none;}
.sec-hdr-icon{font-size:18px;}
.sec-hdr-info{flex:1;}
.sec-hdr-num{font-size:9px;font-weight:800;color:#10b981;text-transform:uppercase;letter-spacing:1px;}
.sec-hdr-title{font-size:13px;font-weight:700;color:#e2e8f0;}
.sec-hdr-cnt{font-size:10px;color:#475569;background:#0f172a;padding:2px 8px;border-radius:10px;}
.sec-hdr-arr{color:#475569;font-size:10px;transition:.2s;}
.sec-card.collapsed .sec-hdr-arr{transform:rotate(-90deg);}
.sec-body{padding:12px 14px;}
.sec-card.collapsed .sec-body{display:none;}

/* Day group for avize */
.day-group{background:#0f172a;border:1px solid #1e3a5f;border-radius:7px;margin-bottom:8px;overflow:hidden;}
.day-hdr{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#0d1829;border-bottom:1px solid #1e293b;flex-wrap:wrap;}
.day-date{font-size:12px;font-weight:700;color:#10b981;}
.day-badge{font-size:10px;padding:2px 7px;border-radius:10px;}
.day-badge.livrat{background:#052010;color:#10b981;}
.day-badge.nelivrat{background:#1e0000;color:#ef4444;}
.day-clase{font-size:10px;color:#f59e0b;margin-left:auto;display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end;}
.clase-tag{background:#162033;border:1px solid #1e3a5f;border-radius:3px;padding:1px 5px;font-size:9px;color:#94a3b8;display:inline-flex;align-items:center;gap:4px;}
.clase-prof{font-size:8px;color:#475569;font-style:italic;border-left:1px solid #1e3a5f;padding-left:4px;}
.day-body{padding:10px 12px;}
.aviz-zilnic{margin:0 12px 8px;background:#0a1929;border:1px solid #1e3a5f;border-radius:6px;overflow:hidden;}
.aviz-title{padding:6px 10px;font-size:10px;font-weight:800;color:#10b981;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid #1e3a5f;background:#0d2010;}
.aviz-table{width:100%;border-collapse:collapse;}
.aviz-table th{padding:4px 8px;background:#0f172a;border:1px solid #1e3a5f;font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px;}
.aviz-table td{padding:4px 8px;border:1px solid #1e3a5f;font-size:11px;color:#cbd5e1;}
.aviz-table tfoot td{background:#0f172a;}
.liste-sectiune{margin-top:10px;background:#0a1929;border:1px solid #1e3a5f;border-radius:6px;overflow:hidden;}
.dosar-salvat-box{background:#0d2010;border:1px solid #10b981;border-radius:8px;padding:10px;margin-bottom:8px;}
.dosar-salvat-box.dosar-salvat-empty{background:#0f172a;border-color:#1e293b;color:#334155;font-size:10px;text-align:center;padding:12px;}
.dosar-salvat-title{font-size:9px;font-weight:800;color:#10b981;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.dosar-salvat-luna{font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:4px;}
.dosar-salvat-data{font-size:9px;color:#475569;margin-bottom:8px;}
.dosar-salvat-acts{display:flex;flex-direction:column;gap:4px;}
.sb-teh-sep{border-top:2px solid #78350f;margin:10px 0 6px;padding:6px 12px 0;font-size:9px;font-weight:800;color:#d97706;text-transform:uppercase;letter-spacing:1px;}
.dosar-teh-salvat-box{background:#1c0a00;border:1px solid #d97706;border-radius:8px;padding:10px;margin:0 8px 8px;}
.dosar-teh-salvat-box.empty{background:#0f172a;border-color:#1e293b;color:#334155;font-size:10px;text-align:center;padding:12px;}
.btn-dosar-teh-salvat{padding:7px 16px;border:none;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#92400e,#d97706);color:#fef3c7;transition:.15s;font-family:'Inter',sans-serif;white-space:nowrap;text-decoration:none;}
.btn-dosar-teh-salvat:hover{filter:brightness(1.15);}
.liste-sectiune-title{padding:5px 10px;font-size:9px;font-weight:800;color:#f59e0b;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid #1e3a5f;background:#1a1000;}
.lista-clasa-row{display:flex;align-items:center;gap:8px;padding:5px 10px;border-bottom:1px solid #1e293b;flex-wrap:wrap;}
.lista-clasa-row:last-child{border-bottom:none;}
.lista-clasa-lbl{font-size:11px;font-weight:800;color:#10b981;min-width:36px;}
.lista-expert-lbl{font-size:10px;color:#475569;flex:1;font-style:italic;}
.lista-link{text-decoration:none;font-size:10px!important;padding:2px 8px!important;}

/* Files */
.file-list{display:flex;flex-direction:column;gap:5px;margin-bottom:8px;}
.file-item{display:flex;align-items:center;gap:7px;background:#162033;border:1px solid #1e3a5f;border-radius:5px;padding:6px 10px;}
.fi-icon{font-size:13px;flex-shrink:0;}
.fi-name{flex:1;font-size:11px;color:#cbd5e1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fi-acts{display:flex;gap:4px;flex-shrink:0;}
.bsm{padding:3px 8px;border:none;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:.1s;}
.bsm:hover{filter:brightness(1.15);}
.bv{background:#1e3a5f;color:#60a5fa;}
.bd{background:#1e0000;color:#ef4444;}
.no-docs{font-size:11px;color:#334155;padding:3px 0;}
.fi-excluded{opacity:.45;}
.fi-excluded .fi-name{text-decoration:line-through;color:#475569;}
.toggle-print-wrap{display:inline-flex;align-items:center;gap:3px;cursor:pointer;}
.toggle-print-wrap input[type=checkbox]{width:13px;height:13px;accent-color:#10b981;cursor:pointer;}
.toggle-print-lbl{font-size:9px;font-weight:700;color:#64748b;white-space:nowrap;}

/* Upload zone */
.upzone{border:2px dashed #1e3a5f;border-radius:7px;padding:14px;text-align:center;cursor:pointer;transition:.2s;margin-top:4px;}
.upzone:hover,.upzone.drag{border-color:#10b981;background:rgba(16,185,129,.04);}
.upzone-txt{font-size:11px;color:#475569;}
.upzone-txt b{color:#10b981;}
.up-prog{margin-top:6px;display:none;}
.up-bar{height:4px;background:#0f172a;border-radius:2px;overflow:hidden;}
.up-fill{height:100%;background:linear-gradient(90deg,#10b981,#2563eb);transition:width .3s;}
.up-txt{font-size:10px;color:#64748b;margin-top:3px;}

/* PDF Modal */
#pdfm{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;}
#pdfm.open{display:flex;}
.pdfm-box{background:#1e293b;border-radius:10px;width:92%;max-width:860px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.pdfm-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #334155;flex-shrink:0;}
.pdfm-title{flex:1;font-size:12px;font-weight:700;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pdfm-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.pdfm-body canvas{max-width:100%;box-shadow:0 2px 8px rgba(0,0,0,.5);}
.pdfm-body img{max-width:100%;border-radius:4px;}

/* ===== PRINT ===== */
#print-dosar-container{display:none;}
@media print{
  @page{size:A4 portrait;margin:0;}
  body>*:not(#print-dosar-container){display:none!important;}
  #print-dosar-container{display:block!important;}

  .print-cover-page{
    width:100%;min-height:100vh;box-sizing:border-box;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    page-break-after:always;break-after:page;
    background:#fff;
    padding:0 0 60px 0;
    font-family:'Inter',Arial,sans-serif;
    border:10px solid #10b981;
    position:relative;
    overflow:hidden;
  }
  .print-cover-antet{
    width:100%;max-width:100%;object-fit:cover;object-position:center top;
    display:block;flex-shrink:0;
  }
  .print-cover-divider{
    width:120px;height:4px;background:#10b981;border-radius:2px;margin:28px 0;
  }
  .print-cover-title{
    font-size:32pt;font-weight:800;color:#0f172a;text-align:center;letter-spacing:1px;margin-bottom:16px;
  }
  .print-cover-luna{
    font-size:20pt;font-weight:700;color:#10b981;text-align:center;letter-spacing:2px;text-transform:uppercase;
  }
  .print-cover-meta{
    margin-top:28px;border:2px solid #10b981;border-radius:10px;padding:18px 36px;text-align:left;background:#f0fdf4;
  }
  .print-cover-meta-row{
    font-size:12pt;color:#0f172a;margin-bottom:10px;line-height:1.6;
  }
  .print-cover-meta-row:last-child{margin-bottom:0;}
  .print-cover-meta-lbl{
    font-weight:800;color:#065f46;
  }
  .print-cover-body{
    width:100%;padding:40px 80px 0 80px;box-sizing:border-box;
    display:flex;flex-direction:column;align-items:center;flex:1;
  }
  .print-cover-opis{
    margin-top:24px;width:100%;border-top:2px solid #10b981;padding-top:16px;
  }
  .print-cover-opis-title{
    font-size:7pt;font-weight:800;color:#065f46;letter-spacing:2px;text-transform:uppercase;
    margin-bottom:8px;text-align:center;
  }
  .print-cover-opis-row{
    display:flex;align-items:baseline;gap:6px;padding:3px 0;
    border-bottom:1px dotted #d1fae5;font-size:8pt;color:#374151;
  }
  .print-cover-opis-row:last-child{border-bottom:none;}
  .print-cover-opis-nr{
    font-weight:700;color:#10b981;min-width:16px;flex-shrink:0;
  }
  .print-cover-opis-label{flex:1;}

  .print-sec-page{
    width:210mm;height:297mm;box-sizing:border-box;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    page-break-after:always;break-after:page;
    page-break-inside:avoid;break-inside:avoid;
    border:8px solid;border-radius:0;
    background:#fff;
    padding:60px 80px;
    font-family:'Inter',Arial,sans-serif;
    overflow:hidden;
  }
  .print-sec-num{font-size:16pt;font-weight:900;letter-spacing:4px;text-transform:uppercase;margin-bottom:28px;}
  .print-sec-icon{font-size:56pt;margin-bottom:20px;}
  .print-sec-title{font-size:42pt;font-weight:900;text-align:center;margin-bottom:32px;letter-spacing:2px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .print-sec-line{height:6px;width:160px;border-radius:3px;margin-bottom:24px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .print-sec-sub{font-size:12pt;font-weight:600;text-align:center;letter-spacing:1px;}

  .print-placeholder-page{
    width:210mm;height:297mm;box-sizing:border-box;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    page-break-after:always;break-after:page;
    page-break-inside:avoid;break-inside:avoid;
    border:3px dashed;
    background:#fff;
    padding:60px 80px;
    font-family:'Inter',Arial,sans-serif;
    overflow:hidden;
  }
  .print-ph-tag{font-size:9pt;font-weight:700;padding:5px 14px;border-radius:20px;border:1.5px solid;margin-bottom:32px;letter-spacing:1px;text-transform:uppercase;}
  .print-ph-icon{font-size:44pt;margin-bottom:20px;}
  .print-ph-title{font-size:18pt;font-weight:800;text-align:center;margin-bottom:24px;line-height:1.4;}
  .print-ph-warn{font-size:11pt;color:#dc2626;font-weight:700;text-align:center;margin-bottom:28px;padding:10px 24px;border:2px solid #fca5a5;border-radius:8px;background:#fff5f5;}
  .print-ph-box{font-size:11pt;text-align:center;padding:20px 32px;border:2px solid;border-radius:10px;line-height:2;}

  .print-doc-ref{
    width:210mm;height:297mm;box-sizing:border-box;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    page-break-after:always;break-after:page;
    page-break-inside:avoid;break-inside:avoid;
    background:#fff;padding:60px 80px;
    font-family:'Inter',Arial,sans-serif;
    overflow:hidden;
  }
  .print-doc-ref-icon{font-size:44pt;margin-bottom:16px;}
  .print-doc-ref-name{font-size:16pt;font-weight:700;color:#1e293b;margin-bottom:12px;text-align:center;}
  .print-doc-ref-note{font-size:10pt;color:#64748b;text-align:center;}
  .print-pdf-page{
    width:210mm;height:297mm;box-sizing:border-box;
    page-break-after:always;break-after:page;
    page-break-inside:avoid;break-inside:avoid;
    background:#fff;
    overflow:hidden;
  }
  .print-pdf-page:last-child{page-break-after:avoid;break-after:avoid;}
  .print-pdf-page img{width:210mm;height:297mm;display:block;object-fit:contain;}
  .print-aviz-page{
    width:210mm;height:297mm;box-sizing:border-box;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    page-break-after:always;break-after:page;
    page-break-inside:avoid;break-inside:avoid;
    border:6px solid;background:#fff;
    padding:60px 80px;
    font-family:'Inter',Arial,sans-serif;
    overflow:hidden;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  .print-aviz-tag{font-size:10pt;font-weight:700;padding:6px 18px;border-radius:20px;border:1.5px solid;margin-bottom:28px;letter-spacing:1px;text-transform:uppercase;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .print-aviz-title{font-size:32pt;font-weight:900;text-align:center;margin-bottom:12px;}
  .print-aviz-date{font-size:18pt;font-weight:700;text-align:center;margin-bottom:36px;opacity:.8;}
  .print-aviz-table{width:100%;border-collapse:collapse;max-width:600px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>
<body>

<!-- INDEX -->
<div id="view-index">
  <div class="idx-header">
    <div class="idx-title">🍽️ Raportare Masă Caldă</div>
    <div class="idx-sub">PNRAS — Liceul Tehnologic „Victor Mihăilescu Craiu" Belcești — SC PROCONS SRL</div>
  </div>
  <div class="years-wrap">
    <div class="year-block">
      <div class="year-label">📅 2024</div>
      <div class="months-grid" id="grid-2024"></div>
    </div>
    <div class="year-block">
      <div class="year-label">📅 2025</div>
      <div class="months-grid" id="grid-2025"></div>
    </div>
    <div class="year-block">
      <div class="year-label">📅 2026</div>
      <div class="months-grid" id="grid-2026"></div>
    </div>
  </div>
</div>

<!-- DOSAR -->
<div id="view-dosar">
  <div class="cp">
    <div class="cp-row">
      <div class="cp-title">🍽️ Masă Caldă</div>
      <span class="cp-luna" id="cp-luna">—</span>
      <button class="btn btn-back" onclick="goBack()">⬅ Înapoi</button>
      <button class="btn btn-gen" onclick="genDosar()">🚀 GENEREAZĂ DOSAR</button>
      <div id="dosar-salvat-header"></div>
    </div>
    <div id="status-bar"></div>
  </div>
  <div class="dosar-body">
    <div class="sidebar" id="sidebar"></div>
    <div class="dosar-main" id="dosar-main"></div>
  </div>
</div>

<!-- PDF Modal -->
<div id="pdfm">
  <div class="pdfm-box">
    <div class="pdfm-hdr">
      <span class="pdfm-title" id="pdfm-title">—</span>
      <a id="pdfm-link" target="_blank" style="font-size:10px;color:#60a5fa;text-decoration:none;white-space:nowrap;">🔗 Deschide</a>

// Grupează zilele consecutive nelivrate
function groupZile(pontaj){
  const result=[];let i=0;
  while(i<pontaj.length){
    const p=pontaj[i];
    if(p.valoare_aviz>0){result.push({type:'livrat',zile:[p]});i++;}
    else{
      const grup=[p];
      while(i+1<pontaj.length&&!(pontaj[i+1].valoare_aviz>0)&&pontaj[i+1].zi===pontaj[i].zi+1){i++;grup.push(pontaj[i]);}
      result.push({type:'nelivrat',zile:grup});i++;
    }
  }
  return result;
}

          if(!f.data_document) return true;
          return String(new Date(f.data_document).getFullYear())===String(_an);
        });
        return r;
      }).catch(()=>({data:[]})),
      db.from('elevi').select('clasa_grupa').then(r=>r).catch(()=>({data:[]})),
      db.from('liste_fisiere').select('*').eq('luna',_luna).eq('an',_an).then(r=>r).catch(()=>({data:[]}))
    ]);
    _ctrDocs=ctrR.data||[];

    // Dacă există masa pentru zi+clasă → afișăm masa + prezența aceluiași expert
    // Dacă nu există masa → excludem complet clasa din zi respectivă
    _listeZiClasa={};
    const toateListe=listeR.data||[];
    // Grupăm mai întâi toate listele pe zi|clasa
    const _tmpListe={};
    toateListe.forEach(l=>{
      const k=String(l.zi)+'|'+(l.clasa||'');
      if(!_tmpListe[k])_tmpListe[k]=[];
      _tmpListe[k].push(l);
    });
    // Păstrăm doar zi+clase unde există masa
    Object.entries(_tmpListe).forEach(([k,arr])=>{
      const masa=arr.find(l=>l.tip==='masa');
      if(!masa)return; // fără masă = excludem
      // Prezența: doar a expertului care are masa
      const prez=arr.find(l=>l.tip==='prezenta'&&l.expert===masa.expert);
      _listeZiClasa[k]={masa,prez:prez||null,expert:masa.expert};
    });
    // Pentru fiecare factură găsită după titlu, preia PDF-ul din documente_contract
    const facturiMeta=factR.data||[];
    if(facturiMeta.length){
      const fIds=facturiMeta.map(f=>f.id);
      const{data:factDocs}=await db.from('documente_contract').select('*').in('furnizor',fIds).eq('tip_document','13. Factura');
      const docsByFid={};(factDocs||[]).forEach(d=>{docsByFid[d.furnizor]=d;});
      _facturi=facturiMeta.map(f=>({...f,doc:docsByFid[f.id]||null}));
      _facturi.sort((a,b)=>{
        const da=a.data_document?new Date(a.data_document):new Date(0);
        const db2=b.data_document?new Date(b.data_document):new Date(0);
        return da-db2;
      });
    } else {
      _facturi=[];
    }
    _pontDet=detR.data||[];
    const ziCuActivitate=new Set((_pontDet||[]).map(p=>String(p.zi)));

    // Helper: verifică dacă o zi (număr) din luna/an curent e weekend
    function esteWeekend(zi){
      const lunaIdx=["Ianuarie","Februarie","Martie","Aprilie","Mai","Iunie","Iulie","August","Septembrie","Octombrie","Noiembrie","Decembrie"].indexOf(_luna);
      const d=new Date(Number(_an),lunaIdx,Number(zi));
      return d.getDay()===0||d.getDay()===6;
    }

    // Preia zilele cu fara_masa=true — SINGURA sursă de comunicări nelivrare
    const{data:faraMasaR}=await db.from('pontaj_detaliat')
      .select('zi').eq('luna',_luna).eq('an',_an).eq('fara_masa',true);
    const zileFaraMasaSet=new Set((faraMasaR||[]).map(r=>String(r.zi)));

    // Păstrăm în _pontaj DOAR:
    // 1. Zile cu aviz livrat (valoare_aviz > 0)
    // 2. Zile cu fara_masa=true explicit marcate — apar ca comunicări nelivrare
    // Excludem zilele care au doar activitate în pontaj_detaliat fără aviz și fără fara_masa
    _pontaj=(pontR.data||[]).filter(p=>{
      if(p.valoare_aviz>0) return true; // livrat
      if(zileFaraMasaSet.has(String(p.zi))) return true; // comunicare nelivrare explicită
      return false; // altceva — ignorăm
    });

    // Adaugă zilele cu fara_masa=true care nu sunt deja în setari_pontaj
    if(faraMasaR&&faraMasaR.length){
      const zileFM=[...new Set(faraMasaR.map(r=>Number(r.zi)))];
      zileFM.forEach(zi=>{
        if(!_pontaj.find(p=>Number(p.zi)===zi))
          _pontaj.push({zi,valoare_aviz:0,tip_meniu:null,luna:_luna,an:_an});
      });
      _pontaj.sort((a,b)=>a.zi-b.zi);
    }
    const docs=(docsR.data||[]).filter(d=>d.tip_document&&d.tip_document.startsWith(`MASA_${_luna}_${_an}_`));
    const byTip={};
    docs.forEach(d=>{if(!byTip[d.tip_document])byTip[d.tip_document]=[];byTip[d.tip_document].push(d);});
    _byTip=byTip;
    try{renderSidebar(byTip);}catch(e){console.error('renderSidebar:',e);}
    try{renderMain(byTip);}catch(e){console.error('renderMain:',e);}

    await loadDosarTehnicSalvat().catch(e=>console.warn('loadDosarTehnicSalvat:',e));
    setSt('','');
  }catch(e){console.error('load() catch:',e);setSt('❌ '+e.message,'err');}
}

function fileItemToggle(d,icon,nameHtml,extraActsHtml=''){
  const excluded=d.exclude_print===true;
  return '<div class="file-item'+(excluded?' fi-excluded':'')+'">'
    +'<span class="fi-icon">'+icon+'</span>'
    +'<span class="fi-name">'+nameHtml+'</span>'
    +'<div class="fi-acts">'
    +extraActsHtml
    +'<label class="toggle-print-wrap" title="'+(excluded?'Exclus din print':'Inclus \u00een print')+'">'
    +'<input type="checkbox" class="toggle-print-cb" '+(excluded?'':'checked')+' onchange="toggleExcludePrint(\''+d.id+'\',!this.checked)">'
    +'<span class="toggle-print-lbl">'+(excluded?'\u{1f6ab} Print':'\u{1f5a8} Print')+'</span>'
    +'</label>'
    +'</div>'
    +'</div>';
}

function fileListHtml(docs,secId,zi=''){
  if(!docs.length)return`<div class="no-docs">Niciun document adăugat.</div>`;
  return`<div class="file-list">${docs.map(d=>{
    const ext=(d.link_drive||'').split('?')[0].split('.').pop().toLowerCase();
    const icon={'pdf':'📄','doc':'📝','docx':'📝','jpg':'🖼️','jpeg':'🖼️','png':'🖼️','webp':'🖼️'}[ext]||'📎';
    const nm=(d.nume_fisier||'document').replace(/'/g,"\\'");
    const lk=(d.link_drive||'').replace(/'/g,"\\'");
    const excluded=d.exclude_print===true;
    return`<div class="file-item${excluded?' fi-excluded':''}" id="fi_${d.id}">
      <span class="fi-icon">${icon}</span>
      <span class="fi-name" title="${d.nume_fisier||'document'}">${d.nume_fisier||'document'}</span>
      <div class="fi-acts">
        <button class="bsm bv" onclick="viewDoc('${lk}','${nm}')">👁 Vezi</button>
        <label class="toggle-print-wrap" title="${excluded?'Exclus din print — click pentru a include':'Inclus în print — click pentru a exclude'}">
          <input type="checkbox" class="toggle-print-cb" ${excluded?'':'checked'} onchange="toggleExcludePrint('${d.id}',!this.checked)">
          <span class="toggle-print-lbl">${excluded?'🚫 Print':'🖨 Print'}</span>
        </label>
        <button class="bsm bd" onclick="delDoc('${d.id}','${lk}','${secId}','${zi}')">🗑 Şterge</button>
      </div>
    </div>`;
  }).join('')}</div>`;

// ===== UPLOAD =====
function onDrop(ev,secId,zi){
  ev.preventDefault();
  const uid=`up_${secId}_${zi}`;
  document.getElementById(uid).classList.remove('drag');
  uploadFiles([...ev.dataTransfer.files],secId,zi);
}
function onFileInput(ev,secId,zi){
  uploadFiles([...ev.target.files],secId,zi);
  ev.target.value='';
}

async function uploadFiles(files,secId,zi){
  if(!files.length)return;
  const prog=document.getElementById(`prog_${secId}_${zi}`);
  const fill=document.getElementById(`fill_${secId}_${zi}`);
  const txt=document.getElementById(`txt_${secId}_${zi}`);
  if(prog)prog.style.display='block';
  const tipDoc=mk(secId,zi);
  for(let i=0;i<files.length;i++){
    const f=files[i];
    if(txt)txt.textContent=`Urcă: ${f.name} (${i+1}/${files.length})`;
    if(fill)fill.style.width='20%';
    try{
      const safe=f.name.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9._-]/g,'_');
      const fn=`masa_calda/${_luna}_${_an}_${secId}${zi?'_'+zi:''}_${Date.now()}_${safe}`;
      const url=await r2Up(fn,f);
      if(fill)fill.style.width='75%';
      const{error}=await db.from('documente_contract').insert({contract_id:CTR_ID,tip_document:tipDoc,nume_fisier:f.name,link_drive:url,furnizor:'masa_calda'});
      if(error)throw error;
      if(fill)fill.style.width='100%';
      if(txt)txt.textContent=`✅ ${f.name}`;
    }catch(e){
      if(txt)txt.textContent='❌ '+e.message;
      if(fill){fill.style.background='#ef4444';fill.style.width='100%';}
    }
    await new Promise(r=>setTimeout(r,400));
  }
  setTimeout(async()=>{
    if(prog){prog.style.display='none';if(fill){fill.style.width='0%';fill.style.background='';}}
    await load();
  },700);
}

// ===== DELETE =====
async function toggleExcludePrint(id,exclude){
  try{
    await db.from('documente_contract').update({exclude_print:exclude}).eq('id',id);
    // Update local byTip data without full reload
    Object.values(_byTip).forEach(arr=>arr.forEach(d=>{if(d.id===id)d.exclude_print=exclude;}));
    // Update visual state
    const el=document.getElementById('fi_'+id);
    if(el){
      el.classList.toggle('fi-excluded',exclude);
      const lbl=el.querySelector('.toggle-print-lbl');
      if(lbl)lbl.textContent=exclude?'🚫 Print':'🖨 Print';
      const cb=el.querySelector('.toggle-print-cb');
      if(cb)cb.title=exclude?'Exclus din print — click pentru a include':'Inclus în print — click pentru a exclude';
    }
    // Refresh doc counts in section headers
    renderSidebar(_byTip);
  }catch(e){alert('Eroare: '+e.message);}
}

async function delDoc(id,link,secId,zi){
  if(!confirm('Ștergi documentul?'))return;
  try{
    if(link)await r2Del(link);
    await db.from('documente_contract').delete().eq('id',id);
    await load();
  }catch(e){alert('Eroare: '+e.message);}
}

// ===== VIEW DOC =====
async function viewDoc(url,name){
  if(!url)return;
  document.getElementById('pdfm-title').textContent=name;
  document.getElementById('pdfm-link').href=url;
  const body=document.getElementById('pdfm-body');
  body.innerHTML='<div style="color:#64748b;padding:20px;">Se încarcă...</div>';
  document.getElementById('pdfm').classList.add('open');
  const ext=(url.split('?')[0].split('.').pop()||'').toLowerCase();
  if(['jpg','jpeg','png','webp','gif','bmp'].includes(ext)){
    body.innerHTML=`<img src="${url}">`;return;
  }
  if(ext==='pdf'){
    try{
      const pdf=await pdfjsLib.getDocument({url,cMapUrl:'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',cMapPacked:true}).promise;
      body.innerHTML='';
      for(let n=1;n<=pdf.numPages;n++){
        const pg=await pdf.getPage(n);const vp=pg.getViewport({scale:1.5});
        const cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;
        await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
        body.appendChild(cv);
      }
    }catch(e){body.innerHTML=`<div style="color:#ef4444;">Eroare: ${e.message}</div>`;}
    return;
  }
  body.innerHTML=`<div style="color:#94a3b8;text-align:center;padding:30px;">
    <div style="font-size:36px;margin-bottom:10px;">📎</div>
    <div>Previzualizare indisponibilă.</div>
    <a href="${url}" target="_blank" style="color:#10b981;font-weight:700;display:block;margin-top:10px;">🔗 Deschide fișierul</a>
  </div>`;
}
function closePdfModal(){document.getElementById('pdfm').classList.remove('open');document.getElementById('pdfm-body').innerHTML='';}

const MENIURI_CONFIG={
  1:'<strong>Meniu 1: Șnițel de pui</strong> (Șnițel >130g, Garnitură cartofi/piure >150g, Salată varză, 3 felii pâine, Tacâmuri)',

  3:'<strong>Meniu 3: Hamburger pui</strong> (Burger >130g, Garnitură cartofi pai >150g, Legume, Chiflă, Tacâmuri)',
  4:'<strong>Meniu 4: Piept de pui</strong> (Piept >130g, Garnitură natur/piure >150g, Salată varză/asortată, 3 felii pâine, Tacâmuri)',
  5:'<strong>Meniu 5: Mâncare cartofi cu porc</strong> (Carne porc >130g, Mâncărică cartofi >150g, Murături asortate, 3 felii pâine, Tacâmuri)'
};
const LUNI_TEXT=["Ianuarie","Februarie","Martie","Aprilie","Mai","Iunie","Iulie","August","Septembrie","Octombrie","Noiembrie","Decembrie"];

function calcNrRegistru(toateRandurile){
  const sorted=[...toateRandurile].sort((a,b)=>{
    const lA=LUNI_TEXT.indexOf(a.luna_inreg),lB=LUNI_TEXT.indexOf(b.luna_inreg);
    if(lA!==lB)return lA-lB;
    const ziA=parseInt(a.zi_inreg)||999,ziB=parseInt(b.zi_inreg)||999;
    if(ziA!==ziB)return ziA-ziB;
    const soA=a.sort_order!=null?a.sort_order:a.id;
    const soB=b.sort_order!=null?b.sort_order:b.id;
    return soA-soB;
  });
  let autoNr=1;
  const blocate=sorted.filter(r=>r.blocat).map(r=>parseInt(r.numar_fix));
  sorted.forEach(row=>{
    if(row.blocat){row.tempNr=parseInt(row.numar_fix);autoNr=Math.max(autoNr,row.tempNr+1);}
    else{while(blocate.includes(autoNr))autoNr++;row.tempNr=autoNr++;} 
  });
  return sorted;
}

}

async function pdfToImages(url,scale=1.8){
  return fileToImages(url,scale);
}
async function fileToImages(url,scale=1.2){
  const images=[];
  const ext=(url.split('?')[0].split('.').pop()||'').toLowerCase();
  try{
    if(['jpg','jpeg','png','webp','gif','bmp','tiff','tif','avif'].includes(ext)){
      // Imagine standard: folosim URL direct — nu convertim în base64
      images.push(url);
    } else if(['heic','heif'].includes(ext)){
      const resp=await fetch(url);
      const blob=await resp.blob();
      const converted=await heic2any({blob,toType:'image/jpeg',quality:0.75});
      const arrBlob=Array.isArray(converted)?converted:[converted];
      for(const b of arrBlob){
        const dataUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(b);});
        images.push(dataUrl);
      }
    } else {
      // PDF via pdf.js — scala redusă, calitate redusă
      const pdf=await pdfjsLib.getDocument({
        url,
        cMapUrl:'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
        cMapPacked:true
      }).promise;
      for(let n=1;n<=pdf.numPages;n++){
        const pg=await pdf.getPage(n);
        const vp=pg.getViewport({scale});
        const cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;
        await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
        images.push(cv.toDataURL('image/jpeg',0.75));
      }
    }
  }catch(e){console.warn('fileToImages error ('+ext+'):',e);}
  return images;
}

async function genDosar(){
  setSt('⏳ Se generează dosarul...','load');
  const warnings=[];

  // Încarcă contractul (S1)
  const{data:ctrDocs}=await db.from('documente_contract').select('*').eq('contract_id',CTR_ID).eq('tip_document','9. Contract');

  // Preia imaginea antet ca base64 (necesar pentru print corect)
  let antetSrc=ANTET_URL;
  try{
    const resp=await fetch(ANTET_URL);
    const blob=await resp.blob();
    antetSrc=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(blob);});
  }catch(e){console.warn('Antet fallback URL',e);}

  // Cache imagini — uploadează paginile în R2 și returnează URL-uri
  const _imgCache={};
  async function getImgs(key,url){
    if(_imgCache[key]) return _imgCache[key];
    const pages=await pdfToImages(url);
    // Dacă sunt deja URL-uri (imagini directe) — returnează ca atare
    if(pages.length&&pages[0].startsWith('http')){
      _imgCache[key]=pages;
      return pages;
    }
    // PDF pages — uploadează fiecare în R2
    const urls=[];
    for(let pi=0;pi<pages.length;pi++){
      try{
        const b64=pages[pi];
        const byteStr=atob(b64.split(',')[1]);
        const ab=new ArrayBuffer(byteStr.length);
        const ia=new Uint8Array(ab);
        for(let j=0;j<byteStr.length;j++) ia[j]=byteStr.charCodeAt(j);
        const imgBlob=new Blob([ab],{type:'image/jpeg'});
        const fn=`masa_calda/tmp/${_luna}_${_an}_${key}_p${pi+1}_${Date.now()}.jpg`;
        const imgUrl=await r2Up(fn,imgBlob);
        urls.push(imgUrl);
      }catch(e){console.warn('upload page error:',e);urls.push(pages[pi]);}
    }
    _imgCache[key]=urls;
    return urls;

      +`<div class="viewer-toolbar">`
      +`<div class="viewer-title">📂 Dosar masă caldă — ${_luna} ${_an}</div>`
      +`<button class="viewer-btn viewer-btn-print" onclick="window.print()">🖨️ Printează / Salvează PDF</button>`
      +`</div>`
      +`<div class="viewer-pages">${printHtml}</div>`
      +`</body></html>`;
    const blob=new Blob([standAlone],{type:'text/html;charset=utf-8'});
    const fn=`masa_calda/DOSAR_${_luna}_${_an}_${Date.now()}.html`;
    const url=await r2Up(fn,blob);
    // Șterge dosar vechi dacă există
    const tipD=`DOSAR_MASA_${_luna}_${_an}`;
    const{data:vechi}=await db.from('documente_contract').select('id,link_drive').eq('contract_id',CTR_ID).eq('tip_document',tipD);
    if(vechi&&vechi.length){for(const v of vechi){if(v.link_drive)await r2Del(v.link_drive);}await db.from('documente_contract').delete().eq('contract_id',CTR_ID).eq('tip_document',tipD);}
    // Salvează referința nouă
    await db.from('documente_contract').insert({contract_id:CTR_ID,tip_document:tipD,nume_fisier:`Dosar masă caldă — ${_luna} ${_an}.html`,link_drive:url,furnizor:'dosar_masa_calda'});
    // Inserează containerul de print
    let printDiv=document.getElementById('print-dosar-container');
    if(printDiv) printDiv.remove();
    printDiv=document.createElement('div');
    printDiv.id='print-dosar-container';
    printDiv.innerHTML=printHtml;
    document.body.appendChild(printDiv);
    setSt('✅ Dosar salvat! Apasă CTRL+P sau butonul PDF.','ok');
    // Actualizează sidebar cu dosarul salvat
    await renderDosarSalvat(tipD,url);
    setTimeout(()=>window.print(),400);
  }catch(e){
    // Chiar dacă salvarea eșuează, permite printul
    let printDiv=document.getElementById('print-dosar-container');
    if(printDiv) printDiv.remove();
    printDiv=document.createElement('div');
    printDiv.id='print-dosar-container';
    printDiv.innerHTML=printHtml;
    document.body.appendChild(printDiv);
    setSt('⚠️ Salvare eșuată: '+e.message+' — dar poți printa.','err');
    setTimeout(()=>window.print(),400);
  }
}

async function stergeDosarSalvat(){
  if(!confirm(`Ștergi dosarul salvat pentru ${_luna} ${_an}?`)) return;
  const tipD=`DOSAR_MASA_${_luna}_${_an}`;
  const{data}=await db.from('documente_contract').select('id,link_drive').eq('contract_id',CTR_ID).eq('tip_document',tipD);
  if(data&&data.length){
    for(const v of data){ if(v.link_drive) await r2Del(v.link_drive); }
    await db.from('documente_contract').delete().eq('contract_id',CTR_ID).eq('tip_document',tipD);
  }
  const printDiv=document.getElementById('print-dosar-container');
  if(printDiv) printDiv.remove();
  const panel=document.getElementById('dosar-salvat-header');
  if(panel) panel.innerHTML=`<span class="btn-dosar-salvat-empty">📂 Niciun dosar salvat</span>`;
  setSt('🗑️ Dosar șters.','ok');
}

async function renderDosarSalvat(tipD,url){
  const panel=document.getElementById('dosar-salvat-header');
  if(!panel)return;
  panel.innerHTML=`<a href="${url}" target="_blank" class="btn btn-dosar-salvat" style="text-decoration:none;">📂 DOSAR SALVAT — ${_luna} ${_an}</a>`
    +`<button class="btn" style="background:#7f1d1d;color:#fca5a5;font-size:11px;padding:6px 10px;" onclick="stergeDosarSalvat()" title="Șterge dosarul salvat">🗑️</button>`;
}

async function loadDosarSalvat(){
  const tipD=`DOSAR_MASA_${_luna}_${_an}`;
  const{data}=await db.from('documente_contract').select('link_drive,data_upload').eq('contract_id',CTR_ID).eq('tip_document',tipD).order('data_upload',{ascending:false}).limit(1);
  const panel=document.getElementById('dosar-salvat-header');
  if(!panel)return;
  if(data&&data.length&&data[0].link_drive){
    const d=data[0];
    const dataF=d.data_upload?new Date(d.data_upload).toLocaleDateString('ro-RO',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    panel.innerHTML=`<a href="${d.link_drive}" target="_blank" class="btn btn-dosar-salvat" title="Generat: ${dataF}" style="text-decoration:none;">📂 DOSAR SALVAT — ${_luna} ${_an}</a>`
      +`<button class="btn" style="background:#7f1d1d;color:#fca5a5;font-size:11px;padding:6px 10px;" onclick="stergeDosarSalvat()" title="Șterge dosarul salvat">🗑️</button>`;
  } else {
    panel.innerHTML=`<span class="btn-dosar-salvat-empty">📂 Niciun dosar salvat</span>`;
  }
}

let _stTimer=null;
function setSt(msg,type){
  const el=document.getElementById('status-bar');
  if(_stTimer){clearTimeout(_stTimer);_stTimer=null;}
  if(!msg){el.style.display='none';return;}
  el.className=type?'st-'+type:'';el.textContent=msg;el.style.display='block';
  // Auto-clear dupa 8s pentru mesaje ok/load ramase
  if(type==='ok')_stTimer=setTimeout(()=>setSt('',''),4000);
  if(type==='load')_stTimer=setTimeout(()=>setSt('',''),3000);
}

async function genDosarTehnic(){
  setSt('⏳ Se generează dosarul tehnic...','load');
  const warnings=[];

  let antetSrc=ANTET_URL;
  try{
    const resp=await fetch(ANTET_URL);
    const blob=await resp.blob();
    antetSrc=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(blob);});
  }catch(e){console.warn('Antet fallback',e);}

  const _imgCacheTeh={};
  async function getImgsTeh(key,url){
    if(_imgCacheTeh[key]) return _imgCacheTeh[key];
    const pages=await pdfToImages(url);
    if(pages.length&&pages[0].startsWith('http')){_imgCacheTeh[key]=pages;return pages;}
    const urls=[];
    for(let pi=0;pi<pages.length;pi++){
      try{
        const b64=pages[pi];
        const byteStr=atob(b64.split(',')[1]);
        const ab=new ArrayBuffer(byteStr.length);
        const ia=new Uint8Array(ab);
        for(let j=0;j<byteStr.length;j++) ia[j]=byteStr.charCodeAt(j);
        const imgBlob=new Blob([ab],{type:'image/jpeg'});
        const fn=`masa_calda/tmp/teh_${_luna}_${_an}_${key}_p${pi+1}_${Date.now()}.jpg`;
        const imgUrl=await r2Up(fn,imgBlob);
        urls.push(imgUrl);
      }catch(e){console.warn('upload teh page error:',e);urls.push(pages[pi]);}
    }
    _imgCacheTeh[key]=urls;
    return urls;
  }

  let printHtml='';

  // COPERTĂ
  printHtml+=`<div class="print-cover-page" style="border-color:#7c3aed;">
    <img class="print-cover-antet" src="${antetSrc}" alt="Antet PNRAS">
    <div class="print-cover-body">

        <div class="print-cover-meta-row"><span class="print-cover-meta-lbl" style="color:#1e3a8a;">Contract:</span> nr. 143/06.12.2024</div>
        <div class="print-cover-meta-row"><span class="print-cover-meta-lbl" style="color:#1e3a8a;">Furnizor:</span> SC PROCONS SRL</div>
        <div class="print-cover-meta-row"><span class="print-cover-meta-lbl" style="color:#1e3a8a;">Activitate:</span> II.3. Gustări/Masă rece/caldă și sănătoasă</div>
      </div>
      <div class="print-cover-opis" style="border-top-color:#2563eb;">
        <div class="print-cover-opis-title" style="color:#1e3a8a;">CUPRINS DOSAR</div>
        ${SECTIUNI_TEH.map((s,i)=>`
          <div class="print-cover-opis-row" style="border-bottom-color:#bfdbfe;">
            <span class="print-cover-opis-nr" style="color:#2563eb;">${i+1}.</span>
            <span class="print-cover-opis-label">${s.label}</span>
          </div>`).join('')}
      </div>
      <div style="margin-top:18px;width:100%;border-top:2px solid #2563eb;padding-top:14px;">
        <div style="font-size:7pt;font-weight:800;color:#1e3a8a;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;text-align:center;">REZUMAT DOCUMENTE</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
          ${(()=>{
            // Calculează rezumatul
            const nrAvize=(_pontaj||[]).filter(p=>p.valoare_aviz>0).length;
            const ziActiveLivrate=(_pontaj||[]).filter(p=>p.valoare_aviz>0).map(p=>p.zi);
            // Total liste prezență + masă

              {icon:'✅',label:'Proces-verbal recepție',val:nrPV,total:1},
            ];
            return items.map(it=>`<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:6px 8px;display:flex;align-items:center;gap:6px;">
              <span style="font-size:13pt;">${it.icon}</span>
              <div style="flex:1;">
                <div style="font-size:7.5pt;color:#1e3a8a;font-weight:700;">${it.label}</div>
                <div style="font-size:10pt;font-weight:800;color:${it.val===it.total&&it.total>0?'#15803d':it.val===0?'#dc2626':'#d97706'};">${it.val}${it.total!==it.val?' / '+it.total:''}</div>
              </div>
            </div>`).join('');
          })()}
        </div>
      </div>
    </div>
  </div>`;

  // SECȚIUNI
  for(let i=0;i<SECTIUNI_TEH.length;i++){
    const st=SECTIUNI_TEH[i];
    const srcId=st.srcId;
    const c=SEC_COLORS_TEH[st.id]||{color:'#334155',bg:'#f8fafc',border:'#e2e8f0'};
    // Culori separate pentru avize vs liste în Secțiunea II
    const cAviz={color:'#065f46',bg:'#ecfdf5',border:'#6ee7b7'}; // verde — avize
    const cListe={color:'#1d4ed8',bg:'#eff6ff',border:'#93c5fd'}; // albastru — liste

    printHtml+=printSecPageTeh(st.id,st.label,i);

    if(st.avize){
      // SECȚIUNEA II — Avize + Liste
      const grupe=groupZile(_pontaj);
      const events=[];
      grupe.forEach(g=>{
        if(g.type==='livrat') events.push({type:'livrat',zi:g.zile[0].zi,pontaj:g.zile[0]});
        else events.push({type:'nelivrat',zi:g.zile[0].zi,ziEnd:g.zile[g.zile.length-1].zi,g});
      });
      events.sort((a,b)=>a.zi-b.zi);

      if(!events.length){
        warnings.push('Secțiunea II — Avize: niciun pontaj găsit.');
        printHtml+=`<div class="print-placeholder-page" style="border-color:${c.border};"><div class="print-ph-icon">⚠️</div><div class="print-ph-title" style="color:${c.color};">Niciun pontaj pentru această lună</div></div>`;
      }

      for(const ev of events){
        if(ev.type==='livrat'){
          const p=ev.pontaj;
          const zi=String(p.zi).padStart(2,'0');
          const dataF=`${zi}.${LC[_luna]}.${_an}`;

          // Pagina separator aviz zilnic — VERDE
          printHtml+=`<div class="print-aviz-page" style="border-color:${cAviz.border};background:${cAviz.bg};">
            <div class="print-aviz-tag" style="background:${cAviz.bg};color:${cAviz.color};border-color:${cAviz.border};">Secțiunea II — Aviz</div>
            <div class="print-aviz-title" style="color:${cAviz.color};">📦 Aviz de livrare</div>
            <div class="print-aviz-date" style="color:${cAviz.color};">${dataF}</div>
          </div>`;

          // Fișier aviz
          const avizKey=mk('S9',p.zi);
          const avizDocs=(_byTip[avizKey]||[]).filter(d=>!d.exclude_print&&d.link_drive);
          if(avizDocs.length){
            setSt(`⏳ Procesare aviz ${dataF}...`,'load');
            for(const d of avizDocs){
              const imgs=await getImgsTeh('taviz_'+d.id,d.link_drive);
              if(imgs.length) imgs.forEach(src=>{printHtml+=`<div class="print-pdf-page"><img src="${src}" style="width:100%;display:block;"></div>`;});
              else{warnings.push(`Secț. II — Aviz ${dataF}: eroare procesare.`);printHtml+=`<div class="print-placeholder-page" style="border-color:${cAviz.border};"><div class="print-ph-icon">⚠️</div><div class="print-ph-title" style="color:${cAviz.color};">Eroare procesare aviz ${dataF}</div></div>`;}
            }
          } else {
            warnings.push(`Secț. II — Aviz ${dataF}: niciun fișier uploadat.`);
            printHtml+=`<div class="print-placeholder-page" style="border-color:${cAviz.border};">
              <div class="print-ph-tag" style="background:${cAviz.bg};color:${cAviz.color};border-color:${cAviz.border};">Aviz lipsă</div>
              <div class="print-ph-icon">⚠️</div>
              <div class="print-ph-title" style="color:${cAviz.color};">Aviz lipsă — ${dataF}</div>
              <div class="print-ph-box" style="border-color:${cAviz.border};color:${cAviz.color};">Încarcă PDF-ul avizului în S6 → ${dataF}</div>
            </div>`;
          }

          // Liste per clasă
          const claseProf={};
          _pontDet.filter(pd=>String(pd.zi)===String(p.zi)).forEach(pd=>{
            pd.clase_grupe.split(',').forEach(c2=>{
              const cl=c2.trim();if(!cl)return;
              if(!claseProf[cl])claseProf[cl]=[];
              if(pd.expert&&!claseProf[cl].includes(pd.expert))claseProf[cl].push(pd.expert);
            });
          });
          const claseList=Object.keys(claseProf).sort();

          for(const cl of claseList){
            const entry=_listeZiClasa[String(p.zi)+'|'+cl];
            const nrElevi=_eleviPerClasa[cl]!==undefined?_eleviPerClasa[cl]:'';

            // Pagina separator clasă — ALBASTRU
            printHtml+=`<div class="print-aviz-page" style="border-color:${cListe.border};background:${cListe.bg};">
              <div class="print-aviz-tag" style="background:${cListe.bg};color:${cListe.color};border-color:${cListe.border};">Secțiunea II — Liste ${dataF}</div>
              <div class="print-aviz-title" style="color:${cListe.color};font-size:24pt;">📋 Clasa / Grupa ${cl}</div>
              <div class="print-aviz-date" style="color:${cListe.color};">${dataF}${nrElevi!==''?' · '+nrElevi+' elevi':''}</div>
            </div>`;

            // Listă prezență
            if(entry&&entry.prez&&entry.prez.public_url){
              setSt(`⏳ Procesare prezență ${cl} ${dataF}...`,'load');
              const imgsPrez=await getImgsTeh('tprez_'+entry.prez.id,entry.prez.public_url);
              if(imgsPrez.length) imgsPrez.forEach(src=>{printHtml+=`<div class="print-pdf-page"><img src="${src}" style="width:100%;display:block;"></div>`;});
              else{warnings.push(`Secț. II — Prezență ${cl}/${dataF}: eroare.`);printHtml+=`<div class="print-placeholder-page" style="border-color:${cListe.border};"><div class="print-ph-icon">⚠️</div><div class="print-ph-title" style="color:${cListe.color};">Eroare procesare listă prezență ${cl} — ${dataF}</div></div>`;}
            } else {
              warnings.push(`Secț. II — Prezență ${cl}/${dataF}: lipsă.`);
              printHtml+=`<div class="print-placeholder-page" style="border-color:${cListe.border};">
                <div class="print-ph-tag" style="background:${cListe.bg};color:${cListe.color};border-color:${cListe.border};">Listă prezență lipsă</div>
                <div class="print-ph-icon">📋</div>
                <div class="print-ph-title" style="color:${cListe.color};">Listă prezență — ${cl} — ${dataF}</div>
              </div>`;
            }

            // Listă masă
            if(entry&&entry.masa&&entry.masa.public_url){
              setSt(`⏳ Procesare masă ${cl} ${dataF}...`,'load');
              const imgsMasa=await getImgsTeh('tmasa_'+entry.masa.id,entry.masa.public_url);
              if(imgsMasa.length) imgsMasa.forEach(src=>{printHtml+=`<div class="print-pdf-page"><img src="${src}" style="width:100%;display:block;"></div>`;});
              else{warnings.push(`Secț. II — Masă ${cl}/${dataF}: eroare.`);printHtml+=`<div class="print-placeholder-page" style="border-color:${cListe.border};"><div class="print-ph-icon">⚠️</div><div class="print-ph-title" style="color:${cListe.color};">Eroare procesare listă masă ${cl} — ${dataF}</div></div>`;}
            } else {
              warnings.push(`Secț. II — Masă ${cl}/${dataF}: lipsă.`);
              printHtml+=`<div class="print-placeholder-page" style="border-color:${cListe.border};">
                <div class="print-ph-tag" style="background:${cListe.bg};color:${cListe.color};border-color:${cListe.border};">Listă masă lipsă</div>
                <div class="print-ph-icon">🍽️</div>
                <div class="print-ph-title" style="color:${cListe.color};">Listă masă — ${cl} — ${dataF}</div>
              </div>`;
            }
          }
        } else {
          // Zi nelivrată
          const ziStart=String(ev.zi).padStart(2,'0');
          const ziEnd=ev.ziEnd?String(ev.ziEnd).padStart(2,'0'):null;
          const dataStart=`${ziStart}.${LC[_luna]}.${_an}`;
          const dataEnd=ziEnd?`${ziEnd}.${LC[_luna]}.${_an}`:null;
          const perioada=dataEnd?`${dataStart} – ${dataEnd}`:dataStart;
          const gk=ev.zi+'-'+(ev.ziEnd||ev.zi);
          if(esteAscunsa(gk)) continue;
          const comKey=mk('S9','com_'+gk);
          const comDocs=(_byTip[comKey]||[]).filter(d=>!d.exclude_print&&d.link_drive);
          if(comDocs.length){
            setSt(`⏳ Procesare comunicare ${perioada}...`,'load');
            for(const d of comDocs){
              const imgs=await getImgsTeh('tcom_'+d.id,d.link_drive);
              if(imgs.length) imgs.forEach(src=>{printHtml+=`<div class="print-pdf-page"><img src="${src}" style="width:100%;display:block;"></div>`;});
              else{warnings.push(`Secț. II — Comunicare ${perioada}: eroare.`);printHtml+=`<div class="print-placeholder-page" style="border-color:${cAviz.border};"><div class="print-ph-icon">⚠️</div><div class="print-ph-title" style="color:${cAviz.color};">Eroare comunicare nelivrare ${perioada}</div></div>`;}
            }
          } else {
            warnings.push(`Secț. II — Comunicare nelivrare ${perioada}: lipsă.`);
            printHtml+=`<div class="print-placeholder-page" style="border-color:${cAviz.border};">
              <div class="print-ph-tag" style="background:${cAviz.bg};color:${cAviz.color};border-color:${cAviz.border};">Comunicare nelivrare lipsă</div>
              <div class="print-ph-icon">⚠️</div>
              <div class="print-ph-title" style="color:${cAviz.color};">Comunicare nelivrare — ${perioada}</div>
            </div>`;
          }
        }
      }
    } else {
      // Secțiuni simple: S5 (Notă comandă), S3 (Raport), S4 (PV)
      const docs=(_byTip[mk(srcId)]||[]).filter(d=>!d.exclude_print&&d.link_drive);
      if(docs.length){
        for(const d of docs){
          setSt(`⏳ Procesare ${st.label}...`,'load');
          const imgs=await getImgsTeh('tsec_'+d.id,d.link_drive);
          if(imgs.length) imgs.forEach(src=>{printHtml+=`<div class="print-pdf-page"><img src="${src}" style="width:100%;display:block;"></div>`;});
          else{warnings.push(`${st.label}: eroare la procesare fișier.`);printHtml+=`<div class="print-placeholder-page" style="border-color:${c.border};"><div class="print-ph-icon">⚠️</div><div class="print-ph-title" style="color:${c.color};">Eroare procesare: ${d.nume_fisier||'document'}</div></div>`;}
        }
      } else {
        warnings.push(`${st.label}: niciun fișier încărcat.`);
        printHtml+=`<div class="print-placeholder-page" style="border-color:${c.border};">
          <div class="print-ph-tag" style="background:${c.bg};color:${c.color};border-color:${c.border};">${st.label}</div>
          <div class="print-ph-icon">⚠️</div>
          <div class="print-ph-title" style="color:${c.color};">Niciun document încărcat</div>
          <div class="print-ph-box" style="border-color:${c.border};color:${c.color};">Încarcă documentul în secțiunea corespunzătoare.</div>
        </div>`;
      }
    }
  }

  if(warnings.length){
    const continua=confirm('⚠️ Dosar tehnic — documente lipsă:\n\n'+warnings.map((w,idx)=>`${idx+1}. ${w}`).join('\n')+'\n\nSe generează dosarul cu pagini de avertisment?');
    if(!continua){setSt('❌ Generare dosar tehnic anulată.','err');return;}
  }

  setSt('⏳ Se salvează dosarul tehnic...','load');
  try{
    const fonts='<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">';
    const viewerCss=`
      *{box-sizing:border-box;margin:0;padding:0;}
      body{background:#525659;font-family:'Inter',Arial,sans-serif;padding:0;}
      .viewer-toolbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:#1e3a8a;padding:10px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.4);}
      .viewer-title{color:#e2e8f0;font-size:13px;font-weight:700;flex:1;}
      .viewer-btn{padding:7px 18px;border:none;border-radius:5px;font-weight:700;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;}
      .viewer-btn-print{background:#2563eb;color:#fff;}
      .viewer-btn-print:hover{background:#1d4ed8;}
      .viewer-pages{padding:60px 20px 40px;display:flex;flex-direction:column;align-items:center;gap:16px;}
      .print-sec-page,.print-placeholder-page,.print-cover-page,.print-pdf-page,.print-aviz-page{
        width:210mm;min-height:297mm;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.4);
        box-sizing:border-box;position:relative;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact;
      }
      .print-pdf-page img{width:210mm;height:297mm;display:block;object-fit:contain;}
      .print-cover-page{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:0 0 60px 0;border:10px solid #2563eb;}
      .print-cover-antet{width:100%;max-width:100%;object-fit:cover;display:block;flex-shrink:0;}
      .print-cover-body{width:100%;padding:40px 80px 0 80px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;flex:1;}
      .print-cover-divider{width:120px;height:4px;background:#7c3aed;border-radius:2px;margin:28px 0;}
      .print-cover-title{font-size:28pt;font-weight:800;color:#0f172a;text-align:center;letter-spacing:1px;margin-bottom:16px;}
      .print-cover-luna{font-size:20pt;font-weight:700;color:#7c3aed;text-align:center;letter-spacing:2px;text-transform:uppercase;}
      .print-cover-meta{margin-top:28px;border:2px solid #7c3aed;border-radius:10px;padding:18px 36px;text-align:left;background:#f5f3ff;width:100%;}
      .print-cover-meta-row{font-size:12pt;color:#0f172a;margin-bottom:10px;line-height:1.6;}
      .print-cover-meta-row:last-child{margin-bottom:0;}
      .print-cover-meta-lbl{font-weight:800;color:#5b21b6;}
      .print-cover-opis{margin-top:24px;width:100%;border-top:2px solid #7c3aed;padding-top:16px;}
      .print-cover-opis-title{font-size:7pt;font-weight:800;color:#5b21b6;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;text-align:center;}
      .print-cover-opis-row{display:flex;align-items:baseline;gap:6px;padding:3px 0;border-bottom:1px dotted #e9d5ff;font-size:8pt;color:#374151;}
      .print-cover-opis-row:last-child{border-bottom:none;}
      .print-cover-opis-nr{font-weight:700;color:#7c3aed;min-width:16px;flex-shrink:0;}
      .print-cover-opis-label{flex:1;}
      .print-sec-page{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;border:8px solid;}
      .print-sec-num{font-size:16pt;font-weight:900;letter-spacing:4px;text-transform:uppercase;margin-bottom:28px;}
      .print-sec-title{font-size:26pt;font-weight:900;text-align:center;margin-bottom:32px;letter-spacing:2px;}
      .print-sec-line{height:6px;width:160px;border-radius:3px;margin-bottom:24px;}
      .print-sec-sub{font-size:12pt;font-weight:600;text-align:center;letter-spacing:1px;}
      .print-placeholder-page{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;border:3px dashed;}
      .print-ph-tag{font-size:9pt;font-weight:700;padding:5px 14px;border-radius:20px;border:1.5px solid;margin-bottom:32px;letter-spacing:1px;text-transform:uppercase;}
      .print-ph-icon{font-size:44pt;margin-bottom:20px;}
      .print-ph-title{font-size:18pt;font-weight:800;text-align:center;margin-bottom:24px;line-height:1.4;}
      .print-ph-box{font-size:11pt;text-align:center;padding:20px 32px;border:2px solid;border-radius:10px;line-height:2;}
      .print-aviz-page{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;border:6px solid;}
      .print-aviz-tag{font-size:10pt;font-weight:700;padding:6px 18px;border-radius:20px;border:1.5px solid;margin-bottom:28px;letter-spacing:1px;text-transform:uppercase;}
      .print-aviz-title{font-size:32pt;font-weight:900;text-align:center;margin-bottom:12px;}
      .print-aviz-date{font-size:18pt;font-weight:700;text-align:center;margin-bottom:36px;opacity:.8;}
      @media print{
        @page{size:A4 portrait;margin:0;}
        .viewer-toolbar{display:none!important;}
        body{background:#fff;padding:0;}
        .viewer-pages{padding:0;gap:0;}
        .print-sec-page,.print-placeholder-page,.print-cover-page,.print-pdf-page,.print-aviz-page{
          width:210mm;height:297mm;box-shadow:none;page-break-after:always;break-after:page;
          page-break-inside:avoid;break-inside:avoid;overflow:hidden;
        }
        .print-pdf-page img{width:210mm;height:297mm;object-fit:contain;}
      }
    `;
    const standAlone=`<!DOCTYPE html><html lang="ro"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">${fonts}<style>${viewerCss}</style></head><body>`
      +`<div class="viewer-toolbar">`
      +`<div class="viewer-title">📂 Dosar Masă Caldă — ${_luna} ${_an}</div>`
      +`<button class="viewer-btn viewer-btn-print" onclick="window.print()">🖨️ Printează / Salvează PDF</button>`
      +`</div>`
      +`<div class="viewer-pages">${printHtml}</div>`
      +`</body></html>`;

    const blob=new Blob([standAlone],{type:'text/html;charset=utf-8'});
    const fn=`masa_calda/DOSAR_TEH_${_luna}_${_an}_${Date.now()}.html`;
    const url=await r2Up(fn,blob);

    const tipD=`DOSAR_TEH_MASA_${_luna}_${_an}`;
    const{data:vechi}=await db.from('documente_contract').select('id,link_drive').eq('contract_id',CTR_ID).eq('tip_document',tipD);
    if(vechi&&vechi.length){for(const v of vechi){if(v.link_drive)await r2Del(v.link_drive);}await db.from('documente_contract').delete().eq('contract_id',CTR_ID).eq('tip_document',tipD);}
    await db.from('documente_contract').insert({contract_id:CTR_ID,tip_document:tipD,nume_fisier:`Dosar Tehnic Masă Caldă — ${_luna} ${_an}.html`,link_drive:url,furnizor:'dosar_tehnic_masa'});

    setSt('✅ Dosar tehnic salvat!','ok');
    await renderDosarTehnicSalvat(url);
    setTimeout(()=>window.open(url,'_blank'),400);
  }catch(e){
    setSt('⚠️ Salvare dosar tehnic eșuată: '+e.message,'err');
  }
}

async function loadDosarTehnicSalvat(){
  const panel=document.getElementById('dosar-teh-salvat-panel');
  if(!panel)return;
  const tipD=`DOSAR_TEH_MASA_${_luna}_${_an}`;
  const{data}=await db.from('documente_contract').select('link_drive,data_upload').eq('contract_id',CTR_ID).eq('tip_document',tipD).order('data_upload',{ascending:false}).limit(1);
  if(data&&data.length&&data[0].link_drive){
    const d=data[0];
    const dataF=d.data_upload?new Date(d.data_upload).toLocaleDateString('ro-RO',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    panel.innerHTML=`<div style="display:flex;align-items:center;gap:4px;padding:2px 4px;">
      <a href="${d.link_drive}" target="_blank" title="Generat: ${dataF}" style="text-decoration:none;font-size:10px;font-weight:700;color:#d97706;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">📂 Dosar — ${_luna} ${_an}</a>
      <button onclick="stergeDosarTehnicSalvat()" title="Șterge dosarul salvat" style="background:none;border:none;cursor:pointer;color:#475569;font-size:12px;padding:0;line-height:1;flex-shrink:0;">🗑️</button>
    </div>`;
  } else {
    panel.innerHTML=`<span style="font-size:10px;color:#334155;padding:4px 2px;display:block;">📂 Niciun dosar tehnic salvat</span>`;
  }
}

async function renderDosarTehnicSalvat(url){
  const panel=document.getElementById('dosar-teh-salvat-panel');
  if(!panel)return;
  panel.innerHTML=`<div style="display:flex;align-items:center;gap:4px;padding:2px 4px;">
    <a href="${url}" target="_blank" style="text-decoration:none;font-size:10px;font-weight:700;color:#d97706;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">📂 Dosar — ${_luna} ${_an}</a>
    <button onclick="stergeDosarTehnicSalvat()" title="Șterge dosarul salvat" style="background:none;border:none;cursor:pointer;color:#475569;font-size:12px;padding:0;line-height:1;flex-shrink:0;">🗑️</button>
  </div>`;
}

async function stergeDosarTehnicSalvat(){
  if(!confirm(`Ștergi dosarul tehnic salvat pentru ${_luna} ${_an}?`)) return;
  const tipD=`DOSAR_TEH_MASA_${_luna}_${_an}`;
  const{data}=await db.from('documente_contract').select('id,link_drive').eq('contract_id',CTR_ID).eq('tip_document',tipD);
  if(data&&data.length){
    for(const v of data){if(v.link_drive)await r2Del(v.link_drive);}
    await db.from('documente_contract').delete().eq('contract_id',CTR_ID).eq('tip_document',tipD);
  }
  const panel=document.getElementById('dosar-teh-salvat-panel');
  if(panel) panel.innerHTML=`<span style="font-size:10px;color:#334155;padding:4px 2px;display:block;">📂 Niciun dosar tehnic salvat</span>`;
  setSt('🗑️ Dosar tehnic șters.','ok');
}

init();
