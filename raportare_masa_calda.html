.pdfm-body canvas{max-width:100%;box-shadow:0 2px 8px rgba(0,0,0,.5);}
.pdfm-body img{max-width:100%;border-radius:4px;}

// ===== R2 =====
async function r2Up(fileName,blob){
  const r=await fetch(`${WORKER}/upload`,{method:'PUT',headers:{'X-Bucket':'contracte','X-File-Name':fileName,'Content-Type':blob.type||'application/octet-stream'},body:blob});
  if(!r.ok)throw new Error('Upload eșuat: '+await r.text());
  return(await r.json()).url;
}
async function r2Del(url){
  try{const fn=decodeURIComponent(url.split('?')[0].replace(R2PUB+'/',''));await fetch(`${WORKER}/delete`,{method:'DELETE',headers:{'X-Bucket':'contracte','X-File-Name':fn}});}catch(e){}
}

// ===== INDEX =====
async function init(){
  const{data:docs}=await db.from('documente_contract').select('tip_document').eq('contract_id',CTR_ID);
  const cnt={};
  (docs||[]).filter(d=>d.tip_document&&d.tip_document.startsWith('MASA_')).forEach(d=>{const m=d.tip_document.match(/MASA_([^_]+)_(\d{4})/);if(m){const k=m[1]+'_'+m[2];cnt[k]=(cnt[k]||0)+1;}});
  [2025,2026].forEach(an=>{
    const g=document.getElementById('grid-'+an);g.innerHTML='';
    LUNI.forEach(luna=>{
      const k=luna+'_'+an,c=cnt[k]||0;
      const el=document.createElement('div');
      el.className='month-card'+(c?' has-docs':'');
      el.innerHTML=`<span class="mc-name">${luna}</span><span class="mc-count">${c||'—'}</span>`;
      el.onclick=()=>open_(luna,String(an));
      g.appendChild(el);
    });
  });
}

async function open_(luna,an){
  _luna=luna;_an=an;
  document.getElementById('view-index').style.display='none';
  document.getElementById('view-dosar').style.display='block';
  document.getElementById('cp-luna').textContent=luna+' '+an;
  await load();
}
function goBack(){
  document.getElementById('view-dosar').style.display='none';
  document.getElementById('view-index').style.display='block';
  init();
}

// tip_document format: MASA_Luna_An_SecId[_zi]
function mk(secId,zi=''){return`MASA_${_luna}_${_an}_${secId}${zi?'_'+zi:''}`;}


// Grupează zilele consecutive nelivrate
function groupZile(pontaj){
  const result=[];let i=0;
  while(i<pontaj.length){
    const p=pontaj[i];
    if(p.valoare_aviz>0){result.push({type:'livrat',zile:[p]});i++;}
    else{
      const grup=[p];
      while(i+1<pontaj.length&&!(pontaj[i+1].valoare_aviz>0)&&pontaj[i+1].zi===pontaj[i].zi+1){i++;grup.push(pontaj[i]);}
      result.push({type:'nelivrat',zile:grup});i++;
    }
  }
  return result;
}
// ===== LOAD =====
async function load(){
  setSt('⏳ Se încarcă...','load');
  try{
    const[docsR,pontR,detR,ctrR]=await Promise.all([
      db.from('documente_contract').select('*').eq('contract_id',CTR_ID).order('data_upload',{ascending:true}),
      db.from('setari_pontaj').select('*').match({luna:_luna,an:_an}).order('zi',{ascending:true}),
      db.from('pontaj_detaliat').select('zi,clase_grupe,expert').eq('luna',_luna).eq('an',_an),
      db.from('documente_contract').select('*').eq('contract_id',CTR_ID).eq('tip_document','9. Contract')
    ]);
    // Fetch secundar — nu blochează dacă eșuează
    const[factR,eleviR,listeR]=await Promise.all([
      db.from('buget_pnras').select('id,titlu,numar,data_document,valoare,val_fara_tva').eq('parent_id',CTR_ID).eq('tip_rand','FACTURA').ilike('titlu','%'+_luna.toLowerCase()+'%').then(r=>r).catch(()=>({data:[]})),
      db.from('elevi').select('clasa_grupa').then(r=>r).catch(()=>({data:[]})),
      db.from('liste_fisiere').select('*').eq('luna',_luna).eq('an',_an).then(r=>r).catch(()=>({data:[]}))
    ]);
    _ctrDocs=ctrR.data||[];
    // Număr elevi per clasă
    _eleviPerClasa={};
    (eleviR.data||[]).forEach(e=>{const c=e.clasa_grupa;if(c)_eleviPerClasa[c]=(_eleviPerClasa[c]||0)+1;});
    // Liste prezență/masă per zi+clasă — ancora: masa
    // Dacă există masa pentru zi+clasă → afișăm masa + prezența aceluiași expert
    // Dacă nu există masa → excludem complet clasa din zi respectivă
    _listeZiClasa={};
    const toateListe=listeR.data||[];
    // Grupăm mai întâi toate listele pe zi|clasa
    const _tmpListe={};
    toateListe.forEach(l=>{
      const k=String(l.zi)+'|'+(l.clasa||'');
      if(!_tmpListe[k])_tmpListe[k]=[];
      _tmpListe[k].push(l);
    });
    // Păstrăm doar zi+clase unde există masa
    Object.entries(_tmpListe).forEach(([k,arr])=>{
      const masa=arr.find(l=>l.tip==='masa');
      if(!masa)return; // fără masă = excludem
      // Prezența: doar a expertului care are masa
      const prez=arr.find(l=>l.tip==='prezenta'&&l.expert===masa.expert);
      _listeZiClasa[k]={masa,prez:prez||null,expert:masa.expert};
    });
    // Pentru fiecare factură găsită după titlu, preia PDF-ul din documente_contract
    const facturiMeta=factR.data||[];
    if(facturiMeta.length){
      const fIds=facturiMeta.map(f=>f.id);
      const{data:factDocs}=await db.from('documente_contract').select('*').in('furnizor',fIds).eq('tip_document','13. Factura');
      const docsByFid={};(factDocs||[]).forEach(d=>{docsByFid[d.furnizor]=d;});
      _facturi=facturiMeta.map(f=>({...f,doc:docsByFid[f.id]||null}));
    } else {
      _facturi=[];
    }
    _pontDet=detR.data||[];
    // Zilele cu valoare_aviz=0 apar ca comunicare DOAR daca au activitati in pontaj_detaliat
    const ziCuActivitate=new Set((_pontDet||[]).map(p=>String(p.zi)));
    _pontaj=(pontR.data||[]).filter(p=>p.valoare_aviz>0||ziCuActivitate.has(String(p.zi)));
    const docs=(docsR.data||[]).filter(d=>d.tip_document&&d.tip_document.startsWith(`MASA_${_luna}_${_an}_`));
    const byTip={};
    docs.forEach(d=>{if(!byTip[d.tip_document])byTip[d.tip_document]=[];byTip[d.tip_document].push(d);});
    _byTip=byTip;
    try{renderSidebar(byTip);}catch(e){console.error('renderSidebar:',e);}
    try{renderMain(byTip);}catch(e){console.error('renderMain:',e);}
    await loadDosarSalvat().catch(e=>console.warn('loadDosarSalvat:',e));
    setSt('','');
  }catch(e){console.error('load() catch:',e);setSt('❌ '+e.message,'err');}
}

// ===== SIDEBAR =====
function renderSidebar(byTip){
  document.getElementById('sidebar').innerHTML=SECTIUNI.map((s,i)=>{
    let items='';
    if(s.avize){
      const grupe=groupZile(_pontaj);
      items=grupe.map(g=>{
        if(g.type==='livrat'){
          const p=g.zile[0];const k=mk(s.id,p.zi);const cnt=(byTip[k]||[]).length;
          const zi=String(p.zi).padStart(2,'0');
          return`<div class="sb-item${cnt?' ok':''}" onclick="scrollTo_('${s.id}_${p.zi}')">
            <span class="dot"></span>${zi}.${LC[_luna]}.${_an} (${cnt})
          </div>`;
        } else {
          const gk='com_'+g.zile[0].zi+'-'+g.zile[g.zile.length-1].zi;
          const k=mk(s.id,gk);const cnt=(byTip[k]||[]).length;
          const z1=String(g.zile[0].zi).padStart(2,'0');
          const z2=String(g.zile[g.zile.length-1].zi).padStart(2,'0');
          const lbl=g.zile.length===1?z1+'.'+LC[_luna]+'.'+_an:z1+'—'+z2+'.'+LC[_luna]+'.'+_an;
          return`<div class="sb-item${cnt?' ok':''}" onclick="scrollTo_('${s.id}_com_${gk}')">
            <span class="dot"></span>⚠️ ${lbl} (${cnt})
          </div>`;
        }
      }).join('');
    } else {
      const cnt=(byTip[mk(s.id)]||[]).length;
      items=`<div class="sb-item${cnt?' ok':''}" onclick="scrollTo_('${s.id}')">
        <span class="dot"></span>${cnt?cnt+' doc.':'Fără documente'}
      </div>`;
    }
    return`<div class="sb-sec open" id="sbsec_${s.id}" onclick="toggleSb('${s.id}')">
        <span>${s.icon} ${i+1}. ${s.label}</span><span class="arr">▶</span>
      </div>
      <div class="sb-items">${items}</div>`;
  }).join('');
}
function toggleSb(id){document.getElementById('sbsec_'+id).classList.toggle('open');}
function scrollTo_(id){const el=document.getElementById('sc_'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}

// ===== MAIN =====
function renderMain(byTip){
  document.getElementById('dosar-main').innerHTML=SECTIUNI.map((s,i)=>{
    let body='';
    if(s.avize){
      if(_pontaj.length===0){body='<div class="no-docs">Nu există date în pontaj pentru această lună.</div>';}
      else{
        // Grupăm zilele consecutive nelivrate
        const grupe=groupZile(_pontaj);
        body=grupe.map(g=>{
          if(g.type==='livrat'){
            const p=g.zile[0];
            const k=mk(s.id,p.zi);
            const docs=byTip[k]||[];
            const zi=String(p.zi).padStart(2,'0');
            const dataF=`${zi}.${LC[_luna]}.${_an}`;
            const claseProf={};
            _pontDet.filter(pd=>String(pd.zi)===String(p.zi)).forEach(pd=>{
              pd.clase_grupe.split(',').forEach(c=>{
                const cl=c.trim();if(!cl)return;
                if(!claseProf[cl])claseProf[cl]=[];
                if(pd.expert&&!claseProf[cl].includes(pd.expert))claseProf[cl].push(pd.expert);
              });
            });
            const clase=Object.keys(claseProf).sort();
            const claseTagsHtml=clase.map(c=>{
              const profi=(claseProf[c]||[]).join(', ');
              return '<span class="clase-tag">'+c+(profi?' <span class="clase-prof">'+profi+'</span>':'')+'</span>';
            }).join('');
            // Aviz zilnic
            const avizRows=clase.map(c=>{
              const nrElevi=_eleviPerClasa[c]||'—';
              const profi=(claseProf[c]||[]).join(', ');
              return '<tr>'
                +'<td style="padding:4px 8px;border:1px solid #1e3a5f;font-size:11px;color:#10b981;font-weight:700;">'+c+'</td>'
                +'<td style="padding:4px 8px;border:1px solid #1e3a5f;font-size:11px;color:#94a3b8;">'+profi+'</td>'
                +'<td style="padding:4px 8px;border:1px solid #1e3a5f;font-size:11px;text-align:center;color:#e2e8f0;">'+nrElevi+'</td>'
                +'</tr>';
            }).join('');
            const avizHtml=clase.length?`
              <div class="aviz-zilnic">
                <div class="aviz-title">📋 Aviz ${dataF}</div>
                <table class="aviz-table">
                  <thead><tr>
                    <th>Clasă/Grupă</th><th>Expert</th><th>Nr. elevi</th>
                  </tr></thead>
                  <tbody>${avizRows}</tbody>
                  <tfoot><tr>
                    <td colspan="2" style="padding:4px 8px;border:1px solid #1e3a5f;font-size:11px;font-weight:700;color:#f59e0b;">TOTAL PORȚII LIVRATE</td>
                    <td style="padding:4px 8px;border:1px solid #1e3a5f;font-size:12px;font-weight:800;text-align:center;color:#10b981;">${p.valoare_aviz}</td>
                  </tr></tfoot>
                </table>
              </div>`:'';
            return`<div class="day-group" id="sc_${s.id}_${p.zi}">
              <div class="day-hdr">
                <span class="day-date">📅 ${dataF}</span>
                <span class="day-badge livrat">✅ Livrat — ${p.valoare_aviz} porții</span>
                ${clase.length?'<span class="day-clase">'+claseTagsHtml+'</span>':''}
              </div>
              ${avizHtml}
              <div class="day-body">
                ${fileListHtml(docs,s.id,p.zi)}
                ${upzoneHtml(s.id,p.zi)}
                ${(()=>{
                  // Liste din dosar_lunar per clasă — ancora: masa
                  const clasecu=clase.filter(c=>_listeZiClasa[String(p.zi)+'|'+c]);
                  if(!clasecu.length)return '';
                  let lHtml='<div class="liste-sectiune">';
                  lHtml+='<div class="liste-sectiune-title">📋 Liste din dosar expert</div>';
                  clasecu.forEach(c=>{
                    const entry=_listeZiClasa[String(p.zi)+'|'+c];
                    lHtml+='<div class="lista-clasa-row">';
                    lHtml+='<span class="lista-clasa-lbl">'+c+'</span>';
                    lHtml+='<span class="lista-expert-lbl">'+entry.expert+'</span>';
                    if(entry.masa){
                      const lkm=(entry.masa.public_url||'').replace(/'/g,"\\'");
                      lHtml+='<a class="bsm bv lista-link" href="'+lkm+'" target="_blank">🍽 Listă masă</a>';
                    }
                    if(entry.prez){
                      const lkp=(entry.prez.public_url||'').replace(/'/g,"\\'");
                      lHtml+='<a class="bsm bv lista-link" href="'+lkp+'" target="_blank">📋 Listă prezență</a>';
                    } else {
                      lHtml+='<span style="font-size:10px;color:#475569;">— fără prezență</span>';
                    }
                    lHtml+='</div>';
                  });
                  lHtml+='</div>';
                  return lHtml;
                })()}
              </div>
            </div>`;
          } else {
            // Grup de zile nelivrate consecutive — un singur slot
            const ziStart=String(g.zile[0].zi).padStart(2,'0');
            const ziEnd=String(g.zile[g.zile.length-1].zi).padStart(2,'0');
            const lc=LC[_luna];
            const label=g.zile.length===1
              ? `${ziStart}.${lc}.${_an}`
              : `${ziStart}.${lc}.${_an} — ${ziEnd}.${lc}.${_an}`;
            // Cheia grupului = zi_start-zi_end
            const groupKey=`${g.zile[0].zi}-${g.zile[g.zile.length-1].zi}`;
            const k=mk(s.id,'com_'+groupKey);
            const docs=byTip[k]||[];
            return`<div class="day-group" id="sc_${s.id}_com_${groupKey}">
              <div class="day-hdr">
                <span class="day-date">📅 ${label}</span>
                <span class="day-badge nelivrat">⚠️ Comunicare nelivrare${g.zile.length>1?' ('+g.zile.length+' zile)':''}</span>
              </div>
              <div class="day-body">
                ${fileListHtml(docs,s.id,'com_'+groupKey)}
                ${upzoneHtml(s.id,'com_'+groupKey)}
              </div>
            </div>`;
          }
        }).join('');
      }
    } else if(s.id==='S1'){
      // Contract — din documente_contract cu tip_document='9. Contract'
      let s1Html='';
      if(_ctrDocs.length){
        s1Html+='<div class="file-list">';
        _ctrDocs.forEach(d=>{
          const ext=(d.link_drive||'').split('?')[0].split('.').pop().toLowerCase();
          const icon={'pdf':'📄','doc':'📝','docx':'📝','jpg':'🖼️','jpeg':'🖼️','png':'🖼️'}[ext]||'📎';
          const nm=(d.nume_fisier||'Contract').replace(/'/g,"\'");
          const lk=(d.link_drive||'').replace(/'/g,"\'");
          s1Html+=fileItemToggle(d,icon,
            `<span title="${d.nume_fisier||'Contract'}">${d.nume_fisier||'Contract'}</span>`,
            `<button class="bsm bv" onclick="viewDoc('${lk}','${nm}')">👁 Vezi</button>`
            +`<a class="bsm bv" href="${lk}" target="_blank" style="text-decoration:none;">🔗 Deschide</a>`
          );
        });
        s1Html+='</div>';
      } else {
        s1Html='<div class="no-docs" style="color:#f59e0b;">⚠️ Contractul nu a fost găsit. Verifică dosarul contractului.</div>';
      }
      // Documente suplimentare lunare pentru S1
      const docsS1=byTip[mk(s.id)]||[];
      if(docsS1.length) s1Html+=fileListHtml(docsS1,s.id);
      s1Html+=upzoneHtml(s.id);
      body=s1Html;
    } else if(s.id==='S2'){
      // Facturi — din buget_pnras filtrate pe luna, cu PDF din documente_contract
      let s2Html='';
      if(_facturi.length){
        s2Html+='<div class="file-list">';
        _facturi.forEach(f=>{
          const label='Fact. Nr. '+(f.numar||'?')+' / '+(f.data_document?f.data_document.split('T')[0].split('-').reverse().join('.'):'—')+' — '+(f.titlu||'');
          const valoare=f.valoare?parseFloat(f.valoare).toLocaleString('ro-RO',{minimumFractionDigits:2})+' RON':'';
          if(f.doc&&f.doc.link_drive){
            const lk=(f.doc.link_drive||'').replace(/'/g,"\\'");
            const nm=(f.doc.nume_fisier||label).replace(/'/g,"\\'");
            const nameHtml='<span title="'+label+(valoare?' ('+valoare+')':'')+'">'+label+(valoare?' <span style="color:#10b981;font-size:10px;">('+valoare+')</span>':'')+'</span>';
            const actsHtml='<button class="bsm bv" onclick="viewDoc(\''+lk+'\',\''+nm+'\')">👁 Vezi</button>'
              +'<a class="bsm bv" href="'+lk+'" target="_blank" style="text-decoration:none;">🔗 Deschide</a>';
            s2Html+=fileItemToggle(f.doc,'💰',nameHtml,actsHtml);
          } else {
            // Factură fără PDF atașat
            s2Html+='<div class="file-item" style="opacity:.6;">'+
              '<span class="fi-icon">💰</span>'+
              '<span class="fi-name">'+label+(valoare?' ('+valoare+')':'')+'</span>'+
              '<div class="fi-acts"><span style="font-size:10px;color:#f59e0b;">⚠️ Fără PDF</span></div>'+
            '</div>';
          }
        });
        s2Html+='</div>';
      } else {
        s2Html='<div class="no-docs" style="color:#f59e0b;">⚠️ Nu s-au găsit facturi pentru '+_luna+' '+_an+' în titlu.</div>';
      }
      // Documente suplimentare lunare pentru S2
      const docsS2=byTip[mk(s.id)]||[];
      if(docsS2.length) s2Html+=fileListHtml(docsS2,s.id);
      s2Html+=upzoneHtml(s.id);
      body=s2Html;
    } else if(s.id==='S3'){
      const docsS3=byTip[mk(s.id)]||[];
      const raportUrl='raport-lunar.html?luna='+encodeURIComponent(_luna)+'&an='+encodeURIComponent(_an);
      let s3Html='<div style="margin-bottom:10px;">'
        +'<a href="'+raportUrl+'" target="_blank" class="btn btn-gen" style="text-decoration:none;display:inline-flex;">'
        +'📄 Deschide Raport Lunar — '+_luna+' '+_an
        +'</a>'
        +'<div style="font-size:10px;color:#475569;margin-top:5px;">Printează din raport-lunar.html, apoi încarcă PDF-ul semnat mai jos.</div>'
        +'</div>';
      s3Html+=fileListHtml(docsS3,'S3')+upzoneHtml('S3');
      body=s3Html;
    } else {
      const docs=byTip[mk(s.id)]||[];
      body=fileListHtml(docs,s.id)+upzoneHtml(s.id);
    }
    let cnt;
    if(s.avize){
      const grupe2=groupZile(_pontaj);
      cnt=grupe2.reduce((a,g)=>{
        const gk=g.type==='livrat'?g.zile[0].zi:'com_'+g.zile[0].zi+'-'+g.zile[g.zile.length-1].zi;
        return a+(byTip[mk(s.id,gk)]||[]).filter(d=>!d.exclude_print).length;
      },0);
    } else if(s.id==='S1'){
      cnt=_ctrDocs.filter(d=>!d.exclude_print).length+(byTip[mk(s.id)]||[]).filter(d=>!d.exclude_print).length;
    } else if(s.id==='S2'){
      cnt=_facturi.filter(f=>f.doc&&!f.doc.exclude_print).length+(byTip[mk(s.id)]||[]).filter(d=>!d.exclude_print).length;
    } else {cnt=(byTip[mk(s.id)]||[]).filter(d=>!d.exclude_print).length;}
    return`<div class="sec-card collapsed" id="sc_${s.id}">
      <div class="sec-hdr" onclick="toggleSec('${s.id}')">
        <span class="sec-hdr-icon">${s.icon}</span>
        <div class="sec-hdr-info">
          <div class="sec-hdr-num">Secțiunea ${i+1}</div>
          <div class="sec-hdr-title">${s.label}</div>
        </div>
        <span class="sec-hdr-cnt">${cnt} doc.</span>
        <span class="sec-hdr-arr">▾</span>
      </div>

async function uploadFiles(files,secId,zi){
  if(!files.length)return;
  const prog=document.getElementById(`prog_${secId}_${zi}`);
  const fill=document.getElementById(`fill_${secId}_${zi}`);
  const txt=document.getElementById(`txt_${secId}_${zi}`);
  if(prog)prog.style.display='block';
  const tipDoc=mk(secId,zi);
  for(let i=0;i<files.length;i++){
    const f=files[i];
    if(txt)txt.textContent=`Urcă: ${f.name} (${i+1}/${files.length})`;
    if(fill)fill.style.width='20%';
    try{
      const safe=f.name.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9._-]/g,'_');
      const fn=`masa_calda/${_luna}_${_an}_${secId}${zi?'_'+zi:''}_${Date.now()}_${safe}`;
      const url=await r2Up(fn,f);
      if(fill)fill.style.width='75%';
      const{error}=await db.from('documente_contract').insert({contract_id:CTR_ID,tip_document:tipDoc,nume_fisier:f.name,link_drive:url,furnizor:'masa_calda'});
      if(error)throw error;
      if(fill)fill.style.width='100%';
      if(txt)txt.textContent=`✅ ${f.name}`;
    }catch(e){
      if(txt)txt.textContent='❌ '+e.message;
      if(fill){fill.style.background='#ef4444';fill.style.width='100%';}
    }
    await new Promise(r=>setTimeout(r,400));
  }
  setTimeout(async()=>{
    if(prog){prog.style.display='none';if(fill){fill.style.width='0%';fill.style.background='';}}
    await load();
  },700);
}

async function pdfToImages(url,scale=1.8){
  return fileToImages(url,scale);
}
async function fileToImages(url,scale=1.8){
  const images=[];
  const ext=(url.split('?')[0].split('.').pop()||'').toLowerCase();
  try{
    if(['jpg','jpeg','png','webp','gif','bmp','tiff','tif','avif'].includes(ext)){
      // Imagine standard: fetch → canvas → jpeg
      const resp=await fetch(url);
      const blob=await resp.blob();
      const dataUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(blob);});
      const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=dataUrl;});
      const cv=document.createElement('canvas');cv.width=img.naturalWidth;cv.height=img.naturalHeight;
      cv.getContext('2d').drawImage(img,0,0);
      images.push(cv.toDataURL('image/jpeg',0.92));
    } else if(['heic','heif'].includes(ext)){
      // HEIC: fetch blob → heic2any → data URL
      const resp=await fetch(url);
      const blob=await resp.blob();
      const converted=await heic2any({blob,toType:'image/jpeg',quality:0.92});
      const arrBlob=Array.isArray(converted)?converted:[converted];
      for(const b of arrBlob){
        const dataUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(b);});
        images.push(dataUrl);
      }
    } else {
      // PDF (sau orice altceva) via pdf.js
      const pdf=await pdfjsLib.getDocument({
        url,
        cMapUrl:'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
        cMapPacked:true
      }).promise;
      for(let n=1;n<=pdf.numPages;n++){
        const pg=await pdf.getPage(n);
        const vp=pg.getViewport({scale});
        const cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;
        await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
        images.push(cv.toDataURL('image/jpeg',0.92));
      }
    }
  }catch(e){console.warn('fileToImages error ('+ext+'):',e);}
  return images;
}

              <div class="print-aviz-date" style="color:${c2.color};">${dataF}</div>
              <table class="print-aviz-table" style="border-color:${c2.border};">
                <thead><tr>
                  <th style="border:1.5px solid ${c2.border};background:${c2.bg};color:${c2.color};padding:10px 14px;font-size:11pt;text-transform:uppercase;letter-spacing:1px;">Clasă/Grupă</th>
                  <th style="border:1.5px solid ${c2.border};background:${c2.bg};color:${c2.color};padding:10px 14px;font-size:11pt;text-transform:uppercase;letter-spacing:1px;">Expert</th>
                  <th style="border:1.5px solid ${c2.border};background:${c2.bg};color:${c2.color};padding:10px 14px;font-size:11pt;text-transform:uppercase;letter-spacing:1px;">Nr. elevi</th>
                </tr></thead>
                <tbody>${avizRows2}</tbody>
                <tfoot><tr>
                  <td colspan="2" style="border:1.5px solid ${c2.border};padding:10px 14px;font-size:13pt;font-weight:800;color:${c2.color};">TOTAL PORȚII LIVRATE</td>
                  <td style="border:1.5px solid ${c2.border};padding:10px 14px;font-size:16pt;font-weight:900;text-align:center;color:${c2.color};">${totalPortii}</td>
                </tr></tfoot>
              </table>
            </div>`;
            // Per clasă: dacă are liste încărcate → randez PDF; altfel → disclaimer
            const claseList3=Object.keys(claseProf2).sort();
            for(const cl of claseList3){
              const entry=_listeZiClasa[String(p.zi)+'|'+cl];
              const profi=(claseProf2[cl]||[]).join(', ');
              const nrElevi=_eleviPerClasa[cl]!==undefined?_eleviPerClasa[cl]:'';
              const c3=SEC_COLORS[s.id]||{color:'#065f46',bg:'#ecfdf5',border:'#6ee7b7'};
              const expertLipsa=profi||'expertul responsabil';
              // Header pagina lista — apare intotdeauna
              printHtml+=`<div class="print-placeholder-page" style="border-color:${c3.border};">
                <div class="print-ph-tag" style="background:${c3.bg};color:${c3.color};border-color:${c3.border};">S6 — Avize / Liste &nbsp;·&nbsp; ${dataF}</div>
                <div class="print-ph-title" style="color:${c3.color};">Lista de prezență și lista de masă<br>pentru clasa / grupa <strong>${cl}</strong>${profi?'<br><span style="font-size:14pt;font-weight:400;">Prof. '+profi+'</span>':''}</div>
                <div class="print-ph-box" style="border-color:${c3.border};color:${c3.color};">
                  <div style="margin-bottom:8px;">📋 <strong>Listă prezență</strong> — clasa/grupa <strong>${cl}</strong> — ${dataF}${nrElevi!==''?' — <strong>'+nrElevi+' elevi</strong>':''}</div>
                  <div>🍽️ <strong>Listă masă</strong> — clasa/grupa <strong>${cl}</strong> — ${dataF}</div>
                </div>
              </div>`;
              if(entry&&(entry.prez||entry.masa)){
                // Randez prezenta
                if(entry.prez&&entry.prez.public_url){
                  setSt('⏳ Se procesează lista de prezență '+cl+'...','load');
                  const imgsPrez=await getImgs('prez_'+entry.prez.id,entry.prez.public_url);
                  if(imgsPrez.length) imgsPrez.forEach(src=>{printHtml+=`<div class="print-pdf-page"><img src="${src}" style="width:100%;display:block;"></div>`;});
                  else printHtml+=`<div class="print-placeholder-page" style="border-color:${c3.border};"><div class="print-ph-tag" style="background:${c3.bg};color:${c3.color};">Listă prezență — ${cl} — ${dataF}</div><div class="print-ph-icon">⚠️</div><div class="print-ph-title" style="color:${c3.color};">Eroare la procesare PDF prezență</div></div>`;
                }
                // Randez masa
                if(entry.masa&&entry.masa.public_url){
                  setSt('⏳ Se procesează lista de masă '+cl+'...','load');
                  const imgsMasa=await getImgs('masa_'+entry.masa.id,entry.masa.public_url);
                  if(imgsMasa.length) imgsMasa.forEach(src=>{printHtml+=`<div class="print-pdf-page"><img src="${src}" style="width:100%;display:block;"></div>`;});
                  else printHtml+=`<div class="print-placeholder-page" style="border-color:${c3.border};"><div class="print-ph-tag" style="background:${c3.bg};color:${c3.color};">Listă masă — ${cl} — ${dataF}</div><div class="print-ph-icon">⚠️</div><div class="print-ph-title" style="color:${c3.color};">Eroare la procesare PDF masă</div></div>`;
                }
              } else {
                // Disclaimer imediat dupa header — lipsesc listele
                printHtml+=`<div class="print-placeholder-page" style="border-color:${c3.border};">
                  <div class="print-ph-tag" style="background:${c3.bg};color:${c3.color};border-color:${c3.border};">S6 — Liste lipsă — ${dataF}</div>
                  <div class="print-ph-icon">⚠️</div>
                  <div class="print-ph-title" style="color:${c3.color};">Lipsesc listele pentru clasa <strong>${cl}</strong></div>
                  <div class="print-ph-box" style="border-color:${c3.border};color:${c3.color};">
                    <div style="margin-bottom:12px;">📋 Încarcă / Adaugă <strong>lista de prezență</strong> pentru <strong>${cl}</strong>, <strong>${expertLipsa}</strong>, din data de <strong>${dataF}</strong></div>
                    <div>🍽️ Încarcă / Adaugă <strong>lista de masă</strong> pentru <strong>${cl}</strong>, <strong>${expertLipsa}</strong>, din data de <strong>${dataF}</strong></div>
                  </div>
                </div>`;
              }
            }
          }
        }
      }
    }
  }

  // ===== SALVEAZĂ DOSARUL =====
  setSt('⏳ Se salvează dosarul...','load');
  try{
    // Construiește HTML standalone — vizualizator cu pagini A4
    const fonts='<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">';
    const viewerCss=`
      *{box-sizing:border-box;margin:0;padding:0;}
      body{background:#525659;font-family:'Inter',Arial,sans-serif;padding:0;}
      .viewer-toolbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:#323639;padding:10px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.4);}
      .viewer-title{color:#e2e8f0;font-size:13px;font-weight:700;flex:1;}
      .viewer-btn{padding:7px 18px;border:none;border-radius:5px;font-weight:700;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;}
      .viewer-btn-print{background:#10b981;color:#000;}
      .viewer-btn-print:hover{background:#059669;}
      .viewer-pages{padding:60px 20px 40px;display:flex;flex-direction:column;align-items:center;gap:16px;}
      /* Pagini generale */
      .print-sec-page,.print-placeholder-page,.print-cover-page,.print-pdf-page,.print-aviz-page,.print-doc-ref{
        width:210mm;min-height:297mm;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.4);
        box-sizing:border-box;position:relative;overflow:hidden;
        -webkit-print-color-adjust:exact;print-color-adjust:exact;
      }
      .print-pdf-page img{width:210mm;height:297mm;display:block;object-fit:contain;}
      /* Coperta */
      .print-cover-page{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:0 0 60px 0;border:10px solid #10b981;}
      .print-cover-page::before,.print-cover-page::after{content:'';position:absolute;left:16px;right:16px;height:4px;background:#10b981;border-radius:2px;}
      .print-cover-page::before{top:16px;}.print-cover-page::after{bottom:16px;}
      .print-cover-antet{width:100%;max-width:100%;object-fit:cover;object-position:center top;display:block;flex-shrink:0;}
      .print-cover-body{width:100%;padding:40px 80px 0 80px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;flex:1;}
      .print-cover-divider{width:120px;height:4px;background:#10b981;border-radius:2px;margin:28px 0;}
      .print-cover-title{font-size:32pt;font-weight:800;color:#0f172a;text-align:center;letter-spacing:1px;margin-bottom:16px;}
      .print-cover-luna{font-size:20pt;font-weight:700;color:#10b981;text-align:center;letter-spacing:2px;text-transform:uppercase;}
      .print-cover-meta{margin-top:28px;border:2px solid #10b981;border-radius:10px;padding:18px 36px;text-align:left;background:#f0fdf4;width:100%;}
      .print-cover-meta-row{font-size:12pt;color:#0f172a;margin-bottom:10px;line-height:1.6;}
      .print-cover-meta-row:last-child{margin-bottom:0;}
      .print-cover-meta-lbl{font-weight:800;color:#065f46;}
      .print-cover-opis{margin-top:24px;width:100%;border-top:2px solid #10b981;padding-top:16px;}
      .print-cover-opis-title{font-size:7pt;font-weight:800;color:#065f46;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;text-align:center;}
      .print-cover-opis-row{display:flex;align-items:baseline;gap:6px;padding:3px 0;border-bottom:1px dotted #d1fae5;font-size:8pt;color:#374151;}
      .print-cover-opis-row:last-child{border-bottom:none;}
      .print-cover-opis-nr{font-weight:700;color:#10b981;min-width:16px;flex-shrink:0;}
      .print-cover-opis-label{flex:1;}
      /* Separator sectiuni */
      .print-sec-page{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;border:8px solid;}
      .print-sec-num{font-size:16pt;font-weight:900;letter-spacing:4px;text-transform:uppercase;margin-bottom:28px;}
      .print-sec-title{font-size:42pt;font-weight:900;text-align:center;margin-bottom:32px;letter-spacing:2px;}
      .print-sec-line{height:6px;width:160px;border-radius:3px;margin-bottom:24px;}
      .print-sec-sub{font-size:12pt;font-weight:600;text-align:center;letter-spacing:1px;}
      /* Placeholder */
      .print-placeholder-page{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;border:3px dashed;}
      .print-ph-tag{font-size:9pt;font-weight:700;padding:5px 14px;border-radius:20px;border:1.5px solid;margin-bottom:32px;letter-spacing:1px;text-transform:uppercase;}
      .print-ph-icon{font-size:44pt;margin-bottom:20px;}
      .print-ph-title{font-size:18pt;font-weight:800;text-align:center;margin-bottom:24px;line-height:1.4;}
      .print-ph-box{font-size:11pt;text-align:center;padding:20px 32px;border:2px solid;border-radius:10px;line-height:2;}
      /* Aviz */
      .print-aviz-page{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;border:6px solid;}
      .print-aviz-tag{font-size:10pt;font-weight:700;padding:6px 18px;border-radius:20px;border:1.5px solid;margin-bottom:28px;letter-spacing:1px;text-transform:uppercase;}
      .print-aviz-title{font-size:32pt;font-weight:900;text-align:center;margin-bottom:12px;}
      .print-aviz-date{font-size:18pt;font-weight:700;text-align:center;margin-bottom:36px;opacity:.8;}
      .print-aviz-table{width:100%;border-collapse:collapse;max-width:600px;}
      /* Doc ref */
      .print-doc-ref{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;}
      .print-doc-ref-icon{font-size:44pt;margin-bottom:16px;}
      .print-doc-ref-name{font-size:16pt;font-weight:700;color:#1e293b;margin-bottom:12px;text-align:center;}
      .print-doc-ref-note{font-size:10pt;color:#64748b;text-align:center;}
      @media print{
        @page{size:A4 portrait;margin:0;}
        .viewer-toolbar{display:none!important;}
        body{background:#fff;padding:0;}
        .viewer-pages{padding:0;gap:0;}
        .print-sec-page,.print-placeholder-page,.print-cover-page,.print-pdf-page,.print-aviz-page,.print-doc-ref{
          width:210mm;height:297mm;box-shadow:none;page-break-after:always;break-after:page;page-break-inside:avoid;break-inside:avoid;overflow:hidden;
        }
        .print-pdf-page:last-child{page-break-after:avoid;break-after:avoid;}
        .print-pdf-page img{width:210mm;height:297mm;object-fit:contain;}
      }
    `;
    const standAlone=`<!DOCTYPE html><html lang="ro"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">${fonts}<style>${viewerCss}</style></head><body>`
      +`<div class="viewer-toolbar">`
      +`<div class="viewer-title">📂 Dosar masă caldă — ${_luna} ${_an}</div>`
      +`<button class="viewer-btn viewer-btn-print" onclick="window.print()">🖨️ Printează / Salvează PDF</button>`
      +`</div>`
      +`<div class="viewer-pages">${printHtml}</div>`
      +`</body></html>`;
    const blob=new Blob([standAlone],{type:'text/html;charset=utf-8'});
    const fn=`masa_calda/DOSAR_${_luna}_${_an}_${Date.now()}.html`;
    const url=await r2Up(fn,blob);
    // Șterge dosar vechi dacă există
    const tipD=`DOSAR_MASA_${_luna}_${_an}`;
    const{data:vechi}=await db.from('documente_contract').select('id,link_drive').eq('contract_id',CTR_ID).eq('tip_document',tipD);
    if(vechi&&vechi.length){for(const v of vechi){if(v.link_drive)await r2Del(v.link_drive);}await db.from('documente_contract').delete().eq('contract_id',CTR_ID).eq('tip_document',tipD);}
    // Salvează referința nouă
    await db.from('documente_contract').insert({contract_id:CTR_ID,tip_document:tipD,nume_fisier:`Dosar masă caldă — ${_luna} ${_an}.html`,link_drive:url,furnizor:'dosar_masa_calda'});
    // Inserează containerul de print
    let printDiv=document.getElementById('print-dosar-container');
    if(printDiv) printDiv.remove();
    printDiv=document.createElement('div');
    printDiv.id='print-dosar-container';
    printDiv.innerHTML=printHtml;
    document.body.appendChild(printDiv);
    setSt('✅ Dosar salvat! Apasă CTRL+P sau butonul PDF.','ok');
    // Actualizează sidebar cu dosarul salvat
    await renderDosarSalvat(tipD,url);
    setTimeout(()=>window.print(),400);
  }catch(e){
    // Chiar dacă salvarea eșuează, permite printul
    let printDiv=document.getElementById('print-dosar-container');
    if(printDiv) printDiv.remove();
    printDiv=document.createElement('div');
    printDiv.id='print-dosar-container';
    printDiv.innerHTML=printHtml;
    document.body.appendChild(printDiv);
    setSt('⚠️ Salvare eșuată: '+e.message+' — dar poți printa.','err');
    setTimeout(()=>window.print(),400);
  }
}

async function stergeDosarSalvat(){
  if(!confirm(`Ștergi dosarul salvat pentru ${_luna} ${_an}?`)) return;
  const tipD=`DOSAR_MASA_${_luna}_${_an}`;
  const{data}=await db.from('documente_contract').select('id,link_drive').eq('contract_id',CTR_ID).eq('tip_document',tipD);
  if(data&&data.length){
    for(const v of data){ if(v.link_drive) await r2Del(v.link_drive); }
    await db.from('documente_contract').delete().eq('contract_id',CTR_ID).eq('tip_document',tipD);
  }
  const printDiv=document.getElementById('print-dosar-container');
  if(printDiv) printDiv.remove();
  const panel=document.getElementById('dosar-salvat-header');
  if(panel) panel.innerHTML=`<span class="btn-dosar-salvat-empty">📂 Niciun dosar salvat</span>`;
  setSt('🗑️ Dosar șters.','ok');
}

async function renderDosarSalvat(tipD,url){
  const panel=document.getElementById('dosar-salvat-header');
  if(!panel)return;
  panel.innerHTML=`<a href="${url}" target="_blank" class="btn btn-dosar-salvat" style="text-decoration:none;">📂 DOSAR SALVAT — ${_luna} ${_an}</a>`
    +`<button class="btn" style="background:#7f1d1d;color:#fca5a5;font-size:11px;padding:6px 10px;" onclick="stergeDosarSalvat()" title="Șterge dosarul salvat">🗑️</button>`;
}

async function loadDosarSalvat(){
  const tipD=`DOSAR_MASA_${_luna}_${_an}`;
  const{data}=await db.from('documente_contract').select('link_drive,data_upload').eq('contract_id',CTR_ID).eq('tip_document',tipD).order('data_upload',{ascending:false}).limit(1);
  const panel=document.getElementById('dosar-salvat-header');
  if(!panel)return;
  if(data&&data.length&&data[0].link_drive){
    const d=data[0];
    const dataF=d.data_upload?new Date(d.data_upload).toLocaleDateString('ro-RO',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    panel.innerHTML=`<a href="${d.link_drive}" target="_blank" class="btn btn-dosar-salvat" title="Generat: ${dataF}" style="text-decoration:none;">📂 DOSAR SALVAT — ${_luna} ${_an}</a>`
      +`<button class="btn" style="background:#7f1d1d;color:#fca5a5;font-size:11px;padding:6px 10px;" onclick="stergeDosarSalvat()" title="Șterge dosarul salvat">🗑️</button>`;
  } else {
    panel.innerHTML=`<span class="btn-dosar-salvat-empty">📂 Niciun dosar salvat</span>`;
  }
}

let _stTimer=null;
function setSt(msg,type){
  const el=document.getElementById('status-bar');
  if(_stTimer){clearTimeout(_stTimer);_stTimer=null;}
  if(!msg){el.style.display='none';return;}
  el.className=type?'st-'+type:'';el.textContent=msg;el.style.display='block';
  // Auto-clear dupa 8s pentru mesaje ok/load ramase
  if(type==='ok')_stTimer=setTimeout(()=>setSt('',''),4000);
  if(type==='load')_stTimer=setTimeout(()=>setSt('',''),3000);
}

init();
</script>
