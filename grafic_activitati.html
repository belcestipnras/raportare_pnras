<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNRAS Dashboard - Contrast Maxim</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #4f46e5;
            --bg: #f0f7ff;
            --text-main: #000000;
            --text-blue: #1e40af;
            --border: #bfdbfe;
            --success: #10b981;
            --complete: #f59e0b;
            --bg-cat1: #dbeafe;
            --bg-cat2: #ffedd5;
            --bg-cat3: #d1fae5;
            --bg-cat4: #ede9fe;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100vh; width: 100vw; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); }

        /* ── APP: header | topbar | main ── */
        .app { display: grid; grid-template-rows: auto auto 1fr; height: 100vh; }

        /* ── ROW 1: CATEGORII — mai mari ── */
        .header {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            padding: 10px 16px; background: white; border-bottom: 2px solid var(--p);
        }
        .cat-btn {
            border: 2px solid var(--border); padding: 12px 14px; border-radius: 10px;
            cursor: pointer; display: flex; align-items: center; transition: 0.2s;
            font-size: 0.88rem; font-weight: 800; color: var(--text-main); line-height: 1.3;
        }
        .cat-btn#c1 { background: var(--bg-cat1); }
        .cat-btn#c2 { background: var(--bg-cat2); }
        .cat-btn#c3 { background: var(--bg-cat3); }
        .cat-btn#c4 { background: var(--bg-cat4); }
        .cat-btn.active { border-color: var(--p); box-shadow: 0 0 0 3px var(--p); }

        /* ── ROW 2: BARA RAPORT ── */
        .topbar {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 16px; background: white; border-bottom: 2px solid var(--border);
            font-size: 0.75rem; font-weight: 800; color: var(--p);
        }
        .topbar select {
            padding: 4px 8px; border-radius: 6px; border: 2px solid var(--border);
            font-family: inherit; font-weight: 700; font-size: 0.75rem;
        }
        .btn-raport {
            background: #059669; color: white; border: none; padding: 6px 14px;
            border-radius: 8px; font-size: 0.75rem; font-weight: 800; cursor: pointer;
        }

        /* ── ROW 3: MAIN ── */
        .main { display: grid; grid-template-columns: 280px 1fr; overflow: hidden; }

        /* SIDEBAR — cartonase mai mari */
        .sidebar { background: white; border-right: 2px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-h { padding: 10px 14px; font-size: 0.75rem; font-weight: 900; color: var(--p); text-transform: uppercase; border-bottom: 1px solid var(--border); flex-shrink: 0; letter-spacing: 0.5px; }
        .sidebar-list { overflow-y: auto; padding: 8px; flex-grow: 1; }
        .act-item {
            padding: 10px 12px; border-radius: 10px; margin-bottom: 6px; cursor: pointer;
            font-size: 0.82rem; line-height: 1.4; border: 2px solid var(--border);
            transition: 0.2s; background: #fff; color: var(--text-main);
        }
        .act-item:hover { border-color: var(--p); background: var(--bg-cat1); }
        .act-item.active { background: var(--p); color: white; border-color: var(--p); }
        .act-item b { font-size: 0.72rem; font-weight: 900; display: block; margin-bottom: 2px; color: inherit; }

        /* CONTENT: calendar sus, documente jos */
        .content { display: grid; grid-template-rows: auto 1fr; overflow: hidden; }

        /* CALENDAR — compact, fara scroll */
        .calendar-section {
            padding: 12px 18px; background: white; border-bottom: 2px solid var(--border);
            display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
        }
        .act-meta h2 { font-size: 1.1rem; font-weight: 900; color: var(--p); }
        .act-meta p  { font-size: 0.8rem; color: var(--text-blue); font-weight: 600; margin-top: 3px; }

        .year-block { display: flex; align-items: center; gap: 8px; }
        .year-label {
            font-size: 0.75rem; font-weight: 900; color: var(--p);
            width: 44px; flex-shrink: 0; text-align: right;
        }
        .month-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 5px; flex: 1; }
        .cell {
            aspect-ratio: 1.1; border: 2px solid var(--border); border-radius: 7px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #fff; cursor: pointer; font-size: 0.78rem; font-weight: 900;
            transition: 0.2s; color: var(--text-main); line-height: 1;
        }
        .cell.active   { background: var(--success); color: white; border-color: var(--success); }
        .cell.finished { background: var(--complete) !important; color: white; border-color: var(--complete); }
        .cell.sel      { outline: 3px solid var(--p); outline-offset: 2px; }
        .cell span     { font-size: 0.58rem; color: var(--text-blue); font-weight: 700; margin-top: 1px; }
        .cell.active span, .cell.finished span { color: white; opacity: 0.9; }
        .cell-empty    { aspect-ratio: 1.1; visibility: hidden; }

        /* DOCUMENTE — grid di cartonase sub calendar */
        .docs-section {
            background: var(--bg-cat1); display: flex; flex-direction: column;
            overflow: hidden; padding: 10px 18px;
        }
        .docs-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-shrink: 0; }
        .docs-h h3 { font-size: 0.85rem; font-weight: 900; color: var(--p); text-transform: uppercase; }
        .docs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px; overflow-y: auto; flex-grow: 1; align-content: start;
        }

        .doc-card {
            background: white; border: 2px solid var(--border); border-radius: 10px;
            padding: 9px 12px; display: flex; flex-direction: column; gap: 5px;
            box-shadow: 0 1px 4px rgba(30,64,175,0.08); transition: 0.15s;
        }
        .doc-card:hover { border-color: var(--p); }
        .doc-card.done { border-left: 5px solid var(--complete); border-color: var(--complete); background: #fffcf5; }
        .doc-title { font-size: 0.78rem; font-weight: 800; color: var(--text-main); line-height: 1.3; }
        .doc-row { display: flex; align-items: center; gap: 6px; }
        .doc-reg { flex: 1; min-width: 0; font-size: 0.72rem; border: 2px solid var(--border); border-radius: 6px; padding: 3px 5px; font-weight: 900; text-align: center; color: var(--p); }
        .doc-del { border: none; background: none; color: #ef4444; cursor: pointer; font-size: 1rem; font-weight: 900; flex-shrink: 0; padding: 0 2px; }

        .tag { background: var(--bg-cat1); padding: 1px 6px; border-radius: 10px; font-size: 0.6rem; font-weight: 800; color: var(--p); border: 1px solid var(--p); }
        .btn-add { background: var(--p); color: white; border: none; padding: 7px 14px; border-radius: 8px; font-size: 0.78rem; font-weight: 800; cursor: pointer; }
        .btn-tag { background: white; border: 2px dashed var(--p); color: var(--p); border-radius: 10px; padding: 1px 8px; font-size: 0.62rem; font-weight: 800; cursor: pointer; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--p); border-radius: 10px; }

        .empty-hint { text-align: center; padding: 24px 10px; color: var(--text-blue); font-weight: 800; font-size: 0.85rem; grid-column: 1 / -1; }

        /* JUSTIFICARE — element fix deasupra grid-ului, nu scrolleaza */
        .just-box {
            flex-shrink: 0;
            background: #fffbeb; border: 2px dashed #f59e0b; padding: 7px 10px;
            border-radius: 9px; display: flex; align-items: flex-start; gap: 8px;
            margin-bottom: 8px;
        }
        .just-box label { font-size: 0.65rem; font-weight: 900; color: #b45309; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; padding-top: 4px; }
        .just-box textarea { flex: 1; border: 1px solid #fcd34d; border-radius: 6px; padding: 5px 8px; font-family: inherit; font-size: 0.78rem; resize: none; height: auto; min-height: 32px; overflow: hidden; line-height: 1.5; display: block; }

        /* Modal */
        .doc-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.35); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .doc-modal { background: white; border-radius: 14px; padding: 24px 28px; box-shadow: 0 8px 40px rgba(79,70,229,0.2); width: 360px; max-width: 90vw; }
        .doc-modal h3 { margin: 0 0 14px 0; font-size: 1rem; font-weight: 900; color: var(--p); border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .doc-modal label { display: block; font-size: 0.72rem; font-weight: 800; color: var(--text-blue); margin-bottom: 5px; text-transform: uppercase; }
        .doc-modal input { width: 100%; padding: 9px 12px; border: 2px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.88rem; font-weight: 700; color: var(--text-main); outline: none; transition: border-color 0.2s; }
        .doc-modal input:focus { border-color: var(--p); }
        .doc-modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
        .doc-modal-cancel { background: #f0f0f0; color: #555; border: none; padding: 8px 16px; border-radius: 8px; font-family: inherit; font-size: 0.75rem; font-weight: 800; cursor: pointer; }
        .doc-modal-ok { background: var(--p); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-family: inherit; font-size: 0.75rem; font-weight: 800; cursor: pointer; }
        .doc-modal-ok:hover { background: #4338ca; }
    </style>
</head>

let cAct = null, cMon = null;

function getBlockKey(code, mid) {
    // Lista activităților care trebuie să fie INDIVIDUALE (lună de lună)
    const separateActs = ["II.3.", "II.4.", "II.5.", "II.6."];
    
    // Dacă activitatea este în listă, dezactivăm gruparea și returnăm doar luna curentă
    if (separateActs.includes(code)) {
        return mid;
    }

    // --- LOGICA ORIGINALĂ PENTRU RESTUL ACTIVITĂȚILOR (Grupare pe blocuri) ---
    const a = project.acts[code]; 
    if (!a.schedule.includes(mid)) return mid;
    
    const sorted = [...a.schedule].sort((x, y) => parseInt(x.substring(1)) - parseInt(y.substring(1)));
    let blockStart = mid; 
    let currVal = parseInt(mid.substring(1));
    
    while (sorted.includes("L" + (currVal - 1))) { 
        currVal--; 
        blockStart = "L" + currVal; 
    }
    return blockStart;
}

async function init() {
    const { data } = await sb.from('grafic_activitati').select('*');
    if (data) data.forEach(r => { 
        const act = project.acts[r.activity_code];
        if(act) { 
            act.schedule = r.schedule || []; 
            const rawData = r.documents || {}; 

            // EXTRAGEM folosind aceeași cheie: _justificari
            act.justificari = rawData._justificari || {};

            // Curățăm documentele pentru a nu randa justificările ca pe o lună
            const cleanDocs = { ...rawData };
            delete cleanDocs._justificari; 
            act.docs = cleanDocs;
        } 
    });
    loadCat(1);
    if (typeof populateIntervals === 'function') populateIntervals();
}

async function sync(code) {
    const a = project.acts[code];
    // "Împachetăm" justificările în obiectul de documente
    const payload = { 
        ...a.docs, 
        _justificari: a.justificari || {} // <-- Aici folosim cheia _justificari
    };

    await sb.from('grafic_activitati').upsert({ 
        activity_code: code, 
        schedule: a.schedule, 
        documents: payload, 
        updated_at: new Date() 
    }, { onConflict: 'activity_code' });
    
    updateCellColors();
}

function updateCellColors() {
    if (!cAct) return;
    project.timeline.forEach(m => {
        const cell = document.getElementById(`m-${m.id}`); if (!cell) return;
        const key = getBlockKey(cAct, m.id); const ds = project.acts[cAct].docs[key] || [];
        if (ds.length > 0 && ds.every(d => d.done)) cell.classList.add('finished'); else cell.classList.remove('finished');
    });
}

function loadCat(id) {
    const l = document.getElementById('list'); l.innerHTML = '';
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`c${id}`).classList.add('active');
    Object.keys(project.acts).forEach(code => {
        const a = project.acts[code];
        if (a.cat === id) {
            const d = document.createElement('div'); d.className = 'act-item ' + (code===cAct?'active':'');
            d.innerHTML = `<b>${code}</b> ${a.name}`; d.onclick = () => { renderAct(code); }; l.appendChild(d);
        }
    });
}

function renderAct(code) {
    cAct = code; cMon = null; loadCat(project.acts[code].cat);
    const v = document.getElementById('view');
    const a = project.acts[code];
    let h = `<div class="act-meta"><h2>Activitatea ${code}</h2><p>${a.name}</p></div>`;

    const yearConfig = {
        "2024": { pad: 4 },  // Mai=5, donc 4 vides avant
        "2025": { pad: 0 },  // Ian-Dec complet
        "2026": { pad: 0, padEnd: 6 }  // Ian-Iun, 6 vides apres
    };

    ["2024","2025","2026"].forEach(y => {
        const months = project.timeline.filter(t => t.year === y);
        const cfg = yearConfig[y];
        h += `<div class="year-block"><span class="year-label">${y}</span><div class="month-grid">`;
        for (let p = 0; p < (cfg.pad||0); p++) h += `<div class="cell-empty"></div>`;
        months.forEach(m => {
            const actv = a.schedule.includes(m.id) ? 'active' : '';
            const key  = getBlockKey(code, m.id);
            const ds   = a.docs[key] || [];
            const fin  = ds.length > 0 && ds.every(d => d.done) ? 'finished' : '';
            h += `<div id="m-${m.id}" class="cell ${actv} ${fin}" onclick="selM('${m.id}')">
                    ${m.name}<span>${m.year.slice(2)}</span>
                  </div>`;
        });
        for (let p = 0; p < (cfg.padEnd||0); p++) h += `<div class="cell-empty"></div>`;
        h += `</div></div>`;
    });

    v.innerHTML = h;
    document.getElementById('d-list').innerHTML = '<div class="empty-hint">Selectați o lună din calendar.</div>';
}

function selM(mid) {
    if (cMon === mid) {
        cMon = null; document.querySelectorAll('.cell').forEach(c => c.classList.remove('sel'));
        document.getElementById('d-list').innerHTML = '<div class="empty-hint">Selectați o lună din calendar.</div>';
        return;
    }
    cMon = mid; document.querySelectorAll('.cell').forEach(c => c.classList.remove('sel'));
    document.getElementById(`m-${mid}`).classList.add('sel');
    const key = getBlockKey(cAct, mid);
    if (templates[cAct] && (!project.acts[cAct].docs[key] || project.acts[cAct].docs[key].length === 0)) {
        project.acts[cAct].docs[key] = templates[cAct].map(t => ({ title: t, done: false, reg: "", sub: [] }));
        sync(cAct);
    }
    renderD();
}

function renderD() {
    const l = document.getElementById('d-list');
    l.innerHTML = '';
    const key  = getBlockKey(cAct, cMon);
    const docs = project.acts[cAct].docs[key] || [];

    // Justificare — in containerul sau propriu, deasupra grid-ului, mereu vizibila
    if (!project.acts[cAct].justificari) project.acts[cAct].justificari = {};
    const justValue = project.acts[cAct].justificari[key] || "";
    const justContainer = document.getElementById('just-container');
    if (justContainer) {
        const justDiv = document.createElement('div');
        justDiv.className = 'just-box';
        justDiv.innerHTML =
            '<label>⚠️ Justificare:</label>' +
            '<textarea id="just-ta" placeholder="Motivul dacă activitatea nu a avut loc în această lună..." ' +
            'oninput="autoResizeTA(this); upJust(\'' + key + '\', this.value)">' + justValue + '</textarea>';
        justContainer.innerHTML = '';
        justContainer.appendChild(justDiv);
        setTimeout(() => {
            const ta = document.getElementById('just-ta');
            if (ta) autoResizeTA(ta);
        }, 0);
    }

    if (docs.length === 0) {
        const h = document.createElement('div');
        h.className = 'empty-hint';
        h.textContent = 'Niciun document. Apăsați + Adaugă Document.';
        l.appendChild(h);
        return;
    }

    docs.forEach((d, i) => {
        const div = document.createElement('div');
        div.className = 'doc-card' + (d.done ? ' done' : '');

        const isAvize = d.title.toLowerCase().includes("avize");
        const ph = isAvize ? "Nr. avize" : "Nr. Reg.";

        let subs = (d.sub || []).map((s, si) =>
            `<div class="tag">${s} <button onclick="remSub(${i},${si})" style="border:none;background:none;color:red;cursor:pointer;font-weight:900;font-size:0.8rem;">&times;</button></div>`
        ).join('');

        div.innerHTML = `
            <div style="display:flex;align-items:flex-start;gap:6px;">
                <input type="checkbox" ${d.done?'checked':''} onchange="upD(${i},'done',this.checked)"
                    style="width:17px;height:17px;accent-color:#f59e0b;cursor:pointer;flex-shrink:0;margin-top:2px;">
                <div class="doc-title" style="flex:1;">${d.title}</div>
                <button class="doc-del" onclick="remD(${i})" title="Șterge">&times;</button>
            </div>
            <div class="doc-row">
                <input type="text" class="doc-reg" value="${d.reg||''}" onchange="upD(${i},'reg',this.value)" placeholder="${ph}">
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:3px;">${subs}<button class="btn-tag" onclick="addSub(${i})">+ CLASĂ</button></div>
        `;
        l.appendChild(div);
    });
}
// Auto-resize textarea
function autoResizeTA(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
}

// Funcția de ajutor pentru salvarea textului din justificare
async function upJust(key, val) {
    project.acts[cAct].justificari[key] = val;
    await sync(cAct);
}
function addSub(i) {
    const val = prompt("Sub-registru (ex: 5A):");
    if(val) { const key = getBlockKey(cAct, cMon); if(!project.acts[cAct].docs[key][i].sub) project.acts[cAct].docs[key][i].sub = []; project.acts[cAct].docs[key][i].sub.push(val); renderD(); sync(cAct); }
}
function remSub(i, si) { const key = getBlockKey(cAct, cMon); project.acts[cAct].docs[key][i].sub.splice(si,1); renderD(); sync(cAct); }
function addD() {
    if (!cMon) return;
    const overlay = document.createElement('div');
    overlay.className = 'doc-modal-overlay';
    overlay.innerHTML = `
        <div class="doc-modal">
            <h3>+ Adaugă Document Nou</h3>
            <label>Numele documentului</label>
            <input type="text" id="doc-modal-input" placeholder="Ex: Raport, Proces-verbal..." maxlength="120" autocomplete="off">
            <div class="doc-modal-actions">
                <button class="doc-modal-cancel" id="doc-modal-cancel">Anulează</button>
                <button class="doc-modal-ok" id="doc-modal-ok">Adaugă</button>
            </div>
        </div>`;
    document.body.appendChild(overlay);
    const input = overlay.querySelector('#doc-modal-input');
    setTimeout(() => input.focus(), 50);
    function confirmAdd() {
        const name = input.value.trim();
        if (!name) { input.style.borderColor = '#ef4444'; input.focus(); return; }
        const key = getBlockKey(cAct, cMon);
        if (!project.acts[cAct].docs[key]) project.acts[cAct].docs[key] = [];
        project.acts[cAct].docs[key].push({ title: name, done: false, reg: '', sub: [] });
        renderD(); sync(cAct); overlay.remove();
    }
    overlay.querySelector('#doc-modal-ok').addEventListener('click', confirmAdd);
    overlay.querySelector('#doc-modal-cancel').addEventListener('click', () => overlay.remove());
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    input.addEventListener('keydown', e => { if (e.key === 'Enter') confirmAdd(); if (e.key === 'Escape') overlay.remove(); });
}
function upD(i, f, v) { const key = getBlockKey(cAct, cMon); project.acts[cAct].docs[key][i][f] = v; if(f==='done') renderD(); sync(cAct); }
function remD(i) { const key = getBlockKey(cAct, cMon); project.acts[cAct].docs[key].splice(i,1); renderD(); sync(cAct); }
window.onload = init;
