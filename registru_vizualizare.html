<!DOCTYPE html>
<html lang="ro">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f4f6; --panel: #ffffff; --accent: #2563eb; --accent-hover: #1d4ed8;
            --text-main: #1f2937; --text-muted: #6b7280; --border-color: #e5e7eb;
            --danger: #ef4444; --success: #10b981; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; flex-direction: column; height: 100vh; }

        /* HEADER */
        .top-bar { 
            background: var(--panel); border-bottom: 1px solid var(--border-color); padding: 0 24px; height: 75px;
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); z-index: 50;
        }

        .month-btn { padding: 8px 10px; border: 1px solid var(--border-color); background: white; cursor: pointer; font-size: 0.75rem; font-weight: 600; border-radius: 6px; }
        .month-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .content-area { flex: 1; padding: 24px; overflow-y: auto; background: #f9fafb; }

        .main-card { background: var(--panel); border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border-color); overflow: hidden; }
        .card-header { padding: 15px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: #fff; }

        /* TABEL */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f9fafb; padding: 12px 16px; text-align: left; font-size: 0.7rem; text-transform: uppercase; font-weight: 700; color: var(--text-muted); border-bottom: 1px solid var(--border-color); }

        .col-zi { width: 50px; }
        .col-nrdata { width: 180px; font-weight: 700; color: #1e40af; background: #eff6ff !important; }
        .col-continut { width: auto; }
        .col-del { width: 45px; text-align: center; }

        input { width: 100%; border: 1px solid transparent; padding: 10px; box-sizing: border-box; font-size: 0.85rem; background: transparent; font-weight: 500; }
        input:focus { border-color: var(--accent); background: #fff; outline: none; }

        /* SIDEBAR */
        .sidebar { 
    width: 420px; 
    background: var(--panel); 
    border-left: 1px solid var(--border-color); 
    padding: 15px; /* Redus de la 24px */
    display: flex;
    flex-direction: column;
    height: calc(100vh - 75px); /* Fixează înălțimea sub top-bar */

    overflow: hidden; /* Împiedică scroll-ul pe întreg sidebar-ul */
}

#sertar-content {
    flex: 1;
    overflow-y: hidden; /* Eliminăm scroll-ul și de aici */
}
        .doc-category { background: #f9fafb; border: 1px solid var(--border-color); border-radius: 10px; margin-bottom: 20px; padding: 16px; }
        .cat-title { font-weight: 700; color: var(--text-main); display: block; margin-bottom: 12px; font-size: 0.8rem; text-transform: uppercase; }
        .cat-count { float: right; color: var(--accent); font-weight: 900; background: #dbeafe; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; }
        
        .btn-add-group { width: 100%; background: var(--accent); color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.8rem; margin-top: 10px; }

        /* DRAG & DROP */
        tr[draggable="true"] { cursor: grab; }
        tr[draggable="true"]:active { cursor: grabbing; }
        tr.drag-over { outline: 2px dashed var(--accent); outline-offset: -2px; background: #eff6ff !important; }
        tr.dragging { opacity: 0.4; }
        .drag-handle { cursor: grab; font-size: 1rem; padding: 0 6px; color: var(--text-muted); user-select: none; }
        .drag-handle:active { cursor: grabbing; }

        /* PRINT */
        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            .top-bar, .sidebar, .trash-container, .col-del, button, .card-header, .table-toolbar { display: none !important; }
            .main-layout { display: block; }
            .content-area { padding: 0; }

            th, td { border: 1px solid #000; padding: 6px; font-size: 8pt; color: black !important; }

        .btn-p { padding: 8px 14px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; font-size: 0.75rem; display: flex; align-items: center; gap: 6px; }
    </style>

</div>

<script>
    const _U = "https://aexjrbdgajurxzngfkpx.supabase.co";
    const _K = "sb_publishable_KPV__0BA9z4EvRl5eqC0FQ_hmBLOLYv";
    const _SB = supabase.createClient(_U, _K);

    const luniText = ["Ianuarie", "Februarie", "Martie", "Aprilie", "Mai", "Iunie", "Iulie", "August", "Septembrie", "Octombrie", "Noiembrie", "Decembrie"];
    let currentAn = "", currentLuna = "", localRows = [];
    let dateExpertiClean = []; 
    let expertiUnici = [];

    function init() {
        [2025, 2026].forEach(an => {
            const div = document.getElementById(`m-${an}`);
            luniText.forEach(l => {
                const b = document.createElement('button');
                b.className = 'month-btn'; b.id = `btn-${an}-${l}`;
                b.innerText = l.substring(0,3);
                b.onclick = () => schimbaLuna(l, an);
                div.appendChild(b);
            });
        });
    }

    async function schimbaLuna(luna, an) {
        document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${an}-${luna}`).classList.add('active');
        currentAn = an; currentLuna = luna;
        document.getElementById('titlu-luna').innerText = `Registru Master PNRAS: ${luna} ${an}`;
        await refreshDate();
    }

    async function refreshDate() {
        const indexLuna = luniText.indexOf(currentLuna);
    // 1. Calculăm startNr corect: primul număr liber după toate înregistrările din lunile anterioare
    const { data: toate } = await _SB.from('registru_master').select('luna_inreg, blocat, numar_fix').eq('an_inreg', currentAn).eq('stare', 'activ');
    const rAnderioare = toate ? toate.filter(r => luniText.indexOf(r.luna_inreg) < indexLuna) : [];
    // Simulăm numerotarea lunilor anterioare pentru a afla ultimul nr folosit
    let autoNrAnt = 1;
    const blocateAnt = rAnderioare.filter(r => r.blocat).map(r => parseInt(r.numar_fix));
    rAnderioare.forEach(row => {
        if (row.blocat) {
            // număr fix — actualizăm autoNrAnt dacă e mai mare
            autoNrAnt = Math.max(autoNrAnt, parseInt(row.numar_fix) + 1);
        } else {
            while (blocateAnt.includes(autoNrAnt)) autoNrAnt++;
            autoNrAnt++;
        }
    });
    document.getElementById('start-nr').value = autoNrAnt;

        const { data: rows } = await _SB.from('registru_master').select('*').eq('luna_inreg', currentLuna).eq('an_inreg', currentAn);
    localRows = rows || [];

window.numereOcupate = localRows
        .filter(r => r.blocat === true)
        .map(r => parseInt(r.numar_fix));
        
        const { data: p } = await _SB.from('pontaj_detaliat').select('expert, clase_grupe').eq('luna', currentLuna).eq('an', currentAn);
        let tempData = [];
        if(p) {
            p.forEach(item => {
                const claseSplit = (item.clase_grupe || "").split(',').map(s => s.trim()).filter(s => s !== "");
                claseSplit.forEach(cls => tempData.push({ expert: item.expert, clasa: cls }));
            });
        }
        dateExpertiClean = [];
        const uniqueSet = new Set();
        tempData.forEach(obj => {
            const key = `${obj.expert}|${obj.clasa}`;
            if(!uniqueSet.has(key)) { uniqueSet.add(key); dateExpertiClean.push(obj); }
        });
        dateExpertiClean.sort((a,b) => a.expert.localeCompare(b.expert) || a.clasa.localeCompare(b.clasa));
        expertiUnici = [...new Set(dateExpertiClean.map(i => i.expert))].sort();

        const { data: m } = await _SB.from('setari_pontaj').select('zi').eq('luna', currentLuna).eq('an', currentAn).gt('valoare_aviz', 0);
        window.zileMasa = [...new Set(m?.map(d => d.zi))].sort((a,b) => a-b);

        renderTabel();
        renderTrash();
        genereazaSertar();
    }

    function renderTabel() {
    const tbody = document.getElementById('tabel-body');
    tbody.innerHTML = '';
    const startNr = parseInt(document.getElementById('start-nr').value);
    
    // 1. Sortare inițială cronologică pentru a atribui numerele corect
    // Rândurile fără zi (cele noi) primesc valoarea 999 pentru a sta la final
    // În cadrul aceleiași zile, se sortează după sort_order (dacă există), altfel după id
    let rowsToDisplay = localRows.filter(r => r.stare !== 'sters').sort((a, b) => {
        const ziA = parseInt(a.zi_inreg) || 999;
        const ziB = parseInt(b.zi_inreg) || 999;
        if (ziA !== ziB) return ziA - ziB;
        // Aceeași zi: sort_order are prioritate
        const soA = a.sort_order != null ? a.sort_order : a.id;
        const soB = b.sort_order != null ? b.sort_order : b.id;
        return soA - soB;
    });

    // 2. Calculăm numerele de înregistrare (afisNr)
    let currentAutoNr = startNr;
    const numereBlocateInLuna = rowsToDisplay.filter(r => r.blocat).map(r => parseInt(r.numar_fix));

    rowsToDisplay.forEach(row => {
        if (row.blocat) {
            row.tempNr = parseInt(row.numar_fix);
        } else {
            // Sărim peste numerele ocupate de rânduri blocate
            while (numereBlocateInLuna.includes(currentAutoNr)) {
                currentAutoNr++; 
            }
            row.tempNr = currentAutoNr;
            currentAutoNr++;
        }
    });

    // 3. RE-SORTARE finală după numărul de înregistrare calculat
    // Această sortare asigură succesiunea corectă: 524, 525, 526, 527...
    rowsToDisplay.sort((a, b) => a.tempNr - b.tempNr);

    // 4. Generarea propriu-zisă a rândurilor în tabel
    rowsToDisplay.forEach((row) => {
        const afisNr = row.tempNr;
        const dataCurenta = parseInt(row.zi_inreg) || 0;
        
        // Verificăm dacă există conflict cronologic (Cod Roșu)
        let esteConflict = false;
        rowsToDisplay.forEach(altRow => {
            if (altRow.blocat) {
                const dataBlocata = parseInt(altRow.zi_inreg) || 0;
                const nrBlocat = altRow.tempNr;
                // Conflict dacă nr mai mare are dată mai mică decât un blocat (sau invers)
                if (afisNr > nrBlocat && dataCurenta < dataBlocata) esteConflict = true;
                if (afisNr < nrBlocat && dataCurenta > dataBlocata) esteConflict = true;
            }
        });

        // Verificăm dacă este Duminică
        const lunaIdx = luniText.indexOf(currentLuna);
        const dataVerif = new Date(currentAn, lunaIdx, dataCurenta);
        const esteDuminica = dataVerif.getDay() === 0;
        const lunaNr = (lunaIdx + 1).toString().padStart(2, '0');

        const tr = document.createElement('tr');
        tr.dataset.id = row.id;
        tr.dataset.zi = row.zi_inreg || '';
        tr.draggable = true;
        if (esteConflict) {
            tr.style.backgroundColor = "#fee2e2"; // Fundal roșu pentru erori de cronologie
        }

        tr.innerHTML = `
            <td style="text-align:center; width:28px; background:#f9fafb;">
                <span class="drag-handle" title="Trage pentru a reordona (doar în aceeași zi)">⠿</span>
            </td>
            <td class="col-nr" style="${row.blocat ? 'background:#d1fae5 !important; color:#065f46; font-weight:800;' : ''}">
                ${afisNr} ${row.blocat ? '🔒' : ''}
            </td>
            <td class="col-zi">
                <input type="text" value="${row.zi_inreg || ''}" 
                       style="${esteDuminica ? 'color: red; font-weight: 900;' : ''}"
                       onchange="proceseazaSchimbareData(${row.id}, this.value)">
            </td>
            <td class="col-nrdata" style="${esteConflict ? 'color: red; font-weight: 900;' : ''}">
                ${afisNr} / ${row.zi_inreg || '..'}.${lunaNr}.${currentAn}
            </td>
            <td class="col-continut">
                <input type="text" value="${row.cuprins_act || ''}" onchange="updateRow(${row.id}, 'cuprins_act', this.value)">
            </td>
            <td class="col-del">
                <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
                    <button onclick="toggleLock(${row.id}, ${afisNr}, ${row.blocat ? 'false' : 'true'})" 
                            title="${row.blocat ? 'Deblochează' : 'Blochează numărul'}"
                            style="cursor:pointer; border:none; background:none; font-size:1.1rem; padding:0;">
                        ${row.blocat ? '🔒' : '🔓'}
                    </button>
                    <button onclick="deleteRow(${row.id})" 
                            title="Șterge"
                            style="color:var(--danger); background:none; border:none; cursor:pointer; font-size:1.1rem; padding:0;">
                        ✕
                    </button>
                </div>
            </td>
        `;
        tbody.appendChild(tr);
    });

    // Inițializăm drag & drop după ce toate rândurile sunt în DOM
    initDragDrop();
}

let dragSrcId = null;
let dragSrcZi = null;

function initDragDrop() {
    const tbody = document.getElementById('tabel-body');
    const rows = Array.from(tbody.querySelectorAll('tr[draggable="true"]'));

    rows.forEach(row => {
        row.addEventListener('dragstart', (e) => {
            dragSrcId = row.dataset.id;
            dragSrcZi = row.dataset.zi;
            row.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });

        row.addEventListener('dragend', () => {
            rows.forEach(r => r.classList.remove('drag-over', 'dragging'));
        });

        row.addEventListener('dragover', (e) => {
            e.preventDefault();
            // Permitem drop doar dacă e aceeași zi
            if (row.dataset.zi === dragSrcZi && row.dataset.id !== dragSrcId) {
                e.dataTransfer.dropEffect = 'move';
                rows.forEach(r => r.classList.remove('drag-over'));
                row.classList.add('drag-over');
            } else {
                e.dataTransfer.dropEffect = 'none';
            }
        });

        row.addEventListener('dragleave', () => {
            row.classList.remove('drag-over');
        });

        row.addEventListener('drop', async (e) => {
            e.preventDefault();
            row.classList.remove('drag-over');

            if (!dragSrcId || row.dataset.id === dragSrcId || row.dataset.zi !== dragSrcZi) return;

            // Obținem ordinea curentă a rândurilor din aceeași zi din tabel (ordinea vizuală)
            const allRowsInTbody = Array.from(tbody.querySelectorAll('tr[draggable="true"]'));
            const sameDay = allRowsInTbody.filter(r => r.dataset.zi === dragSrcZi);

            const srcIdx = sameDay.findIndex(r => r.dataset.id === dragSrcId);
            const dstIdx = sameDay.findIndex(r => r.dataset.id === row.dataset.id);

            if (srcIdx === -1 || dstIdx === -1) return;

            // Reordonăm vizual
            const srcRow = sameDay[srcIdx];
            if (srcIdx < dstIdx) {
                row.parentNode.insertBefore(srcRow, row.nextSibling);
            } else {
                row.parentNode.insertBefore(srcRow, row);
            }

            // Salvăm noua ordine în Supabase
            const updatedOrder = Array.from(tbody.querySelectorAll('tr[draggable="true"]'))
                .filter(r => r.dataset.zi === dragSrcZi);

            const updates = updatedOrder.map((r, idx) => ({
                id: parseInt(r.dataset.id),
                sort_order: idx
            }));

            // Update în Supabase pentru fiecare rând din ziua respectivă
            for (const u of updates) {
                await _SB.from('registru_master').update({ sort_order: u.sort_order }).eq('id', u.id);
            }

            // Reîmprospătăm datele (numerele se recalculează)
            await refreshDate();
        });
    });
}

    // Calculează numerele de înregistrare pentru toate rândurile active ale lunii curente
    function calculeazaNumerele(rows, startNr) {
        const active = rows.filter(r => r.stare !== 'sters').sort((a, b) => {
            const ziA = parseInt(a.zi_inreg) || 999;
            const ziB = parseInt(b.zi_inreg) || 999;
            if (ziA !== ziB) return ziA - ziB;
            const soA = a.sort_order != null ? a.sort_order : a.id;
            const soB = b.sort_order != null ? b.sort_order : b.id;
            return soA - soB;
        });
        const blocate = active.filter(r => r.blocat).map(r => parseInt(r.numar_fix));
        let autoNr = startNr;
        active.forEach(row => {
            if (row.blocat) {
                row.tempNr = parseInt(row.numar_fix);
            } else {
                while (blocate.includes(autoNr)) autoNr++;
                row.tempNr = autoNr;
                autoNr++;
            }
        });
        return active;
    }

    async function adaugaGrup(tip, zi) {
        let payload = [];
        const lunaNr = (luniText.indexOf(currentLuna)+1).toString().padStart(2,'0');
        
        if(tip === 'PLAN') {
            dateExpertiClean.forEach((item, i) => {
                const cls = item.clasa;
                const prefixClasa = cls.includes('Grupa') ? cls : 'clasa ' + cls;
                payload.push({
                    zi_inreg: zi, luna_inreg: currentLuna, an_inreg: currentAn,
                    cuprins_act: `${item.expert}. Planificare ${currentLuna.toLowerCase()} ${currentAn}, ${prefixClasa}`,
                    stare: 'activ', doc_id: `PLAN_${Date.now()}_${i}`,
                    _meta: { tip: 'PLAN', expert: item.expert, clasa: item.clasa }
                });
            });
        } else if(tip === 'ORAR') {
            expertiUnici.forEach((nume, i) => {
                payload.push({
                    zi_inreg: zi, luna_inreg: currentLuna, an_inreg: currentAn,
                    cuprins_act: `${nume}. Orar ${currentLuna.toLowerCase()} ${currentAn}`,
                    stare: 'activ', doc_id: `ORAR_${Date.now()}_${i}`,
                    _meta: { tip: 'ORAR', expert: nume }
                });
            });
        } else if(tip === 'RAPORT') {
            expertiUnici.forEach((nume, i) => {
                payload.push({
                    zi_inreg: zi, luna_inreg: currentLuna, an_inreg: currentAn,
                    cuprins_act: `${nume}. Raport de activitate, ${currentLuna.toLowerCase()} ${currentAn}`,
                    stare: 'activ', doc_id: `RAP_${Date.now()}_${i}`,
                    _meta: { tip: 'RAPORT', expert: nume }
                });
            });
        } else if(tip === 'PONT') {
            expertiUnici.forEach((nume, i) => {
                payload.push({
                    zi_inreg: zi, luna_inreg: currentLuna, an_inreg: currentAn,
                    cuprins_act: `${nume}. Fișă individuală de pontaj, ${currentLuna.toLowerCase()} ${currentAn}`,
                    stare: 'activ', doc_id: `PONT_${Date.now()}_${i}`,
                    _meta: { tip: 'PONT', expert: nume }
                });
            });
        } else if(tip === 'AVIZ') {
            window.zileMasa.forEach((z, i) => {
                const zFmt = z.toString().padStart(2,'0');
                payload.push({
                    zi_inreg: zFmt, luna_inreg: currentLuna, an_inreg: currentAn,
                    cuprins_act: `Aviz de însoțire a mărfii. Masă caldă ${zFmt}.${lunaNr}.${currentAn}`,
                    stare: 'activ', doc_id: `A_${Date.now()}_${i}`
                });
            });
        }

        // Extragem _meta înainte de insert (Supabase nu acceptă coloane inexistente)
        const metaMap = {};
        const payloadCurat = payload.map((row, i) => {
            if (row._meta) { metaMap[i] = row._meta; }
            const { _meta, ...rest } = row;
            return rest;
        });

        const { data: inserate } = await _SB.from('registru_master').insert(payloadCurat).select();
        await refreshDate();

        // După refresh, localRows conține rândurile actualizate cu id-urile noi
        // Calculăm numerele pe baza stării curente
        const startNr = parseInt(document.getElementById('start-nr').value);
        const rowsCalculate = calculeazaNumerele([...localRows], startNr);

        // Construim upsert-urile pentru planificari_documente
        const docUpserts = [];
        Object.entries(metaMap).forEach(([i, meta]) => {
            const idInsertat = inserate && inserate[i] ? inserate[i].id : null;
            if (!idInsertat) return;

            // Găsim rândul cu id-ul respectiv în lista calculată
            const rand = rowsCalculate.find(r => r.id === idInsertat);
            if (!rand) return;

            const nr = rand.tempNr;
            const ziPad = (rand.zi_inreg || '..').toString().padStart(2, '0');
            const dataFormatata = `${ziPad}.${lunaNr}.${currentAn}`;

            let tipDoc = '';
            let continutNou = {};

            if (meta.tip === 'PLAN') {
                tipDoc = `PLAN_${meta.expert}_${meta.clasa}_${currentLuna}_${currentAn}`;
                continutNou = { nr: String(nr), dataReg: dataFormatata };
            } else if (meta.tip === 'ORAR') {
                tipDoc = `INFO_ORAR_${meta.expert.replace(/\s+/g, '')}_${lunaNr}_${currentAn}`;
                continutNou = { nr_inreg: String(nr), data_inreg: dataFormatata };
            } else if (meta.tip === 'RAPORT') {
                tipDoc = `RAPORT_${meta.expert.replace(/\s+/g, '')}_${lunaNr}_${currentAn}`;
                continutNou = { nr: String(nr), dataReg: dataFormatata };
            } else if (meta.tip === 'PONT') {
                tipDoc = `PONTAJ_${meta.expert.replace(/\s+/g, '')}_${lunaNr}_${currentAn}`;
                continutNou = { nr: String(nr), data: dataFormatata };
            }

            if (tipDoc) {
                docUpserts.push({
                    expert: meta.expert,
                    tip_document: tipDoc,
                    luna: currentLuna,
                    an: currentAn,
                    continut_json: continutNou
                });
            }
        });

        if (docUpserts.length > 0) {
            await _SB.from('planificari_documente').upsert(docUpserts, { onConflict: 'tip_document', ignoreDuplicates: false });
        }
    }

async function toggleLock(id, numar, stare) {

    const { error } = await _SB.from('registru_master')
        .update({ 
            blocat: stare, 
            numar_fix: stare ? numar : null 
        })
        .eq('id', id);
    
    if (error) {

    } else {
        await refreshDate(); // Reîmprospătăm datele pentru a vedea modificarea
    }

async function proceseazaSchimbareData(id, ziNoua) {
    const zi = parseInt(ziNoua) || 0;
    if (zi > 0) {
        // Verificăm dacă este duminică
        const lunaIdx = luniText.indexOf(currentLuna);
        const dataObj = new Date(currentAn, lunaIdx, zi);
        
        if (dataObj.getDay() === 0) {
            alert("⚠️ Atenție! Ziua de " + zi + " " + currentLuna + " este Duminică.");
        }
    }
    
    // Salvăm data în baza de date
    await updateRow(id, 'zi_inreg', ziNoua);
}
