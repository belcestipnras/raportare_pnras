<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raport Subactivități — PNRAS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0f1f3d;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --border: rgba(201,168,76,0.25);
    }

    /* ── NAV ── */
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -30%; right: -20%;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .container { width: 100%; max-width: 760px; position: relative; z-index: 1; }
    header { text-align: center; margin-bottom: 3rem; padding-top: 1rem; }
    .badge { display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); border: 1px solid var(--border); padding: 5px 14px; border-radius: 20px; margin-bottom: 1.5rem; }
    h1 { font-family: 'DM Serif Display', serif; font-size: clamp(1.8rem,4vw,2.6rem); color: #fff; line-height: 1.2; margin-bottom: .75rem; }
    h1 span { color: var(--gold); }
    .subtitle { font-size: 14px; color: rgba(255,255,255,.45); font-weight: 300; }
    .divider { width: 48px; height: 2px; background: var(--gold); margin: 1.25rem auto; opacity: .6; }
    .nav-grid { display: flex; flex-direction: column; gap: 1.25rem; }
    .nav-header { display: flex; align-items: center; gap: 1.5rem; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 14px 14px 0 0; padding: 1.25rem 1.75rem; position: relative; }
    .nav-header::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--gold); border-radius: 14px 0 0 0; }
    .btn-code { font-family: 'DM Serif Display', serif; font-size: 1.05rem; color: var(--gold); min-width: 42px; flex-shrink: 0; }
    .btn-title { font-size: 15px; font-weight: 500; color: #fff; }
    .months-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 6px; padding: 1rem 1.75rem 1.25rem; background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.06); border-top: none; border-radius: 0 0 14px 14px; }
    .month-btn { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 8px; padding: 7px 4px; cursor: pointer; color: rgba(255,255,255,.6); font-family: 'DM Sans',sans-serif; font-size: 11px; text-align: center; line-height: 1.3; transition: background .2s, border-color .2s, color .2s; }
    .month-btn:hover { background: rgba(201,168,76,.12); border-color: rgba(201,168,76,.35); color: var(--gold-light); }
    .month-btn.active { background: rgba(201,168,76,.2); border-color: var(--gold); color: var(--gold-light); }
    #months-I4 .month-btn:hover  { background: rgba(180,83,9,.15); border-color: rgba(180,83,9,.5); color: #fbbf24; }
    #months-I4 .month-btn.active { background: rgba(180,83,9,.25); border-color: #b45309; color: #fbbf24; }
    .month-btn .mn { display: block; font-weight: 500; }
    .month-btn .my { display: block; font-size: 10px; opacity: .6; }
    footer { text-align: center; margin-top: 3rem; font-size: 12px; color: rgba(255,255,255,.2); letter-spacing: .05em; }

    /* ── OVERLAY ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(5,12,28,.88); z-index: 200; overflow-y: auto; padding: 0; backdrop-filter: blur(6px); }
    .overlay.open { display: flex; flex-direction: column; }

    .overlay-topbar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(10,20,45,.97);
      border-bottom: 1px solid rgba(201,168,76,.2);
      display: flex; flex-direction: column;
      backdrop-filter: blur(8px);
    }
    .topbar-row1 {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; gap: 12px;
    }
    .overlay-label { font-size: 13px; color: rgba(255,255,255,.5); letter-spacing: .04em; flex: 1; }
    .save-status { font-size: 12px; font-weight: 500; min-width: 100px; text-align: center; }
    .save-status.saving { color: #fbbf24; }
    .save-status.saved  { color: #10b981; }
    .save-status.error  { color: #ef4444; }
    .topbar-actions { display: flex; gap: 8px; }
    .tb-btn { border-radius: 8px; font-family: 'DM Sans',sans-serif; font-size: 12px; padding: 6px 14px; cursor: pointer; transition: background .2s; border: 1px solid rgba(255,255,255,.15); white-space: nowrap; }
    .tb-btn.close { background: rgba(255,255,255,.07); color: rgba(255,255,255,.75); }
    .tb-btn.print { background: rgba(201,168,76,.15); color: var(--gold-light); border-color: rgba(201,168,76,.3); }
    .tb-btn.close:hover { background: rgba(255,255,255,.14); }
    .tb-btn.print:hover { background: rgba(201,168,76,.28); }

    /* ── EDITOR TOOLBAR ── */
    .editor-toolbar {
      display: flex; align-items: center; flex-wrap: wrap; gap: 2px;
      padding: 5px 16px 7px;
      border-top: 1px solid rgba(255,255,255,.06);
      background: rgba(15,25,55,.95);
    }
    .tb-sep { width: 1px; height: 22px; background: rgba(255,255,255,.15); margin: 0 4px; flex-shrink: 0; }
    .tb-group { display: flex; align-items: center; gap: 2px; }
    .et-btn {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 26px; border-radius: 5px; border: none;
      background: transparent; color: rgba(255,255,255,.75);
      cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif;
      transition: background .15s, color .15s; flex-shrink: 0;
    }
    .et-btn:hover   { background: rgba(255,255,255,.12); color: #fff; }
    .et-btn.active  { background: rgba(201,168,76,.25); color: var(--gold-light); }
    .et-btn.wide    { width: auto; padding: 0 8px; font-size: 12px; }
    .et-select {
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.8); border-radius: 5px; font-size: 12px;
      font-family: 'DM Sans', sans-serif; padding: 2px 4px; height: 26px;
      cursor: pointer; outline: none;
    }
    .et-select:focus { border-color: rgba(201,168,76,.4); }
    .et-color {
      width: 28px; height: 26px; border-radius: 5px; border: 1px solid rgba(255,255,255,.15);
      padding: 2px; cursor: pointer; background: rgba(255,255,255,.07);
    }
    /* Color indicator strip under B/I/U */
    .et-btn[data-cmd="foreColor"] { position: relative; }

    .overlay-body { flex: 1; overflow-y: auto; padding: 2rem 1rem 5rem; display: flex; flex-direction: column; align-items: center; }

    /* ── LOADING ── */
    .loading-wrap { width: 210mm; max-width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; gap: 16px; color: rgba(255,255,255,.5); font-size: 14px; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(201,168,76,.2); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════════════════════════════════════
       A4 PAGE
    ═══════════════════════════════════════ */
    .a4-page {
      width: 210mm;
      min-height: 297mm;
      max-width: 100%;
      background: #fff;
      color: #000;
      padding: 12mm 18mm 20mm;
      box-shadow: 0 12px 50px rgba(0,0,0,.6);
      font-family: 'Times New Roman', serif;
      font-size: 11pt;
      line-height: 1.6;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .a4-page + .a4-page { margin-top: 14px; }

    .antet-img { width: 100%; height: auto; display: block; margin-bottom: 8px; }

    /* Nr. înregistrare */
    .nr-inreg-row {
      display: flex; justify-content: flex-start; margin-bottom: 6px;
      font-family: 'DM Sans', sans-serif; font-size: 9.5pt; color: #000;
    }
    .nr-inreg-row [contenteditable] { min-width: 60px; border-bottom: 1px dashed #d1d5db; padding: 0 3px; outline: none; }

    /* Titluri centrate */
    .doc-title { text-align: center; font-size: 12.5pt; font-weight: bold; text-transform: uppercase; color: #000; margin: 10px 0 3px; line-height: 1.3; }
    .doc-sub   { text-align: center; font-size: 11pt; font-weight: bold; color: #000; margin-bottom: 3px; }
    .doc-disc  { text-align: center; font-size: 10.5pt; font-style: italic; color: #000; margin-bottom: 3px; }
    .doc-luna  { text-align: center; font-size: 11pt; margin-bottom: 14px; }

    /* ── SECȚIUNI COLORATE ── */
    .sectiune {
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .sectiune-header {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 9pt; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em;
    }
    .sectiune-body {
      padding: 10px 14px;
      font-size: 11pt; line-height: 1.7;
      box-sizing: border-box;
      width: 100%;
    }

    /* Culori secțiuni */
    .s-intro    { border: none; }
    .s-intro    .sectiune-header { background:#1d4ed8;color:#fff; }
    .s-intro    .sectiune-body   { background: #fff; }

    .s-romana   { border: none; }
    .s-romana   .sectiune-header { background:#1d4ed8;color:#fff; }
    .s-romana   .sectiune-body   { background: #fff; }

    .s-mate     { border: none; }
    .s-mate     .sectiune-header { background:#1d4ed8;color:#fff; }
    .s-mate     .sectiune-body   { background: #fff; }

    .s-total    { border: none; }
    .s-total    .sectiune-header { background:#1d4ed8;color:#fff; }
    .s-total    .sectiune-body   { background: #fff; }

    .s-concluzie { border: none; }
    .s-concluzie .sectiune-header { background:#1d4ed8;color:#fff; }
    .s-concluzie .sectiune-body   { background: #fff; }

    .s-experti  { border: none; }
    .s-experti  .sectiune-header { background:#1d4ed8;color:#fff; }
    .s-experti  .sectiune-body   { background: #fff; padding: 10px 14px; }
    .e-para {
      text-align: justify;
      outline: none;
      border-radius: 4px;
      transition: background .15s;
      min-height: 1.4em;
      display: block;
      width: 100%;
      box-sizing: border-box;
    }
    .e-para:focus { background: rgba(59,130,246,.05); text-decoration: none; }
    .e-para:hover:not(:focus) { background: rgba(0,0,0,.025); }
    /* Prevent double bullets inside editable boxes */
    .e-para ul, .e-para ol { margin: 0; padding-left: 1.2em; }
    .e-para li { margin: 0; padding: 0; }

    /* Bullet list editabila */
    .e-list { list-style: none; margin: 0; padding: 0; }
    .e-list li { display: flex; gap: 6px; margin-bottom: 3px; font-size: 10.5pt; }
    .e-list li::before { content: '•'; flex-shrink: 0; color: #000; }
    .e-list li .e-val { outline: none; flex: 1; border-bottom: 1px dashed #e5e7eb; min-width: 40px; padding: 0 2px; }
    .e-list li .e-val:focus { background: rgba(59,130,246,.05); border-bottom-color: #93c5fd; }
    .e-list li .e-label { color: #000; white-space: nowrap; font-size: 10.5pt; }

    /* Grid statistici */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px; margin-bottom: 8px;
    }
    .stat-box {
      background: #fff;
      border-radius: 6px; padding: 7px 10px;
    }
    .stat-box .s-label { font-family: 'DM Sans',sans-serif; font-size: 8.5pt; color: #000; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
    .stat-box .s-val   { font-family: 'DM Sans',sans-serif; font-size: 13pt; font-weight: 700; color: #000; outline: none; }
    .stat-box .s-val:focus { color: #000; }

    /* Expert cards */
    .expert-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .expert-card {
      background: #fff; border-radius: 7px;
      border: 1px solid #e2e8f0;
      padding: 9px 11px;
      break-inside: avoid;
    }
    .expert-card.ro { border-top: 3px solid #1d4ed8; }
    .expert-card.ma { border-top: 3px solid #1d4ed8; }
    .expert-card-name { font-family: 'DM Sans',sans-serif; font-size: 10pt; font-weight: 700; color: #000; margin-bottom: 2px; }
    .expert-card-disc { font-family: 'DM Sans',sans-serif; font-size: 8pt; color: #000; font-style: italic; margin-bottom: 6px; }
    .expert-card-rows { display: flex; flex-direction: column; gap: 3px; }
    .expert-card-row { display: flex; gap: 6px; font-size: 9.5pt; align-items: baseline; }
    .ec-label { color: #000; white-space: nowrap; font-family: 'DM Sans',sans-serif; font-size: 8.5pt; }
    .ec-val   { font-family: 'DM Sans',sans-serif; font-weight: 600; color: #000; outline: none; border-bottom: 1px dashed #e5e7eb; min-width: 30px; }
    .ec-val:focus { background: rgba(59,130,246,.05); border-bottom-color: #93c5fd; }

    /* Semnături */
    .semnaturi { display: flex; justify-content: space-between; margin-top: auto; padding-top: 28px; font-size: 10.5pt; break-inside: avoid; page-break-inside: avoid; break-before: avoid; page-break-before: avoid; }
    .semnaturi .col { text-align: center; line-height: 1.7; }
    .semnaturi .col strong { display: block; }
    /* Semnături 3 coloane (I.4.) */
    .semnaturi3 { display: flex; justify-content: space-between; margin-top: auto; padding-top: 28px; font-size: 10.5pt; break-inside: avoid; page-break-inside: avoid; break-before: avoid; page-break-before: avoid; gap: 10px; }
    .semnaturi3 .col { text-align: center; line-height: 1.7; flex: 1; }
    .semnaturi3 .col strong { display: block; }
    /* Footer pagina */
    .page-footer-line {
      margin-top: 18px;
      border-top: 1px solid #e5e7eb;
      padding-top: 4px;
      display: flex; justify-content: space-between;
      font-size: 8pt; color: #000;
      font-family: 'DM Sans',sans-serif;
    }

    /* ── PRINT ── */
    @media print {
      @page { size: A4 portrait; margin: 18mm 18mm 18mm 18mm; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: white !important; padding: 0 !important; margin: 0 !important; }
      .overlay { position: static !important; background: none !important; padding: 0 !important; backdrop-filter: none !important; display: block !important; overflow: visible !important; }
      .overlay-topbar { display: none !important; }
      .overlay-body { padding: 0 !important; overflow: visible !important; }
      .a4-page { box-shadow: none !important; page-break-after: always; margin: 0 !important; padding: 0 !important; width: 100% !important; min-height: auto !important; }

      .e-para:focus, .e-val:focus, .ec-val:focus, .s-val:focus { background: none !important; }
      [contenteditable] { border: none !important; }
      .container, header, nav, footer { display: none !important; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="badge">PNRAS — Raport</div>
    <h1>Raport <span>Subactivități</span></h1>
    <div class="divider"></div>
    <p class="subtitle">Selectează o lună pentru a deschide raportul</p>
  </header>

  <nav class="nav-grid" aria-label="Subactivități">
    <div>
      <div class="nav-header"><span class="btn-code" style="color:#f59e0b">I.4.</span><span class="btn-title">Introducerea datelor în SIIIR</span></div>
      <div class="months-grid" id="months-I4"></div>
    </div>
    <div>
      <div class="nav-header"><span class="btn-code">II.4.</span><span class="btn-title">Activități remediale</span></div>
      <div class="months-grid" id="months-II4"></div>
    </div>
    <div>
      <div class="nav-header"><span class="btn-code">II.5.</span><span class="btn-title">Activități extracurriculare</span></div>
      <div class="months-grid" id="months-II5"></div>
    </div>
    <div>
      <div class="nav-header"><span class="btn-code">II.6.</span><span class="btn-title">Clubul de lectură și literație</span></div>
      <div class="months-grid" id="months-II6"></div>
    </div>
  </nav>

  <footer>PNRAS &mdash; Sistem de raportare subactivități</footer>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-topbar">
    <!-- Row 1: label + actions -->
    <div class="topbar-row1">
      <span class="overlay-label" id="overlay-label"></span>
      <span class="save-status" id="save-status"></span>
      <div class="topbar-actions">
        <button class="tb-btn print" onclick="printRaport()">🖨️ Printează</button>
        <button class="tb-btn close" onclick="closeOverlay()">✕ Închide</button>
      </div>
    </div>
    <!-- Row 2: editor toolbar -->
    <div class="editor-toolbar" id="editor-toolbar" style="display:none" onmousedown="event.preventDefault()">
      <!-- Undo / Redo -->
      <div class="tb-group">
        <button class="et-btn" title="Anulează (Ctrl+Z)" onclick="cmd('undo')">↩</button>
        <button class="et-btn" title="Refă (Ctrl+Y)" onclick="cmd('redo')">↪</button>
      </div>
      <div class="tb-sep"></div>
      <!-- Font family -->
      <div class="tb-group">
        <select class="et-select" title="Font" onchange="cmd('fontName', this.value)" id="tb-font" style="width:110px">
          <option value="Times New Roman">Times New Roman</option>
          <option value="Arial">Arial</option>
          <option value="Calibri">Calibri</option>
          <option value="Georgia">Georgia</option>
          <option value="Verdana">Verdana</option>
          <option value="Courier New">Courier New</option>
        </select>
      </div>
      <!-- Font size -->
      <div class="tb-group">
        <select class="et-select" title="Dimensiune" onchange="cmd('fontSize', this.value)" id="tb-size" style="width:54px">
          <option value="1">8</option>
          <option value="2">10</option>
          <option value="3" selected>11</option>
          <option value="4">12</option>
          <option value="5">14</option>
          <option value="6">18</option>
          <option value="7">24</option>
        </select>
      </div>
      <div class="tb-sep"></div>
      <!-- Bold / Italic / Underline / Strikethrough -->
      <div class="tb-group">
        <button class="et-btn" id="tb-bold"   title="Bold (Ctrl+B)" onclick="cmd('bold')"          style="font-weight:700">B</button>
        <button class="et-btn" id="tb-italic" title="Italic (Ctrl+I)" onclick="cmd('italic')"       style="font-style:italic">I</button>
        <button class="et-btn" id="tb-under"  title="Subliniat (Ctrl+U)" onclick="cmd('underline')" style="text-decoration:underline">U</button>
        <button class="et-btn" id="tb-strike" title="Tăiat" onclick="cmd('strikeThrough')"          style="text-decoration:line-through">S</button>
      </div>
      <div class="tb-sep"></div>
      <!-- Text color / Highlight -->
      <div class="tb-group">
        <input class="et-color" type="color" value="#000000" title="Culoare text" id="tb-fcolor"
               onchange="cmd('foreColor', this.value)">
        <input class="et-color" type="color" value="#ffff00" title="Evidențiere" id="tb-hcolor"
               onchange="cmd('hiliteColor', this.value)">
      </div>
      <div class="tb-sep"></div>
      <!-- Alignment -->
      <div class="tb-group">
        <button class="et-btn" title="Aliniere stânga"  onclick="cmd('justifyLeft')"   >&#8676;</button>
        <button class="et-btn" title="Centrare"         onclick="cmd('justifyCenter')" >&#8677;</button>
        <button class="et-btn" title="Aliniere dreapta" onclick="cmd('justifyRight')"  >&#8678;</button>
        <button class="et-btn" title="Justify"          onclick="cmd('justifyFull')"   >&#8644;</button>
      </div>
      <div class="tb-sep"></div>
      <!-- Lists -->
      <div class="tb-group">
        <button class="et-btn" title="Listă cu buline"   onclick="cmd('insertUnorderedList')">☰</button>
        <button class="et-btn" title="Listă numerotată"  onclick="cmd('insertOrderedList')">≡</button>
      </div>
      <!-- Indent -->
      <div class="tb-group">
        <button class="et-btn" title="Indentare (Tab)"    onmousedown="event.preventDefault()" onclick="insertTab(false)">⇥</button>
        <button class="et-btn" title="Dezindentare (Shift+Tab)" onmousedown="event.preventDefault()" onclick="insertTab(true)">⇤</button>
      </div>
      <div class="tb-sep"></div>
      <!-- Superscript / Subscript -->
      <div class="tb-group">
        <button class="et-btn" title="Superscript" onclick="cmd('superscript')">x²</button>
        <button class="et-btn" title="Subscript"   onclick="cmd('subscript')">x₂</button>
      </div>
      <div class="tb-sep"></div>
      <!-- Remove formatting -->
      <div class="tb-group">
        <button class="et-btn wide" title="Elimină formatarea" onclick="cmd('removeFormat')">✕ Format</button>
      </div>
    </div>
  </div>
  <div class="overlay-body" id="overlay-body">
    <div id="a4-container"></div>
  </div>
</div>

<script>
  // ── SUPABASE ──
  const URL_S = 'https://aexjrbdgajurxzngfkpx.supabase.co';
  const KEY_S = 'sb_publishable_KPV__0BA9z4EvRl5eqC0FQ_hmBLOLYv';

  function attachAutoSave(sectionId, month) {

  async function doSave(sectionId, month) {
    const page = document.querySelector('.a4-page');
    if (!page) return;

    // Salvăm innerHTML pentru câmpurile I4 (conțin HTML cu liste/formatare)
    // și innerText pentru câmpurile simple (span-uri editabile)
    const fields = {};
    page.querySelectorAll('[data-field]').forEach(el => {
      const isRichBox = el.tagName === 'DIV' && el.classList.contains('e-para');
      fields[el.dataset.field] = isRichBox ? el.innerHTML : el.innerText.trim();
    });

    try {
      const { error } = await sb.from('rapoarte_salvate').upsert({
        id: `${sectionId}_${month.name}_${month.year}`,
        sectiune: sectionId,
        luna: month.name,
        an: parseInt(month.year),
        continut_json: fields,
        updated_at: new Date().toISOString()
      }, { onConflict: 'sectiune,luna,an' });

      if (error) { console.error('Supabase error:', error); throw error; }
      setStatus('saved', '✅ Salvat');
      setTimeout(() => setStatus(''), 2500);
    } catch(e) {
      console.error('Save failed:', e);
      setStatus('error', '❌ Eroare salvare: ' + (e.message || e));
    }
  }

  function setStatus(type, msg) {

  function lunaNum(luna, an) {
    const idx = months.findIndex(m => m.name === luna && m.year === String(an));

  }

  function perioadaStr(zile, lNum, an) {
    if (!zile.length) return '—';
    const min = Math.min(...zile), max = Math.max(...zile);
    const p = n => String(n).padStart(2,'0');
    return min === max ? `${p(min)}.${lNum}.${an}` : `${p(min)}.${lNum}.${an} – ${p(max)}.${lNum}.${an}`;
  }

  function claseUnice(rows) {
    const set = new Set();
    (rows||[]).forEach(r => {
      if (!r.clase_grupe) return;
      r.clase_grupe.split(',').forEach(c => { const t=c.trim(); if(t) set.add(t); });
    });
    return [...set].sort().join(', ');
  }

  function extrageContiuturi(planuri) {
    if (!planuri?.length) return '—';
    const set = new Set();
    planuri.forEach(p => {
      try {
        (p.continut_json?.tableRows||[]).forEach(r => {
          if (r.cont) r.cont.split('\n').forEach(c => { const t=c.replace(/^•\s*/,'').trim(); if(t) set.add(t); });
        });
      } catch(e){}
    });
    return set.size ? [...set].slice(0,6).join('; ') : '—';
  }

  function eleviPerExpert(eleviArr, field, nume, pontajArr) {
    const claseActive = new Set();
    (pontajArr||[]).filter(r=>r.expert===nume).forEach(r => {
      r.clase_grupe.split(',').forEach(c => { const t=c.trim(); if(t) claseActive.add(t); });
    });
    if (!claseActive.size) {
      // fallback: toți elevii înscriși dacă nu există pontaj
      return new Set((eleviArr||[]).filter(e=>e[field]===nume && e.cnp).map(e=>e.cnp)).size;
    }
    return new Set((eleviArr||[]).filter(e=>e[field]===nume && claseActive.has(e.clasa_grupa) && e.cnp).map(e=>e.cnp)).size;
  }

    function eleviDinClaseActive(cl) {
      const expertiClub = cl.extra ? [cl.expert, cl.extra] : [cl.expert];
      const claseActive = claseActiveExpert(expertiClub);
      // Filtrare doar după clasa_grupa (clasele clubului sunt unice per club)
      return new Set(
        (eleviAll||[])
          .filter(ev => claseActive.has(ev.clasa_grupa) && ev.cnp)
          .map(ev => ev.cnp)
      );
    }

    const cnpTotalSet = new Set();
    CLUBURI.forEach(cl => { eleviDinClaseActive(cl).forEach(cnp => cnpTotalSet.add(cnp)); });
    const nrEleviTotal = cnpTotalSet.size;

    const nrRaport = nrInreg?.nr_inregistrare || '';

    function calcClub(cl) {
      const expertiClub = cl.extra ? [cl.expert, cl.extra] : [cl.expert];
      const rows  = (pontajAll||[]).filter(r => expertiClub.includes(r.expert));
      const ore   = rows.reduce((s,r) => s+(r.nr_ore||0), 0);
      const zile  = rows.map(r=>r.zi).filter(Boolean);
      const per   = perioadaStr(zile, lNum, an);
      const clase = claseUnice(rows);
      const claseAct = claseActiveExpert(expertiClub);
      const cnps  = new Set((eleviAll||[]).filter(ev => claseAct.has(ev.clasa_grupa) && ev.cnp).map(ev=>ev.cnp));
      const nElevi = cnps.size;
      const planClub = (planAll||[]).filter(r => expertiClub.includes(r.expert));
      const cont  = extrageContiuturi(planClub);
      const activi = expertiClub.filter(ex => rows.some(r=>r.expert===ex));
      return { ore, per, clase, nElevi, cont, nExp: activi.length, experti: activi };
    }

      return `

            </ul>
          </div>

    }

        const fk   = 'exp5_'+expert.replace(/[^a-zA-Z0-9]/g,'_');
        return `

        <img src="antet_pnras.jpeg" class="antet-img" onerror="this.style.display='none'">
        <div class="doc-title" style="margin-top:50mm">${sections[sectionId]}</div>
        <div class="doc-luna"><strong>${month.name} ${month.year}</strong></div>
        <div style="text-align:center;color:#9ca3af;font-family:'DM Sans',sans-serif;font-size:13px;margin-top:20px">Raport în curs de configurare</div>

      </div>`;
  }

  const TAB_SIZE = 20; // px per nivel indent

  function insertTab(shiftKey) {
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) return;
    const range = sel.getRangeAt(0);

    // Găsim paragraful curent (cel mai apropiat <p> sau block)
    let node = range.startContainer;
    if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
    const block = node.closest('p, div[contenteditable]');

    // Dacă e un paragraf bullet (conține • ca prim caracter vizibil)
    if (block && block.tagName === 'P' && block.textContent.trimStart().startsWith('•')) {
      const current = parseInt(block.style.paddingLeft) || 0;
      if (shiftKey) {
        block.style.paddingLeft = Math.max(0, current - TAB_SIZE) + 'px';
      } else {
        block.style.paddingLeft = (current + TAB_SIZE) + 'px';
      }
      block.dispatchEvent(new Event('input', { bubbles: true }));
      return;
    }

    // Altfel: inserează em-space la cursor
    if (shiftKey) {
      const off = range.startOffset;
      const textNode = range.startContainer;
      if (textNode.nodeType === Node.TEXT_NODE) {
        const text = textNode.textContent;
        if (off >= 1 && text[off-1] === '\u2003') {
          textNode.textContent = text.slice(0, off-1) + text.slice(off);
          range.setStart(textNode, off-1); range.setEnd(textNode, off-1);
          sel.removeAllRanges(); sel.addRange(range);
        } else if (off >= 4 && text.slice(off-4, off) === '\u00a0\u00a0\u00a0\u00a0') {
          textNode.textContent = text.slice(0, off-4) + text.slice(off);
          range.setStart(textNode, off-4); range.setEnd(textNode, off-4);
          sel.removeAllRanges(); sel.addRange(range);
        }
      }
    } else {
      range.deleteContents();
      const sp = document.createTextNode('\u2003\u2003');
      range.insertNode(sp);
      range.setStartAfter(sp); range.setEndAfter(sp);
      sel.removeAllRanges(); sel.addRange(range);
      sp.parentElement?.dispatchEvent(new Event('input', { bubbles: true }));
    }
  }

  // ── EDITOR TOOLBAR ──
  function cmd(command, value) {
    document.execCommand(command, false, value || null);
    updateToolbarState();
  }

  function updateToolbarState() {
    const cmds = ['bold','italic','underline','strikeThrough'];
    const ids  = ['tb-bold','tb-italic','tb-under','tb-strike'];
    cmds.forEach((c, i) => {
      const btn = document.getElementById(ids[i]);
      if (btn) btn.classList.toggle('active', document.queryCommandState(c));
    });
  }

  // Show/hide toolbar only when a contenteditable inside a4-page is focused
  document.addEventListener('focusin', e => {
    const editable = e.target.closest('[contenteditable="true"]');
    const inPage   = e.target.closest('.a4-page');
    const toolbar  = document.getElementById('editor-toolbar');
    if (toolbar) toolbar.style.display = (editable && inPage) ? 'flex' : 'none';
    if (editable && inPage) updateToolbarState();
  });
  document.addEventListener('keyup',        updateToolbarState);
  document.addEventListener('mouseup',      updateToolbarState);
  document.addEventListener('selectionchange', updateToolbarState);

  // ── TAB KEY — insert spaces at cursor like Word ──
  document.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    const editable = e.target.closest('[contenteditable="true"]');
    const inPage   = e.target.closest('.a4-page');
    if (!editable || !inPage) return;
    e.preventDefault();
    insertTab(e.shiftKey);
  });

  // ── RESET ──
  async function resetRaport() {
    if (!confirm('Ștergi toate modificările pentru această lună și reîncarci textul implicit?')) return;
    if (!activeBtn) return;
    const parts = currentKey.split('_');
    const sectionId = parts[0];
    const luna = parts[1];
    const year = parts[2];
    try {
      await sb.from('rapoarte_salvate').delete()
        .eq('sectiune', sectionId).eq('luna', luna).eq('an', parseInt(year));
      setStatus('saved', '✅ Resetat');
      // Reîncarcă raportul
      const month = months.find(m => m.name === luna && m.year === year);
      if (month) await openReport(sectionId, month, activeBtn);
    } catch(e) {
      setStatus('error', '❌ Eroare reset: ' + e.message);
    }
  }

  // ── PRINT ──
  function printRaport() {
    window.print();
  }

  // ── CLOSE ──
  function closeOverlay() {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
    if (activeBtn) { activeBtn.classList.remove('active'); activeBtn = null; }
    clearTimeout(saveTimer);
    currentKey = null;
  }

  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeOverlay();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });
</script>
</body>
</html>
