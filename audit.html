/* ===== CLOUDFLARE R2 — WORKER PROXY ===== */
// ⚠️  Înlocuiește URL-ul de mai jos cu URL-ul Worker-ului tău după deploy
const WORKER_URL = "https://r2-proxy.belcesti-pnras2024.workers.dev";

const PUBLIC_URLS = {
  contracte: "https://pub-21fd5af81dd046f08d14c67f1291f051.r2.dev",

/* ===== CHUNKED UPLOAD (fișiere mari până la 500 MB) ===== */
const CHUNK_SIZE = 5 * 1024 * 1024; // 5 MB per bucată

async function r2UploadFile(fileName, fileBlob, bucketKey, onProgress) {
  const fileSize = fileBlob.size;

  // Fișiere mici (sub 5 MB) — upload direct ca înainte
  if (fileSize <= CHUNK_SIZE) {
    const resp = await fetch(`${WORKER_URL}/upload`, {
      method: "PUT",
      headers: {
        "X-Bucket": bucketKey,
        "X-File-Name": fileName,
        "Content-Type": fileBlob.type || "application/octet-stream",
      },
      body: fileBlob,
    });
    if (!resp.ok) {
      const txt = await resp.text();
      throw new Error("Upload eșuat: " + txt);
    }
    if (onProgress) onProgress(100);
    const data = await resp.json();
    return data.url;
  }

  // Fișiere mari — upload pe bucăți (multipart)
  const totalChunks = Math.ceil(fileSize / CHUNK_SIZE);
  const contentType = fileBlob.type || "application/octet-stream";

  // 1. Inițializare multipart upload
  const initResp = await fetch(`${WORKER_URL}/multipart/create`, {
    method: "POST",
    headers: {
      "X-Bucket": bucketKey,
      "X-File-Name": fileName,
      "Content-Type": contentType,
    },
  });
  if (!initResp.ok) {
    const txt = await initResp.text();
    throw new Error("Inițializare upload eșuată: " + txt);
  }
  const { uploadId } = await initResp.json();

  // 2. Upload fiecare bucată
  const parts = [];
  for (let i = 0; i < totalChunks; i++) {
    const start = i * CHUNK_SIZE;
    const end = Math.min(start + CHUNK_SIZE, fileSize);
    const chunk = fileBlob.slice(start, end);
    const partNumber = i + 1;

    let attempts = 0;
    let partResp;
    while (attempts < 3) {
      try {
        partResp = await fetch(`${WORKER_URL}/multipart/upload-part`, {
          method: "PUT",
          headers: {
            "X-Bucket": bucketKey,
            "X-File-Name": fileName,
            "X-Upload-Id": uploadId,
            "X-Part-Number": String(partNumber),
          },
          body: chunk,
        });
        if (partResp.ok) break;
      } catch(e) { /* retry */ }
      attempts++;
      if (attempts < 3) await new Promise(r => setTimeout(r, 1000 * attempts));
    }

    if (!partResp || !partResp.ok) {
      // Abort upload dacă o bucată eșuează
      await fetch(`${WORKER_URL}/multipart/abort`, {
        method: "POST",
        headers: {
          "X-Bucket": bucketKey,
          "X-File-Name": fileName,
          "X-Upload-Id": uploadId,
        },
      }).catch(() => {});
      throw new Error(`Upload eșuat la partea ${partNumber}/${totalChunks}`);
    }

    const partData = await partResp.json();
    parts.push({ partNumber, etag: partData.etag });

    if (onProgress) onProgress(Math.round((partNumber / totalChunks) * 95));
  }

  // 3. Finalizare — asamblare fișier
  const completeResp = await fetch(`${WORKER_URL}/multipart/complete`, {
    method: "POST",
    headers: {
      "X-Bucket": bucketKey,
      "X-File-Name": fileName,
      "X-Upload-Id": uploadId,
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ parts }),
  });
  if (!completeResp.ok) {
    const txt = await completeResp.text();
    throw new Error("Finalizare upload eșuată: " + txt);
  }

  if (onProgress) onProgress(100);
  const data = await completeResp.json();
  return data.url;
}

async function r2DeleteFile(publicUrl, bucketKey) {
  try {
    const baseUrl = PUBLIC_URLS[bucketKey];
    const fileName = decodeURIComponent(publicUrl.replace(baseUrl + "/", ""));
    await fetch(`${WORKER_URL}/delete`, {
      method: "DELETE",
      headers: {
        "X-Bucket": bucketKey,
        "X-File-Name": fileName,
      },
    });
  } catch(e) { console.log("Eroare ștergere R2:", e); }
}

    // ===================== DIALOG =====================
    function arataDialog(titlu, mesaj, butoane, cuInput, placeholder, valoareInitiala) {
        return new Promise(resolve => {
            const c = document.getElementById('dialog-container');
            let btns = '';
            butoane.forEach(b => {
                btns += '<button class="dialog-btn ' + (b.clasa || 'dialog-btn-cancel') + '" data-val="' + b.valoare + '">' + b.text + '</button>';
            });
            const valInit = valoareInitiala !== undefined ? valoareInitiala : '';
            const placeholderSafe = (placeholder || '').replace(/"/g, '&quot;');
            const valInitSafe = valInit.replace(/"/g, '&quot;');
            c.innerHTML = '<div class="overlay"><div class="dialog"><h3>' + titlu + '</h3><p>' + mesaj + '</p>' +
                (cuInput ? '<input type="text" id="dialog-input" placeholder="' + placeholderSafe + '" value="' + valInitSafe + '">' : '') +
                '<div class="dialog-btns">' + btns + '</div></div></div>';
            c.querySelectorAll('.dialog-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const val = btn.dataset.val;
                    const txt = cuInput ? document.getElementById('dialog-input').value : '';
                    c.innerHTML = '';
                    resolve({ actiune: val, text: txt });
                });
            });
            if (cuInput) setTimeout(() => {
                const el = document.getElementById('dialog-input');
                if (el) { el.focus(); el.select(); }
            }, 100);
        });
    }

    // ===================== BREADCRUMB =====================
    function actualizeazaBreadcrumb() {
        const bc = document.getElementById('breadcrumb');
        let html = '<span onclick="navigheaza(0)">&#127968; Audit</span>';
        for (let i = 0; i < navigationStack.length; i++) {
            html += '<span class="sep">›</span>';
            if (i === navigationStack.length - 1) {
                html += '<span class="current">' + navigationStack[i].titlu + '</span>';
            } else {
                html += '<span onclick="navigheaza(' + (i + 1) + ')">' + navigationStack[i].titlu + '</span>';
            }
        }
        bc.innerHTML = html;
    }

    function navigheaza(index) {
        if (index === 0) {
            navigationStack = [];
            currentView = { type: 'root' };
        } else {
            navigationStack = navigationStack.slice(0, index);
            currentView = navigationStack[navigationStack.length - 1];
        }
        salveazaState();
        actualizeazaBreadcrumb();
        incarcaVizualizare();
    }

    function pushNav(item) {
        navigationStack.push(item);
        currentView = item;
        salveazaState();
        actualizeazaBreadcrumb();
        incarcaVizualizare();
    }

    function inapoi() {
        if (navigationStack.length === 0) {
            window.location.href = 'index.html';
        } else {
            navigheaza(navigationStack.length - 1);
        }
    }

    // ===================== ROUTER =====================
    async function incarcaVizualizare() {
        // Restauram container normal (poate fi ascuns de folder view)
        const wrapper = document.getElementById('folder-wrapper');
        const containerNormal = document.getElementById('container-normal');
        if (wrapper) wrapper.style.display = 'none';
        if (containerNormal) containerNormal.style.display = '';

        const cont = document.getElementById('continut');
        cont.innerHTML = '<div class="loading">Se încarcă...</div>';

        if (currentView.type === 'root') {
            await afiseazaCarduri();
        } else if (currentView.type === 'card' && currentView.id === '00000000-0000-0000-0000-000000000001') {
            await afiseazaDosareAchizitii();
        } else if (currentView.type === 'card' && currentView.id === '00000000-0000-0000-0000-000000000004') {
            await afiseazaCheltuieliSalarii();
        } else if (currentView.type === 'contract') {
            await afiseazaChecklistContract(currentView.contractId, currentView.titlu);
        } else if (currentView.type === 'card' || currentView.type === 'folder') {
            await afiseazaFolder(currentView.cardId || currentView.id, currentView.parentId || null);
        } else if (currentView.type === 'istoric') {
            await afiseazaIstoric(currentView.cardId);
        }
    }

    async function adaugaCard() {
        const r = await arataDialog('&#10133; Card nou', 'Numele noului card:', [
            { text: 'Adaugă', valoare: 'da', clasa: 'dialog-btn-primary' },
            { text: 'Anulează', valoare: 'nu', clasa: 'dialog-btn-cancel' }
        ], true, 'Ex: Raport monitorizare');
        if (r.actiune !== 'da' || !r.text.trim()) return;

        const r2 = await arataDialog('&#127912; Emoji', 'Alege un emoji (sau lasă gol):', [
            { text: 'OK', valoare: 'da', clasa: 'dialog-btn-primary' }
        ], true, '📁');

        await db.from('audit_carduri').insert({ titlu: r.text.trim(), icon: r2.text.trim() || '📁' });
        afiseazaCarduri();
    }

    async function stergeCard(id) {
        const r = await arataDialog('&#128465; Șterge card', 'Cardul va fi mutat în istoric.', [
            { text: 'Șterge', valoare: 'da', clasa: 'dialog-btn-danger' },
            { text: 'Anulează', valoare: 'nu', clasa: 'dialog-btn-cancel' }
        ]);
        if (r.actiune !== 'da') return;
        await db.from('audit_carduri').update({ sters: true }).eq('id', id);
        await db.from('audit_continut').update({ sters: true }).eq('card_id', id);

    async function afiseazaDosareAchizitii() {
        const cont = document.getElementById('continut');

        const { data: toateContractele } = await db.from('buget_pnras').select('*')
            .eq('tip_rand', 'CONTRACT').order('data_document', { ascending: true });

        const { data: documente } = await db.from('documente_contract').select('contract_id, tip_document');

        const { data: manual } = await db.from('audit_continut').select('*')
            .eq('card_id', '00000000-0000-0000-0000-000000000001').is('parent_id', null).eq('sters', false)
            .neq('tip', 'blocat').order('ordine', { ascending: true });

        const { data: blocate } = await db.from('audit_continut').select('titlu')
            .eq('card_id', '00000000-0000-0000-0000-000000000001').eq('tip', 'blocat').eq('sters', false);
        const blocateSet = new Set((blocate || []).map(b => b.titlu));

        const { data: cartonaseConfig } = await db.from('cartonase_config').select('contract_id, cartonase, ascunse');
        const cartonasePer = {};
        const ascunsePer = {};
        if (cartonaseConfig) {
            cartonaseConfig.forEach(c => { cartonasePer[c.contract_id] = c.cartonase || []; ascunsePer[c.contract_id] = c.ascunse || []; });
        }

        // Separare contracte vs state de plată (subcategorie 'c' = state de plată)
        const contractePropriu = (toateContractele || []).filter(c => c.subcategorie !== 'c');
        const statePlata = (toateContractele || []).filter(c => c.subcategorie === 'c');

        const nrContracte = contractePropriu.filter(c => !blocateSet.has(c.id)).length;
        const nrState = statePlata.filter(c => !blocateSet.has(c.id)).length;

        const docPer = {};
        if (documente) {
            documente.forEach(d => {
                if (!docPer[d.contract_id]) docPer[d.contract_id] = [];
                if (!docPer[d.contract_id].includes(d.tip_document)) docPer[d.contract_id].push(d.tip_document);
            });
        }

        function genContractItem(c, esteBlockat) {
            const ex = docPer[c.id] || [];
            const listaCustom = cartonasePer[c.id];
            const ascunse = ascunsePer[c.id] || [];
            const lista = completeazaLista((listaCustom && listaCustom.length > 0) ? listaCustom : LISTA_DOCUMENTE, c.id).filter(t => !ascunse.includes(t));
            const totalOk = lista.filter(d => ex.includes(d)).length;
            const complet = lista.length > 0 && totalOk === lista.length;
            let st = '';
            if (complet) st = '<span class="contract-status" style="background:#dcfce7;color:#166534;">COMPLET ✔</span>';
            else if (totalOk > 0) st = '<span class="contract-status" style="background:#fef3c7;color:#92400e;">' + totalOk + '/' + lista.length + '</span>';
            else st = '<span class="contract-status" style="background:#fee2e2;color:#991b1b;">GOL</span>';

            const val = c.valoare ? parseFloat(c.valoare).toLocaleString('ro-RO', { minimumFractionDigits: 2 }) + ' lei' : '';
            let titluAfisat = c.titlu || 'Fără titlu';
            if (c.numar) titluAfisat += ' | Nr. ' + c.numar;
            if (c.data_document) {
                const d = new Date(c.data_document);
                if (!isNaN(d)) titluAfisat += ' | ' + d.toLocaleDateString('ro-RO');
            }
            const idSafe = c.id;
            const titluSafe = titluAfisat.replace(/"/g, '&quot;');
            const lacatIcon = esteBlockat ? '🔒' : '🔓';

            return '<div class="contract-item" ' +
                (esteBlockat ? '' : 'data-cid="' + idSafe + '" data-ctitlu="' + titluSafe + '" onclick="deschideContractFromEl(this)"') +
                ' style="display:flex;align-items:center;gap:12px;cursor:' + (esteBlockat ? 'not-allowed' : 'pointer') + ';">' +
                '<div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0;">' +
                    '<span style="font-size:20px;">' + (c.subcategorie === 'c' ? '💼' : '📄') + '</span>' +
                    '<div style="flex:1;min-width:0;"><div class="contract-title">' + titluAfisat + '</div></div>' +
                    '<span class="contract-val">' + val + '</span>' +
                    st +
                '</div>' +
                '<div style="display:flex;flex-direction:column;align-items:center;gap:2px;margin-left:8px;flex-shrink:0;">' +
                    '<button class="btn-lacat" onclick="event.stopPropagation(); toggleBlocat(\'' + idSafe + '\', ' + (esteBlockat ? 'true' : 'false') + ')">' + lacatIcon + '</button>' +
                    (esteBlockat ? '<div style="font-size:9px;color:#111;font-weight:700;text-align:center;white-space:nowrap;margin-top:2px;">Apasă pt.<br>deblocare</div>' : '') +
                '</div>' +
                '</div>';
        }

        function genListaItemuri(lista, titluBlocat) {
            const active = lista.filter(c => !blocateSet.has(c.id));
            const blocateList = lista.filter(c => blocateSet.has(c.id));
            let h = '';

            if (active.length === 0 && blocateList.length === 0) {
                h += '<div class="empty">Nu există înregistrări.</div>';
            }

            if (active.length > 0) {
                const grupe = {};
                active.forEach(c => { const an = c.an || '-'; if (!grupe[an]) grupe[an] = []; grupe[an].push(c); });
                Object.keys(grupe).sort().forEach(an => {
                    h += '<div class="an-header">&#128197; ' + an + '</div>';
                    grupe[an].forEach(c => { h += genContractItem(c, false); });
                });
            }

            if (blocateList.length > 0 && arataBlocate) {
                h += '<div style="margin-top:32px;border:2px dashed #d1d5db;border-radius:14px;padding:20px;background:#fafafa;">' +
                    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">' +
                        '<span style="font-size:22px;">&#128274;</span>' +
                        '<div>' +
                            '<div style="font-size:15px;font-weight:700;color:#6b7280;">' + titluBlocat + '</div>' +
                            '<div style="font-size:11px;color:#9ca3af;margin-top:2px;">Acestea nu fac obiectul prezentei raportări</div>' +
                        '</div>' +
                    '</div>';
                const grupeB = {};
                blocateList.forEach(c => { const an = c.an || '-'; if (!grupeB[an]) grupeB[an] = []; grupeB[an].push(c); });
                Object.keys(grupeB).sort().forEach(an => {
                    h += '<div class="an-header" style="color:#9ca3af;border-color:#e5e7eb;">&#128197; ' + an + '</div>';
                    grupeB[an].forEach(c => { h += genContractItem(c, true); });
                });
                h += '</div>';
            }
            return h;
        }

        // ===== HTML =====
        let html = '<div class="actions-bar">' +
            '<button class="btn-action btn-folder" onclick="adaugaSubfolder(\'00000000-0000-0000-0000-000000000001\', null)">&#128193; Adaugă subfolder</button>' +
            '<button class="btn-action btn-file" onclick="adaugaFisier(\'00000000-0000-0000-0000-000000000001\', null)">&#128196; Adaugă fișier</button>' +
            '<button class="btn-action btn-history" onclick="veziIstoricCard(\'00000000-0000-0000-0000-000000000001\')">&#128337; Istoric</button>' +
            '<button id="btn-arata-blocate" class="btn-action" style="background:#9ca3af;" onclick="toggleArataBlocate(this)">&#128274; Afișează dosare blocate</button>' +
            '</div>';

        html += '<div style="margin-bottom:16px;padding:12px 16px;background:#f0f4ff;border-left:4px solid #1a56db;border-radius:8px;font-size:12px;color:#444;line-height:1.6;">' +
            '&#8505;&#65039; Dacă vreți să vizualizați dosarele încărcate, care au fost blocate, sau cele care nu fac obiectul prezentei raportări, dați click pe <b>"Afișează dosare blocate"</b> și acestea vor apărea la finalul paginii.' +
            '</div>';

        // Conținut manual (fișiere/foldere adăugate manual)
        if (manual && manual.length > 0) {
            html += '<div class="file-list">';
            manual.forEach((item, idx) => {
                html += item.tip === 'folder' ? genFolderItem(item, idx, manual.length) : genFisierItem(item, idx, manual.length);
            });
            html += '</div>';
        }

        // ===== TAB-URI =====
        const { data: anexeItems } = await db.from('audit_continut').select('id')
            .eq('card_id', '00000000-0000-0000-0000-000000000002').eq('sters', false);
        const nrAnexe = (anexeItems || []).length;

        html += '<div class="tabs-bar">' +
            '<button class="tab-btn ' + (tabActiv === 'contracte' ? 'activ' : '') + '" onclick="schimbaTab(\'contracte\')">' +
                '&#128196; Contracte <span class="tab-badge">' + nrContracte + '</span>' +
            '</button>' +

            '<button class="tab-btn ' + (tabActiv === 'anexe' ? 'activ' : '') + '" onclick="schimbaTab(\'anexe\')">' +
                '&#128206; Anexe <span class="tab-badge">' + nrAnexe + '</span>' +
            '</button>' +
        '</div>';

        // ===== CONȚINUT TAB ACTIV =====
        if (tabActiv === 'contracte') {
            html += genListaItemuri(contractePropriu, 'Contracte blocate');
        } else if (tabActiv === 'anexe') {
            html += await genContinutAnexe();
        }

        cont.innerHTML = html;

        // Actualizare buton blocate
        const btn = document.getElementById('btn-arata-blocate');
        if (btn) btn.innerHTML = arataBlocate ? '&#128274; Ascunde dosare blocate' : '&#128274; Afișează dosare blocate';

        const listaActiva = tabActiv === 'contracte' ? contractePropriu : statePlata;
        const blocateListActiva = listaActiva.filter(c => blocateSet.has(c.id));
        let msgExistent = document.getElementById('msg-no-blocate');
        if (arataBlocate && blocateListActiva.length === 0) {
            if (!msgExistent) {
                const msg = document.createElement('span');
                msg.id = 'msg-no-blocate';
                msg.style.cssText = 'font-size:12px;color:#9ca3af;font-style:italic;align-self:center;margin-left:4px;';
                msg.textContent = 'Nu există dosare blocate.';
                btn.parentNode.appendChild(msg);
            }
        } else {
            if (msgExistent) msgExistent.remove();
        }
    }

    // ===================== GENERARE DOSAR SALARII =====================

    const LUNI_RO = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
    const LUNI_MAP = {
        'ianuarie':0,'februarie':1,'martie':2,'aprilie':3,'mai':4,'iunie':5,
        'iulie':6,'august':7,'septembrie':8,'octombrie':9,'noiembrie':10,'decembrie':11
    };

    function extragelunaAnDinTitlu(titlu) {
        const t = (titlu || '').toLowerCase();
        let luna = null, an = null;
        for (const [l, idx] of Object.entries(LUNI_MAP)) {
            if (t.includes(l)) { luna = LUNI_RO[idx]; break; }
        }
        const mA = (titlu || '').match(/(20\d{2})/);
        if (mA) an = mA[1];
        return { luna, an };
    }

    const SECTIUNE_CULORI = [
        { bg: [0, 128, 128],   text: [255,255,255] }, // turcoaz
        { bg: [30, 90, 180],   text: [255,255,255] }, // albastru
        { bg: [34, 139, 34],   text: [255,255,255] }, // verde
        { bg: [160, 60, 160],  text: [255,255,255] }, // mov
        { bg: [200, 100, 0],   text: [255,255,255] }, // portocaliu
    ];

    async function genereazaDosarSalarii(contractId, titluContract, modActiune) {
        // modActiune: 'print' sau 'save'
        const btn = document.getElementById('btn-dosar-' + contractId + '-' + modActiune);
        const originalText = btn ? btn.innerHTML : '';
        if (btn) { btn.disabled = true; btn.innerHTML = '⏳ Se generează...'; }

        try {
            const { PDFDocument, rgb, StandardFonts, degrees } = PDFLib;

            // 1. Fetch documente pentru acest contract
            const { data: docs } = await db.from('documente_contract')
                .select('*')
                .eq('contract_id', contractId)
                .order('tip_document', { ascending: true });

            // 2. Fetch antet
            const antetUrl = 'https://aexjrbdgajurxzngfkpx.supabase.co/storage/v1/object/public/arhiva_pnras/antet_pnras.jpeg';
            const antetResp = await fetch(antetUrl);
            const antetBytes = new Uint8Array(await antetResp.arrayBuffer());

            // 3. Extrage luna/an
            const { luna, an } = extragelunaAnDinTitlu(titluContract);
            const lunaAnText = (luna && an) ? luna + ' ' + an : (luna || an || '');

            // 4. Creeaza PDF principal
            const pdfDoc = await PDFDocument.create();
            pdfDoc.registerFontkit(fontkit);
            pdfDoc.registerFontkit(fontkit);
            // Fetch fonturi TTF din Supabase
            const FONT_BASE = 'https://aexjrbdgajurxzngfkpx.supabase.co/storage/v1/object/public/arhiva_pnras/';
            const [fBoldArr, fRegArr, fItalArr] = await Promise.all([
                fetch(FONT_BASE + 'Roboto-Bold.ttf').then(r => r.arrayBuffer()),
                fetch(FONT_BASE + 'Roboto-Regular.ttf').then(r => r.arrayBuffer()),
                fetch(FONT_BASE + 'Roboto-Italic.ttf').then(r => r.arrayBuffer()),
            ]);
            const fontBold = await pdfDoc.embedFont(fBoldArr, { subset: true });
            const fontReg  = await pdfDoc.embedFont(fRegArr,  { subset: true });
            const fontBI   = await pdfDoc.embedFont(fItalArr, { subset: true });
            const antetImg = await pdfDoc.embedJpg(antetBytes);

            const A4W = 595, A4H = 842;
            const CHENAR = 24; // margine chenar

            // ===== COPERTA =====
            const coperta = pdfDoc.addPage([A4W, A4H]);
            const { width, height } = coperta.getSize();
            const innerW = width - 2*CHENAR - 8;

            // Fetch imagine crai.jpeg
            const craiResp = await fetch('https://aexjrbdgajurxzngfkpx.supabase.co/storage/v1/object/public/arhiva_pnras/crai.jpeg');
            const craiBytes = new Uint8Array(await craiResp.arrayBuffer());
            const craiImg = await pdfDoc.embedJpg(craiBytes);

            // Chenar turcoaz - doar border, fundal alb
            coperta.drawRectangle({ x: CHENAR, y: CHENAR, width: width - 2*CHENAR, height: height - 2*CHENAR,
                borderColor: rgb(0, 0.5, 0.5), borderWidth: 3, color: rgb(1,1,1) });

            // Antet imagine - toata latimea interioara chenarului
            const imgDims = antetImg.scaleToFit(innerW, 140);
            const imgX = CHENAR + 4;
            const imgY = height - CHENAR - 4 - imgDims.height;
            coperta.drawImage(antetImg, { x: imgX, y: imgY, width: innerW, height: imgDims.height });

            // Linie separator sub antet
            coperta.drawLine({
                start: { x: CHENAR + 4, y: imgY - 8 },
                end:   { x: width - CHENAR - 4, y: imgY - 8 },
                thickness: 1.5, color: rgb(0, 0.5, 0.5)
            });

            // Titlu mare
            const titluCoperta = 'Cheltuieli salariale';
            const titluSize = 28;
            const titluW = fontBold.widthOfTextAtSize(titluCoperta, titluSize);
            const yTitlu = imgY - 52;
            coperta.drawText(titluCoperta, {
                x: (width - titluW) / 2, y: yTitlu,
                size: titluSize, font: fontBold, color: rgb(0, 0.3, 0.3)
            });

            // Luna An
            let yLunaAn = yTitlu - 36;
            if (lunaAnText) {
                const laSize = 22;
                const laW = fontBold.widthOfTextAtSize(lunaAnText, laSize);
                coperta.drawText(lunaAnText, {
                    x: (width - laW) / 2, y: yLunaAn,
                    size: laSize, font: fontBold, color: rgb(0, 0.3, 0.3)
                });
            }

            // Subtitlu italic - wrap si centrat corect
            const subtitluFull = 'pentru activitățile desfășurate în cadrul proiectului PNRAS ' +
                '"FII UNUL DINTRE C.R.A.I.! (Creativitate, Reziliență, Adaptabilitate, Incluziune), ' +
                'implementat la Liceul Tehnologic "Victor Mihăilescu Craiu" Belcești';

            const subtSize = 11;
            const maxLineW = innerW - 20;

            function wrapText(text, font, size, maxW) {
                const words = text.split(' ');
                const lines = [];
                let current = '';
                for (const word of words) {
                    const test = current ? current + ' ' + word : word;
                    if (font.widthOfTextAtSize(test, size) <= maxW) {
                        current = test;
                    } else {
                        if (current) lines.push(current);
                        current = word;
                    }
                }
                if (current) lines.push(current);
                return lines;
            }

            const subtLines = wrapText(subtitluFull, fontBI, subtSize, maxLineW);
            let ySubt = yLunaAn - 28;
            for (const linie of subtLines) {
                const lW = fontBI.widthOfTextAtSize(linie, subtSize);
                coperta.drawText(linie, {
                    x: (width - lW) / 2, y: ySubt,
                    size: subtSize, font: fontBI, color: rgb(0.2, 0.2, 0.2)
                });
                ySubt -= 16;
            }

            // Imagine crai.jpeg - centrata intre subtitlu si opis
            // Rezervam spatiu pentru opis: ~120px (5 randuri * 20 + titlu + margin)
            const yOpisStart = CHENAR + 140;
            const craiMaxH = ySubt - 16 - yOpisStart - 20;
            const craiMaxW = innerW - 40;
            const craiDims = craiImg.scaleToFit(craiMaxW, Math.max(craiMaxH, 60));
            const craiX = (width - craiDims.width) / 2;
            const craiY = yOpisStart + 20 + (craiMaxH - craiDims.height) / 2;
            coperta.drawImage(craiImg, { x: craiX, y: craiY, width: craiDims.width, height: craiDims.height });

            // ===== OPIS =====
            const LISTA_SALARII = ['Foaie de pontaj colectiv', 'Stat de plată', 'ALOP', 'Ordin de plată', 'Extras de cont'];
            const docMap = {};
            (docs || []).forEach(d => {
                const tip = d.tip_document;
                if (!docMap[tip]) docMap[tip] = d;
            });

            // Linie separator deasupra opisului
            coperta.drawLine({
                start: { x: CHENAR + 4, y: yOpisStart + 10 },
                end:   { x: width - CHENAR - 4, y: yOpisStart + 10 },
                thickness: 1, color: rgb(0, 0.5, 0.5)
            });

            let yOpis = yOpisStart - 4;
            coperta.drawText('OPIS', {
                x: (width - fontBold.widthOfTextAtSize('OPIS', 13)) / 2, y: yOpis,
                size: 13, font: fontBold, color: rgb(0, 0.4, 0.4)
            });
            yOpis -= 20;

            let opisNr = 1;
            const opisItems = [];
            for (const tip of LISTA_SALARII) {
                const doc = docMap[tip];
                if (!doc) continue;
                opisItems.push({ tip, doc, nr: opisNr });

                let detaliu = '';
                if (tip === 'Extras de cont') {
                    detaliu = doc.data_inregistrare ? doc.data_inregistrare.split('T')[0].split('-').reverse().join('.') : '';
                } else {
                    const nr = doc.nr_inregistrare || '';
                    const data = doc.data_inregistrare ? doc.data_inregistrare.split('T')[0].split('-').reverse().join('.') : '';
                    detaliu = nr && data ? 'Nr. ' + nr + '/' + data : (nr ? 'Nr. ' + nr : data);
                }

                const fullLine = opisNr + '. ' + tip + (detaliu ? ': ' + detaliu : '');
                coperta.drawText(fullLine, {
                    x: CHENAR + 30, y: yOpis,
                    size: 10, font: fontReg, color: rgb(0.1, 0.1, 0.1)
                });
                yOpis -= 17;
                opisNr++;
            }

            // ===== SECTIUNI + PDF-URI =====
            for (const { tip, doc, nr } of opisItems) {
                const culoare = SECTIUNE_CULORI[(nr - 1) % SECTIUNE_CULORI.length];
                const bgColor = rgb(culoare.bg[0]/255, culoare.bg[1]/255, culoare.bg[2]/255);
                const txtColor = rgb(culoare.text[0]/255, culoare.text[1]/255, culoare.text[2]/255);

                // Pagina de sectiune - fundal alb, chenar colorat gros
                const secPag = pdfDoc.addPage([A4W, A4H]);

                // Fundal alb
                secPag.drawRectangle({ x: 0, y: 0, width: A4W, height: A4H, color: rgb(1,1,1) });

                // Chenar colorat - aceeasi grosime ca coperta
                secPag.drawRectangle({ x: CHENAR, y: CHENAR, width: A4W - 2*CHENAR, height: A4H - 2*CHENAR,
                    borderColor: bgColor, borderWidth: 3 });

                // Antet pe pagina de sectiune - toata latimea chenarului, ca pe coperta
                const secInnerW = A4W - 2*CHENAR - 8;
                const secImgDims = antetImg.scaleToFit(secInnerW, 140);
                secPag.drawImage(antetImg, {
                    x: CHENAR + 4, y: A4H - CHENAR - 4 - secImgDims.height,
                    width: secInnerW, height: secImgDims.height
                });

                // Text centrat vertical si orizontal
                let detaliuSec = '';
                if (tip === 'Extras de cont') {
                    detaliuSec = doc.data_inregistrare ? doc.data_inregistrare.split('T')[0].split('-').reverse().join('.') : '';
                } else {
                    const nr2 = doc.nr_inregistrare || '';
                    const data2 = doc.data_inregistrare ? doc.data_inregistrare.split('T')[0].split('-').reverse().join('.') : '';
                    detaliuSec = nr2 && data2 ? 'Nr. ' + nr2 + '/' + data2 : (nr2 ? 'Nr. ' + nr2 : data2);
                }

                const numeSize = 26;
                const detSize = 18;
                const lineGap = 14;
                const totalTextH = numeSize + (detaliuSec ? lineGap + detSize : 0);
                const centerY = A4H / 2;
                const numeY = centerY + totalTextH / 2;
                const detY = numeY - numeSize - lineGap;

                const numeW = fontBold.widthOfTextAtSize(tip, numeSize);
                secPag.drawText(tip, {
                    x: (A4W - numeW) / 2, y: numeY,
                    size: numeSize, font: fontBold, color: bgColor
                });

                if (detaliuSec) {
                    const detW = fontReg.widthOfTextAtSize(detaliuSec, detSize);
                    secPag.drawText(detaliuSec, {
                        x: (A4W - detW) / 2, y: detY,
                        size: detSize, font: fontReg, color: bgColor
                    });
                }

                // Embed PDF document
                const linkDoc = doc.link_drive || '';
                if (!linkDoc) continue;
                try {
                    const docResp = await fetch(linkDoc);
                    if (!docResp.ok) continue;
                    const docBytes = new Uint8Array(await docResp.arrayBuffer());
                    const docPdf = await PDFDocument.load(docBytes, { ignoreEncryption: true });
                    const pageCount = docPdf.getPageCount();
                    const copiedPages = await pdfDoc.copyPages(docPdf, [...Array(pageCount).keys()]);
                    copiedPages.forEach(p => pdfDoc.addPage(p));
                } catch(e) {
                    console.warn('Skip doc:', tip, e);
                }
            }

            // Salveaza/Printeaza
            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const numeFisier = 'Dosar_Salarii_' + (lunaAnText.replace(' ', '_') || contractId) + '.pdf';

            if (modActiune === 'save') {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = numeFisier;
                a.click();
            } else {
                const url = URL.createObjectURL(blob);
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = url;
                document.body.appendChild(iframe);
                iframe.onload = () => { iframe.contentWindow.print(); };
            }

        } catch(e) {
            alert('Eroare la generare dosar: ' + e.message);
            console.error(e);
        } finally {
            if (btn) { btn.disabled = false; btn.innerHTML = originalText; }
        }
    }

                            '<div class="file-date">' + tipDoc + '</div>' +
                        '</div>' +
                        '<div class="file-actions">' +
                        (link ? '<button class="btn-small btn-open" onclick="event.stopPropagation(); window.open(\'' + link + '\', \'_blank\')" title="Deschide">Deschide</button>' : '') +
                        '</div></div>';
                });
                html += '</div>';
            }

            cont.innerHTML = html;
            return;
        }

        // ===== CONTRACTE — checklist documente achiziție =====
        const existente = docs ? docs.map(d => d.tip_document) : [];
        // Facturile din dosar_facturi (furnizor=UUID, tip=13. Factura) — tratate separat (exclus Procons)
        const facturiDosar = contractId === CTR_PROCONS ? [] : (docs || []).filter(d =>
            d.tip_document === '13. Factura' && d.furnizor && d.furnizor.length === 36
        );
        const grupate = {};
        if (docs) docs.filter(d =>
            !(d.tip_document === '13. Factura' && d.furnizor && d.furnizor.length === 36)
        ).forEach(d => {
            if (!grupate[d.tip_document]) grupate[d.tip_document] = [];
            grupate[d.tip_document].push(d);
        });

        const dosarPdf = docs ? docs.find(d => d.tip_document === 'DOSAR ACHIZIȚIE PDF') : null;
        const totalOk = listaCartonase.filter(tip => existente.includes(tip)).length;
        const complet = listaCartonase.length > 0 && totalOk === listaCartonase.length;

        let html = '<div style="padding:14px 18px;border-radius:10px;margin-bottom:16px;font-size:15px;font-weight:700;' +
            (complet ? 'background:#dcfce7;color:#166534;">' : 'background:#fee2e2;color:#991b1b;">') +
            (complet ? '✅ DOSAR COMPLET (' + totalOk + '/' + listaCartonase.length + ')' :
                       '❌ DOSAR INCOMPLET (' + totalOk + '/' + listaCartonase.length + ')') + '</div>';

        const titluSafeZip = titlu.replace(/'/g, "\\'");
        html += '<div style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">';
        if (dosarPdf && dosarPdf.link_drive) {
            html += '<button class="btn-action btn-dosar" onclick="window.open(\'' + dosarPdf.link_drive + '\', \'_blank\')">' +
                '&#128214; Deschide dosarul complet PDF</button>';
        } else {
            html += '<div style="padding:10px;background:#f3f4f6;border-radius:8px;font-size:12px;color:#888;">' +
                'Dosarul PDF nu a fost generat încă.</div>';
        }
        html += '<button class="btn-action" style="background:#059669;margin-left:auto;" onclick="descarcaDosarContract(\'' + contractId + '\', \'' + titluSafeZip + '\')">&#128230; Descarcă dosar ZIP</button>';
        html += '</div>';

        html += '<div class="checklist">';
        listaCartonase.forEach(tip => {
            const fisiere = grupate[tip] || [];
            const areDoc = existente.includes(tip);
            let cls = 'check-miss', ico = '❌';
            if (areDoc) { cls = 'check-ok'; ico = '✅'; }

            html += '<div class="check-item ' + cls + '">' +
                '<div class="check-item-header">' +
                '<span class="check-icon">' + ico + '</span>' +
                '<span class="check-name">' + tip + '</span>' +
                '</div>';

            if (tip === '9. Contract' || tip === '13. Factură') {
                html += '<div style="margin-top:7px;margin-left:28px;display:flex;align-items:flex-start;gap:6px;color:#9ca3af;font-size:11px;font-style:italic;line-height:1.6;">' +
                    '<span style="flex-shrink:0;margin-top:1px;">⚠️</span>' +
                    '<span>Verifică să fie menționate: <b>Codul Proiectului</b>, <b>Bun de plată</b>, <b>Viza CFP</b>, <b>Certificat în privința realității, regularității, legalității</b></span>' +
                    '</div>';
            }

            if (tip === '14. ALOP') {
                html += '<div style="margin-top:7px;margin-left:28px;display:flex;align-items:flex-start;gap:6px;color:#9ca3af;font-size:11px;font-style:italic;line-height:1.6;">' +
                    '<span style="flex-shrink:0;margin-top:1px;">⚠️</span>' +
                    '<span>Verifică să fie menționate: <b>Codul Proiectului</b>, <b>Certificat în privința realității, regularității, legalității</b></span>' +
                    '</div>';
            }

            if (fisiere.length > 0) {
                html += '<div class="check-files-list">';
                const fisiereSortate = [...fisiere].sort((a, b) => {
                    const dA = a.data_inregistrare ? new Date(a.data_inregistrare) : new Date(0);
                    const dB = b.data_inregistrare ? new Date(b.data_inregistrare) : new Date(0);
                    return dA - dB;
                });
                fisiereSortate.forEach(f => {
                    if (!f.link_drive) return;
                    const titluSafe = titlu.replace(/'/g, "\\'");
                    html += '<div class="check-file-row">';
                    html += '<a class="check-files" href="' + f.link_drive + '" target="_blank">📎 ' + (f.nume_fisier || 'Deschide') + '</a>';
                    html += '<button class="btn-del-storage" onclick="stergeTabelFisier(\'' + f.id + '\', \'' + contractId + '\', \'' + titluSafe + '\')" title="Șterge fișier">🗑️</button>';
                    html += '</div>';
                });
                html += '</div>';
            }
            html += '</div>';
        });

        const tipuriExtra = Object.keys(grupate).filter(tip => {
            if (listaCartonase.includes(tip)) return false;
            if (tip === 'DOSAR ACHIZIȚIE PDF') return false;
            if (tip === '13. Factura') return false;
            const t = tip.toUpperCase();
            return t.includes('FACTUR') || t.includes('DOSAR');
        });
        const areAltceva = tipuriExtra.length > 0 || facturiDosar.length > 0;
        if (areAltceva) {
            html += '<div style="margin-top:12px;font-size:12px;color:#888;font-style:italic;">Alte documente:</div>';
            // Buton Dosar facturi pentru fiecare factură
            if (facturiDosar.length > 0) {
                const titluEnc = encodeURIComponent(titlu);
                facturiDosar.forEach(f => {
                    const nrF = f.nr_inregistrare ? 'Nr. ' + f.nr_inregistrare + ' — ' : '';
                    const dataF = f.data_inregistrare ? f.data_inregistrare.split('-').reverse().join('.') + ' — ' : '';
                    const numeF = f.nume_fisier || 'Factură';
                    const url = 'dosar_facturi.html?id=' + contractId + '&den=' + titluEnc;
                    html += '<div class="check-item check-opt"><div class="check-item-header">' +
                        '<span class="check-icon">🧾</span>' +
                        '<span class="check-name">' + nrF + dataF + numeF + '</span>' +
                        '</div>' +
                        '<div style="margin-top:6px;margin-left:28px;">' +
                        '<a href="' + url + '" style="font-size:12px;color:#2563eb;font-weight:600;text-decoration:none;">📂 Deschide Dosar Factură</a>' +
                        '</div></div>';
                });
            }
            tipuriExtra.forEach(tip => {
                const fisiere = grupate[tip] || [];
                html += '<div class="check-item check-opt"><div class="check-item-header">' +
                    '<span class="check-icon">📄</span><span class="check-name">' + tip + '</span></div>';
                if (fisiere.length > 0) {
                    html += '<div class="check-files-list">';
                    const fisiereSortateExtra = [...fisiere].sort((a, b) => {
                        const dA = a.data_inregistrare ? new Date(a.data_inregistrare) : new Date(0);
                        const dB = b.data_inregistrare ? new Date(b.data_inregistrare) : new Date(0);
                        return dA - dB;
                    });
                    fisiereSortateExtra.forEach(f => {
                        if (!f.link_drive) return;
                        const titluSafe = titlu.replace(/'/g, "\\'");
                        html += '<div class="check-file-row">';
                        html += '<a class="check-files" href="' + f.link_drive + '" target="_blank">📎 ' + (f.nume_fisier || 'Deschide') + '</a>';
                        html += '<button class="btn-del-storage" onclick="stergeTabelFisier(\'' + f.id + '\', \'' + contractId + '\', \'' + titluSafe + '\')" title="Șterge">🗑️</button>';
                        html += '</div>';
                    });
                    html += '</div>';
                }
                html += '</div>';
            });
        }

        html += '</div>';
        cont.innerHTML = html;
    }

    // ===================== FOLDER GENERIC =====================
    async function afiseazaFolder(cardId, parentId) {
        const cont = document.getElementById('continut');
        if (parentId === 'null' || parentId === null || parentId === undefined) parentId = null;

        let query = db.from('audit_continut').select('*')
            .eq('card_id', cardId).eq('sters', false)
            .order('tip', { ascending: true }).order('ordine', { ascending: true });

        if (parentId) query = query.eq('parent_id', parentId);
        else query = query.is('parent_id', null);

        const { data: items } = await query;

        let notitaItem = items ? items.find(i => i.tip === 'notita') : null;
        const notiteCurente = notitaItem ? (notitaItem.titlu || '') : '';
        const areNotite = notiteCurente.trim().length > 0;
        const itemsFiltrate = items ? items.filter(i => i.tip !== 'notita') : [];

        const parentArg = parentId ? "'" + parentId + "'" : 'null';
        const notitaIdArg = notitaItem ? "'" + notitaItem.id + "'" : 'null';

        const notiteSafe = notiteCurente.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

        // Coloana stanga: notite
        const leftCol =
            '<div class="folder-left">' +
                '<div id="notite-box" class="notite-box">' +
                    '<div class="notite-box-header">' +
                        '<span class="notite-box-label">&#128221; Notițe</span>' +
                        '<button class="notite-box-close" onclick="stergeNotita(' + notitaIdArg + ')" title="Șterge notițe">&#10005;</button>' +
                    '</div>' +
                    '<textarea class="notite-ta" id="notite-ta" placeholder="Scrie notițe..." ' +
                        'oninput="autoResizeNotite(this); scheduleazaSalvareNotite(\'' + cardId + '\', ' + parentArg + ', ' + notitaIdArg + ')" ' +
                        'onblur="salveazaNotiteImmediat(\'' + cardId + '\', ' + parentArg + ', ' + notitaIdArg + ')">' + notiteSafe + '</textarea>' +
                    '<div class="notite-status" id="notite-status"></div>' +
                '</div>' +
            '</div>';

        // Titlul folderului curent (din ultimul element din navigationStack)
        const titluFolderCurent = navigationStack.length > 0 ? (navigationStack[navigationStack.length - 1].titlu || 'Folder') : 'Folder';

        // Coloana dreapta: butoane + documente
        let rightCol =
            '<div class="folder-right">' +
                '<div class="actions-bar">' +
                    '<button class="btn-action btn-folder" onclick="adaugaSubfolder(\'' + cardId + '\', ' + parentArg + ')">&#128193; Subfolder</button>' +
                    '<button class="btn-action btn-file" onclick="adaugaFisier(\'' + cardId + '\', ' + parentArg + ')">&#128196; Fișier</button>' +
                    '<button class="btn-action btn-history" onclick="veziIstoricCard(\'' + cardId + '\')">&#128337; Istoric</button>' +
                    '<button class="btn-action" style="background:#059669;" onclick="descarcaDosarCurent(\'' + cardId + '\', ' + parentArg + ', \'' + titluFolderCurent.replace(/'/g, "\\'") + '\')">&#128230; Descarcă dosar</button>' +
                '</div>';

        if (itemsFiltrate.length === 0) {
            rightCol += '<div class="empty">&#128193; Folder gol. Adaugă subfoldere sau fișiere.</div>';
        } else {
            rightCol += '<div class="file-list">';
            const total = itemsFiltrate.length;
            itemsFiltrate.forEach((item, idx) => { rightCol += item.tip === 'folder' ? genFolderItem(item, idx, total) : genFisierItem(item, idx, total); });
            rightCol += '</div>';
        }
        rightCol += '</div>';

        // Afisam folder-layout in wrapper full-width, nu in container
        const wrapper = document.getElementById('folder-wrapper');
        const containerNormal = document.getElementById('container-normal');
        wrapper.style.display = 'flex';
        containerNormal.style.display = 'none';
        wrapper.innerHTML = leftCol + rightCol;
        initDragSort();
        const ta = document.getElementById('notite-ta');
        if (ta) autoResizeNotite(ta);
    }
    function autoResizeNotite(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    function aratToast(msg, tip) {
        const t = document.getElementById('toast');
        if (!t) return;
        t.textContent = msg;
        t.className = 'toast ' + (tip || 'success');
        t.classList.add('show');
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function toggleNotite(cardId, parentId, notitaId) {
        const box = document.getElementById('notite-box');
        if (!box) return;
        if (box.style.display !== 'none') {
            box.style.display = 'none';
        } else {
            box.style.display = 'block';
            setTimeout(() => { const ta = document.getElementById('notite-ta'); if (ta) ta.focus(); }, 50);
        }
    }

    async function stergeNotita(notitaId) {
        if (!notitaId || notitaId === 'null') return;
        const { error } = await db.from('audit_continut').update({ sters: true }).eq('id', notitaId);
        if (error) { aratToast('❌ Eroare la ștergere!', 'error'); return; }
        const box = document.getElementById('notite-box');
        if (box) box.remove();
        const btn = document.getElementById('btn-notite');
        if (btn) btn.innerHTML = '&#128221; Notițe';
        aratToast('🗑️ Notițe șterse (restaurabile din Istoric)', 'success');
    }

    const _notiteTimer = { t: null };

    function scheduleazaSalvareNotite(cardId, parentId, notitaId) {
        const s = document.getElementById('notite-status');
        clearTimeout(_notiteTimer.t);
        if (s) { s.textContent = 'Se salvează...'; s.className = 'notite-status'; }
        _notiteTimer.t = setTimeout(() => salveazaNotite(cardId, parentId, notitaId), 900);
    }

    function salveazaNotiteImmediat(cardId, parentId, notitaId) {
        clearTimeout(_notiteTimer.t);
        salveazaNotite(cardId, parentId, notitaId);
    }

    async function salveazaNotite(cardId, parentId, notitaId) {
        const ta = document.getElementById('notite-ta');
        const s = document.getElementById('notite-status');
        if (!ta) return;
        const text = ta.value;
        let error;
        if (notitaId && notitaId !== 'null') {
            ({ error } = await db.from('audit_continut').update({ titlu: text }).eq('id', notitaId));
        } else {
            const { data: nd, error: insertErr } = await db.from('audit_continut').insert({
                card_id: cardId, parent_id: parentId || null,
                tip: 'notita', titlu: text, sters: false
            }).select().single();
            error = insertErr;
            if (nd) {
                const btn = document.getElementById('btn-notite');
                if (btn) btn.setAttribute('onclick', "toggleNotite('" + cardId + "', " + (parentId ? "'" + parentId + "'" : 'null') + ", '" + nd.id + "')");
                const closeBtn = document.querySelector('.notite-box-close');
                if (closeBtn) closeBtn.setAttribute('onclick', "stergeNotita('" + nd.id + "')");
                const ta2 = document.getElementById('notite-ta');
                if (ta2) {
                    ta2.setAttribute('oninput', "autoResizeNotite(this); scheduleazaSalvareNotite('" + cardId + "', " + (parentId ? "'" + parentId + "'" : 'null') + ", '" + nd.id + "')");
                    ta2.setAttribute('onblur', "salveazaNotiteImmediat('" + cardId + "', " + (parentId ? "'" + parentId + "'" : 'null') + ", '" + nd.id + "')");
                }
            }
        }
        const btn = document.getElementById('btn-notite');
        if (btn) btn.innerHTML = '&#128221; Notițe' + (text.trim() ? ' ●' : '');
        if (s) {
            if (error) { s.textContent = 'Eroare: ' + (error.message || JSON.stringify(error)); s.className = 'notite-status eroare'; }
            else {
                s.textContent = '✓ Salvat'; s.className = 'notite-status salvat';
                aratToast('✓ Notițe salvate', 'success');
                setTimeout(() => { if (s) { s.textContent = ''; s.className = 'notite-status'; } }, 2000);
            }
        }
    }

    function genFolderItem(item, idx, total) {
        const titluSafe = (item.titlu || '').replace(/'/g, "\'").replace(/"/g, '&quot;');
        const nrCrt = (typeof idx === 'number') ? idx + 1 : '';
        const nrBadge = nrCrt !== '' ? '<div class="nr-crt">' + nrCrt + '</div>' : '';
        return '<div class="file-item" draggable="true" data-id="' + item.id + '" style="cursor:grab;" onclick="deschideSubfolder(\'' + item.id + '\', \'' + item.card_id + '\', \'' + titluSafe + '\')">' +
            nrBadge +
            '<span class="file-icon">&#128193;</span>' +
            '<div class="file-info"><div class="file-name">' + item.titlu + '</div><div class="file-date">Folder</div></div>' +
            '<div class="file-actions">' +
            '<button class="btn-small" style="background:#059669;" onclick="event.stopPropagation(); descarcaFolder(\'' + item.id + '\', \'' + item.card_id + '\', \'' + titluSafe + '\')">&#128230;</button>' +
            '<button class="btn-small btn-rename" onclick="event.stopPropagation(); redenumesteFolderul(\'' + item.id + '\', \'' + titluSafe + '\')">&#9998;</button>' +
            '<button class="btn-small btn-del" onclick="event.stopPropagation(); stergeItem(\'' + item.id + '\')">&#10005;</button>' +
            '</div></div>';
    }

    async function descarcaFisier(url, numeFisier) {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = numeFisier;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        } catch (err) {
            // Fallback: deschide într-un tab nou
            window.open(url, '_blank');
        }
    }
    function genFisierItem(item, idx, total) {
        const ext = (item.fisier_nume || '').split('.').pop().toLowerCase();
        let icon = '📄';
        if (['jpg','jpeg','png','gif'].includes(ext)) icon = '🖼️';
        else if (ext === 'pdf') icon = '📕';
        else if (['xlsx','xls','csv'].includes(ext)) icon = '📊';
        else if (['doc','docx'].includes(ext)) icon = '📝';

        const titluSafe = (item.titlu || item.fisier_nume || '').replace(/'/g, "\'").replace(/"/g, '&quot;');
        const fisierNumeSafe = (item.fisier_nume || 'fisier').replace(/'/g, "\'");
        const nrCrt = (typeof idx === 'number') ? idx + 1 : '';
        const nrBadge = nrCrt !== '' ? '<div class="nr-crt">' + nrCrt + '</div>' : '';

        return '<div class="file-item" draggable="true" data-id="' + item.id + '" style="cursor:grab;">' +
            nrBadge +
            '<span class="file-icon">' + icon + '</span>' +
            '<div class="file-info"><div class="file-name">' + (item.titlu || item.fisier_nume || '-') + '</div></div>' +
            '<div class="file-actions">' +
            '<button class="btn-small btn-rename" onclick="event.stopPropagation(); redenumesteFisierul(\'' + item.id + '\', \'' + titluSafe + '\')" title="Editează titlul">&#9998;</button>' +
            (item.fisier_url ? '<button class="btn-small btn-open" onclick="event.stopPropagation(); window.open(\'' + item.fisier_url + '\', \'_blank\')" title="Deschide">Deschide</button>' : '') +
            (item.fisier_url ? '<button class="btn-small" style="background:#059669;" onclick="event.stopPropagation(); descarcaFisier(\'' + item.fisier_url + '\', \'' + fisierNumeSafe + '\')" title="Descarcă">💾</button>' : '') +
            '<button class="btn-small btn-del" onclick="event.stopPropagation(); stergeItem(\'' + item.id + '\')">&#10005;</button>' +
            '</div></div>';
    }

    function deschideSubfolder(id, cardId, titlu) {
        pushNav({ type: 'folder', id: id, cardId: cardId, parentId: id, titlu: titlu });
    }

    // ===================== ADAUGĂ SUBFOLDER =====================
    async function adaugaSubfolder(cardId, parentId) {
        const r = await arataDialog('&#128193; Subfolder nou', 'Numele subfolderului:', [
            { text: 'Adaugă', valoare: 'da', clasa: 'dialog-btn-primary' },
            { text: 'Anulează', valoare: 'nu', clasa: 'dialog-btn-cancel' }
        ], true, 'Ex: Dosare 2025');
        if (r.actiune !== 'da' || !r.text.trim()) return;

        // Calculăm ordinea: max(ordine) + 1
        let maxOrdQuery = db.from('audit_continut').select('ordine')
            .eq('card_id', cardId).eq('sters', false).neq('tip', 'notita')
            .order('ordine', { ascending: false }).limit(1);
        if (parentId) maxOrdQuery = maxOrdQuery.eq('parent_id', parentId);
        else maxOrdQuery = maxOrdQuery.is('parent_id', null);
        const { data: maxOrdData } = await maxOrdQuery;
        const nextOrdine = (maxOrdData && maxOrdData.length > 0 && maxOrdData[0].ordine != null) ? maxOrdData[0].ordine + 1 : 0;

        const insertData = {
            card_id: cardId,
            parent_id: parentId || null,
            tip: 'folder',
            titlu: r.text.trim(),
            icon: '📁',
            sters: false,
            ordine: nextOrdine
        };

        const { data, error } = await db.from('audit_continut').insert(insertData).select();
        if (error) {
                     const msg = error.message || error.details || error.hint || JSON.stringify(error);
            alert('Eroare la salvare:\n' + msg + '\nCod: ' + (error.code||'?') + '\nDetalii: ' + (error.details||'-') + '\nHint: ' + (error.hint||'-'));
            console.error('Insert error full:', JSON.stringify(error));
            return;
        }
        incarcaVizualizare();
    }

    // ===================== ADAUGĂ FIȘIER =====================
    function adaugaFisier(cardId, parentId) {
        uploadTargetCardId = cardId;
        uploadTargetParentId = parentId;
        document.getElementById('file-input-audit').click();

    function aratProgressUpload(fisierCurent, indexCurent, total, progres) {
        let overlay = document.getElementById('upload-progress-overlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'upload-progress-overlay';
            overlay.className = 'upload-progress-overlay';
            overlay.innerHTML = `
                <div class="upload-progress-box">
                    <div class="upload-progress-title">⬆️ Se încarcă fișierele...</div>
                    <div class="upload-progress-subtitle" id="upl-subtitle"></div>
                    <div class="upload-progress-file" id="upl-file-name"></div>
                    <div class="upload-progress-bar-bg">
                        <div class="upload-progress-bar-fill" id="upl-bar" style="width:0%"></div>
                    </div>
                    <div class="upload-progress-pct" id="upl-pct">0%</div>
                    <div class="upload-progress-overall-bg">
                        <div class="upload-progress-overall-fill" id="upl-overall" style="width:0%"></div>
                    </div>
                    <div class="upload-progress-overall-label" id="upl-overall-label"></div>
                </div>`;
            document.body.appendChild(overlay);
        }
        const overallPct = total > 1 ? Math.round(((indexCurent) / total) * 100) : 0;
        document.getElementById('upl-subtitle').textContent = `Fișier ${indexCurent + 1} din ${total}`;
        document.getElementById('upl-file-name').textContent = '📄 ' + fisierCurent;
        document.getElementById('upl-bar').style.width = progres + '%';
        document.getElementById('upl-pct').textContent = progres + '%';
        document.getElementById('upl-overall').style.width = overallPct + '%';
        document.getElementById('upl-overall-label').textContent = total > 1 ? `Total: ${overallPct}% (${indexCurent}/${total} completate)` : '';
    }

    function ascundeProgressUpload() {
        const overlay = document.getElementById('upload-progress-overlay');
        if (overlay) overlay.remove();
    }

    document.getElementById('file-input-audit').addEventListener('change', async function(e) {
        const files = e.target.files;
        if (!files || files.length === 0) return;

        let uploadErrors = [];
        const total = files.length;

        for (let i = 0; i < total; i++) {
            const file = files[i];
            aratProgressUpload(file.name, i, total, 10);

            const uniqueId = Math.random().toString(36).substring(2, 10) + '_' + Date.now();
            const fileName = uniqueId + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
            console.log('[UPLOAD] Încerc upload:', fileName);

            aratProgressUpload(file.name, i, total, 30);

            let auditUrl;
            try {
                auditUrl = await r2UploadFile(fileName, file, "audit", (pct) => {
                    aratProgressUpload(file.name, i, total, pct);
                });
            } catch(err) {
                uploadErrors.push(file.name + ': ' + err.message);
                continue;
            }

            console.log('[UPLOAD] URL:', auditUrl);

            let maxOrdQ = db.from('audit_continut').select('ordine')
                .eq('card_id', uploadTargetCardId).eq('sters', false).neq('tip', 'notita')
                .order('ordine', { ascending: false }).limit(1);
            if (uploadTargetParentId) maxOrdQ = maxOrdQ.eq('parent_id', uploadTargetParentId);
            else maxOrdQ = maxOrdQ.is('parent_id', null);
            const { data: maxOrdD } = await maxOrdQ;
            const nextOrd = (maxOrdD && maxOrdD.length > 0 && maxOrdD[0].ordine != null) ? maxOrdD[0].ordine + 1 : 0;

            const { error: dbError } = await db.from('audit_continut').insert({
                card_id: uploadTargetCardId, parent_id: uploadTargetParentId,
                tip: 'fisier', titlu: file.name, fisier_url: auditUrl, fisier_nume: file.name,
                sters: false, ordine: nextOrd
            });
            console.log('[UPLOAD] DB insert error:', dbError);
            if (dbError) uploadErrors.push(file.name + ' (DB): ' + (dbError.message || JSON.stringify(dbError)));

            aratProgressUpload(file.name, i, total, 100);
            await new Promise(res => setTimeout(res, 200));
        }

        ascundeProgressUpload();
        e.target.value = '';
        if (uploadErrors.length > 0) {
            alert('Erori la upload:\n' + uploadErrors.join('\n'));
        }
        incarcaVizualizare();
    });

    // ===================== MUTĂ ITEM SUS/JOS =====================
    async function mutaItem(itemId, direction) {
        // 1. Obținem itemul curent
        const { data: item } = await db.from('audit_continut').select('*').eq('id', itemId).single();
        if (!item) return;

        // 2. Obținem toți frații (același card_id, parent_id, neșterși, fără notițe)
        let query = db.from('audit_continut').select('*')
            .eq('card_id', item.card_id).eq('sters', false)
            .neq('tip', 'notita')
            .order('ordine', { ascending: true });

        if (item.parent_id) query = query.eq('parent_id', item.parent_id);
        else query = query.is('parent_id', null);

        const { data: siblings } = await query;
        if (!siblings || siblings.length < 2) return;

        // 3. Găsim indexul curent
        const currentIdx = siblings.findIndex(s => s.id === itemId);
        if (currentIdx < 0) return;

        const targetIdx = currentIdx + direction;
        if (targetIdx < 0 || targetIdx >= siblings.length) return;

        // 4. Swap ordinea între cele două
        const currentOrdine = siblings[currentIdx].ordine || currentIdx;
        const targetOrdine = siblings[targetIdx].ordine || targetIdx;

        await db.from('audit_continut').update({ ordine: targetOrdine }).eq('id', siblings[currentIdx].id);
        await db.from('audit_continut').update({ ordine: currentOrdine }).eq('id', siblings[targetIdx].id);

        // 5. Reîncărcăm
        incarcaVizualizare();
    }

    async function descarcaTotCard(cardId, titluCard) {
        aratToast('📦 Se pregătește descărcarea...', 'success');

        try {
            // 1. Obținem TOATE itemurile din card (neșterse, fără notițe)
            const { data: allItems } = await db.from('audit_continut').select('*')
                .eq('card_id', cardId).eq('sters', false).neq('tip', 'notita')
                .order('ordine', { ascending: true });

            if (!allItems || allItems.length === 0) {
                aratToast('⚠️ Cardul este gol, nimic de descărcat.', 'error');
                return;
            }

            const zip = new JSZip();

            // 2. Construim arborele de foldere
            async function adaugaInZip(parentId, zipFolder) {
                const children = allItems.filter(i => {
                    if (parentId === null) return !i.parent_id;
                    return i.parent_id === parentId;
                });

                for (const item of children) {
                    if (item.tip === 'folder') {
                        // Creăm subfolder în ZIP
                        const subFolder = zipFolder.folder(item.titlu || 'Folder');
                        await adaugaInZip(item.id, subFolder);
                    } else if (item.tip === 'fisier' && item.fisier_url) {
                        // Descărcăm fișierul și îl adăugăm în ZIP
                        try {
                            const response = await fetch(item.fisier_url);
                            if (response.ok) {
                                const blob = await response.blob();
                                const numeFisier = item.fisier_nume || item.titlu || 'fisier';
                                zipFolder.file(numeFisier, blob);
                            }
                        } catch (e) {
                            console.warn('Nu s-a putut descărca:', item.titlu, e);
                        }
                    }
                }
            }

            await adaugaInZip(null, zip);

            // 3. Generăm și descărcăm ZIP-ul
            const content = await zip.generateAsync({ type: 'blob' }, (metadata) => {
                // Progres opțional
            });

            const numeZip = (titluCard || 'Audit').replace(/[^a-zA-Z0-9ăâîșțĂÂÎȘȚ ]/g, '_') + '.zip';
            saveAs(content, numeZip);
            aratToast('✅ Descărcare completă!', 'success');

        } catch (err) {
            console.error('Eroare descărcare ZIP:', err);
            aratToast('❌ Eroare: ' + err.message, 'error');
        }
    }

    // ===================== DESCARCĂ DOSAR CONTRACT (ZIP) =====================
    async function descarcaDosarContract(contractId, titluContract) {
        aratToast('📦 Se pregătește descărcarea...', 'success');
        try {
            const { data: docs } = await db.from('documente_contract').select('*').eq('contract_id', contractId);

            const fisiere = (docs || []).filter(d => d.link_drive && d.tip_document !== 'DOSAR ACHIZIȚIE PDF');
            if (fisiere.length === 0) {
                aratToast('⚠️ Nu există fișiere de descărcat.', 'error');
                return;
            }

            const zip = new JSZip();
            const folderZip = zip.folder(titluContract || 'Dosar');

            for (const doc of fisiere) {
                try {
                    const response = await fetch(doc.link_drive);
                    if (response.ok) {
                        const blob = await response.blob();
                        // Nume fișier: tip_document + extensie .pdf
                        let numeFisier = doc.nume_fisier || (doc.tip_document + '.pdf');
                        if (!numeFisier.toLowerCase().endsWith('.pdf')) {
                            numeFisier = numeFisier.replace(/\.[^/.]+$/, '') + '.pdf';
                        }
                        folderZip.file(numeFisier, blob);
                    }
                } catch (e) {
                    console.warn('Nu s-a putut descărca:', doc.tip_document, e);
                }
            }

            const content = await zip.generateAsync({ type: 'blob' });
            const numeZip = (titluContract || 'Dosar').replace(/[^a-zA-Z0-9ăâîșțĂÂÎȘȚ ]/g, '_') + '.zip';
            saveAs(content, numeZip);
            aratToast('✅ Descărcare completă! (' + fisiere.length + ' fișiere)', 'success');
        } catch (err) {
            console.error('Eroare descărcare dosar contract:', err);
            aratToast('❌ Eroare: ' + err.message, 'error');
        }
    }

    // ===================== DESCARCĂ DOSAR CURENT =====================
    async function descarcaDosarCurent(cardId, parentId, titluDosar) {
        aratToast('📦 Se pregătește descărcarea dosarului...', 'success');
        try {
            // Luăm TOATE itemele din card (pentru a putea traversa subfolderele)
            const { data: allItems } = await db.from('audit_continut').select('*')
                .eq('card_id', cardId).eq('sters', false).neq('tip', 'notita')
                .order('ordine', { ascending: true });

            if (!allItems || allItems.length === 0) {
                aratToast('⚠️ Dosarul este gol, nimic de descărcat.', 'error');
                return;
            }

            // Verificăm dacă există fișiere sub parentId (recursiv)
            function areChildren(pid) {
                const children = allItems.filter(i => i.parent_id === (pid || null));
                if (children.some(i => i.tip === 'fisier' && i.fisier_url)) return true;
                for (const c of children) {
                    if (c.tip === 'folder' && areChildren(c.id)) return true;
                }
                return false;
            }
            if (!areChildren(parentId || null)) {
                aratToast('⚠️ Dosarul este gol, nimic de descărcat.', 'error');
                return;
            }

            const zip = new JSZip();
            // Folderul rădăcină din ZIP are denumirea dosarului
            const rootFolder = zip.folder(titluDosar || 'Dosar');

            async function adaugaRecursiv(pid, zipFolder) {
                const children = allItems.filter(i => i.parent_id === (pid || null));
                for (const item of children) {
                    if (item.tip === 'folder') {
                        const sub = zipFolder.folder(item.titlu || 'Folder');
                        await adaugaRecursiv(item.id, sub);
                    } else if (item.tip === 'fisier' && item.fisier_url) {
                        try {
                            const response = await fetch(item.fisier_url);
                            if (response.ok) {
                                const blob = await response.blob();
                                // Asigurăm extensia .pdf
                                let numeFisier = item.fisier_nume || item.titlu || 'fisier';
                                if (!numeFisier.toLowerCase().endsWith('.pdf')) {
                                    numeFisier = numeFisier.replace(/\.[^/.]+$/, '') + '.pdf';
                                }
                                zipFolder.file(numeFisier, blob);
                            }
                        } catch (e) {
                            console.warn('Nu s-a putut descărca:', item.titlu, e);
                        }
                    }
                }
            }

            await adaugaRecursiv(parentId || null, rootFolder);

            const content = await zip.generateAsync({ type: 'blob' });
            const numeZip = (titluDosar || 'Dosar').replace(/[^a-zA-Z0-9ăâîșțĂÂÎȘȚ ]/g, '_') + '.zip';
            saveAs(content, numeZip);
            aratToast('✅ Descărcare completă!', 'success');
        } catch (err) {
            console.error('Eroare descărcare dosar:', err);
            aratToast('❌ Eroare: ' + err.message, 'error');
        }
    }

    // Recalculează numerele crt vizual după reordonare
    function recalcNrCrt(container) {
        const items = container.querySelectorAll('.file-item[data-id]');
        items.forEach((el, i) => {
            let badge = el.querySelector('.nr-crt');
            if (!badge) {
                badge = document.createElement('div');
                badge.className = 'nr-crt';
                el.insertBefore(badge, el.firstChild);
            }
            badge.textContent = i + 1;
        });
    }

    // ===================== DRAG & DROP REORDONARE =====================
    let _dragId = null;

    function initDragSort() {
        const list = document.querySelector('.file-list');
        if (!list) return;

        list.querySelectorAll('.file-item[draggable]').forEach(el => {
            el.addEventListener('dragstart', e => {
                _dragId = el.dataset.id;
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', _dragId);
                setTimeout(() => el.classList.add('dragging'), 0);
            });
            el.addEventListener('dragend', () => {
                el.classList.remove('dragging');
                document.querySelectorAll('.file-item').forEach(i => i.classList.remove('drag-over'));
            });
            el.addEventListener('dragover', e => {
                e.preventDefault();
                e.stopPropagation();
                document.querySelectorAll('.file-item').forEach(i => i.classList.remove('drag-over'));
                if (el.dataset.id !== _dragId) el.classList.add('drag-over');
            });
            el.addEventListener('drop', async e => {
                e.preventDefault();
                e.stopPropagation();
                document.querySelectorAll('.file-item').forEach(i => i.classList.remove('drag-over'));
                const targetId = el.dataset.id;
                if (!_dragId || _dragId === targetId) return;

                const allEls = [...document.querySelectorAll('.file-item[data-id]')];
                const ids = allEls.map(el => el.dataset.id);
                const fromIdx = ids.indexOf(_dragId);
                const toIdx = ids.indexOf(targetId);
                if (fromIdx < 0 || toIdx < 0) return;

                // Muta vizual imediat
                const draggingEl = allEls[fromIdx];
                const targetEl = allEls[toIdx];
                const parent = draggingEl.parentNode;
                if (fromIdx < toIdx) {
                    parent.insertBefore(draggingEl, targetEl.nextSibling);
                } else {
                    parent.insertBefore(draggingEl, targetEl);
                }

                // Recalculează numerele crt după mutare
                recalcNrCrt(parent);

                // Salveaza noile ordini in DB
                const newIds = [...document.querySelectorAll('.file-item[data-id]')].map(el => el.dataset.id);
                await Promise.all(newIds.map((id, i) =>
                    db.from('audit_continut').update({ ordine: i }).eq('id', id)
                ));

                _dragId = null;
            });
        });
    }
