<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator CIM PNRAS</title>
<style>
/* ===== RESET ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
* { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

/* ===== APP SHELL ===== */
body { font-family: Calibri, sans-serif; font-size: 12pt; background: #c8cdd4; }
.app { display: flex; height: 100vh; overflow: hidden; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 270px; min-width: 270px;
  background: linear-gradient(180deg, #0f2744 0%, #1a3a5c 100%);
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 3px 0 12px rgba(0,0,0,0.3);
}
.sidebar-header {
  padding: 18px 16px 14px;
  background: rgba(0,0,0,0.25);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.sidebar-header h2 {
  font-size: 12pt; font-weight: 700; color: #8ecfea; margin-bottom: 3px;
  letter-spacing: 0.3px;
}
.sidebar-header p { font-size: 8.5pt; color: #7a9ab5; }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px 6px; }
.sidebar-list::-webkit-scrollbar { width: 4px; }
.sidebar-list::-webkit-scrollbar-track { background: transparent; }
.sidebar-list::-webkit-scrollbar-thumb { background: #2e5a80; border-radius: 4px; }
.expert-btn {
  display: block; width: 100%; text-align: left;
  padding: 9px 12px; background: transparent;
  border: 1px solid transparent; border-radius: 5px;
  color: #b0c8df; font-family: Calibri, sans-serif; font-size: 9.5pt;
  cursor: pointer; margin-bottom: 3px; transition: all 0.15s;
  line-height: 1.3;
}
.expert-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); color: #ddeeff; }
.expert-btn.active { background: #1e5a94; border-color: #5ba3d0; color: #fff; font-weight: 700; }
.expert-btn small { display: block; font-size: 7.5pt; margin-top: 2px; color: #5a8aaa; }
.expert-btn.active small { color: #9dc8e8; }

/* ===== MAIN PANEL ===== */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.toolbar {
  background: #f0f2f5; border-bottom: 1px solid #c0c5cc;
  padding: 9px 16px; display: flex; align-items: center; gap: 10px;
  flex-shrink: 0; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.toolbar h3 { font-size: 10.5pt; color: #334; flex: 1; font-weight: 400; }
.btn-print {
  background: #1e5a94; color: #fff; border: none;
  padding: 7px 18px; font-family: Calibri, sans-serif;
  font-size: 10pt; font-weight: 700; border-radius: 4px;
  cursor: pointer; letter-spacing: 0.2px; transition: background 0.15s;
}
.btn-print:hover { background: #0f3d6e; }
.btn-print:disabled { background: #9aabb8; cursor: not-allowed; }

.doc-area { flex: 1; overflow-y: auto; background: #c8cdd4; padding: 24px 28px; }
.doc-area::-webkit-scrollbar { width: 8px; }
.doc-area::-webkit-scrollbar-track { background: #b8bdc4; }
.doc-area::-webkit-scrollbar-thumb { background: #8a96a4; border-radius: 4px; }

.placeholder {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; color: #667;
  font-size: 12pt; gap: 10px;
}
.placeholder-icon { font-size: 40pt; opacity: 0.3; }

/* ===== DOCUMENT (A4) ===== */
.document {
  width: 210mm;
  background: #fff;
  margin: 0 auto 28px;
  padding: 0 0 15mm 0;
  box-shadow: 0 3px 16px rgba(0,0,0,0.22);
  font-family: Calibri, sans-serif;
  font-size: 12pt;
  color: #000;
  line-height: 1.45;
  overflow: hidden;
}
.doc-content { padding: 0 20mm 0 15mm; }

/* ===== ANTET ===== */
.antet-img {
  display: block;
  width: 100%;
  height: auto;
  margin-bottom: 8px;
}
.antet-school-box {
  border: 2px solid #1f4e79;
  margin-top: 0;
  margin-bottom: 12px;
  padding: 8px 14px;
  text-align: center;
  line-height: 1.55;
}
.antet-school-box .s1 { font-size: 11pt; font-weight: 700; color: #1f4e79; }
.antet-school-box .s2 { font-size: 10.5pt; font-weight: 700; color: #1f4e79; }
.antet-school-box .s3 { font-size: 10pt; color: #c00000; font-weight: 700; }
.antet-info-row { font-size: 10pt; line-height: 1.6; }
.antet-info-row .lbl { color: #1f4e79; font-weight: 700; }
.antet-info-row .val { color: #c00000; font-weight: 700; }

/* ===== TITLU CONTRACT ===== */
.cim-title {
  text-align: center;
  margin: 16px 0 6px;
  line-height: 1.5;
}
.cim-title .t1 { font-size: 13pt; font-weight: 700; }
.cim-title .t2 { font-size: 12pt; font-weight: 400; }

/* ===== SECTIUNI ===== */
.section {
  margin-top: 14pt;
  margin-bottom: 0;
}
.section-heading {
  font-size: 11.5pt;
  font-weight: 700;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: #1f4e79;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
  color: #fff;
  padding: 4px 10px 4px 8px;
  border-radius: 3px;
  letter-spacing: 0.2px;
  page-break-after: avoid;
  break-after: avoid;
}
/* Primul element dupa titlul sectiunii ramane cu el */
.section-heading + .nlist,
.section-heading + .alist,
.section-heading + p,
.section-heading + .ni,
.section-heading + .ai {
  page-break-before: avoid;
  break-before: avoid;
}
.section-heading .ltr {
  min-width: 22px;
  font-size: 12pt;
  font-weight: 800;
  color: #a8d4f0;
  flex-shrink: 0;
}
.section-heading .title { color: #fff; font-weight: 700; }

/* ===== PARAGRAF SIMPLU (text justify + alineat) ===== */
p.par {
  text-align: justify;
  text-indent: 1.2cm;
  margin-bottom: 5px;
  hyphens: auto;
}
p.par-no-indent {
  text-align: justify;
  margin-bottom: 5px;
  hyphens: auto;
}

/* ===== LISTA NUMEROTATA (1)(2)... ===== */
.nlist { margin: 3px 0; }
.ni {
  display: flex; gap: 0; margin-bottom: 4px;
  text-align: justify; hyphens: auto;
}
.ni .n { min-width: 32px; font-weight: 700; flex-shrink: 0; color: #000; }
.ni .c { flex: 1; text-align: justify; hyphens: auto; }

/* ===== LISTA LITERA a. b. c. ===== */
.alist { margin: 2px 0 2px 32px; }
.ai {
  display: flex; gap: 2px; margin-bottom: 3px;
  text-align: justify; hyphens: auto;
}
.ai .l { min-width: 20px; font-style: italic; flex-shrink: 0; }
.ai .c { flex: 1; text-align: justify; hyphens: auto; }

/* ===== BULLET LIST ===== */
.blist { margin: 2px 0 2px 48px; list-style: disc; }
.blist li { margin-bottom: 2px; text-align: justify; hyphens: auto; }

/* ===== SUBHEADING in lista ===== */
.sub-heading {
  font-weight: 700; margin: 6px 0 3px;
  text-align: left;
}

/* ===== SEMNATURA ===== */
.signatures {
  margin-top: 24px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  page-break-inside: avoid;
  break-inside: avoid;
  page-break-before: auto;
}
.sig-block {
  page-break-inside: avoid;
  break-inside: avoid;
}
.sig-block p { margin-bottom: 1px; }
.sig-block .role { font-weight: 700; }
.sig-right { text-align: right; }

/* ===== FISA POSTULUI ===== */
.fisa-header {
  text-align: center;
  margin: 14px 0 10px;
  line-height: 1.6;
}
.fisa-header p { font-weight: 700; font-size: 12pt; }
.fisa-header .sub { font-weight: 400; font-size: 11pt; }

/* ===== PRINT ===== */
@media print {
  body { background: #fff; }
  .app { display: block; height: auto; }
  .sidebar, .toolbar { display: none !important; }
  .doc-area { overflow: visible; background: none; padding: 0; }

  /* @page fara margini laterale - antetul ocupa toata latimea */
  @page {
    margin: 15mm 20mm 15mm 15mm;
    size: A4;
  }

  /* Documentul ocupa toata pagina */
  .document {
    box-shadow: none;
    margin: 0;
    padding: 0;
    width: 100%;
    page-break-after: always;
  }
  .document:last-child { page-break-after: avoid; }

  /* Antetul - aceleasi margini ca documentul */
  .antet-img-wrap {
    display: block;
    width: 100%;
    margin: 0;
  }
  .antet-img {
    width: 100%;
    display: block;
    margin-bottom: 8px;
  }

  /* @page margin:15mm gestioneaza toate marginile - doc-content fara padding extra */
  .doc-content {
    padding: 0;
  }

  /* Forteaza culorile la print */
  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  .section-heading {
    background: #1f4e79 !important;
    color: #fff !important;
  }
  .section-heading .ltr { color: #a8d4f0 !important; }
  .section-heading .title { color: #fff !important; }

  .placeholder { display: none; }
}
</style>
</head>

}

}
function sec(letter, title) {

}

function antet() {

}

}
