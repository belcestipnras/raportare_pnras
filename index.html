<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal PNRAS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="antet-container">
        <img src="antet_pnras.jpeg" alt="Antet PNRAS" class="imagine-antet">
    </div>

    <section class="hero-section">
    <h1>Platformă de raportare a activităților PNRAS</h1>
    <p class="motto">
        Fii unul dintre <span class="crai-acronim">C.R.A.I.</span>! 
        <br>
        <span class="crai-detaliu">(Creativitate, Reziliență, Adaptabilitate, Incluziune)</span>
    </p>
</section>

    <main class="menu-container">
    <button class="menu-card" onclick="location.href='activitati.html'">
        <div class="icon">📝</div>
        <span>Activități</span>
    </button>

    <button class="menu-card" onclick="verificaParola()">
        <div class="icon">⏱️</div>
        <span>Pontaj</span>
    </button>

    <button class="menu-card" onclick="verificaParolaMasa()">
        <div class="icon">🍲</div>
        <span>Masă caldă</span>
    </button>

    <button class="menu-card" onclick="verificaParolaOrar()">
        <div class="icon">📅</div>
        <span>Orar</span>
    </button>

    <button class="menu-card" onclick="verificaParolaBuget()">
        <div class="icon">💰</div>
        <span>Buget/Achiziții</span>
</button>

<button class="menu-card" onclick="verificaParolaMate()">
        <div class="icon">🧮</div>
        <span>MATE</span>
    </button>

<button class="menu-card" onclick="verificaParolaRegistru()">
    <div class="icon">📚</div>
    <span>Registru</span>
</button>

<button class="menu-card" onclick="verificaParolaGrafic()">
        <div class="icon">📊</div>
        <span>Grafic activități</span>
    </button>

<button class="menu-card" onclick="verificaParolaInventar()">
        <div class="icon">📦</div>
        <span>Inventar</span>
    </button>
</main>

    <script>
    function verificaParola() {
        const parolaIntrodusa = prompt("Introduceți parola pentru acces la secțiunea Pontaj:");
        if (parolaIntrodusa === "Pontaj123") {
            window.location.href = 'pontaj.html';
        } else if (parolaIntrodusa !== null) {
            alert("Parolă incorectă! Accesul a fost refuzat.");
        }
    }

    function verificaParolaMasa() {
        const parolaIntrodusaMasa = prompt("Introduceți parola pentru acces la secțiunea Masă caldă:");
        if (parolaIntrodusaMasa === "Masa123") {
            window.location.href = 'masa-calda.html';
        } else if (parolaIntrodusaMasa !== null) {
            alert("Parolă incorectă! Accesul a fost refuzat.");
        }
    }

    function verificaParolaOrar() {
        const parolaIntrodusaOrar = prompt("Introduceți parola pentru acces la secțiunea Orar:");
        if (parolaIntrodusaOrar === "Orar123") {
            window.location.href = 'orar_general.html';
        } else if (parolaIntrodusaOrar !== null) {
            alert("Parolă incorectă! Accesul a fost refuzat.");
        }
    }

function verificaParolaBuget() {
    const parolaIntrodusaBuget = prompt("Introduceți parola pentru acces la secțiunea Buget/Achiziții:");
    if (parolaIntrodusaBuget === "Buget123") { // Poți schimba parola aici
        window.location.href = 'buget_achizitii.html';
    } else if (parolaIntrodusaBuget !== null) {
        alert("Parolă incorectă! Accesul a fost refuzat.");
    }
}

function verificaParolaMate() {
    const parolaIntrodusaMate = prompt("Introduceți parola pentru secțiunea MATE:");
    if (parolaIntrodusaMate === "Mate123") { // Poți schimba parola aici
        window.location.href = 'mate.html';
    } else if (parolaIntrodusaMate !== null) {
        alert("Parolă incorectă! Accesul a fost refuzat.");
    }
}

function verificaParolaRegistru() {
    const parolaRegistru = prompt("Introduceți parola pentru acces la secțiunea Registru:");
    if (parolaRegistru === "Registru123") { // Poți schimba parola aici
        window.location.href = 'registru_vizualizare.html';
    } else if (parolaRegistru !== null) {
        alert("Parolă incorectă! Accesul a fost refuzat.");
    }
}

function verificaParolaInventar() {
    const parolaInventar = prompt("Introduceți parola pentru acces la secțiunea Inventar:");
    if (parolaInventar === "Inventar123") {
        window.location.href = 'registru_inventar.html';
    } else if (parolaInventar !== null) {
        alert("Parolă incorectă! Accesul a fost refuzat.");
    }
}

function verificaParolaGrafic() {
    const parolaGrafic = prompt("Introduceți parola pentru acces la Grafic activități:");
    if (parolaGrafic === "Grafic123") {
        window.location.href = 'grafic_activitati.html';
    } else if (parolaGrafic !== null) {
        alert("Parolă incorectă! Accesul a fost refuzat.");
    }
}
</script>

</body>
</html>
