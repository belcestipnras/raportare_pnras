        .a4-page { width: 210mm; min-height: 297mm; margin: 20px auto; background: white; padding: 1.5cm; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative; border: 1pt solid #eee; }

        .info-grid { border: 1pt solid #000; display: grid; grid-template-columns: 1fr; margin-bottom: 15px; }
        .info-row { display: grid; grid-template-columns: 420px 1fr; border-bottom: 0.5pt solid #000; }
        .info-row:last-child { border-bottom: none; }
        .info-label { padding: 6px 8px; font-weight: 700; background: #fafafa; border-right: 0.5pt solid #000; font-size: 8.5pt; }
        .info-value { padding: 6px 8px; font-weight: 800; font-size: 9pt; }

        .checkbox-sim { width: 10pt; height: 10pt; border: 1pt solid #000; display: inline-block; vertical-align: middle; margin-right: 5px; position: relative; }
        .checked::after { content: 'X'; position: absolute; top: -4px; left: 1px; font-size: 10pt; font-weight: 800; }

/* Stiluri pentru Secțiunea Scor de Risc */

        .progress-bar { 
            height: 100%;

            print-color-adjust: exact !important;

        .status-badge { 
            display: inline-block; 
            padding: 4px 12px; 
            border-radius: 4px; 
            color: white !important; 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 9pt; 
            margin-top: 10px;
            /* Forțează afișarea culorii fundalului la printare */
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;

        .risc-mediu { background-color: #ca8a04; }  /* Galben/Mustar */
        .risc-ridicat { background-color: #dc2626; } /* Rosu */

.signature-footer {
            margin-top: 40px;

            flex-direction: column;
            align-items: center;

            margin-top: 30px;

            border-bottom: 1px solid #000;

</style>
</head>

const _db = supabase.createClient(supabaseUrl, supabaseKey);
const params = new URLSearchParams(window.location.search);
const config = {
    clasa: params.get('clasa'),
    an: params.get('an')
};

let dateleCurente = [];
let anSelectat = 2026;
let clasaActiva = "";

async function incarcaDatele() {
    dateleCurente = []; 
    document.getElementById('container-fise').innerHTML = "<div style='text-align:center; padding:50px;'>Se încarcă datele...</div>";
    
    const { data, error } = await _db
        .from('mate_pnras')
        .select('*')
        .eq('anul', parseInt(anSelectat));

    if (error) { console.error(error); return; }

    // Filtru: cel puțin un DA în fo_* SAU are nr_dosar completat
    dateleCurente = (data || []).filter(elev => {
        const areDA = ['fo_frecventa','fo_rezultate','fo_repetent_1','fo_repetent_m','fo_sanctionat']
            .some(camp => (elev[camp] || '').toString().toUpperCase().trim() === 'DA');
        const areDosar = elev.nr_dosar && elev.nr_dosar.trim() !== '' && elev.nr_dosar.trim() !== '---';
        return areDA || areDosar;
    });
    renderTabs();
    
    if (dateleCurente.length > 0) {
        const primaClasa = clasaActiva || [...new Set(dateleCurente.map(e => e.clasa))].sort()[0];
        clasaActiva = primaClasa;
        renderTabs();
        renderFise(dateleCurente.filter(e => e.clasa === primaClasa));
    } else {
        document.getElementById('container-fise').innerHTML = "Niciun elev găsit.";
    }
}

function renderTabs() {
    const container = document.getElementById('selector-clase');
    container.innerHTML = "";
    const claseUnice = [...new Set(dateleCurente.map(e => e.clasa))].sort();
    
    claseUnice.forEach(clasa => {
        const btn = document.createElement('button');
        btn.className = `btn-tab ${clasa === clasaActiva ? 'active' : ''}`;
        btn.innerText = `Clasa ${clasa}`;
        btn.onclick = () => { 
            clasaActiva = clasa; 
            renderTabs(); 
            renderFise(dateleCurente.filter(e => e.clasa === clasa)); 
        };
        container.appendChild(btn);
    });
}

function renderFise(elevi) {
    const container = document.getElementById('container-fise');
    container.innerHTML = "";

            isF = sCnp[0] === '6' || sCnp[0] === '2';
            const prefixAn = (sCnp[0] === '5' || sCnp[0] === '6') ? 2000 : 1900;
            const an = parseInt(sCnp.substring(1, 3)) + prefixAn;
            const dataN = new Date(an, parseInt(sCnp.substring(3, 5)) - 1, parseInt(sCnp.substring(5, 7)));
            const azi = new Date();
            varsta = azi.getFullYear() - dataN.getFullYear();
            if (azi.getMonth() < dataN.getMonth() || (azi.getMonth() === dataN.getMonth() && azi.getDate() < dataN.getDate())) varsta--;

            p13: "are dizabilităţi sau CES",
            p14: "are dificultăţi de învăţare",
            p15: "a fost plecat din localitate peste 3 luni",

            p17: "este căsătorit(ă) sau are copii",

            p19: "se confruntă cu discriminare sau izolare",

            p21: "există alte cauze şcolare identificate",
            p22: "locuieşte într-o zonă marginalizată",
            p23: "naveta spre şcoală este dificilă"
        };

        let identificatoriDA = [];
        let descrieriProbleme = [];

        Object.keys(mesajeRisc).forEach(p => {
            if ((e[p] || '').toString().toUpperCase() === 'DA') {
                identificatoriDA.push(p);
                descrieriProbleme.push(mesajeRisc[p]);

        let textObservatii = "";

            statusText = "Risc Ridicat";

async function completeazaToateObservatiileAI() {
    // 1. Definim dicționarul de cuvinte cheie pe care AI-ul trebuie să le folosească
    const dictionarSemnificatii = {
        p8: "dificultăți financiare și condiții de locuit precare",
        p9: "proveniența dintr-o familie monoparentală sau cu părinți plecați la muncă",
        p10: "lipsa de implicare sau atitudinea pasivă a părinților față de educație",
        p11: "existența unor frați care au abandonat deja studiile",
        p12: "lipsa unui spațiu de studiu și a resurselor materiale de bază",
        p13: "prezența unor dizabilități sau cerințe educaționale speciale (CES)",
        p14: "dificultăți de învățare nediagnosticate oficial",
        p15: "istoric de absenteism cauzat de plecări prelungite din localitate",
        p16: "izolarea cauzată de locuirea în gazdă sau la internat",
        p17: "responsabilități familiale precoce (căsătorie sau îngrijirea propriilor copii)",
        p18: "lipsa de motivație, aspirații scăzute și dezinteres față de școală",
        p19: "sentimente de izolare socială sau discriminare în mediul școlar",
        p20: "implicarea în conflicte sau acte de violență școlară",
        p21: "alte probleme de natură școlară identificate",
        p22: "locuirea într-o zonă marginalizată sau comunitate defavorizată",
        p23: "naveta dificilă care afectează frecvența școlară"
    };

    const fiseElemente = document.querySelectorAll('.a4-page');
    const eleviDeProcesat = dateleCurente.filter(e => e.clasa === clasaActiva).sort((a,b) => a.nume_elev.localeCompare(b.nume_elev));
    
    if (!confirm(`Generăm automat observații logice pentru ${eleviDeProcesat.length} elevi?`)) return;

    for (let i = 0; i < eleviDeProcesat.length; i++) {
        const elev = eleviDeProcesat[i];
        const boxObservatii = document.getElementById(`obs-text-${elev.id}`);
        
        if (!boxObservatii) continue;
        boxObservatii.innerHTML = "<em>🤖 Se compune textul logic... (" + (i+1) + "/" + eleviDeProcesat.length + ")</em>";

        // Extragem doar cuvintele din dicționar pentru bifele de "DA"
        const factoriIdentificati = Object.keys(dictionarSemnificatii)
            .filter(p => (elev[p] || '').toString().toUpperCase() === 'DA')
            .map(p => dictionarSemnificatii[p])
            .join(', ');

        if (!factoriIdentificati) {
            boxObservatii.innerHTML = "Nu au fost identificați factori de risc specifici în secțiunile p8-p23.";
            continue;
        }

        const promptCompus = `
            Ești expert psihopedagog. Analizează următorii factori de risc identificați pentru elevul ${elev.nume_elev}: ${factoriIdentificati}.
            
            Sarcina ta:
            Creează un text logic și cursiv de 3-4 fraze care să descrie situația elevului. 
            NU folosi expresii de tipul "Are DA la..." sau "Indicatorul p...". 
            Folosește direct cuvintele extrase din descrieri pentru a construi o interpretare profesională. 
            Textul trebuie să sune ca o observație oficială într-un dosar educațional.
            Nu folosi introduceri, scrie direct textul observației.
        `;

        try {
            const response = await fetch(`${supabaseUrl}/functions/v1/chatgpt-pnras`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': `Bearer ${supabaseKey}` 
                },
                body: JSON.stringify({ prompt: promptCompus })
            });

            const data = await response.json();
            const textFinal = data.reply || (data.choices && data.choices[0].message.content) || "Eroare la procesare.";

            boxObservatii.innerHTML = textFinal;
            
            // Salvare în coloana dedicată din Supabase
            await _db.from('mate_pnras').update({ observatii_evaluare: textFinal }).eq('id', elev.id);

            // Pauză mică pentru stabilitate
            await new Promise(r => setTimeout(r, 1100));

        } catch (err) {
            console.error(err);
            boxObservatii.innerHTML = "⚠️ Eroare la comunicarea cu AI-ul.";
        }
    }
    alert("✅ Toate observațiile au fost compuse!");
}

async function updateCampEvaluare(id, coloana, valoare, selectEl) {
    // 1. Salvează în datele locale imediat
    const elevLocal = dateleCurente.find(el => el.id === id);
    if (elevLocal) elevLocal[coloana] = valoare;

    // 2. Recalculează scorul de risc live pe fișa elevului
    const fisa = selectEl.closest('.a4-page');
    if (fisa && elevLocal) {
        const isDA = (v) => (v || '').toString().toUpperCase() === 'DA';
        const puncteA = ['p8','p9','p10','p11','p12'].filter(p => isDA(elevLocal[p])).length;
        const puncteB = ['p13','p14','p15','p16','p17','p18'].filter(p => isDA(elevLocal[p])).length;
        const puncteC = ['p19','p20','p21'].filter(p => isDA(elevLocal[p])).length;
        const puncteD = ['p22','p23'].filter(p => isDA(elevLocal[p])).length;
        const totalDA = puncteA + puncteB + puncteC + puncteD;
        const procentRisc = Math.round((totalDA / 16) * 100);

        // Actualizează scorurile afișate
        const scoruri = fisa.querySelectorAll('.risk-score');
        if (scoruri[0]) scoruri[0].textContent = puncteA + ' / 5';
        if (scoruri[1]) scoruri[1].textContent = puncteB + ' / 6';
        if (scoruri[2]) scoruri[2].textContent = puncteC + ' / 3';
        if (scoruri[3]) scoruri[3].textContent = puncteD + ' / 2';

        // Actualizează scorul total și bara
        const scorTotal = fisa.querySelector('.risk-label:last-of-type') || 
                          [...fisa.querySelectorAll('.risk-label')].find(el => el.textContent.includes('SCOR TOTAL'));
        if (scorTotal) scorTotal.textContent = 'SCOR TOTAL DE RISC: ' + procentRisc + '%';

        const bar = fisa.querySelector('.progress-bar');
        if (bar) bar.style.width = procentRisc + '%';

        // Actualizează badge-ul de status
        const badge = fisa.querySelector('.status-badge');
        if (badge) {
            badge.classList.remove('risc-scazut','risc-mediu','risc-ridicat');
            if (procentRisc > 25) { badge.classList.add('risc-ridicat'); badge.textContent = 'Risc Ridicat'; }
            else if (procentRisc >= 10) { badge.classList.add('risc-mediu'); badge.textContent = 'Risc Mediu'; }
            else { badge.classList.add('risc-scazut'); badge.textContent = 'Risc Scăzut'; }
        }
    }

    // 3. Salvează în Supabase (silent, fără alert)
    try {
        const { error } = await _db
            .from('mate_pnras')
            .update({ [coloana]: valoare })
            .eq('id', id);
        if (error) throw error;
        // Feedback vizual subtil pe select
        selectEl.style.borderBottomColor = '#16a34a';
        setTimeout(() => selectEl.style.borderBottomColor = '', 1500);
    } catch(err) {
        console.error('Eroare salvare ' + coloana + ':', err.message);
        selectEl.style.borderBottomColor = '#dc2626';
    }
}

        // 1. Salvarea efectivă în Cloud
        const { error } = await _db
            .from('mate_pnras')
            .update({ [coloana]: valoare })
            .eq('id', id);

        if (error) throw error;

        // 2. Actualizarea datelor locale (ca să nu dispară la refresh)
        const elevLocal = dateleCurente.find(el => el.id === id);
        if (elevLocal) elevLocal[coloana] = valoare;

        // 3. Logica de numerotare automată pentru TOATĂ clasa
        if (coloana === 'nr_inregistrare' && valoare.includes('/')) {
            const parti = valoare.split('/');
            if (parti.length >= 4) {
                const nrBaza = parti[0];
                const clasa = parti[1];
                const an = parti[3];

                const inputs = document.querySelectorAll('.input-nr-inreg');
                inputs.forEach(async (input, idx) => {
                    const idElev = input.getAttribute('data-id');
                    if (idElev && idElev != id) {
                        const noulNr = `${nrBaza}/${clasa}/${idx + 1}/${an}`;
                        input.value = noulNr;
                        // Salvăm silențios pentru restul clasei
                        await _db.from('mate_pnras').update({ nr_inregistrare: noulNr }).eq('id', idElev);
                    }
                });
            }
        }
        console.log(`✅ ${coloana} salvat cu succes!`);
    } catch (err) {
        console.error("❌ EROARE SUPABASE:", err.message);
        alert("Atenție: Datele NU s-au salvat! Eroare: " + err.message);
    }
}

async function genereazaAI_individual(elevId, btn) {
    const elev = dateleCurente.find(el => el.id === elevId);
    if (!elev) return;

    const boxObservatii = document.getElementById('obs-text-' + elevId);
    if (!boxObservatii) return;

    const dictionarSemnificatii = {
        p8: "dificultăți financiare și condiții de locuit precare",
        p9: "proveniența dintr-o familie monoparentală sau cu părinți plecați la muncă",
        p10: "lipsa de implicare sau atitudinea pasivă a părinților față de educație",
        p11: "existența unor frați care au abandonat deja studiile",
        p12: "lipsa unui spațiu de studiu și a resurselor materiale de bază",
        p13: "prezența unor dizabilități sau cerințe educaționale speciale (CES)",
        p14: "dificultăți de învățare nediagnosticate oficial",
        p15: "istoric de absenteism cauzat de plecări prelungite din localitate",
        p16: "izolarea cauzată de locuirea în gazdă sau la internat",
        p17: "responsabilități familiale precoce (căsătorie sau îngrijirea propriilor copii)",
        p18: "lipsa de motivație, aspirații scăzute și dezinteres față de școală",
        p19: "sentimente de izolare socială sau discriminare în mediul școlar",
        p20: "implicarea în conflicte sau acte de violență școlară",
        p21: "alte probleme de natură școlară identificate",
        p22: "locuirea într-o zonă marginalizată sau comunitate defavorizată",
        p23: "naveta dificilă care afectează frecvența școlară"
    };

    const factoriIdentificati = Object.keys(dictionarSemnificatii)
        .filter(p => (elev[p] || '').toString().toUpperCase() === 'DA')
        .map(p => dictionarSemnificatii[p])
        .join(', ');

    const textOriginal = boxObservatii.innerHTML;
    btn.disabled = true;
    btn.textContent = '⏳ Se generează...';
    boxObservatii.innerHTML = '<em style="color:#8b5cf6;">🤖 Se compune observația...</em>';

    const promptCompus = factoriIdentificati
        ? `Ești expert psihopedagog. Analizează următorii factori de risc identificați pentru elevul ${elev.nume_elev}: ${factoriIdentificati}.
Creează un text logic și cursiv de 3-4 fraze care să descrie situația elevului.
NU folosi expresii de tipul "Are DA la..." sau "Indicatorul p...".
Folosește direct cuvintele extrase din descrieri pentru a construi o interpretare profesională.
Textul trebuie să sune ca o observație oficială într-un dosar educațional.
Nu folosi introduceri, scrie direct textul observației.`
        : `Elevul ${elev.nume_elev} nu prezintă indicatori de risc majori în secțiunile p8-p23. Redactează o frază scurtă oficială în acest sens.`;

    try {
        const response = await fetch(`${supabaseUrl}/functions/v1/chatgpt-pnras`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${supabaseKey}`
            },
            body: JSON.stringify({ prompt: promptCompus })
        });
        const data = await response.json();
        const textFinal = data.reply || (data.choices && data.choices[0].message.content) || 'Eroare la procesare.';
        boxObservatii.innerHTML = textFinal;
        await _db.from('mate_pnras').update({ observatii_evaluare: textFinal }).eq('id', elevId);
    } catch(err) {
        console.error(err);
        boxObservatii.innerHTML = textOriginal;
        alert('⚠️ Eroare la AI: ' + err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '✨ Generează AI';
    }
}

function navigheazaLaRaport() {
    if (!clasaActiva) {
        alert("Te rugăm să selectezi o clasă mai întâi.");
        return;
    }
    
    // Construim URL-ul cu parametrii necesari
    const url = `raport_evaluare.html?clasa=${clasaActiva}&an=${anSelectat}&expert=${encodeURIComponent(config.expert)}`;
    
    // Deschidem raportul într-un tab nou
    window.open(url, '_blank');
}
