// pt PDF (pdf-lib standard fonts) – normalizam doar textul din PDF
function roPDF(t){
  if(!t) return "";
  return String(t)
    .replace(/ă/g,"a").replace(/Ă/g,"A")
    .replace(/â/g,"a").replace(/Â/g,"A")
    .replace(/î/g,"i").replace(/Î/g,"I")
    .replace(/ș/g,"s").replace(/Ș/g,"S")
    .replace(/ț/g,"t").replace(/Ț/g,"T");
}

// sanitize pentru nume fisier in storage (evita probleme cu caractere speciale)
function safeName(name){
  return roPDF(name)
    .replace(/[^\w.\- ]+/g, "")     // scoate simboluri dubioase
    .replace(/\s+/g, "_")           // spatii -> _
    .replace(/_+/g, "_")
    .slice(0, 140);
}

// ia path-ul din link public: .../storage/v1/object/public/contracte/<PATH>
function storagePathFromPublicUrl(url){
  try{
    const marker = "/storage/v1/object/public/contracte/";
    const idx = url.indexOf(marker);
    if(idx === -1) return null;
    const encodedPath = url.substring(idx + marker.length);
    return decodeURIComponent(encodedPath);
  }catch(e){
    return null;
  }
}

// Funcție separată pentru aplicare ștampilă aleatorie
function aplicaStampila(pagina, imaginiStampile) {
  if (!imaginiStampile || imaginiStampile.length === 0) return;
  
  const { width: pWidth, height: pHeight } = pagina.getSize();
  const indexAleator = Math.floor(Math.random() * imaginiStampile.length);
  const stampilaSelectata = imaginiStampile[indexAleator];

  // 1. Calculăm proporția originală a imaginii (Lățime / Înălțime)
  const raportOriginal = stampilaSelectata.width / stampilaSelectata.height;

  // 2. Stabilim lățimea de bază dorită (52mm + margine pentru semnătura care iese în afară)
  // Folosim un factor de scalare pentru a compensa spațiul gol din PNG-urile tale
  const latimeBazaPuncte = 52 * 2.834 * 1.32; 

  // 3. Calculăm înălțimea DINAMICĂ pentru a NU deforma imaginea
  const latimeFinala = latimeBazaPuncte;
  const inaltimeFinala = latimeFinala / raportOriginal;

  // 4. Desenăm imaginea respectând proporțiile ei naturale
  pagina.drawImage(stampilaSelectata, {
    x: pWidth - latimeFinala - 15, 
    y: pHeight - inaltimeFinala - 15, 
    width: latimeFinala,     
    height: inaltimeFinala,     
    opacity: 0.9
  });
}

      totalOk++;
    } else if(obligatorii.includes(doc)){

      textColor = "#334155";

      culoare = "#fef9c3";          // galben soft

    }

    container.innerHTML += `

function safeName(name){
return name
.normalize("NFD").replace(/[\u0300-\u036f]/g,"") // scoate diacritice
.replace(/[^a-zA-Z0-9.\-_]/g,"_") // doar litere sigure
.replace(/_+/g,"_");
}

document.getElementById("fileInput").addEventListener("change", async function(){

  for(const file of files){

    const fileName = `${contractId}_${Date.now()}_${safe}`;

    if(up.error){
      alert("Eroare upload: " + up.error.message);
      this.value = "";
      return;
    }

    const { data:linkData } = supabaseClient.storage.from("contracte").getPublicUrl(fileName);

    const ins = await supabaseClient.from("documente_contract").insert([{
      contract_id: contractId,
      nume_contract: nume || "",
      furnizor: furn || "",
      tip_document: tipSelectat,
      nume_fisier: file.name,
      link_drive: linkData.publicUrl

/* ===================== DELETE ===================== */
async function stergeDoc(id, link){
  if(!confirm("Ștergi documentul?")) return;

  try{

    // ===== sterge fisier din storage =====
    if(link){
      const url = new URL(link);
      let path = url.pathname.split("/object/public/contracte/")[1];

      if(path){
        path = decodeURIComponent(path);

        await supabaseClient
          .storage
          .from("contracte")
          .remove([path]);
      }
    }

    // ===== sterge din tabel =====
    await supabaseClient
      .from("documente_contract")
      .delete()
      .eq("id", id);

    incarcaDocumente();

  }catch(e){
    alert("Eroare la ștergere");
    console.log(e);
  }
}

  // Forțăm 3.1 să devină 4 (Bold) așa cum ai cerut anterior
  if(textDeAfisat.startsWith("3.1.")) {
    textDeAfisat = textDeAfisat.replace("3.1.", "4.");
  }

  // --- FILTRU STRICT: Dacă nu începe cu cifră și nu e excepția "Fotografii", sărim peste ---
  const incepeCuCifra = /^\d/.test(textDeAfisat);
  const esteFoto = doc.tip_document.toLowerCase().includes("fotografii");
  
  if (!incepeCuCifra && !esteFoto) continue;

  // --- EXCEPȚIE FOTOGRAFII ---
  if (esteFoto) {
    if (!fotografiiProcesate) {
      pageOpis.drawText(roPDF("15. Fotografii"), { x: 95, y: y, size: 9, font: fontOpisBold });
      y -= 18; randIndex++;
      fotografiiProcesate = true;
    }
    continue;
  }

  // --- ANTET CATEGORIE 5 (OFERTA) ---
  if(doc.tip_document.startsWith("5") && !ofertaAntetScris) {
    pageOpis.drawText(roPDF("5. Oferta"), { x: 95, y: y, size: 9, font: fontOpisBold });
    y -= 18; randIndex++;
    ofertaAntetScris = true;
  }

  // Renumerotare specifică: 3.1 devine 4 (Bold)
  if(textDeAfisat.startsWith("3.1.")) {
    textDeAfisat = textDeAfisat.replace("3.1.", "4.");
  }

  // --- STABILIRE BOLD ȘI INDENTARE (CHIRURGICAL) ---
const matchNumere = textDeAfisat.match(/^(\d+(\.\d+)*)/);
let indent = 0;
let fontRand = fontOpis; 

if (matchNumere) {
  // Curățăm prefixul: eliminăm punctul final dacă există, apoi spargem în segmente
  const prefixCurat = matchNumere[0].replace(/\.$/, "");
  const segmente = prefixCurat.split('.');
  const nivel = segmente.length;

  if (nivel === 1 || textDeAfisat.startsWith("4.")) {
    // Nivel 1: "5." -> BOLD
    fontRand = fontOpisBold;
    indent = 0;
  } 
  else if (nivel === 2) {
    // Nivel 2: "5.1" -> BOLD + ITALIC
    fontRand = fontOpisBoldItalic;
    indent = 20;
  } 
  else if (nivel >= 3) {
    // Nivel 3: "5.1.1" -> ITALIC
    fontRand = fontOpisItalic;
    indent = 40;
  }
}

// 2. Fundal alternat (Rămâne neschimbat)
if(randIndex % 2 === 1) { 
  pageOpis.drawRectangle({ x: 85, y: y - 4, width: 425, height: 16, color: PDFLib.rgb(0.97, 0.97, 0.98) });
}

// 3. Scriere Text cu indentarea nouă
pageOpis.drawText(roPDF(textDeAfisat), { 
  x: 95 + indent, 
  y: y, 
  size: 8.5, 
  font: fontRand 
});

  // --- AFIȘARE NR. ÎNREGISTRARE ȘI DATĂ ---
  let dataF = "-";
  if(doc.data_inregistrare) {
      const p = doc.data_inregistrare.split("-");
      if(p.length === 3) dataF = `${p[2]}.${p[1]}.${p[0]}`;
  }
  const nrInreg = doc.nr_inregistrare || "-";
  pageOpis.drawText(roPDF(`${nrInreg} / ${dataF}`), { x: 400, y: y, size: 9, font: fontOpisBold });

  y -= 18; 
  randIndex++;
  if (y < 40) break; 
}

const opisPages = await pdfFinal.copyPages(opisDoc, opisDoc.getPageIndices());
opisPages.forEach(p => pdfFinal.addPage(p));

  // foi + documente
  for(const tip of ordine){
    // separator
    // Filtrăm documentele de acest tip
const list = docs.filter(d => d.tip_document === tip);

// DACĂ NU EXISTĂ DOCUMENTE, SĂRIM PESTE TOT (Nu punem nici separator, nici pagină lipsă)
if(!list.length) continue;

// DACĂ EXISTĂ, adăugăm mai întâi pagina separator (foaia de gardă)
let page = pdfFinal.addPage([595,842]);
page.drawText(roPDF(tip.toUpperCase()), {x:80,y:420,size:22,font:bold});

    for(const d of list){
      // bytes stabil din storage (evita 400 la caractere speciale)
      let bytes;

try{
  bytes = await downloadBytesFromStoragePublicUrl(d.link_drive);
}catch(e){

  const errPage = pdfFinal.addPage([595,842]);
  errPage.drawText("EROARE FISIER:", {x:80,y:500,size:18,font:bold,color:rgb(0.8,0,0)});
  errPage.drawText(roPDF(d.nume_fisier || "necunoscut"), {x:80,y:470,size:14,font});

  continue; // trece la urmatorul document
}

      // PDF
      // PDF + ȘTAMPILĂ (Varianta corectă)
if((d.link_drive || "").toLowerCase().includes(".pdf")){
        const src = await PDFDocument.load(bytes);
        const sourcePages = await pdfFinal.copyPages(src, src.getPageIndices());
        for (const p of sourcePages) {
  if (vreaStampila) aplicaStampila(p, imaginiStampile); // Doar dacă s-a ales OK
  pdfFinal.addPage(p);
}
        continue;
      }

      // imagine
      let img;
      if((d.link_drive || "").toLowerCase().includes(".png")) img = await pdfFinal.embedPng(bytes);
      else img = await pdfFinal.embedJpg(bytes);

      const p = pdfFinal.addPage([595,842]);
      const scale = Math.min(500/img.width, 700/img.height);
      const w = img.width * scale;
      const h = img.height * scale;
      p.drawImage(img, {x:(595-w)/2, y:(842-h)/2, width:w, height:h});
if (vreaStampila) aplicaStampila(p, imaginiStampile); // Doar dacă s-a ales OK
    }
  }

  // save local
  const pdfBytes = await pdfFinal.save();
  const blob = new Blob([pdfBytes], {type:"application/pdf"});

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `Dosar_achizitie_${contractId}.pdf`;
  a.click();

  // upload in storage + insert in tabel
  const fileName = `DOSAR_${contractId}_${Date.now()}.pdf`;

  const up = await supabaseClient
  .storage
  .from("contracte")
  .upload(fileName, blob, { upsert: true, cacheControl: "0" });
  if(up.error){
    alert("PDF generat, dar nu s-a putut urca in storage: " + up.error.message);
    return;
  }

  const { data:urlData } = supabaseClient.storage.from("contracte").getPublicUrl(fileName);

  // sterge vechea inregistrare dosar
await supabaseClient
.from("documente_contract")
.delete()
.eq("contract_id", contractId)
.eq("tip_document","DOSAR ACHIZIȚIE PDF");

// insereaza noul dosar
await supabaseClient.from("documente_contract").insert([{
  contract_id: contractId,
  nume_contract: nume || "",
  furnizor: furn || "",
  tip_document: "DOSAR ACHIZIȚIE PDF",
  nume_fisier: fileName,
  link_drive: urlData.publicUrl
}]);

  alert("DOSAR GENERAT ✔");
  incarcaDocumente();
}

/* ===================== START ===================== */
window.addEventListener("load", () => {
  if(!contractId){
    alert("Lipsește id în URL (dosar_contract.html?id=...)");
    return;
  }
  incarcaDocumente();
});
</script>
