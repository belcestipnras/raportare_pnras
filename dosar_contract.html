// pt PDF (pdf-lib standard fonts) – normalizam doar textul din PDF
function roPDF(t){
  if(!t) return "";
  return String(t)
    .replace(/ă/g,"a").replace(/Ă/g,"A")
    .replace(/â/g,"a").replace(/Â/g,"A")
    .replace(/î/g,"i").replace(/Î/g,"I")
    .replace(/ș/g,"s").replace(/Ș/g,"S")
    .replace(/ț/g,"t").replace(/Ț/g,"T");
}

// sanitize pentru nume fisier in storage (evita probleme cu caractere speciale)
function safeName(name){
  return roPDF(name)
    .replace(/[^\w.\- ]+/g, "")     // scoate simboluri dubioase
    .replace(/\s+/g, "_")           // spatii -> _
    .replace(/_+/g, "_")
    .slice(0, 140);
}

// ia path-ul din link public: .../storage/v1/object/public/contracte/<PATH>
function storagePathFromPublicUrl(url){
  try{
    const marker = "/storage/v1/object/public/contracte/";
    const idx = url.indexOf(marker);
    if(idx === -1) return null;
    const encodedPath = url.substring(idx + marker.length);
    return decodeURIComponent(encodedPath);
  }catch(e){
    return null;
  }
}

// Funcție separată pentru aplicare ștampilă aleatorie
function aplicaStampila(pagina, imaginiStampile) {
  if (!imaginiStampile || imaginiStampile.length === 0) return;
  
  const { width: pWidth, height: pHeight } = pagina.getSize();
  const indexAleator = Math.floor(Math.random() * imaginiStampile.length);
  const stampilaSelectata = imaginiStampile[indexAleator];

  // 1. Calculăm proporția originală a imaginii (Lățime / Înălțime)
  const raportOriginal = stampilaSelectata.width / stampilaSelectata.height;

  // 2. Stabilim lățimea de bază dorită (52mm + margine pentru semnătura care iese în afară)
  // Folosim un factor de scalare pentru a compensa spațiul gol din PNG-urile tale
  const latimeBazaPuncte = 52 * 2.834 * 1.32; 

  // 3. Calculăm înălțimea DINAMICĂ pentru a NU deforma imaginea
  const latimeFinala = latimeBazaPuncte;
  const inaltimeFinala = latimeFinala / raportOriginal;

  // 4. Desenăm imaginea respectând proporțiile ei naturale
  pagina.drawImage(stampilaSelectata, {
    x: pWidth - latimeFinala - 15, 
    y: pHeight - inaltimeFinala - 15, 
    width: latimeFinala,     
    height: inaltimeFinala,     
    opacity: 0.9
  });
}

async function downloadBytesFromStoragePublicUrl(publicUrl){

try{

const url = new URL(publicUrl);
let path = url.pathname.split("/object/public/contracte/")[1];

if(!path){
throw "Path invalid";
}

path = decodeURIComponent(path);

const { data, error } = await supabaseClient
.storage
.from("contracte")
.download(path);

if(error){
console.log("DOWNLOAD ERROR:", error);
throw error;
}

const ab = await data.arrayBuffer();
return new Uint8Array(ab);

}catch(e){
alert("Eroare citire fisier din storage. Redenumeste PDF fara diacritice.");
throw e;
}
}

/* ===================== LOAD + RENDER ===================== */
function getListaDefault() {
  // Detectam tipul dupa denumirea contractului
  const denLower = (contractNumeFull || "").toLowerCase();

  if (denLower.includes("stat de plat")) {
    // Extragem luna si anul din denumire (ex: "iulie 2024")
    const luni = {
      "ianuarie":1,"februarie":2,"martie":3,"aprilie":4,"mai":5,"iunie":6,
      "iulie":7,"august":8,"septembrie":9,"octombrie":10,"noiembrie":11,"decembrie":12
    };
    const luniNume = ["Ianuarie","Februarie","Martie","Aprilie","Mai","Iunie",
                      "Iulie","August","Septembrie","Octombrie","Noiembrie","Decembrie"];

    let lunaGasita = "";
    let anGasit = "";

    const denOrig = contractNumeFull || "";

    // Cauta luna in denumire
    for (const [luna, nr] of Object.entries(luni)) {
      if (denOrig.toLowerCase().includes(luna)) {
        lunaGasita = luniNume[nr - 1];
        break;
      }
    }

    // Cauta anul (4 cifre)
    const matchAn = denOrig.match(/(20\d{2})/);
    if (matchAn) anGasit = matchAn[1];

    if (lunaGasita && anGasit) {
      return [`Stat de plată ${lunaGasita} ${anGasit}`];
    } else if (lunaGasita) {
      return [`Stat de plată ${lunaGasita}`];
    } else {
      return ["Stat de plată"];
    }
  }

  // Default: dosar achizitie
  return listaDocumente_DEFAULT;
}

const manualDoc = data.find(d => d.dosar_complet_manual === true);
if(manualDoc) completManual = true;

document.getElementById("bifaComplet").checked = completManual;

        const numeFisierEscaped = (doc.nume_fisier || "").replace(/'/g, "\\'").replace(/"/g, "&quot;");
        html += `

            <td>

                <button class="btn small" onclick="stergeDoc('${doc.id}','${doc.link_drive}')" title="Șterge documentul" style="background:#fee2e2;color:#dc2626;border-color:#fca5a5;">🗑️ Șterge</button>
              </div>
            </td>

    });

  // 4) cartonase

      const sub = ["5. Ofertă","5.1 CIF","5.2 Certificat constatator","5.3 Declarație beneficiar real","5.4 Declarație art. 164/165/167"];
      ok = sub.every(s => existente.includes(s));

    let culoare = "#f1f5f9";

    } else if(obligatorii.includes(doc)){

    } else {

    }

    const docIdx = listaDocumente.indexOf(doc);

    const wrapper = document.createElement("div");
    wrapper.id = `cartonas_${docIdx}`;
    wrapper.style.cssText = `position:relative;padding:10px 10px 8px 10px;border-radius:12px;background:${culoare};color:${textColor};border:1px solid #e2e8f0;box-shadow:0 1px 2px rgba(0,0,0,0.05);font-size:13px;text-align:center;font-weight:600;`;

    // Titlu - click = upload

    wrapper.appendChild(titluDiv);

    // Buton stergere

  }
}

function safeName(name){
return name
.normalize("NFD").replace(/[\u0300-\u036f]/g,"") // scoate diacritice
.replace(/[^a-zA-Z0-9.\-_]/g,"_") // doar litere sigure
.replace(/_+/g,"_");
}

/* ===================== UPLOAD - ADAUGA DOCUMENT (fara stergere) ===================== */
let tipAdauga = "";

function adaugaDocumentLaTip(btn) {
  tipAdauga = btn.getAttribute("data-tip");
  document.getElementById("fileInputAdauga").click();
}

document.getElementById("fileInputAdauga").addEventListener("change", async function(){
  const files = this.files;
  if(!files.length) return;

  for(const file of files){
    const safe = safeName(file.name);
    const fileName = `${contractId}_${Date.now()}_${safe}`;

    const up = await supabaseClient.storage.from("contracte").upload(fileName, file, { upsert:false });
    if(up.error){
      alert("Eroare upload: " + up.error.message);
      this.value = "";
      return;
    }

    const { data:linkData } = supabaseClient.storage.from("contracte").getPublicUrl(fileName);

    const ins = await supabaseClient.from("documente_contract").insert([{
      contract_id: contractId,
      nume_contract: nume || "",
      furnizor: furn || "",
      tip_document: tipAdauga,
      nume_fisier: file.name,
      link_drive: linkData.publicUrl
    }]);

    if(ins.error){
      alert("Eroare salvare în tabel: " + ins.error.message);
      this.value = "";
      return;
    }
  }

  this.value = "";
  incarcaDocumente();
});

function selecteazaTip(tip){

document.getElementById("fileInput").addEventListener("change", async function(){
  const files = this.files;
  if(!files.length) return;

  for(const file of files){
    // sterge documentele vechi de acelasi tip din storage + tabel
    const { data: vechi } = await supabaseClient
      .from("documente_contract")
      .select("id, link_drive")
      .eq("contract_id", contractId)
      .eq("tip_document", tipSelectat);

    if (vechi && vechi.length) {
      const paths = vechi
        .filter(d => d.link_drive)
        .map(d => {
          try {
            const url = new URL(d.link_drive);
            const path = url.pathname.split("/object/public/contracte/")[1];
            return path ? decodeURIComponent(path) : null;
          } catch(e) { return null; }
        })
        .filter(Boolean);
      if (paths.length) await supabaseClient.storage.from("contracte").remove(paths);
      await supabaseClient.from("documente_contract").delete()
        .eq("contract_id", contractId)
        .eq("tip_document", tipSelectat);
    }

    const safe = safeName(file.name);
    const fileName = `${contractId}_${Date.now()}_${safe}`;

    const up = await supabaseClient.storage.from("contracte").upload(fileName, file, { upsert:false });
    if(up.error){
      alert("Eroare upload: " + up.error.message);
      this.value = "";
      return;
    }

    const { data:linkData } = supabaseClient.storage.from("contracte").getPublicUrl(fileName);

    const ins = await supabaseClient.from("documente_contract").insert([{
      contract_id: contractId,
      nume_contract: nume || "",
      furnizor: furn || "",
      tip_document: tipSelectat,
      nume_fisier: file.name,
      link_drive: linkData.publicUrl
    }]);

    if(ins.error){
      alert("Eroare salvare în tabel: " + ins.error.message);
      this.value = "";
      return;
    }
  }

  this.value = "";
  incarcaDocumente();

async function adaugaCartonasNou() {
  const input = document.getElementById("inputCartonasNou");
  const titlu = input.value.trim();
  if (!titlu) { input.focus(); return; }
  if (listaDocumente.includes(titlu)) {
    alert("Există deja un cartonaș cu acest titlu!");
    return;
  }
  listaDocumente.push(titlu);
  input.value = "";
  await salveazaCartonase();
  incarcaDocumente();
}

// Enter key pe input
document.getElementById("inputCartonasNou").addEventListener("keydown", function(e){
  if(e.key === "Enter") adaugaCartonasNou();
});

function editeazaCartonas(idx, titleDiv) {
  const vechuNume = listaDocumente[idx];
  
  // Inlocuim div-ul cu un input inline
  const container = titleDiv.parentElement;
  const oldDiv = titleDiv;
  
  const inp = document.createElement("input");
  inp.type = "text";
  inp.value = vechuNume;
  inp.style = "width:100%;box-sizing:border-box;padding:3px 6px;border:1px solid #93c5fd;border-radius:6px;font-size:13px;font-weight:600;text-align:center;background:rgba(255,255,255,0.8);color:#1e293b;";
  
  oldDiv.replaceWith(inp);
  inp.focus();
  inp.select();

  async function salveaza() {
    const nouNume = inp.value.trim();
    if (!nouNume) { inp.focus(); return; }
    if (nouNume !== vechuNume && listaDocumente.includes(nouNume)) {
      alert("Există deja un cartonaș cu acest titlu!");
      inp.focus();
      return;
    }

    // Actualizam lista locala
    listaDocumente[idx] = nouNume;

    // Actualizam si in obligatorii daca era acolo
    const idxObl = obligatorii.indexOf(vechuNume);
    if (idxObl !== -1) obligatorii[idxObl] = nouNume;

    // Daca exista documente uploadate cu vechiul tip, le redenumim in tabel
    if (nouNume !== vechuNume) {
      await salveazaCartonase();
      supabaseClient
        .from("documente_contract")
        .update({ tip_document: nouNume })
        .eq("contract_id", contractId)
        .eq("tip_document", vechuNume)
        .then(() => incarcaDocumente());
    } else {
      incarcaDocumente();
    }
  }

  inp.addEventListener("blur", salveaza);
  inp.addEventListener("keydown", function(e) {
    if (e.key === "Enter") { inp.blur(); }
    if (e.key === "Escape") { incarcaDocumente(); }
  });
}

/* ===================== STERGE CARTONAS ===================== */
async function stergeCartonas(tip) {
  if(!confirm(`Ștergi cartonașul "${tip}" și TOATE documentele uploadate pentru el? Acțiunea este ireversibilă!`)) return;

  try {
    // 1. Ia toate documentele de acest tip
    const { data: docs } = await supabaseClient
      .from("documente_contract")
      .select("id, link_drive")
      .eq("contract_id", contractId)
      .eq("tip_document", tip);

    // 2. Sterge fisierele din storage
    if (docs && docs.length) {
      const paths = docs
        .filter(d => d.link_drive)
        .map(d => {
          try {
            const url = new URL(d.link_drive);
            const path = url.pathname.split("/object/public/contracte/")[1];
            return path ? decodeURIComponent(path) : null;
          } catch(e) { return null; }
        })
        .filter(Boolean);
      if (paths.length) await supabaseClient.storage.from("contracte").remove(paths);

      // 3. Sterge din tabel
      await supabaseClient
        .from("documente_contract")
        .delete()
        .eq("contract_id", contractId)
        .eq("tip_document", tip);
    }

    // 4. Scoate din lista locala
    const idx = listaDocumente.indexOf(tip);
    if (idx !== -1) listaDocumente.splice(idx, 1);

    // 5. Scoate si din obligatorii daca e acolo
    const idxObl = obligatorii.indexOf(tip);
    if (idxObl !== -1) obligatorii.splice(idxObl, 1);

    await salveazaCartonase();
    incarcaDocumente();
  } catch(e) {
    alert("Eroare la ștergere cartonaș");
    console.log(e);
  }
}

/* ===================== DELETE ===================== */
async function stergeDoc(id, link){
  if(!confirm("Ștergi documentul?")) return;

  try{

    // ===== sterge fisier din storage =====
    if(link){
      const url = new URL(link);
      let path = url.pathname.split("/object/public/contracte/")[1];

      if(path){
        path = decodeURIComponent(path);

        await supabaseClient
          .storage
          .from("contracte")
          .remove([path]);
      }
    }

    // ===== sterge din tabel =====
    await supabaseClient
      .from("documente_contract")
      .delete()
      .eq("id", id);

    // ===== curata fisiere orfane din storage (fara inregistrare in tabel) =====
    const { data: ramaseTabel } = await supabaseClient
      .from("documente_contract")
      .select("link_drive")
      .eq("contract_id", contractId);

    const { data: storageFiles } = await supabaseClient.storage
      .from("contracte")
      .list("", { limit: 500, search: contractId });

    if (storageFiles && storageFiles.length) {
      const linkuriTabel = new Set((ramaseTabel || []).map(d => d.link_drive).filter(Boolean));
      const orfane = storageFiles
        .filter(f => {
          if (!f.name.startsWith(contractId + "_")) return false;
          const { data: urlData } = supabaseClient.storage.from("contracte").getPublicUrl(f.name);
          return !linkuriTabel.has(urlData.publicUrl);
        })
        .map(f => f.name);
      if (orfane.length) {
        await supabaseClient.storage.from("contracte").remove(orfane);
      }
    }

    incarcaDocumente();

  }catch(e){
    alert("Eroare la ștergere");
    console.log(e);
  }
}

async function stergeTotal(){

    const { data: docs } = await supabaseClient
      .from("documente_contract")
      .select("id, link_drive")
      .eq("contract_id", contractId);

    // 2. Ștergem fișierele din storage care au link în tabel
    if(docs && docs.length){
      const paths = docs
        .filter(d => d.link_drive)
        .map(d => {
          try{
            const url = new URL(d.link_drive);
            const path = url.pathname.split("/object/public/contracte/")[1];
            return path ? decodeURIComponent(path) : null;
          }catch(e){ return null; }
        })
        .filter(Boolean);
      if(paths.length) await supabaseClient.storage.from("contracte").remove(paths);
    }

    // 3. Ștergem din storage și fișierele orfane (fără înregistrare în tabel)
    const { data: storageFiles } = await supabaseClient.storage.from("contracte").list("", { limit: 500, search: contractId });
    if(storageFiles && storageFiles.length){

        .filter(f => f.name.startsWith(contractId + "_"))

      .eq("contract_id", contractId);

    incarcaDocumente();
    alert("✓ Toate documentele au fost șterse.");

  }
