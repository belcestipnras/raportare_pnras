/* Comprimă imaginile înainte de upload (maxSide=1600px, quality=0.75) */
async function comprimaImagine(file) {
  const tipuri = ['image/jpeg','image/jpg','image/png','image/webp','image/bmp'];
  if (!tipuri.includes(file.type)) return file; // nu e imagine → returnează original
  return new Promise((resolve) => {
    const MAX_SIDE = 1600;
    const QUALITY  = 0.75;
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (Math.max(w, h) > MAX_SIDE) {
          const sc = MAX_SIDE / Math.max(w, h);
          w = Math.round(w * sc); h = Math.round(h * sc);
        }
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        cv.toBlob((blob) => {
          if (!blob || blob.size >= file.size) { resolve(file); return; } // daca e mai mare, pastreaza originalul
          const numeNou = file.name.replace(/\.[^.]+$/, '.jpg');
          resolve(new File([blob], numeNou, { type: 'image/jpeg' }));
        }, 'image/jpeg', QUALITY);
      };
      img.onerror = () => resolve(file);
      img.src = e.target.result;
    };
    reader.onerror = () => resolve(file);
    reader.readAsDataURL(file);
  });
}

async function r2UploadFile(fileName, fileBlob, bucketKey, onProgress) {
  const MULTIPART_THRESHOLD = 90 * 1024 * 1024; // 90 MB → folosește multipart
  const CHUNK_SIZE = 20 * 1024 * 1024;           // 20 MB per chunk

  const contentType = fileBlob.type || "application/octet-stream";

  // Fișiere mici → upload simplu
  if (fileBlob.size <= MULTIPART_THRESHOLD) {
    const resp = await fetch(`${WORKER_URL}/upload`, {
      method: "PUT",
      headers: { "X-Bucket": bucketKey, "X-File-Name": fileName, "Content-Type": contentType },
      body: fileBlob,
    });
    if (!resp.ok) throw new Error("Upload eșuat: " + await resp.text());
    return (await resp.json()).url;
  }

  // Fișiere mari → multipart upload
  // 1. Inițializare
  const createResp = await fetch(`${WORKER_URL}/multipart/create`, {
    method: "POST",
    headers: { "X-Bucket": bucketKey, "X-File-Name": fileName, "Content-Type": contentType },
  });
  if (!createResp.ok) throw new Error("Multipart create eșuat: " + await createResp.text());
  const { uploadId } = await createResp.json();

  // 2. Upload chunks
  const totalChunks = Math.ceil(fileBlob.size / CHUNK_SIZE);
  const parts = [];
  try {
    for (let i = 0; i < totalChunks; i++) {
      const start = i * CHUNK_SIZE;
      const end = Math.min(start + CHUNK_SIZE, fileBlob.size);
      const chunk = fileBlob.slice(start, end);

      if (onProgress) onProgress(Math.round((i / totalChunks) * 90), `Se urcă partea ${i + 1}/${totalChunks}...`);

      const partResp = await fetch(`${WORKER_URL}/multipart/upload-part`, {
        method: "PUT",
        headers: {
          "X-Bucket": bucketKey,
          "X-File-Name": fileName,
          "X-Upload-Id": uploadId,
          "X-Part-Number": String(i + 1),
          "Content-Type": "application/octet-stream",
        },
        body: chunk,
      });
      if (!partResp.ok) throw new Error(`Upload parte ${i + 1} eșuat: ` + await partResp.text());
      const { etag } = await partResp.json();
      parts.push({ partNumber: i + 1, etag });
    }

    // 3. Finalizare
    if (onProgress) onProgress(95, "Se finalizează upload-ul...");
    const completeResp = await fetch(`${WORKER_URL}/multipart/complete`, {
      method: "POST",
      headers: {
        "X-Bucket": bucketKey,
        "X-File-Name": fileName,
        "X-Upload-Id": uploadId,
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ parts }),
    });
    if (!completeResp.ok) throw new Error("Multipart complete eșuat: " + await completeResp.text());
    return (await completeResp.json()).url;

  } catch (err) {
    // Abort în caz de eroare
    try {
      await fetch(`${WORKER_URL}/multipart/abort`, {
        method: "POST",
        headers: { "X-Bucket": bucketKey, "X-File-Name": fileName, "X-Upload-Id": uploadId },
      });
    } catch(e) {}
    throw err;
  }
}

async function r2DeleteFile(publicUrl, bucketKey) {

    const fileName = decodeURIComponent(publicUrl.replace(PUBLIC_URLS[bucketKey] + "/", ""));
    await fetch(`${WORKER_URL}/delete`, { method: "DELETE", headers: { "X-Bucket": bucketKey, "X-File-Name": fileName } });

}

// Amestecă un array (Fisher-Yates)
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Generează secvența de ștampile pentru N pagini:
// - Se epuizează toate cele 25 înainte de repetare
// - Ordinea e aleatorie în fiecare „pachet" de 25
function genereazaSecventaStampile(imaginiStampile, nrPagini) {
  const secventa = [];
  let pachet = [];
  for (let i = 0; i < nrPagini; i++) {
    if (pachet.length === 0) pachet = shuffleArray(imaginiStampile);
    secventa.push(pachet.shift());
  }
  return secventa;
}

// Overlay full-page A4 — primește ștampila exactă (nu mai alege aleatoriu)
function aplicaStampila(pagina, stampImg) {
  if (!stampImg) return;
  const { width: pW, height: pH } = pagina.getSize();
  const scaleFactorPxToPt = pW / stampImg.width;
  const drawW = stampImg.width  * scaleFactorPxToPt;
  const drawH = stampImg.height * scaleFactorPxToPt;

  pagina.drawImage(stampImg, {
    x: 0,
    y: pH - drawH,
    width:  drawW,
    height: drawH,
    opacity: 1.0
  });
}

function parseazaPagini(str, total) {
  const s = new Set();
  (str||'').split(',').forEach(p => {
    p = p.trim();
    const r = p.match(/^(\d+)\s*-\s*(\d+)$/);
    if (r) { for(let i=Math.min(+r[1],+r[2]);i<=Math.max(+r[1],+r[2]);i++) if(i>=1&&i<=total) s.add(i); }
    else { const n=parseInt(p); if(!isNaN(n)&&n>=1&&n<=total) s.add(n); }
  });
  return [...s].sort((a,b)=>a-b);
}

function getPagini(opt, spec, total) {
  const all = Array.from({length:total},(_,i)=>i+1);
  if(opt==='toate') return all;
  if(opt==='prima') return [1];
  if(opt==='ultima') return [total];
  if(opt==='fara_prima') return all.filter(p=>p!==1);
  if(opt==='fara_ultima') return all.filter(p=>p!==total);
  if(opt==='fara_prima_ultima') return all.filter(p=>p!==1&&p!==total);
  if(opt==='specifice') return parseazaPagini(spec, total);
  return [];
}

    const linkCuratSP = linkDrive.split('?')[0];
    const oldFileName = decodeURIComponent(linkCuratSP.replace(PUBLIC_URLS['contracte'] + '/', ''));
    const originalBlob = new Blob([originalBytes], { type: 'application/pdf' });
    const originalFileName = oldFileName.replace(/\.pdf$/i, '_original.pdf');
    // Șterge un eventual original vechi și urcă unul nou
    await r2DeleteFile(PUBLIC_URLS['contracte'] + '/' + originalFileName, 'contracte');
    const originalUrl = await r2UploadFile(originalFileName, originalBlob, 'contracte');

    setSP(35, 'Se încarcă ștampilele...');
    const stampile = await incarcaStampileFullPage(pdfDoc2);
    if (!stampile.length) throw new Error('Nu s-au putut încărca ștampilele din Supabase.');

    setSP(55, `Se aplică pe ${paginiDeStampilat.length} ${paginiDeStampilat.length===1?'pagină':'pagini'}...`);
    const secventaStampile = genereazaSecventaStampile(stampile, paginiDeStampilat.length);
    paginiDeStampilat.forEach((nr, idx) => aplicaStampila(pagini[nr-1], secventaStampile[idx]));

    setSP(72, 'Se generează PDF-ul...');
    const blob = new Blob([await pdfDoc2.save()], { type: 'application/pdf' });

    setSP(82, 'Se urcă în storage...');
    await r2DeleteFile(linkCuratSP, 'contracte');
    const newUrl = await r2UploadFile(oldFileName, blob, 'contracte');

    setSP(95, 'Se actualizează baza de date...');
    const newUrlNoCache = newUrl.split('?')[0] + '?t=' + Date.now();
    const { error: errUpd } = await supabaseClient.from('documente_contract').update({
      link_drive: newUrlNoCache,
      stampilat: true,
      link_original: originalUrl
    }).eq('id', docId);
    if (errUpd) { console.error('Eroare update stampilat:', errUpd); alert('Avertisment: ștampila aplicată dar nu s-a putut salva statusul: ' + errUpd.message); }

    setSP(100, 'Gata!');
    setTimeout(() => {
      pm.remove();
      alert(`✔ Ștampila aplicată pe ${paginiDeStampilat.length} ${paginiDeStampilat.length===1?'pagină':'pagini'} din "${numeFisier}".`);
      incarcaDocumente();
    }, 500);
  } catch(e) {
    pm.remove();
    alert('Eroare la ștampilare: ' + e.message);
    console.error(e);
  }
}

async function stergeStampilaDocument(docId, linkDrive, numeFisier) {
  const linkCurat = (linkDrive||'').split('?')[0];
  if (!confirm(`Ești sigur că vrei să ștergi ștampila din "${numeFisier}"?\nDocumentul original va fi restaurat.`)) return;

  const pm = document.createElement('div');
  pm.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:10000;";
  pm.innerHTML = `
    <div style="background:white;padding:28px 36px;border-radius:14px;min-width:340px;box-shadow:0 8px 30px rgba(0,0,0,0.3);text-align:center;">
      <div style="font-size:17px;font-weight:bold;margin-bottom:6px;">🗑️ Se șterge ștampila...</div>
      <div id="ssTxt" style="font-size:13px;color:#64748b;margin-bottom:14px;">Inițializare...</div>
      <div style="background:#e2e8f0;border-radius:99px;height:10px;overflow:hidden;">
        <div id="ssBar" style="height:100%;width:0%;background:linear-gradient(90deg,#ef4444,#f97316);border-radius:99px;transition:width 0.3s;"></div>
      </div>
    </div>`;
  document.body.appendChild(pm);
  const setSS = (p,t) => { document.getElementById('ssBar').style.width=p+'%'; document.getElementById('ssTxt').textContent=t; };

  try {
    // Obține link_original din baza de date
    setSS(10, 'Se caută originalul...');
    const { data: docData, error: docErr } = await supabaseClient
      .from('documente_contract').select('link_original').eq('id', docId).single();
    if (docErr || !docData) throw new Error('Nu s-au putut citi datele documentului.');
    const linkOriginal = docData.link_original;
    if (!linkOriginal) throw new Error('Nu există un fișier original salvat. Aplică ștampila din nou pentru a salva originalul.');

    // Descarcă originalul
    setSS(30, 'Se descarcă originalul...');
    const respOrig = await fetch(linkOriginal);
    if (!respOrig.ok) throw new Error('Nu s-a putut descărca originalul: HTTP ' + respOrig.status);
    const originalBytes = new Uint8Array(await respOrig.arrayBuffer());

    // Suprascrie fișierul cu ștampilă cu originalul
    setSS(60, 'Se restaurează originalul...');
    const oldFileName = decodeURIComponent(linkCurat.replace(PUBLIC_URLS['contracte'] + '/', ''));
    const originalBlob = new Blob([originalBytes], { type: 'application/pdf' });
    await r2DeleteFile(linkCurat, 'contracte');
    const newUrl = await r2UploadFile(oldFileName, originalBlob, 'contracte');

    // Șterge fișierul _original din R2
    setSS(80, 'Se curăță fișierele temporare...');
    await r2DeleteFile(linkOriginal.split('?')[0], 'contracte');

    // Actualizează baza de date
    setSS(92, 'Se actualizează baza de date...');
    const newUrlNoCache = newUrl.split('?')[0] + '?t=' + Date.now();
    await supabaseClient.from('documente_contract').update({
      link_drive: newUrlNoCache,
      stampilat: false,
      link_original: null
    }).eq('id', docId);

    setSS(100, 'Gata!');
    setTimeout(() => {
      pm.remove();
      alert(`✔ Ștampila a fost ștearsă. Documentul original "${numeFisier}" a fost restaurat.`);
      incarcaDocumente();
    }, 500);
  } catch(e) {
    pm.remove();
    alert('Eroare la ștergerea ștampilei: ' + e.message);
    console.error(e);
  }
}

async function downloadBytesFromStoragePublicUrl(publicUrl){
  const resp = await fetch(publicUrl);
  if(!resp.ok) throw new Error("HTTP " + resp.status);
  return new Uint8Array(await resp.arrayBuffer());
}

async function incarcaDocumente(){
  const denLowerInc = (contractNumeFull || "").toLowerCase();
  const eStatDePlata = denLowerInc.includes("salarii") || denLowerInc.includes("stat de plat");

  const CTR_PROCONS_ID = '275eb452-1c8b-4b7a-b1a6-d73fad65490c';
  const eProcons = contractId === CTR_PROCONS_ID;

  if (eStatDePlata) {
    listaDocumente.splice(0, listaDocumente.length, ...getListaDefault());
    await salveazaCartonase();
  } else {
    const { data: cfgData } = await supabaseClient.from("cartonase_config").select("cartonase,ascunse,migrat").eq("contract_id", contractId).maybeSingle();
    if (cfgData) {
      listaAscunse = cfgData.ascunse || [];
      let lista = cfgData.cartonase || [];
      // Migrare specială pentru Procons
      if (eProcons) {
        const standardProcons = [
          "1. Referat de necesitate","2. Notă de justificare","3. Cerere de ofertă","4. Anunț achiziție",
          "5. Ofertă","5.1 CIF","5.2 Certificat constatator","5.3 Declarație beneficiar real",
          "5.4 Declarație art. 164/165/167","6. Proces-verbal selecție oferte","7. Comunicare selecție oferte",
          "8. Dovadă achiziție SICAP","9. Contract","10. Alte documente"
        ];
        const deElminatProcons = ["13. Factura","14. OP","15. Fotografii","16. Alte documente"];
        // Păstrăm cartonașele MASA_ și eliminăm vechile standard greșite
        const masaCartonase = lista.filter(c => !standardProcons.includes(c) && !deElminatProcons.includes(c));
        // Adăugăm standardele care lipsesc din 1-9
        const standardLipsa = standardProcons.filter(c => !lista.includes(c));
        const listaProcons = [...standardProcons, ...masaCartonase];
        // Adăugăm standardele lipsă doar dacă chiar lipseau
        const modificatP = standardLipsa.length > 0 || deElminatProcons.some(c => lista.includes(c));
        listaDocumente.splice(0, listaDocumente.length, ...listaProcons);
        _migratLocal = true;
        if (modificatP) await salveazaCartonase(true);
      } else {
      // Cartonașele vechi de șters (înlocuite de cele noi)
      // Migrare doar dacă lista nu conține deja toate canonicele 12-19
      // Migrare doar dacă nu a fost deja efectuată (marcată în Supabase)
      if (cfgData.migrat || _saritMigrare) {
        _migratLocal = true;
        listaDocumente.splice(0, listaDocumente.length, ...lista);
        if (!cfgData.migrat) await salveazaCartonase(true); // persista migrat=true
      } else {
      // Cartonașele canonice fixe 12-19
      const canonice12plus = [
        "12. Proces-verbal de dare în folosință",
        "13. Factură","14. ALOP","15. Ordin de plată","16. Extras de cont",
        "17. NIR/BC/Fișa mijloc fix/Fișa de magazie","18. Fotografii","19. Alte documente"
      ];
      // Cartonașele canonice 1-11 (dacă lipsesc, se adaugă)
      const canonice1_11 = [
        "1. Referat de necesitate","2. Notă de justificare","3. Cerere de ofertă","4. Anunț achiziție",
        "5. Ofertă","5.1 CIF","5.2 Certificat constatator","5.3 Declarație beneficiar real",
        "5.4 Declarație art. 164/165/167","6. Proces-verbal selecție oferte","7. Comunicare selecție oferte",
        "8. Dovadă achiziție SICAP","9. Contract","10. Decizie comisie recepție",
        "11. Proces-verbal de recepție"
      ];
      // 1. Păstrăm doar cartonașele 1-11 din lista salvată (eliminate tot de la 12 în sus)
      const listaFiltrata = lista.filter(c => canonice1_11.includes(c));
      // 2. Adaugă 1-11 canonice care lipsesc
      canonice1_11.forEach(c => {
        if (!listaFiltrata.includes(c)) listaFiltrata.push(c);
      });
      // 3. Adaugă fix 12-19 la final
      canonice12plus.forEach(c => listaFiltrata.push(c));
      listaDocumente.splice(0, listaDocumente.length, ...listaFiltrata);
      _migratLocal = true;
      await salveazaCartonase(true);
      } // end migrat
      } // end if(!eProcons)
    } else {
      const { data: de } = await supabaseClient.from("documente_contract").select("tip_document").eq("contract_id", contractId);
      const tu = [...new Set((de||[]).map(d=>d.tip_document).filter(t=>t&&t!=="DOSAR ACHIZIȚIE PDF"))]
        .sort((a,b)=>a.localeCompare(b,undefined,{numeric:true,sensitivity:'base'}));
      listaAscunse = [];
      listaDocumente.splice(0, listaDocumente.length, ...(tu.length?tu:getListaDefault()));
      await salveazaCartonase();
    }
  }

  const { data:docs, error } = await supabaseClient.from("documente_contract").select("*").eq("contract_id", contractId);
  if(error){ console.log("EROARE LOAD:", error); return; }

  // Facturile din buget_achizitii (furnizor=UUID, tip=13. Factura) → le remapăm la "13. Factură"
  const data = (docs||[]).map(d => {
    if(d.furnizor&&d.furnizor.length===36&&d.tip_document==="13. Factura") {
      return {...d, tip_document:"13. Factură"};
    }
    return d;
  });
  const existente = data.map(d=>d.tip_document);
  _existente = existente;

  document.getElementById("bifaComplet").checked = !!data.find(d=>d.dosar_complet_manual===true);

  /* ---- TABEL ---- */
  const tbody = document.getElementById("lista-docuri");
  if(!data.length){
    tbody.innerHTML = `<tr><td style="color:#888;text-align:center">Niciun document încă</td></tr>`;
  } else {
    const grupate = {};
    data.filter(d=>!listaAscunse.includes(d.tip_document)).forEach(d => { if(!grupate[d.tip_document]) grupate[d.tip_document]=[]; grupate[d.tip_document].push(d); });

    let html = "";
    const LISTA_SALARII_ORDINE = ["Foaie de pontaj colectiv", "Stat de plată", "ALOP", "Ordin de plată", "Extras de cont"];
    const CTR_PROCONS = '275eb452-1c8b-4b7a-b1a6-d73fad65490c';
    const sortedTips = Object.keys(grupate).filter(tip => {
      if (contractId === CTR_PROCONS) {
        const t = tip.toUpperCase();
        // Exclude tipurile care nu sunt facturi sau dosare
        if (!listaDocumente.includes(tip) && !t.includes('FACTUR') && !t.includes('DOSAR')) return false;
      }
      return true;
    }).sort((a, b) => {
      const iA = LISTA_SALARII_ORDINE.indexOf(a);
      const iB = LISTA_SALARII_ORDINE.indexOf(b);
      if (iA !== -1 && iB !== -1) return iA - iB;
      if (iA !== -1) return -1;
      if (iB !== -1) return 1;
      return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
    });
    sortedTips.forEach(tip => {
      html += `<tr style="background:#f1f5f9;font-weight:bold">
        <td style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
          <span>${tip} (${grupate[tip].length})</span>
          <button class="btn small" onclick="adaugaDocumentLaTip(this)" data-tip="${tip}"
            style="background:#dcfce7;color:#16a34a;border-color:#86efac;font-weight:600;font-size:12px;">➕ Adaugă</button>
        </td></tr>`;

      grupate[tip].forEach(doc => {
        const eid   = doc.id;
        const elink = (doc.link_drive||'').replace(/"/g,'&quot;');
        const enume = (doc.nume_fisier||'document').replace(/"/g,'&quot;');
        const etip  = (doc.tip_document||'').replace(/"/g,'&quot;');
        const isPdf = (doc.link_drive||'').toLowerCase().split('?')[0].endsWith('.pdf');
        const isStampilat = doc.stampilat === true;

        html += `<tr style="${isStampilat ? 'background:#dcfce7;' : ''}"><td style="${isStampilat ? 'background:#dcfce7;' : ''}">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            ${isPdf ? `<input type="checkbox" class="chk-doc" data-docid="${eid}" data-slink="${elink}" data-snume="${enume}" data-stip="${etip}" onchange="actualizezaBtnSelectate()" style="width:16px;height:16px;cursor:pointer;flex-shrink:0;">` : '<span style="width:16px;flex-shrink:0;"></span>'}
            <input class="small" type="text" value="${(doc.tip_document||'').replace(/"/g,'&quot;')}"
              onchange="salveazaTip('${eid}', this.value)"
              style="min-width:160px;padding:4px;border:1px solid #fbbf24;border-radius:6px;font-size:13px;background:#fffbeb;">
            <input class="small" type="text" placeholder="Nr" value="${doc.nr_inregistrare||''}"
              onchange="salveazaNr('${eid}', this.value)" style="width:95px;padding:4px">
            <input class="small" type="date" value="${doc.data_inregistrare||''}"
              onchange="salveazaData('${eid}', this.value)" style="padding:4px">
            <a href="${elink}" target="_blank">📄 Deschide</a>
            ${isPdf ? `<button class="btn small"
                data-sid="${eid}" data-slink="${elink}" data-snume="${enume}" data-stip="${etip}"
                onclick="aplicaStampilaDocument(this.dataset.sid,this.dataset.slink,this.dataset.snume,this.dataset.stip)"
                style="background:#eff6ff;color:#2563eb;border-color:#93c5fd;">🖋️ Ștampilă</button>` : ''}
            ${isPdf && isStampilat ? `<button class="btn small"
                data-sid="${eid}" data-slink="${elink}" data-snume="${enume}"
                onclick="stergeStampilaDocument(this.dataset.sid,this.dataset.slink,this.dataset.snume)"
                style="background:#fff7ed;color:#c2410c;border-color:#fdba74;">✖ Șterge ștampilă</button>` : ''}
            <button class="btn small" onclick="stergeDoc('${eid}','${elink}')"
              style="background:#fee2e2;color:#dc2626;border-color:#fca5a5;">🗑️ Șterge</button>
          </div>
        </td></tr>`;
      });
    });
    tbody.innerHTML = html;
  }

  /* ---- CARTONAȘE ---- */
  randeazaCartonase(existente);
}


// Match cartonaș față de documente existente — după denumire exactă SAU prefix numeric ("12.")
function docExista(doc, existente) {
  if (existente.includes(doc)) return true;
  const prefix = doc.match(/^(\d+(?:\.\d+)?)\.\s/);
  if (prefix) {
    const p = prefix[1] + '.';
    return existente.some(e => e.startsWith(p));
  }
  return false;
}

function randeazaCartonase(existente) {
  const container = document.getElementById("cartonaseContainer");
  container.innerHTML = "";
  let totalOk = 0;

  listaDocumente.forEach(doc => {
    const eAscuns = listaAscunse.includes(doc);
    let ok = !eAscuns && docExista(doc, existente);
    if(!eAscuns && doc==="5. Ofertă"){
      const sub=["5. Ofertă","5.1 CIF","5.2 Certificat constatator","5.3 Declarație beneficiar real","5.4 Declarație art. 164/165/167"];
      ok=sub.every(s=>docExista(s, existente));
    }
    let culoare="#f1f5f9", textColor="#334155";
    if(eAscuns){ culoare="#e2e8f0"; textColor="#94a3b8"; }
    else if(ok){culoare="#22c55e";textColor="white";totalOk++;}
    else if(obligatorii.includes(doc)){culoare="#fee2e2";}
    else{culoare="#fef9c3";}

    const docIdx = listaDocumente.indexOf(doc);
    const wrapper = document.createElement("div");
    wrapper.id=`cartonas_${docIdx}`; wrapper.dataset.doc=doc; wrapper.draggable=!eAscuns;
    wrapper.style.cssText=`position:relative;padding:10px 10px 8px 28px;border-radius:12px;background:${culoare};color:${textColor};border:1px solid #e2e8f0;box-shadow:0 1px 2px rgba(0,0,0,0.05);font-size:13px;text-align:center;font-weight:600;transition:opacity 0.15s,box-shadow 0.15s;${eAscuns?'opacity:0.5;':''}`;

    const handle=document.createElement("div"); handle.title="Trage pentru a muta"; handle.textContent="⠿";
    handle.style.cssText=`position:absolute;left:6px;top:50%;transform:translateY(-50%);cursor:${eAscuns?'default':'grab'};font-size:16px;opacity:0.45;user-select:none;line-height:1;`;
    wrapper.appendChild(handle);

    const titluDiv=document.createElement("div"); titluDiv.title=eAscuns?"Cartonaș ascuns — apasă 👁 pentru a reactiva":"Click: upload | Dublu-click: editează titlul";
    titluDiv.style.cssText="cursor:pointer;padding-right:18px;min-height:20px;"; titluDiv.textContent=doc;
    if(!eAscuns){
      titluDiv.addEventListener("click",()=>selecteazaTip(doc));
      titluDiv.addEventListener("dblclick",(e)=>{e.stopPropagation();editeazaCartonas(docIdx,titluDiv);});
    }
    wrapper.appendChild(titluDiv);

    // Buton ascunde/activează (👁)
    const btnToggle=document.createElement("button");
    btnToggle.title=eAscuns?"Activează cartonaș":"Ascunde cartonaș (nu se ia în calcul la dosar)";
    btnToggle.textContent="👁";
    btnToggle.style.cssText="position:absolute;bottom:4px;left:28px;background:rgba(0,0,0,0.12);border:none;border-radius:50%;width:18px;height:18px;font-size:10px;line-height:18px;cursor:pointer;color:inherit;padding:0;";
    btnToggle.addEventListener("click",(e)=>{e.stopPropagation();toggleAscunsCartonas(doc);});
    wrapper.appendChild(btnToggle);

    if(!eAscuns){
      const btnEdit=document.createElement("button"); btnEdit.title="Editează"; btnEdit.textContent="✎";
      btnEdit.style.cssText="position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.15);border:none;border-radius:50%;width:18px;height:18px;font-size:12px;line-height:18px;cursor:pointer;color:inherit;padding:0;font-weight:bold;";
      btnEdit.addEventListener("click",(e)=>{e.stopPropagation();editeazaCartonas(docIdx,titluDiv);});
      wrapper.appendChild(btnEdit);
    }

    const btnDel=document.createElement("button"); btnDel.title="Șterge cartonașul"; btnDel.textContent="✕";
    btnDel.style.cssText="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.15);border:none;border-radius:50%;width:18px;height:18px;font-size:11px;line-height:18px;cursor:pointer;color:inherit;padding:0;font-weight:bold;";
    btnDel.addEventListener("click",(e)=>{e.stopPropagation();stergeCartonas(doc);});
    wrapper.appendChild(btnDel);

    wrapper.addEventListener("dragstart",(e)=>{e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain",doc);wrapper.style.opacity="0.4";container._dragSrc=wrapper;});
    wrapper.addEventListener("dragend",()=>{wrapper.style.opacity="1";container.querySelectorAll("[data-doc]").forEach(el=>el.style.outline="");});
    wrapper.addEventListener("dragover",(e)=>{e.preventDefault();if(container._dragSrc!==wrapper)wrapper.style.outline="2px dashed #6366f1";});
    wrapper.addEventListener("dragleave",()=>{wrapper.style.outline="";});
    wrapper.addEventListener("drop",async(e)=>{
      e.preventDefault(); wrapper.style.outline="";
      const srcDoc=e.dataTransfer.getData("text/plain"), dstDoc=wrapper.dataset.doc;
      if(!srcDoc||srcDoc===dstDoc)return;
      const si=listaDocumente.indexOf(srcDoc), di=listaDocumente.indexOf(dstDoc);
      if(si===-1||di===-1)return;
      listaDocumente.splice(si,1); listaDocumente.splice(di,0,srcDoc);
      await salveazaCartonase(); incarcaDocumente();
    });
    container.appendChild(wrapper);
  });

  const statusDiv=document.getElementById("statusDosar");
  const listaActiva = listaDocumente.filter(d=>!listaAscunse.includes(d));
  if(listaActiva.length>0&&totalOk===listaActiva.length)
    statusDiv.innerHTML=`<span style="color:#16a34a">DOSAR COMPLET ✔</span> (${totalOk}/${listaActiva.length})`;
  else
    statusDiv.innerHTML=`<span style="color:#dc2626">DOSAR INCOMPLET</span> (${totalOk}/${listaActiva.length})`;
}

async function adaugaCartonasNou(){
  const input=document.getElementById("inputCartonasNou"); const titlu=input.value.trim();
  if(!titlu){input.focus();return;}
  if(listaDocumente.includes(titlu)){alert("Există deja un cartonaș cu acest titlu!");return;}

}
document.getElementById("inputCartonasNou").addEventListener("keydown",function(e){if(e.key==="Enter")adaugaCartonasNou();});

function editeazaCartonas(idx,titleDiv){
  const vechuNume=listaDocumente[idx];
  const inp=document.createElement("input"); inp.type="text"; inp.value=vechuNume;
  inp.style="width:100%;box-sizing:border-box;padding:3px 6px;border:1px solid #93c5fd;border-radius:6px;font-size:13px;font-weight:600;text-align:center;background:rgba(255,255,255,0.8);color:#1e293b;";
  titleDiv.replaceWith(inp); inp.focus(); inp.select();
  async function salveaza(){
    const nouNume=inp.value.trim(); if(!nouNume){inp.focus();return;}
    if(nouNume!==vechuNume&&listaDocumente.includes(nouNume)){alert("Există deja un cartonaș cu acest titlu!");inp.focus();return;}
    listaDocumente[idx]=nouNume;
    const io=obligatorii.indexOf(vechuNume); if(io!==-1)obligatorii[io]=nouNume;
    if(nouNume!==vechuNume){
      await salveazaCartonase();
      await supabaseClient.from("documente_contract").update({tip_document:nouNume}).eq("contract_id",contractId).eq("tip_document",vechuNume);
      _saritMigrare = true;
      await incarcaDocumente();
      _saritMigrare = false;
    } else {
      randeazaCartonase(_existente);
    }
  }
  inp.addEventListener("blur",salveaza);
  inp.addEventListener("keydown",function(e){if(e.key==="Enter")inp.blur();if(e.key==="Escape")incarcaDocumente();});
}

async function stergeCartonas(tip){
  if(!confirm(`Ștergi cartonașul "${tip}" și TOATE documentele? Acțiunea este ireversibilă!`))return;
  try{
    const{data:docs}=await supabaseClient.from("documente_contract").select("id,link_drive").eq("contract_id",contractId).eq("tip_document",tip);
    if(docs&&docs.length){
      const paths=docs.filter(d=>d.link_drive).map(d=>{try{const u=new URL(d.link_drive);const p=u.pathname.split("/object/public/contracte/")[1];return p?decodeURIComponent(p):null;}catch(e){return null;}}).filter(Boolean);
      if(paths.length)await supabaseClient.storage.from("contracte").remove(paths);
      await supabaseClient.from("documente_contract").delete().eq("contract_id",contractId).eq("tip_document",tip);
    }
    const idx=listaDocumente.indexOf(tip); if(idx!==-1)listaDocumente.splice(idx,1);
    const io=obligatorii.indexOf(tip); if(io!==-1)obligatorii.splice(io,1);
    await salveazaCartonase(); incarcaDocumente();
  }catch(e){alert("Eroare la ștergere cartonaș");console.log(e);}
}

/* ===================== GENERARE DOSAR ===================== */
async function genereazaDosar(){
  const{PDFDocument,rgb,StandardFonts}=PDFLib;
  const calitate=await intreabaCalitate();

  const pm=document.createElement('div'); pm.id='progressModal';
  pm.style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:10000;";
  pm.innerHTML=`<div style="background:white;padding:30px 40px;border-radius:14px;min-width:380px;box-shadow:0 8px 30px rgba(0,0,0,0.3);text-align:center;">
    <div style="font-size:18px;font-weight:bold;margin-bottom:6px;">⏳ Generare dosar PDF</div>
    <div id="progressText" style="font-size:13px;color:#64748b;margin-bottom:16px;">Inițializare...</div>
    <div style="background:#e2e8f0;border-radius:99px;height:12px;overflow:hidden;">
      <div id="progressBar" style="height:100%;width:0%;background:linear-gradient(90deg,#3b82f6,#6366f1);border-radius:99px;transition:width 0.3s ease;"></div>
    </div>
    <div id="progressPercent" style="font-size:13px;color:#3b82f6;font-weight:bold;margin-top:8px;">0%</div>
  </div>`;
  document.body.appendChild(pm);
  function upd(pct,txt){document.getElementById('progressBar').style.width=pct+'%';document.getElementById('progressPercent').textContent=Math.round(pct)+'%';if(txt)document.getElementById('progressText').textContent=txt;}

  try{
    const{data:docsRaw}=await supabaseClient.from("documente_contract").select("*").eq("contract_id",contractId);
    if(!docsRaw||!docsRaw.length){alert("Nu există documente");return;}
    const docs=docsRaw.map(d=>d.tip_document==="13. Factura"?{...d,tip_document:"13. Factură"}:d);
    const ordine=[...listaDocumente];

    upd(2,'Se încarcă documentele...');
    const pdfFinal=await PDFDocument.create();
    pdfFinal.registerFontkit(fontkit);

    const coverBytes=await fetch("https://aexjrbdgajurxzngfkpx.supabase.co/storage/v1/object/public/contracte/coperta_template.pdf").then(r=>r.arrayBuffer());
    const coverDoc=await PDFDocument.load(coverBytes);
    const pageCover=coverDoc.getPages()[0];
    const nrCurat=(nume||"").replace(/contract\s*nr\.?/i,"").trim();
    const t1=roPDF("Contract nr. "+nrCurat), t2=roPDF("Furnizor: "+(furn||""));
    const ww=pageCover.getWidth();
    const fB=await coverDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);
    const portocaliu=PDFLib.rgb(0.75,0.28,0.02);
    pageCover.drawText(t1,{x:(ww-fB.widthOfTextAtSize(t1,26))/2,y:380,size:26,font:fB,color:portocaliu});
    pageCover.drawText(t2,{x:(ww-fB.widthOfTextAtSize(t2,22))/2,y:340,size:22,font:fB,color:portocaliu});
    (await pdfFinal.copyPages(coverDoc,coverDoc.getPageIndices())).forEach(p=>pdfFinal.addPage(p));
    upd(8,'Copertă generată...');

    const font=await pdfFinal.embedFont(StandardFonts.Helvetica);
    const bold=await pdfFinal.embedFont(StandardFonts.HelveticaBold);

    // Încarcă FontAwesome Solid pentru iconițe
    upd(9, 'Se încarcă font iconițe...');
    let fontIco = null;
    try {
      const faUrl = `${SUPABASE_URL}/storage/v1/object/public/contracte/fa-solid-900.ttf`;
      console.log('[FA] Încerc să încarc:', faUrl);
      const faResp = await fetch(faUrl);
      console.log('[FA] Status răspuns:', faResp.status, faResp.statusText);
      if (!faResp.ok) throw new Error(`HTTP ${faResp.status}`);
      const faBytes = await faResp.arrayBuffer();
      console.log('[FA] Bytes descărcați:', faBytes.byteLength);
      fontIco = await pdfFinal.embedFont(faBytes, { subset: false });
      console.log('[FA] Font embed reușit:', fontIco);
      // Test rapid — încearcă să măsori un caracter
      const testW = fontIco.widthOfTextAtSize('\uf15b', 50);
      console.log('[FA] Test lățime caracter \\uf15b la 50pt:', testW);
    } catch(e) {
      console.error('[FA] EROARE la încărcare font:', e);
      alert('DEBUG font: ' + e.message);
    }

    // Mapare tip document → codepoint FontAwesome Solid (Unicode)
    const FA_ICONS = {
      "referat":    "\uf15c", // file-alt
      "nota":       "\uf249", // sticky-note
      "cerere":     "\uf303", // pen
      "anunt":      "\uf0a1", // bullhorn
      "oferta":     "\uf0c5", // copy
      "cif":        "\uf1c9", // file-code
      "certificat": "\uf0a3", // certificate
      "declaratie": "\uf46d", // file-signature
      "proces":     "\uf0f6", // file-medical-alt → clipboard-list
      "receptie":   "\uf46c", // clipboard-check
      "selectie":   "\uf0ae", // tasks
      "comunicare": "\uf0e0", // envelope
      "dovada":     "\uf108", // desktop
      "sicap":      "\uf108", // desktop
      "contract":   "\uf56d", // file-contract
      "decizie":    "\uf24e", // balance-scale
      "comisie":    "\uf0c0", // users
      "factura":    "\uf571", // file-invoice-dollar
      "op":         "\uf53d", // money-check
      "fotograf":   "\uf030", // camera
      "alte":       "\uf07b", // folder
      "default":    "\uf15b", // file
    };

    function getFaIcon(tip) {
      const tl = (tip||"").toLowerCase();
      for (const [key, val] of Object.entries(FA_ICONS)) {
        if (key !== "default" && tl.includes(key)) return val;
      }
      return FA_ICONS.default;
    }

    const opisBytes=await fetch("https://aexjrbdgajurxzngfkpx.supabase.co/storage/v1/object/public/contracte/opis_template.pdf").then(r=>r.arrayBuffer());
    const opisDoc=await PDFDocument.load(opisBytes);
    const pageOpis=opisDoc.getPages()[0];
    const fO=await opisDoc.embedFont(PDFLib.StandardFonts.Helvetica);
    const fOB=await opisDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);
    const fOI=await opisDoc.embedFont(PDFLib.StandardFonts.HelveticaOblique);
    const fOBI=await opisDoc.embedFont(PDFLib.StandardFonts.HelveticaBoldOblique);

    // Ștampile full-page (25 PNG-uri, overlay A4)
    const vreaStampila=await intreabaStampila();
    let imaginiStampile=[];
    let stampilaPachet=[], stampilaIndex=0;
    function urmatoareaStampila() {
      if(stampilaIndex>=stampilaPachet.length){ stampilaPachet=shuffleArray(imaginiStampile); stampilaIndex=0; }
      return stampilaPachet[stampilaIndex++];
    }
    if(vreaStampila){
      upd(3,'Se încarcă ștampilele...');
      imaginiStampile=await incarcaStampileFullPage(pdfFinal);
      if(!imaginiStampile.length) throw new Error('Nu s-au putut încărca ștampilele din Supabase.');
      stampilaPachet=shuffleArray(imaginiStampile);
    }

    let y=520,ri=0,nc=0;
    const gopd={};
    if(docs) docs.forEach(d=>{if(d.tip_document==='DOSAR ACHIZIȚIE PDF')return;if(!gopd[d.tip_document])gopd[d.tip_document]=[];gopd[d.tip_document].push(d);});

    // Completează nr/dată factură din buget_pnras pentru documentele de tip factură
    console.log('[OPIS-FACTURI] contractId:', contractId);
    console.log('[OPIS-FACTURI] chei gopd:', Object.keys(gopd));
    const {data:facturiBuget, error:errFB} = await supabaseClient.from('buget_pnras').select('id,numar,data_document,titlu').eq('parent_id', contractId).eq('tip_rand','FACTURA').order('data_document',{ascending:true});
    console.log('[OPIS-FACTURI] facturiBuget:', facturiBuget, 'eroare:', errFB);
    if(facturiBuget && facturiBuget.length) {
      const fbMap = Object.fromEntries(facturiBuget.map(f=>([f.id, f])));
      const tipFactura = Object.keys(gopd).find(t => t.toLowerCase().includes('factur'));
      console.log('[OPIS-FACTURI] tipFactura găsit:', tipFactura);
      if(tipFactura && gopd[tipFactura]) {
        gopd[tipFactura].forEach(d => {
          const fb = fbMap[d.furnizor];
          console.log('[OPIS-FACTURI] doc.furnizor:', d.furnizor, '→ fb găsit:', fb);
          if(fb) {
            d.nr_inregistrare = fb.numar || '';
            d.data_inregistrare = fb.data_document ? fb.data_document.split('T')[0] : null;
          }
        });
        gopd[tipFactura].sort((a,b) => (a.data_inregistrare||'').localeCompare(b.data_inregistrare||''));
      }
    }

    function getNivel(t){const m=t.match(/^(\d+(\.\d+)*)/);if(!m)return 1;return m[1].split('.').filter(s=>s!=='').length;}
    function getFmt(n){
      if(n===1)return{font:fOB,indent:0,size:9,areDoc:false};
      if(n===2)return{font:fOBI,indent:20,size:8.5,areDoc:true};
      if(n===3)return{font:fOI,indent:40,size:8,areDoc:true};
      return{font:fOI,indent:60,size:8,areDoc:true};
    }
    function dr(text,nrI,dI,fmt){
      if(y<40)return;
      if(ri%2===1)pageOpis.drawRectangle({x:85,y:y-4,width:425,height:16,color:PDFLib.rgb(0.97,0.97,0.98)});
      if(fmt.areNrCrt){nc++;pageOpis.drawText(String(nc),{x:86,y,size:fmt.size,font:fmt.font});}
      pageOpis.drawText(roPDF(text),{x:105+fmt.indent,y,size:fmt.size,font:fmt.font});
      if(fmt.areDoc){let df="-";if(dI){const p=dI.split("-");if(p.length===3)df=`${p[2]}.${p[1]}.${p[0]}`;}pageOpis.drawText(roPDF(`${nrI||"-"} / ${df}`),{x:400,y,size:fmt.size,font:fmt.font});}
      y-=18;ri++;
    }

    for(const tip of listaDocumente.filter(t=>t&&t!=='DOSAR ACHIZIȚIE PDF'&&!listaAscunse.includes(t))){
      if(y<40)break;
      const niv=getNivel(tip),fmt=getFmt(niv),ft=gopd[tip]||[];
      const fd=niv===1?{font:fOB,indent:0,size:9,areDoc:true,areNrCrt:false}:{...fmt,areDoc:true,areNrCrt:false};
      if(!ft.length){dr(tip,"-",null,fd);}
      else if(ft.length===1){dr(tip,ft[0].nr_inregistrare,ft[0].data_inregistrare,fd);}
      else{
        dr(tip,null,null,{...fd,areDoc:false,areNrCrt:false});
        const fe={font:fOI,indent:fd.indent+20,size:fd.size-0.5,areDoc:true,areNrCrt:false};
        for(const f of ft){if(y<40)break;dr((f.nume_fisier||"doc").replace(/\.(pdf|jpe?g|png)$/i,"").substring(0,60),f.nr_inregistrare,f.data_inregistrare,fe);}
      }
    }
    (await pdfFinal.copyPages(opisDoc,opisDoc.getPageIndices())).forEach(p=>pdfFinal.addPage(p));
    upd(15,'Opis generat...');

    // Mapare tip document → culoare + emoji (ca text Unicode)
    const SECTIUNE_STYLE = {
      default:          { r:0.22, g:0.48, b:0.87, icon:"D" }, // albastru
      "referat":        { r:0.13, g:0.55, b:0.45, icon:"R" },
      "nota":           { r:0.47, g:0.20, b:0.78, icon:"N" },
      "cerere":         { r:0.90, g:0.45, b:0.10, icon:"C" },
      "anunt":          { r:0.13, g:0.55, b:0.45, icon:"A" },
      "oferta":         { r:0.22, g:0.48, b:0.87, icon:"O" },
      "cif":            { r:0.55, g:0.35, b:0.10, icon:"F" },
      "certificat":     { r:0.10, g:0.50, b:0.30, icon:"C" },
      "declaratie":     { r:0.60, g:0.15, b:0.55, icon:"D" },
      "proces":         { r:0.80, g:0.30, b:0.10, icon:"P" },
      "comunicare":     { r:0.10, g:0.40, b:0.70, icon:"C" },
      "dovada":         { r:0.20, g:0.55, b:0.35, icon:"V" },
      "contract":       { r:0.75, g:0.28, b:0.02, icon:"K" },
      "decizie":        { r:0.55, g:0.10, b:0.10, icon:"D" },
      "factura":        { r:0.10, g:0.50, b:0.20, icon:"F" },
      "op":             { r:0.20, g:0.45, b:0.65, icon:"P" },
      "fotograf":       { r:0.40, g:0.20, b:0.60, icon:"F" },
      "alte":           { r:0.35, g:0.35, b:0.35, icon:"X" },
    };

    function getSectiuteStyle(tip) {
      const tl = (tip||"").toLowerCase();
      for (const [key, val] of Object.entries(SECTIUNE_STYLE)) {
        if (key !== "default" && tl.includes(key)) return val;
      }
      return SECTIUNE_STYLE.default;
    }

    function deseneazaPaginasectiune(page, tip, nrSectiune, imgAntet, imgCrai, listaDocs, fontIco, getFaIcon) {
      const W = 595, H = 842;
      const { rgb } = PDFLib;
      const st = getSectiuteStyle(tip);
      const culoare      = rgb(st.r, st.g, st.b);
      const culoareDark  = rgb(st.r*0.7, st.g*0.7, st.b*0.7);
      const culoareMediu = rgb(Math.min(1,st.r+0.20), Math.min(1,st.g+0.20), Math.min(1,st.b+0.20));
      const alb  = rgb(1,1,1);

      // ── FUNDAL ALB SUS ──
      page.drawRectangle({ x:0, y:H/2, width:W, height:H/2, color:alb });

      // ── ANTET PNRAS ──
      if (imgAntet) {
        const d = imgAntet.scale(1);
        const aW = W - 40;
        const aH = (d.height / d.width) * aW;
        page.drawImage(imgAntet, { x:20, y:H - aH - 18, width:aW, height:aH });
      }

      // ── CRAI — centrat în zona albă, sub antet ──
      if (imgCrai) {
        const d = imgCrai.scale(1);
        const cH = 165;
        const cW = (d.width / d.height) * cH;
        const antetH = imgAntet ? (imgAntet.scale(1).height / imgAntet.scale(1).width) * (W-40) + 18 : 80;
        const antetBottom = H - antetH - 18; // Y-ul de jos al antetului
        const spatAlb = antetBottom - H/2;   // spațiu alb disponibil între antet și separator
        const cY = H/2 + (spatAlb - cH) / 2; // centrat vertical în spațiul rămas
        page.drawImage(imgCrai, { x:(W - cW)/2, y:cY, width:cW, height:cH });
      }

      // Linie separator
      page.drawLine({ start:{x:0, y:H/2}, end:{x:W, y:H/2}, thickness:2, color:culoare });

      // ── ZONA COLORATĂ JOS ──
      page.drawRectangle({ x:0, y:0, width:W, height:H/2, color:culoare });
      page.drawRectangle({ x:0, y:0, width:12, height:H/2, color:culoareDark, opacity:0.4 });
      page.drawEllipse({ x:W+50, y:-50, xScale:200, yScale:200, color:culoareMediu, opacity:0.15 });

      // ── ICOANĂ FontAwesome centrată în zona colorată ──
      if (fontIco && getFaIcon) {
        const icoChar = getFaIcon(tip);
        const icoSize = 82;
        const icoW = fontIco.widthOfTextAtSize(icoChar, icoSize);
        const icoCenterY = H/4 - 50;
        page.drawText(icoChar, {
          x: (W - icoW) / 2,
          y: icoCenterY - icoSize * 0.35,
          size: icoSize,
          font: fontIco,
          color: alb,
          opacity: 0.90,
        });
      }

      // ── TITLU — sus în zona colorată ──
      const tipCurat = roPDF(tip.toUpperCase());
      const maxChars = 34;
      let lines = [];
      if (tipCurat.length <= maxChars) {
        lines = [tipCurat];
      } else {
        const words = tipCurat.split(' ');
        let l1='', l2='';
        for (const w of words) {
          if ((l1+' '+w).trim().length <= maxChars) l1=(l1+' '+w).trim();
          else l2=(l2+' '+w).trim();
        }
        lines = l2 ? [l1, l2] : [l1];
      }
      const titleSize = lines.length > 1 ? 23 : 26;
      const lineSpacing = titleSize + 9;

      // Titlul sus în zona colorată, cu margine de 28px față de separator
      const titluTopY = H/2 - 28 - titleSize;
      lines.forEach((line, i) => {
        const tw = bold.widthOfTextAtSize(line, titleSize);
        page.drawText(line, {
          x: (W - tw) / 2,
          y: titluTopY - i * lineSpacing,
          size: titleSize, font: bold, color: alb
        });
      });

      // Linie subțire sub titlu
      const subTitluY = titluTopY - lines.length * lineSpacing + lineSpacing - 14;
      page.drawRectangle({ x:36, y:subTitluY, width:W-72, height:1, color:alb, opacity:0.30 });

      // ── INFO DOCUMENTE — sub titlu ──
      const infoStartY = subTitluY - 18;
      let iy = infoStartY;
      const infoSize = 9.5;
      const infoLineH = infoSize + 7;

      // Furnizor
      if (furn) {
        const label = roPDF("Furnizor: ");
        const val   = roPDF(furn);
        const lw = font.widthOfTextAtSize(label, infoSize);
        page.drawText(label, { x:36, y:iy, size:infoSize, font:font,  color:alb, opacity:0.65 });
        page.drawText(val,   { x:36+lw, y:iy, size:infoSize, font:bold, color:alb, opacity:0.92 });
        iy -= infoLineH;
      }

      // Contract
      if (nume) {
        const label = roPDF("Contract: ");
        const val   = roPDF(nume);
        const lw = font.widthOfTextAtSize(label, infoSize);
        page.drawText(label, { x:36, y:iy, size:infoSize, font:font,  color:alb, opacity:0.65 });
        page.drawText(val,   { x:36+lw, y:iy, size:infoSize, font:bold, color:alb, opacity:0.92 });
        iy -= infoLineH + 3;
      }

      // Documente din secțiune
      if (listaDocs && listaDocs.length) {
        listaDocs.forEach(d => {
          if (iy < 40) return;
          let info = '';
          if (d.nr_inregistrare) {
            info += 'Nr. ' + d.nr_inregistrare;
            if (d.data_inregistrare) {
              const p = d.data_inregistrare.split('-');
              if (p.length === 3) info += '/' + p[2] + '.' + p[1] + '.' + p[0];
            }
          } else if (d.data_inregistrare) {
            const p = d.data_inregistrare.split('-');
            if (p.length === 3) info = p[2] + '.' + p[1] + '.' + p[0];
          }

          const tipDoc = roPDF((d.tip_document || tip) + ': ');
          const valDoc = roPDF(info || (d.nume_fisier || '-'));
          const tw = font.widthOfTextAtSize(tipDoc, infoSize);
          page.drawText(tipDoc, { x:36, y:iy, size:infoSize, font:font,  color:alb, opacity:0.65 });
          page.drawText(valDoc, { x:36+tw, y:iy, size:infoSize, font:bold, color:alb, opacity:0.92 });
          iy -= infoLineH;
        });
      }

      // Nr secțiune jos
      const nrText = roPDF("Sectiunea " + String(nrSectiune).padStart(2,'0'));
      const nrTW = font.widthOfTextAtSize(nrText, 9);
      page.drawText(nrText, { x:(W-nrTW)/2, y:38, size:9, font:font, color:alb, opacity:0.55 });

      // ── FOOTER ──
      page.drawRectangle({ x:0, y:0, width:W, height:32, color:culoareDark, opacity:0.55 });
      page.drawText(roPDF("Dosar achizitie publica  |  " + (furn||"PNRAS 2024")),
        { x:36, y:11, size:9, font:font, color:alb, opacity:0.82 });
    }

    const totalDocs=ordine.reduce((a,t)=>a+docs.filter(d=>d.tip_document===t).length,0);
    let dp=0, nrSectiuneCurent=0;

    // Încarcă antetul și logo-ul din Supabase (bucket arhiva_pnras)
    upd(15,'Se încarcă antet și logo...');
    let imgAntet = null, imgCrai = null;
    try {
      const antetResp = await fetch(`${SUPABASE_URL}/storage/v1/object/public/arhiva_pnras/antet_pnras.jpeg`);
      if (antetResp.ok) imgAntet = await pdfFinal.embedJpg(new Uint8Array(await antetResp.arrayBuffer()));
    } catch(e) { console.warn('Nu s-a putut încărca antet_pnras.jpeg:', e); }
    try {
      const craiResp = await fetch(`${SUPABASE_URL}/storage/v1/object/public/arhiva_pnras/crai.jpeg`);
      if (craiResp.ok) imgCrai = await pdfFinal.embedJpg(new Uint8Array(await craiResp.arrayBuffer()));
    } catch(e) { console.warn('Nu s-a putut încărca crai.jpeg:', e); }

    for(const tip of ordine){
      const list=docs.filter(d=>d.tip_document===tip);
      if(!list.length)continue;
      nrSectiuneCurent++;
      let page=pdfFinal.addPage([595,842]);
      deseneazaPaginasectiune(page, tip, nrSectiuneCurent, imgAntet, imgCrai, list, fontIco, getFaIcon);

      for(const d of list){
        let bytes;
        try{bytes=await downloadBytesFromStoragePublicUrl(d.link_drive);}
        catch(e){
          const ep=pdfFinal.addPage([595,842]);
          ep.drawText("EROARE FISIER:",{x:80,y:500,size:18,font:bold,color:rgb(0.8,0,0)});
          ep.drawText(roPDF(d.nume_fisier||"necunoscut"),{x:80,y:470,size:14,font});
          continue;
        }

        if((d.link_drive||"").toLowerCase().includes(".pdf")){
          dp++;
          upd(15+(dp/Math.max(totalDocs,1))*75,`Procesare: ${d.nume_fisier||tip} (${dp}/${totalDocs})`);
          if(!pdfjsLib.GlobalWorkerOptions.workerSrc)
            pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          const pdfjsDoc=await pdfjsLib.getDocument({data:bytes.buffer}).promise;
          for(let pi=1;pi<=pdfjsDoc.numPages;pi++){
            const pg=await pdfjsDoc.getPage(pi);
            const vp=pg.getViewport({scale:calitate.scale});
            const cv=document.createElement('canvas'); cv.width=vp.width; cv.height=vp.height;
            await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
            const jb64=cv.toDataURL('image/jpeg',calitate.quality).split(',')[1];
            const jBytes=Uint8Array.from(atob(jb64),c=>c.charCodeAt(0));
            const img=await pdfFinal.embedJpg(jBytes);
            const a4=pdfFinal.addPage([595,842]);
            const sc=Math.min(595/img.width,842/img.height);
            a4.drawImage(img,{x:(595-img.width*sc)/2,y:(842-img.height*sc)/2,width:img.width*sc,height:img.height*sc});
            if(vreaStampila&&imaginiStampile.length)aplicaStampila(a4,urmatoareaStampila());
          }
          continue;
        }

        dp++;
        upd(15+(dp/Math.max(totalDocs,1))*75,`Procesare: ${d.nume_fisier||tip} (${dp}/${totalDocs})`);
        let img;
        try{
          const b2=new Blob([bytes],{type:(d.link_drive||'').toLowerCase().includes('.png')?'image/png':'image/jpeg'});
          const bUrl=URL.createObjectURL(b2);
          const bmp=await createImageBitmap(await fetch(bUrl).then(r=>r.blob()));
          URL.revokeObjectURL(bUrl);
          const cv2=document.createElement('canvas');
          const sc2=Math.min(1,calitate.maxSide/Math.max(bmp.width,bmp.height));
          cv2.width=Math.round(bmp.width*sc2); cv2.height=Math.round(bmp.height*sc2);
          cv2.getContext('2d').drawImage(bmp,0,0,cv2.width,cv2.height);
          const jb2=cv2.toDataURL('image/jpeg',calitate.quality).split(',')[1];
          img=await pdfFinal.embedJpg(Uint8Array.from(atob(jb2),c=>c.charCodeAt(0)));
        }catch(e){
          if((d.link_drive||"").toLowerCase().includes(".png"))img=await pdfFinal.embedPng(bytes);
          else img=await pdfFinal.embedJpg(bytes);
        }
        const p=pdfFinal.addPage([595,842]);
        const sc=Math.min(500/img.width,700/img.height);
        p.drawImage(img,{x:(595-img.width*sc)/2,y:(842-img.height*sc)/2,width:img.width*sc,height:img.height*sc});
        if(vreaStampila&&imaginiStampile.length)aplicaStampila(p,urmatoareaStampila());
      }
    }

    upd(92,'Se salvează PDF-ul...');
    const pdfBytes=await pdfFinal.save();
    const blob=new Blob([pdfBytes],{type:"application/pdf"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`Dosar_achizitie_${contractId}.pdf`; a.click();

    const fn=`DOSAR_${contractId}_${Date.now()}.pdf`;

    upd(96,'Se urcă în storage...');
    let dosarUrl; try{dosarUrl=await r2UploadFile(fn,blob,"contracte",(pct,txt)=>upd(96+(pct/100)*3,txt));}catch(e){alert("PDF generat și descărcat local, dar nu s-a putut urca în storage: "+e.message);return;}

    const{data:dv}=await supabaseClient.from("documente_contract").select("link_drive").eq("contract_id",contractId).eq("tip_document","DOSAR ACHIZIȚIE PDF").single();
    if(dv&&dv.link_drive)await r2DeleteFile(dv.link_drive,"contracte");
    await supabaseClient.from("documente_contract").delete().eq("contract_id",contractId).eq("tip_document","DOSAR ACHIZIȚIE PDF");
    await supabaseClient.from("documente_contract").insert([{contract_id:contractId,nume_contract:nume||"",furnizor:furn||"",tip_document:"DOSAR ACHIZIȚIE PDF",nume_fisier:fn,link_drive:dosarUrl}]);

    upd(100,'Gata!');
    setTimeout(()=>{pm.remove();alert("DOSAR GENERAT ✔");incarcaDocumente();},600);

  }catch(err){pm.remove();alert("Eroare la generare dosar: "+err.message);console.error(err);}
}

/* ===================== ȘTAMPILĂ BULK ===================== */

function actualizezaBtnSelectate() {
  const checked = document.querySelectorAll('.chk-doc:checked');
  const btn = document.getElementById('btnStampilaSelectate');
  if (btn) btn.style.display = checked.length > 0 ? '' : 'none';
  // Actualizează starea checkbox-ului "selectează tot"
  const all = document.querySelectorAll('.chk-doc');
  const chkAll = document.getElementById('chkSelectAll');
  if (chkAll) {
    chkAll.indeterminate = checked.length > 0 && checked.length < all.length;
    chkAll.checked = all.length > 0 && checked.length === all.length;
  }
}

function toggleSelectAll(checked) {
  document.querySelectorAll('.chk-doc').forEach(c => c.checked = checked);
  actualizezaBtnSelectate();
}

async function stampilaToate() {
  const { data: docs } = await supabaseClient.from("documente_contract").select("*").eq("contract_id", contractId);
  const pdfDocs = (docs || []).filter(d => (d.link_drive || '').toLowerCase().split('?')[0].endsWith('.pdf') && d.tip_document !== 'DOSAR ACHIZIȚIE PDF');
  if (!pdfDocs.length) { alert('Nu există documente PDF de ștampilat.'); return; }
  if (!confirm(`Se va aplica ștampila pe ${pdfDocs.length} document(e) PDF. Continuați?`)) return;
  await stampilaLista(pdfDocs.map(d => ({ id: d.id, link: d.link_drive, nume: d.nume_fisier, tip: d.tip_document })));
}

function stampilaSelectate() {
  const checked = document.querySelectorAll('.chk-doc:checked');
  if (!checked.length) { alert('Niciun document selectat.'); return; }
  const lista = [...checked].map(c => ({ id: c.dataset.docid, link: c.dataset.slink, nume: c.dataset.snume, tip: c.dataset.stip }));
  if (!confirm(`Se va aplica ștampila pe ${lista.length} document(e) selectat(e). Continuați?`)) return;
  stampilaLista(lista);
}

async function stampilaLista(lista) {
  // Întreabă o singură dată opțiunea de pagini, aplicată la toate
  // Luăm primul document pentru a afla numărul de pagini (ca referință pentru UI)
  if (!pdfjsLib.GlobalWorkerOptions.workerSrc)
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // Citim nr pagini primul doc
  let totalPaginiRef = 1;
  try {
    const respRef = await fetch(lista[0].link);
    if (respRef.ok) {
      const bytesRef = new Uint8Array(await respRef.arrayBuffer());
      const pRef = await pdfjsLib.getDocument({ data: bytesRef.buffer }).promise;
      totalPaginiRef = pRef.numPages;
    }
  } catch(e) {}

  // Modal selecție pagini (o singură dată pentru toate)
  const selectie = await intreabaSelectiePagini(totalPaginiRef);
  if (!selectie) return;

  // Modal progres global
  const pm = document.createElement('div');
  pm.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:10000;";
  pm.innerHTML = `
    <div style="background:white;padding:28px 36px;border-radius:14px;min-width:380px;box-shadow:0 8px 30px rgba(0,0,0,0.3);text-align:center;">
      <div style="font-size:17px;font-weight:bold;margin-bottom:6px;">🖋️ Se aplică ștampilele...</div>
      <div id="bulkTxt" style="font-size:13px;color:#64748b;margin-bottom:14px;">Inițializare...</div>
      <div style="background:#e2e8f0;border-radius:99px;height:10px;overflow:hidden;">
        <div id="bulkBar" style="height:100%;width:0%;background:linear-gradient(90deg,#3b82f6,#6366f1);border-radius:99px;transition:width 0.3s;"></div>
      </div>
      <div id="bulkCount" style="font-size:12px;color:#94a3b8;margin-top:8px;"></div>
    </div>`;
  document.body.appendChild(pm);
  const setBulk = (p, t, cnt) => {
    document.getElementById('bulkBar').style.width = p + '%';
    document.getElementById('bulkTxt').textContent = t;
    if (cnt !== undefined) document.getElementById('bulkCount').textContent = cnt;
  };

  let reusit = 0, esuat = 0;
  try {
    for (let i = 0; i < lista.length; i++) {
      const doc = lista[i];
      const pct = Math.round((i / lista.length) * 95);
      setBulk(pct, `Se procesează: ${doc.nume || doc.tip}`, `${i + 1} / ${lista.length}`);

      try {
        // Descarcă documentul
        const resp = await fetch(doc.link);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const originalBytes = new Uint8Array(await resp.arrayBuffer());

        // Citește paginile
        const pdfjs = await pdfjsLib.getDocument({ data: originalBytes.slice(0).buffer }).promise;
        const totalPagini = pdfjs.numPages;
        const paginiDeStampilat = getPagini(selectie.optiune, selectie.specifice, totalPagini);
        if (!paginiDeStampilat.length) { esuat++; continue; }

        // Aplică ștampila (refolosim logica din aplicaStampilaDocument)
        const { PDFDocument } = PDFLib;
        const pdfDoc2 = await PDFDocument.load(originalBytes);
        const pagini = pdfDoc2.getPages();

        const linkCuratSP = doc.link.split('?')[0];
        const oldFileName = decodeURIComponent(linkCuratSP.replace(PUBLIC_URLS['contracte'] + '/', ''));
        const originalBlob = new Blob([originalBytes], { type: 'application/pdf' });
        const originalFileName = oldFileName.replace(/\.pdf$/i, '_original.pdf');
        await r2DeleteFile(PUBLIC_URLS['contracte'] + '/' + originalFileName, 'contracte');
        const originalUrl = await r2UploadFile(originalFileName, originalBlob, 'contracte');

        const stampile = await incarcaStampileFullPage(pdfDoc2);
        if (!stampile.length) throw new Error('Ștampile indisponibile');

        const secventaStampile = genereazaSecventaStampile(stampile, paginiDeStampilat.length);
        paginiDeStampilat.forEach((nr, idx) => aplicaStampila(pagini[nr - 1], secventaStampile[idx]));

        const blob = new Blob([await pdfDoc2.save()], { type: 'application/pdf' });
        await r2DeleteFile(linkCuratSP, 'contracte');
        const newUrl = await r2UploadFile(oldFileName, blob, 'contracte');
        const newUrlNoCache = newUrl.split('?')[0] + '?t=' + Date.now();

        await supabaseClient.from('documente_contract').update({
          link_drive: newUrlNoCache,
          stampilat: true,
          link_original: originalUrl
        }).eq('id', doc.id);

        reusit++;
      } catch(e) {
        console.error(`Eroare la doc ${doc.nume}:`, e);
        esuat++;
      }
    }

    setBulk(100, 'Gata!', `${reusit} reușite, ${esuat} eșuate`);
    setTimeout(() => {
      pm.remove();
      alert(`✔ Ștampilare finalizată!\n✅ Reușite: ${reusit}\n❌ Eșuate: ${esuat}`);
      incarcaDocumente();
    }, 600);
  } catch(e) {
    pm.remove();
    alert('Eroare la ștampilare bulk: ' + e.message);
    console.error(e);
  }
}

/* ===================== START ===================== */
window.addEventListener("load",()=>{
  if(!contractId){alert("Lipsește id în URL (dosar_contract.html?id=...)");return;}
  incarcaDocumente();
});
