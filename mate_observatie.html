<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fișe Observație MATE - PNRAS</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root { 
            --sidebar-w: 300px; 
            --primary: #4338ca; 
            --accent: #f59e0b; 
            --bg-app: #94a3b8;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        }
        
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg-app); display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: var(--sidebar-w); flex-shrink: 0; background: #0f172a; color: white; display: flex; flex-direction: column; padding: 25px; overflow-y: auto; border-right: 1px solid #1e293b; }
        .brand { font-size: 1.2rem; font-family: 'Montserrat'; font-weight: 800; margin-bottom: 25px; color: #818cf8; display: flex; align-items: center; gap: 10px; }
        .section-label { font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; font-weight: 800; margin: 20px 0 10px 0; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        
        .sidebar-input { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; color: white; font-size: 0.9rem; margin-bottom: 12px; width: 100%; box-sizing: border-box; outline: none; }

        .year-toggle { display: flex; background: #000; border-radius: 10px; padding: 4px; margin-bottom: 15px; }
        .year-btn { flex: 1; border: none; background: transparent; color: #94a3b8; padding: 10px; font-weight: 700; cursor: pointer; font-size: 0.75rem; }
        .year-btn.active { background: var(--primary); color: white; border-radius: 7px; }

        .class-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .class-card { background: #1e293b; border: 1px solid #334155; color: #cbd5e1; padding: 12px 0; text-align: center; border-radius: 8px; cursor: pointer; font-weight: 800; }
        .class-card.active { background: var(--primary); color: white; border-color: #818cf8; box-shadow: 0 0 15px rgba(67, 56, 202, 0.4); }

        .btn-group { margin-top: auto; padding-top: 30px; display: flex; flex-direction: column; gap: 10px; }
        .print-btn { background: #059669; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 800; cursor: pointer; font-family: 'Montserrat'; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .raport-btn { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 800; text-align: center; text-decoration: none; font-size: 0.85rem; font-family: 'Montserrat'; }

        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; background: #cbd5e1; }
        
        /* DESIGN FOAIE A4 */
        .sheet { background: white; width: 210mm; min-height: 296mm; margin: 0 auto 40px auto; padding: 15mm 18mm; box-shadow: var(--card-shadow); position: relative; box-sizing: border-box; }
        .sheet-antet { width: 100%; margin-bottom: 15px; }
        .sheet-antet img { width: 100%; height: auto; display: block; }

        .nr-inreg-row { display: inline-block; background: #eff6ff; border: 1px solid #bfdbfe; padding: 8px 15px; border-radius: 6px; font-family: 'Montserrat'; font-weight: 800; font-size: 0.9rem; color: #1e40af; margin-bottom: 20px; }

        .doc-title-container { text-align: center; margin-bottom: 20px; }
        .doc-title-main { font-family: 'Montserrat'; font-weight: 800; font-size: 1.4rem; text-transform: uppercase; color: #1e3a8a; margin: 0; }

        .section-title { font-family: 'Montserrat'; font-weight: 800; font-size: 0.85rem; color: #1e3a8a; text-transform: uppercase; margin: 20px 0 8px 0; }
        .section-subtitle { font-weight: 800; font-size: 0.78rem; color: #92400e; background: #fef3c7; padding: 6px 12px; border-radius: 6px; margin: 20px 0 8px 0; }

        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; border: 1px solid #94a3b8; }
        .info-table td { padding: 8px 12px; border: 1px solid #cbd5e1; font-size: 0.85rem; color: #1e293b; vertical-align: middle; }
        .info-table td.label-cell { font-weight: 700; background: #f8fafc; width: 55%; }
        .info-table td.value-cell { font-weight: 700; color: #000; }

        .mate-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; border: 1px solid #94a3b8; }
        .mate-table th { background: #1e3a8a; color: white; padding: 10px; text-align: left; font-weight: 800; text-transform: uppercase; font-size: 0.65rem; }
        .mate-table td { padding: 8px 12px; border: 1px solid #cbd5e1; font-size: 0.82rem; color: #1e293b; }
        .mate-table tr:nth-child(even) { background-color: #f8fafc; }

        .radio-group { display: flex; gap: 15px; justify-content: center; }
        .radio-label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: 800; font-size: 0.7rem; }

        .conclusion-box { border: 2px solid #1e3a8a; border-radius: 10px; padding: 12px 18px; margin: 15px 0; background: #eff6ff; }
        .conclusion-row { display: flex; gap: 25px; margin-top: 8px; align-items: center; }
        .concl-opt { font-weight: 700; font-size: 0.85rem; color: #64748b; padding: 4px 10px; border-radius: 6px; border: 1px solid #cbd5e1; }
        .concl-opt.active-risc { color: #991b1b; background: #fee2e2; border-color: #ef4444; }
        .concl-opt.active-ok { color: #065f46; background: #d1fae5; border-color: #10b981; }

        .risk-note { border-left: 4px solid #f59e0b; background: #fffbeb; padding: 10px 15px; margin: 15px 0; font-size: 0.82rem; color: #78350f; }
        .risk-note b { text-transform: uppercase; }

        .concl-explicatie { margin: 8px 0 0 0; padding-left: 18px; font-size: 0.72rem; color: #475569; line-height: 1.3; }
        .concl-explicatie li { margin-bottom: 2px; }

        .completare-box { margin-top: 25px; border-top: 1px dashed #94a3b8; padding-top: 15px; }
        .completare-box .section-title { margin-top: 0; }
        .completare-row { font-size: 0.85rem; color: #1e293b; margin-bottom: 8px; }
        .completare-row span[contenteditable="true"] { font-weight: 700; border-bottom: 1px solid #94a3b8; padding: 0 4px; outline: none; }
        .completare-row span[contenteditable="true"]:focus { background: #eff6ff; }

        .obs-footer { margin-top: 20px; font-size: 0.78rem; font-style: italic; color: #475569; }
        .auto-badge { font-size: 0.68rem; font-style: italic; color: #92400e; background: #fef3c7; display: inline-block; padding: 2px 8px; border-radius: 4px; margin-top: 5px; }

        @media print {
            @page { margin: 0; size: A4; }
            body { background: white; display: block; }
            .sidebar { display: none !important; }
            .main-content { padding: 0; margin: 0; background: white; overflow: visible; }
            .sheet { box-shadow: none; margin: 0; width: 210mm; min-height: 296mm; page-break-after: always; padding: 8mm 14mm !important; border: none; }

            .sheet-antet { margin-bottom: 8px; }
            .nr-inreg-row { font-size: 0.72rem; padding: 5px 10px; margin-bottom: 10px; background: #eff6ff !important; -webkit-print-color-adjust: exact; }
            .doc-title-container { margin-bottom: 10px; }
            .doc-title-main { font-size: 1.05rem; }

            .section-title { font-size: 0.7rem; margin: 10px 0 5px 0; }
            .section-subtitle { font-size: 0.62rem; padding: 4px 10px; margin: 10px 0 5px 0; background: #fef3c7 !important; -webkit-print-color-adjust: exact; }

            .info-table td { font-size: 0.7rem; padding: 5px 8px; line-height: 1.2; }
            .auto-badge { font-size: 0.58rem; padding: 1px 6px; background: #fef3c7 !important; -webkit-print-color-adjust: exact; }
            .mate-table th { font-size: 0.55rem; padding: 5px 8px; background: #1e3a8a !important; -webkit-print-color-adjust: exact; }
            .mate-table td { font-size: 0.68rem; padding: 5px 8px; line-height: 1.2; }
            .radio-label { font-size: 0.6rem; gap: 3px; }
            .radio-group { gap: 10px; }

            .conclusion-box { padding: 8px 12px; margin: 10px 0; background: #eff6ff !important; -webkit-print-color-adjust: exact; }
            .conclusion-row { margin-top: 5px; gap: 15px; }
            .concl-opt { font-size: 0.68rem; padding: 3px 8px; }
            .concl-opt.active-risc { background: #fee2e2 !important; -webkit-print-color-adjust: exact; }
            .concl-opt.active-ok { background: #d1fae5 !important; -webkit-print-color-adjust: exact; }
            .concl-explicatie { font-size: 0.6rem; margin-top: 5px; }

            .risk-note { font-size: 0.66rem; padding: 6px 10px; margin: 10px 0; background: #fffbeb !important; -webkit-print-color-adjust: exact; }

            .completare-box { margin-top: 12px; padding-top: 8px; }
            .completare-row { font-size: 0.68rem; margin-bottom: 4px; }

            .obs-footer { font-size: 0.6rem; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand"><i class="fa-solid fa-file-invoice"></i> <span>MATE PNRAS</span></div>
        
        <div class="section-label">Configurare NR. ÎNREG</div>
        <input type="text" id="nrBaza" class="sidebar-input" placeholder="Nr. bază (ex: 12)" oninput="handleConfigChange()">
        <input type="text" id="dataDoc" class="sidebar-input" placeholder="Data (ex: 23.01.2026)" oninput="handleConfigChange()">

        <div class="section-label">An Școlar</div>
        <div class="year-toggle">
            <button class="year-btn" id="btn2025" onclick="setYear(2025)">2024-25</button>
            <button class="year-btn active" id="btn2026" onclick="setYear(2026)">2025-26</button>
        </div>

        <div class="section-label">Alege Clasa</div>
        <div class="class-grid" id="classGrid"></div>

        <div class="btn-group">
            <button onclick="window.print()" class="print-btn"><i class="fa-solid fa-print"></i> Printează</button>
            <a href="raport_observatie.html" class="raport-btn">Vezi Raport MATE</a>
        </div>
    </div>

    <div class="main-content" id="sheetsContainer">
        <div style="text-align: center; color: white; margin-top: 150px; opacity: 0.6;">
            <h2>Selectați clasa</h2>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://aexjrbdgajurxzngfkpx.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFleGpyYmRnYWp1cnh6bmdma3B4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgxMzE3NTYsImV4cCI6MjA4MzcwNzc1Nn0.VUx0QOKgjX4m23HOF2rBpE9vWA3T18KtjLc0w_iXhqA';
        const _db = supabase.createClient(supabaseUrl, supabaseKey);
        
        const TABLE_DATA = 'mate_pnras';
        const TABLE_CONFIG = 'rapoarte_salvate';

        let currentYear = 2026;
        let currentClass = null;
        let saveTimeout = null;

        const INDICATORS = [
            { col: 'fo_frecventa', text: 'Elevul are frecvenţă şcolară redusă' },
            { col: 'fo_rezultate', text: 'Elevul are performanţe şcolare slabe' },
            { col: 'fo_repetent_1', text: 'Elevul a rămas repetent o dată' },
            { col: 'fo_repetent_m', text: 'Elevul a rămas repetent de două sau mai multe ori' },
            { col: 'fo_sanctionat', text: 'Elevul a primit sancţiuni în cadrul şcolii (exmatriculare, mustrare, mutare pe motive disciplinare, notă scăzută la purtare etc.) sau plângeri făcute de alţi elevi şi/sau părinţi şi/sau cadre didactice pe motiv de violenţă, bullying, furt, distrugerea de bunuri etc.' }
        ];

        // Coloana din tabel pentru "Elevul este deja identificat și înregistrat în lista de Elevi în proces de abandon"
        const COL_LISTA_ABANDON = 'fo_lista_abandon';

        // Populare Grid Clase
        const clase = ['5A','5B','5C','6A','6B','6C','7A','7B','7C','8A','8B','8C'];
        const grid = document.getElementById('classGrid');
        clase.forEach(c => {
            const d = document.createElement('div');
            d.className = 'class-card'; d.innerText = c;
            d.onclick = () => selectClass(c, d);
            grid.appendChild(d);
        });

        // Încărcare la Refresh
        window.onload = async () => {
            await loadSavedConfig();
        };

        async function loadSavedConfig() {
            const configId = `config_mate_obs_${currentYear}`;
            const { data } = await _db.from(TABLE_CONFIG).select('metadata').eq('id', configId).maybeSingle();
            if (data && data.metadata) {
                document.getElementById('nrBaza').value = data.metadata.nrBaza || '';
                document.getElementById('dataDoc').value = data.metadata.dataDoc || '';
            }
        }

        function handleConfigChange() {
            updateAllInregDisplays();
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveConfig, 1000);
        }

        async function saveConfig() {
            const configId = `config_mate_obs_${currentYear}`;
            const meta = { 
                nrBaza: document.getElementById('nrBaza').value, 
                dataDoc: document.getElementById('dataDoc').value 
            };
            await _db.from(TABLE_CONFIG).upsert({ id: configId, metadata: meta, updated_at: new Date() });
        }

        function updateAllInregDisplays() {
            const nr = document.getElementById('nrBaza').value || '...';
            const dt = document.getElementById('dataDoc').value || '...';
            document.querySelectorAll('.nr-display').forEach((el, idx) => {
                el.innerText = `${nr}/${currentClass || 'CL'}/${idx+1}/${dt}`;
            });
        }

        async function setYear(y) {
            currentYear = y;
            document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn'+y).classList.add('active');
            await loadSavedConfig();
            if(currentClass) loadStudents();
        }

        async function selectClass(cls, el) {
            currentClass = cls;
            document.querySelectorAll('.class-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            // Înainte de a încărca elevii, ne asigurăm că avem ultimele date de configurare
            await loadSavedConfig();
            loadStudents();
        }

        async function loadStudents() {
            const container = document.getElementById('sheetsContainer');
            container.innerHTML = '<div style="text-align:center; padding:50px; color:white;">Se încarcă datele...</div>';
            const { data } = await _db.from(TABLE_DATA).select('*').eq('clasa', currentClass).eq('anul', currentYear).order('nume_elev', { ascending: true });
            if (data) {
                await loadIstoricAbandon(data);
                renderSheets(data);
            }
        }

        // Verifică, pentru fiecare elev (după CNP), dacă în anul școlar anterior a avut deja un
        // dosar de caz deschis (coloana nr_dosar, completată pe rândul cu anul = currentYear - 1),
        // ceea ce înseamnă că a fost identificat și înregistrat în lista de "Elevi în proces de abandon".
        // Dacă da, și elevul nu are deja o valoare setată pentru anul curent, se pre-completează
        // automat "DA" (rămâne editabil manual).
        async function loadIstoricAbandon(students) {
            const cnpuri = students.map(s => s.cnp).filter(Boolean);
            if (!cnpuri.length) return;

            const { data, error } = await _db
                .from(TABLE_DATA)
                .select('cnp, nr_dosar')
                .eq('anul', currentYear - 1)
                .in('cnp', cnpuri);

            if (error) {
                console.warn('Nu am putut verifica istoricul din anul școlar anterior:', error.message);
                return;
            }

            const istoricCuDosar = {};
            (data || []).forEach(row => {
                if (row.cnp && row.nr_dosar && String(row.nr_dosar).trim() !== '') istoricCuDosar[row.cnp] = true;
            });

            students.forEach(s => {
                const nesetatAnulAcesta = (s[COL_LISTA_ABANDON] === null || s[COL_LISTA_ABANDON] === undefined || s[COL_LISTA_ABANDON] === '');
                if (nesetatAnulAcesta && s.cnp && istoricCuDosar[s.cnp]) {
                    s[COL_LISTA_ABANDON] = 'DA';
                    s._autoDetectat = true;
                    // salvăm și în baza de date, ca valoarea să rămână persistentă pentru anul curent
                    _db.from(TABLE_DATA).update({ [COL_LISTA_ABANDON]: 'DA' }).eq('id', s.id);
                }
            });
        }

        let currentStudents = [];

        function esteInRisc(s) {
            if (s[COL_LISTA_ABANDON] === 'DA') return true;
            return INDICATORS.some(ind => s[ind.col] === 'DA');
        }

        function renderSheets(students) {
            currentStudents = students;
            const container = document.getElementById('sheetsContainer');
            container.innerHTML = "";
            const nr = document.getElementById('nrBaza').value || '...';
            const dt = document.getElementById('dataDoc').value || '...';
            
            students.forEach((s, idx) => {
                const sheet = document.createElement('div');
                sheet.className = 'sheet';
                sheet.dataset.idx = idx;
                sheet.innerHTML = `
                    <div class="sheet-antet"><img src="antet_pnras.jpeg"></div>
                    <div class="nr-inreg-row">NR. ÎNREG: <span class="nr-display">${nr}/${currentClass}/${idx+1}/${dt}</span></div>
                    
                    <div class="doc-title-container">
                        <h1 class="doc-title-main">Fișa de observație MATE</h1>
                    </div>

                    <div class="section-title">Indicatorii de risc</div>
                    <table class="info-table">
                        <tr><td class="label-cell">Școala (denumire &amp; codul unic de identificare):</td><td class="value-cell">Liceul Tehnologic ”Victor Mihăilescu Craiu” Belcești, 17130374</td></tr>
                        <tr><td class="label-cell">Nume și prenume elev:</td><td class="value-cell">${s.nume_elev}</td></tr>
                        <tr><td class="label-cell">CNP elev:</td><td class="value-cell">${s.cnp || '—'}</td></tr>
                        <tr><td class="label-cell">Clasa în care se află elevul:</td><td class="value-cell">${s.clasa}</td></tr>
                        <tr>
                            <td class="label-cell">Elevul este identificat și înregistrat în lista de „Elevi în proces de abandon”?</td>
                            <td>
                                <div class="radio-group">
                                    <label class="radio-label"><input type="radio" name="${s.id}_${COL_LISTA_ABANDON}" value="DA" ${s[COL_LISTA_ABANDON] === 'DA' ? 'checked' : ''} onchange="updateValue(${idx}, '${COL_LISTA_ABANDON}', 'DA')"> DA</label>
                                    <label class="radio-label"><input type="radio" name="${s.id}_${COL_LISTA_ABANDON}" value="NU" ${s[COL_LISTA_ABANDON] !== 'DA' ? 'checked' : ''} onchange="updateValue(${idx}, '${COL_LISTA_ABANDON}', 'NU')"> NU</label>
                                </div>
                                ${s._autoDetectat ? `<div class="auto-badge">detectat automat — era în listă în anul ${currentYear-2}-${currentYear-1}</div>` : ''}
                            </td>
                        </tr>
                    </table>

                    <div class="section-subtitle" data-role="indicatori-subtitlu">DOAR DACĂ ELEVUL FRECVENTEAZĂ ȘCOALA (și nu este pe lista „Elevilor în proces de abandon”)</div>
                    <table class="mate-table" data-role="indicatori-tabel">
                        <thead><tr><th style="width: 75%;">Indicatori de risc identificați</th><th style="text-align:center;">DA / NU</th></tr></thead>
                        <tbody>
                            ${INDICATORS.map(ind => `
                                <tr>
                                    <td>${ind.text}</td>
                                    <td>
                                        <div class="radio-group">
                                            <label class="radio-label"><input type="radio" name="${s.id}_${ind.col}" value="DA" ${s[ind.col] === 'DA' ? 'checked' : ''} onchange="updateValue(${idx}, '${ind.col}', 'DA')"> DA</label>
                                            <label class="radio-label"><input type="radio" name="${s.id}_${ind.col}" value="NU" ${s[ind.col] !== 'DA' ? 'checked' : ''} onchange="updateValue(${idx}, '${ind.col}', 'NU')"> NU</label>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>

                    <div class="conclusion-box">
                        <div class="section-title" style="margin:0;">Concluzia Fișei de observație MATE</div>
                        <div class="conclusion-row">
                            <span>Elevul este:</span>
                            <span class="concl-opt" data-role="concl-risc">1. Cu risc de abandon sau PTS</span>
                            <span class="concl-opt" data-role="concl-ok">0. Fără risc</span>
                        </div>
                        <ul class="concl-explicatie">
                            <li>Dacă toți cei 5 indicatori sunt completați cu „Nu” → elevul nu are risc de abandon sau PTS.</li>
                            <li>Dacă cel puțin unul dintre cei 5 indicatori este completat cu „Da” → elev cu risc de abandon sau de părăsire timpurie a școlii.</li>
                        </ul>
                    </div>

                    <div class="risk-note" data-role="risk-note">
                        <b>Doar pentru elevii supuși riscului</b><br>
                        Planificarea evaluării: cazul este evaluat de școală în baza Fișei de evaluare MATE.
                    </div>

                    <div class="completare-box">
                        <div class="section-title">Datele privind completarea Fișei de observație MATE</div>
                        <div class="completare-row">Numele și prenumele persoanei care a completat fișa: <span contenteditable="true">${s.diriginte || ''}</span></div>
                        <div class="completare-row">Funcția persoanei care a completat fișa: <span contenteditable="true">Profesor Diriginte</span></div>
                        <div class="completare-row">Data la care a fost completată fișa: <span contenteditable="true">${dt}</span></div>
                    </div>

                    <div class="obs-footer">Observație: Această fișă trebuie trimisă spre introducere în „Observatorul școlii”.</div>`;
                container.appendChild(sheet);
                updateConcluzie(sheet, s);
            });
        }

        function updateConcluzie(sheet, s) {
            const subtitlu = sheet.querySelector('[data-role="indicatori-subtitlu"]');
            const tabel = sheet.querySelector('[data-role="indicatori-tabel"]');
            const risicNote = sheet.querySelector('[data-role="risk-note"]');
            const conclRisc = sheet.querySelector('[data-role="concl-risc"]');
            const conclOk = sheet.querySelector('[data-role="concl-ok"]');

            const inLista = s[COL_LISTA_ABANDON] === 'DA';
            // Tabelul de indicatori se aplică doar dacă elevul NU e deja pe lista de abandon
            subtitlu.style.display = inLista ? 'none' : 'block';
            tabel.style.display = inLista ? 'none' : 'table';

            const risc = esteInRisc(s);
            conclRisc.classList.toggle('active-risc', risc);
            conclOk.classList.toggle('active-ok', !risc);
            risicNote.style.display = risc ? 'block' : 'none';
        }

        async function updateValue(idx, col, val) {
            const s = currentStudents[idx];
            s[col] = val;
            const sheet = document.querySelector(`.sheet[data-idx="${idx}"]`);
            if (col === COL_LISTA_ABANDON && s._autoDetectat) {
                s._autoDetectat = false;
                if (sheet) {
                    const badge = sheet.querySelector('.auto-badge');
                    if (badge) badge.remove();
                }
            }
            if (sheet) updateConcluzie(sheet, s);
            await _db.from(TABLE_DATA).update({ [col]: val }).eq('id', s.id);
        }
    </script>
</body>
